<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1417">
<title>Auge Equipos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.5; overscroll-behavior-y:none;
    transition:background .15s,color .15s;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .wrap{max-width:440px;margin:0 auto;min-height:100dvh;position:relative}

  /* ---- Login ---- */
  .center{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:20px}
  .logo{width:76px;height:76px;border-radius:20px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:34px;color:var(--accent-on)}
  .title-xl{font-size:22px;font-weight:800;margin:0;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:0;max-width:280px}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;min-height:52px;padding:0 22px;border-radius:14px;background:#fff;color:#1a1a1a;font-size:16px;font-weight:700;width:100%;max-width:320px}
  .btn-google svg{width:20px;height:20px}

  /* ---- Topbar ---- */
  .topbar{display:flex;align-items:center;gap:12px;padding:16px 18px;padding-top:calc(16px + env(safe-area-inset-top))}
  .h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:0;flex:1}
  .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--avatar2));flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
  .screen-sub{font-size:12px;color:var(--muted);padding:0 18px;margin:-8px 0 4px}

  /* ---- Category pill ---- */
  .pill{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:7px 14px;height:34px;font-size:12px;color:var(--text);margin:0 18px 12px}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .pill .chev{color:var(--muted);font-size:11px}

  /* ---- Filter chips ---- */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:0 18px 14px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:8px 15px;border-radius:20px;font-size:13px;font-weight:600;background:var(--surface);color:var(--muted);border:1px solid var(--line)}
  .chip.active{background:var(--accent);color:var(--accent-on);font-weight:700;border-color:var(--accent)}

  .count{font-size:12px;color:var(--muted);padding:0 20px;margin:0 0 10px}

  /* ---- Content / player rows ---- */
  .content{padding:0 18px;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
  .row{display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px -5px rgba(18,38,46,.15)}
  [data-mode="dark"] .row{box-shadow:none;border:1px solid var(--line)}
  .numbadge{width:40px;height:40px;flex:0 0 auto;border-radius:12px;background:var(--num-bg);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:800;font-size:16px}
  .pname{font-size:15px;font-weight:600}
  .ppos{font-size:12px;color:var(--muted)}
  .cap{width:22px;height:22px;flex:0 0 auto;border-radius:50%;background:var(--cap-bg);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .cardstack{display:flex;align-items:center;gap:3px}
  .cardbox{width:15px;height:20px;border-radius:3px}
  .addbtn{width:100%;border:1.5px dashed var(--line);border-radius:18px;padding:14px;color:var(--accent);font-size:14px;font-weight:700;text-align:center;margin-top:4px}

  .empty{border:1px dashed var(--line);border-radius:16px;padding:40px 20px;text-align:center;color:var(--muted);margin-top:8px}
  .empty b{color:var(--text)}

  /* ---- Campeonato ---- */
  .matchcard{background:var(--card);border-radius:20px;padding:18px;position:relative;overflow:hidden;color:#fff}
  [data-mode="dark"] .matchcard{border:1px solid var(--line)}
  [data-mode="dark"] .matchcard::after{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,var(--oc) 0%,transparent 70%);opacity:.28;pointer-events:none}
  .matchlabel{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--oc)}
  .matchrow{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px;position:relative;z-index:1}
  .crest{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .crest.home{background:var(--accent)}
  .crest.away{background:rgba(255,255,255,.12)}
  .mtime{font-size:22px;font-weight:800}
  .mfoot{font-size:12px;color:rgba(255,255,255,.75);position:relative;z-index:1}
  .section-t{font-size:12px;color:var(--muted);font-weight:700;margin:20px 2px 10px}
  .results{display:flex;gap:8px}
  .rescard{flex:1;background:var(--surface);border-radius:14px;padding:12px;text-align:center}
  [data-mode="dark"] .rescard{border:1px solid var(--line)}
  .resscore{font-weight:800;font-size:16px}
  .resriv{font-size:10px;color:var(--muted);margin-top:3px}
  .standings{background:var(--surface);border-radius:18px;overflow:hidden}
  [data-mode="dark"] .standings{border:1px solid var(--line)}
  .strow{display:grid;grid-template-columns:26px 1fr 34px 40px;align-items:center;padding:12px 15px;font-size:13px;border-bottom:1px solid var(--line)}
  .strow:last-child{border-bottom:none}
  .sthead{font-size:10.5px;color:var(--muted);font-weight:700}
  .sthead .pts,.strow .pts{text-align:right}
  .sthead .pts{color:var(--accent)}
  .strow.me{background:var(--num-bg);border-left:3px solid var(--accent)}
  .strow.me .pos,.strow.me .pts{color:var(--accent);font-weight:800}

  /* ---- Config ---- */
  .cfg-t{font-size:13px;color:var(--muted);margin:18px 2px 10px;font-weight:700}
  .swatches{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .sw{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;transition:border-color .15s}
  .sw.active{border-color:var(--accent);border-width:2px}
  .sw-colors{display:flex;gap:3px}
  .sw-c{width:14px;height:14px;border-radius:4px}
  .sw-name{font-size:12px;color:var(--text);text-align:left;line-height:1.2}
  .modetoggle{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px}
  .modebtn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);min-height:44px}
  .modebtn.active{background:var(--accent);color:var(--accent-on);font-weight:700}
  .cfg-mail{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:13px;color:var(--muted)}
  .cfg-mail b{color:var(--text);font-weight:600}
  .logout{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px;color:var(--result-lose);font-size:14px;font-weight:700;margin-top:14px;min-height:48px}

  /* ---- Bottom nav ---- */
  .bottomnav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;z-index:30;background:var(--navbg);border-top:1px solid var(--line);display:flex;height:calc(68px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom)}
  .navitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--navmuted);font-size:10.5px;min-height:44px}
  .navitem svg{width:24px;height:24px}
  .navitem.active{color:var(--accent);font-weight:700}
  .navitem.active .navico{background:var(--accent);color:var(--accent-on);border-radius:7px}
  .navico{width:34px;height:26px;display:flex;align-items:center;justify-content:center}

  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sheet-bg{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.6);display:flex;align-items:flex-end}
  .sheet{background:var(--surface);width:100%;max-width:440px;margin:0 auto;border-radius:20px 20px 0 0;padding:8px 0 calc(16px + env(safe-area-inset-bottom));max-height:70dvh;overflow:auto}
  .sheet h3{margin:16px 20px 8px;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.04em}
  .eq-row{display:flex;align-items:center;gap:12px;padding:15px 20px;font-size:15px;width:100%;text-align:left;border-bottom:1px solid var(--line);min-height:56px}
  .eq-row.sel{color:var(--accent);font-weight:700}

  /* ---- Panel coordinador ---- */
  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .metric{background:var(--surface);border-radius:18px;padding:16px;box-shadow:0 2px 10px -5px rgba(18,38,46,.15)}
  [data-mode="dark"] .metric{box-shadow:none;border:1px solid var(--line)}
  .metric-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .metric-v{font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--accent);margin-top:4px;line-height:1}
  .metric-s{font-size:11px;color:var(--muted);margin-top:4px}
  .bars{display:flex;align-items:flex-end;justify-content:space-around;gap:8px;height:120px;background:var(--surface);border-radius:18px;padding:16px}
  [data-mode="dark"] .bars{border:1px solid var(--line)}
  .barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%}
  .bar{width:60%;max-width:34px;background:var(--accent);border-radius:6px 6px 0 0;min-height:6px}
  .barlbl{font-size:11px;color:var(--muted)}
  .trainrow{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;padding:14px;margin-bottom:8px;border-left:3px solid var(--accent)}
  [data-mode="dark"] .trainrow{border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  /* ---- Auth form / onboarding ---- */
  .authform{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
  .field{width:100%;min-height:50px;border-radius:14px;background:var(--surface);border:1px solid var(--line);padding:0 16px;font-size:16px;color:var(--text);font-family:inherit}
  .field::placeholder{color:var(--muted)}
  .authbtn{width:100%;min-height:52px;border-radius:14px;background:var(--accent);color:var(--accent-on);font-size:16px;font-weight:700}
  .authbtn:disabled{opacity:.55}
  .linkbtn{background:none;color:var(--accent);font-size:13px;font-weight:600;padding:6px}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px;width:100%;max-width:320px}
  .segbtn{flex:1;padding:9px;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);min-height:40px}
  .segbtn.active{background:var(--accent);color:var(--accent-on)}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;width:100%;max-width:320px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .msg{font-size:13px;max-width:320px;text-align:center;line-height:1.4}
  .msg.err{color:var(--result-lose)}
  .msg.ok{color:var(--accent)}

  /* ---- Gestión de equipos ---- */
  .cfg-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;font-size:15px;color:var(--text);width:100%;text-align:left;min-height:52px}
  .cfg-row .chev{color:var(--muted);font-size:20px}
  .sigbadge{flex:0 0 auto;padding:6px 9px;border-radius:8px;background:var(--num-bg);color:var(--accent);font-weight:800;font-size:12px;min-width:34px;text-align:center}
  .backrow{display:flex;align-items:center;gap:12px;padding:16px 18px;padding-top:calc(16px + env(safe-area-inset-top))}
  .backbtn{width:42px;height:42px;flex:0 0 auto;border-radius:12px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:24px}
  .field-lbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .selectrow{display:flex;gap:8px;flex-wrap:wrap}
  .selchip{padding:9px 15px;border-radius:20px;font-size:14px;font-weight:600;background:var(--surface);color:var(--muted);border:1px solid var(--line);min-height:42px}
  .selchip.active{background:var(--accent);color:var(--accent-on);border-color:var(--accent)}

  /* ---- Desktop (pantalla grande): misma app, adaptada ---- */
  @media (min-width:900px){
    .wrap{max-width:1120px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;min-height:100dvh}
    .bottomnav{position:sticky;top:0;left:auto;transform:none;width:240px;max-width:none;height:100dvh;
      flex-direction:column;justify-content:flex-start;gap:6px;border-top:none;border-right:1px solid var(--line);
      padding:26px 14px;grid-column:1;grid-row:1}
    .navitem{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:13px;width:100%;
      padding:12px 14px;border-radius:12px;font-size:14.5px;min-height:48px}
    .navitem .navico{width:26px;height:26px;border-radius:8px}
    .navitem.active{background:var(--num-bg);color:var(--accent)}
    .navitem.active .navico{background:transparent;color:var(--accent)}
    .wrap > div:not(.bottomnav):not(.sheet-bg){grid-column:2;grid-row:1;min-width:0}
    .content{padding:0 32px 44px;max-width:920px}
    .topbar,.screen-sub,.pill,.chips{padding-left:32px;padding-right:32px}
    .chips{max-width:920px}
    .metrics{grid-template-columns:repeat(4,1fr)}
    .h1{font-size:30px}
    .sheet-bg{align-items:center}
    .sheet{max-width:420px;border-radius:20px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ============ CONFIG ============ */
const SUPABASE_URL = "https://ojzsvefvbsrrdyeswqlg.supabase.co";
// Clave pública (publishable) de Supabase — segura para el cliente, respeta RLS.
const SUPABASE_ANON_KEY = "sb_publishable_dDCOsKQHaX14Dyw2B31gAQ_-lg2-bni";
/* ================================ */
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============ TEMA (paletas del club) ============ */
const PALETTES = {
  celeste:  { name:"Celeste, azul y blanco", p:"#1B7FC4", p2:"#5FB8E8", soft:"#E3F1FA", card:"#123A5C", oc:"#8FD3F5" },
  amarillo: { name:"Amarillo y azul",        p:"#1D3F9E", p2:"#F2C500", soft:"#E5E9F6", card:"#12275F", oc:"#F2C500" },
  rojo:     { name:"Blanco y rojo",          p:"#D22F35", p2:"#2C2C30", soft:"#FBE4E4", card:"#1E1E20", oc:"#FF8F93" },
  verde:    { name:"Verde y blanco",         p:"#1F8A5B", p2:"#F0A83E", soft:"#E4F3EB", card:"#13351F", oc:"#7FD0A8" },
  bordo:    { name:"Bordó y oro",            p:"#7C1F2E", p2:"#C79A3A", soft:"#F3E6E8", card:"#2A1015", oc:"#E0C06A" },
  negro:    { name:"Negro y naranja",        p:"#26262B", p2:"#F07A22", soft:"#ECECEE", card:"#141416", oc:"#F07A22" },
  turquesa: { name:"Turquesa y coral",       p:"#0E8C8C", p2:"#F2704E", soft:"#E1F0F0", card:"#16344B", oc:"#4FD0CD" },
};
const NEUTRAL = {
  light:{ bg:"#EEF3F3", surface:"#FFFFFF", text:"#12262E", text2:"#4a5b62", muted:"#6C818A", line:"#E0E8E8", navmuted:"#93a3a8", navbg:"#FFFFFF" },
  dark: { bg:"#0E1417", surface:"#171E22", text:"#EAF0F2", text2:"#b7c3c9", muted:"#8494A0", line:"rgba(255,255,255,.07)", navmuted:"#5f6f6a", navbg:"#080C0D" },
};
function applyTheme(paletteKey, mode){
  const pal = PALETTES[paletteKey] || PALETTES.celeste;
  const n = NEUTRAL[mode] || NEUTRAL.dark;
  const dark = mode === "dark";
  const s = document.documentElement.style;
  s.setProperty("--p", pal.p); s.setProperty("--p2", pal.p2); s.setProperty("--soft", pal.soft);
  s.setProperty("--card", pal.card); s.setProperty("--oc", pal.oc);
  s.setProperty("--bg", n.bg); s.setProperty("--surface", n.surface); s.setProperty("--text", n.text);
  s.setProperty("--text2", n.text2); s.setProperty("--muted", n.muted); s.setProperty("--line", n.line);
  s.setProperty("--navmuted", n.navmuted); s.setProperty("--navbg", n.navbg);
  s.setProperty("--accent", dark ? pal.oc : pal.p);
  s.setProperty("--accent-on", dark ? "#0C1114" : "#FFFFFF");
  s.setProperty("--avatar2", dark ? pal.oc : pal.p2);
  s.setProperty("--num-bg", dark ? "rgba(255,255,255,.06)" : pal.soft);
  s.setProperty("--cap-bg", dark ? "#E8B23E" : pal.p2);
  s.setProperty("--amarilla", "#E8B23E");
  s.setProperty("--roja", dark ? "#E85555" : "#E0483C");
  s.setProperty("--result-win", dark ? pal.oc : pal.p);
  s.setProperty("--result-draw", "#E0A83E");
  s.setProperty("--result-lose", dark ? "#E85555" : "#E0483C");
  document.documentElement.setAttribute("data-mode", mode);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", n.bg);
}

/* ============ Iconos nav ============ */
const NAV_ALL = {
  panel:         { label:"Panel",         d:"M4 13h6V4H4v9zm0 7h6v-5H4v5zm10 0h6V11h-6v9zm0-16v5h6V4h-6z" },
  plantilla:     { label:"Plantilla",     d:"M12 12a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0" },
  campeonato:    { label:"Campeonato",    d:"M6 9a6 6 0 0012 0V4H6v5zM4 4h2m12 0h2M9 18h6m-3-3v3" },
  entrenamiento: { label:"Entrenamiento", d:"M4 12h16M7 8v8m10-8v8" },
  config:        { label:"Config",        d:"M12 15a3 3 0 100-6 3 3 0 000 6zM19 12a7 7 0 00-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 00-1.7-1L14 2h-4l-.8 2.4a7 7 0 00-1.7 1l-2.4-1-2 3.4L3.1 11a7 7 0 000 2l-2 1.6 2 3.4 2.4-1a7 7 0 001.7 1L10 22h4l.8-2.4a7 7 0 001.7-1l2.4 1 2-3.4-2-1.6a7 7 0 00.1-1z" },
};
function Ico({ d }){ return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>; }
const initials = (s) => (s||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
const DIAS = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function fmtFecha(iso){
  if(!iso) return "—";
  const d = new Date(iso+"T12:00:00");
  return DIAS[d.getDay()]+" "+d.getDate()+" "+MESES[d.getMonth()];
}
const DIVISIONES = ["10ma","9na","8va","7ma","6ta","5ta","Intermedia","Primera"];
const DIV_SIGLA = { "Intermedia":"INT", "Primera":"1ra" };
const ramaAbbr = (r)=> r==="Damas"?"Dam":r==="Caballeros"?"Cab":"";
const divNum   = (d)=> !d ? "" : (DIV_SIGLA[d] || d.replace(/[^0-9]/g,""));
function genSigla(division,tira,rama){
  if(!division) return "";
  return (divNum(division)+(tira||"")+(ramaAbbr(rama)?" "+ramaAbbr(rama):"")).trim();
}
function tiraOpts(rama,division){
  if(rama==="Caballeros") return (division==="Primera"||division==="Intermedia") ? ["A","B","C"] : ["A","B"];
  return ["A","B","C","D"]; // Damas o sin definir
}

/* ============ Login ============ */
function Login(){
  const [mode,setMode]=useState("in");   // in | up
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);      // {type:'err'|'ok', text}

  const traducir=(m)=>{
    const s=(m||"").toLowerCase();
    if(s.includes("invalid login")) return "Email o contraseña incorrectos.";
    if(s.includes("already registered")) return "Ese email ya tiene una cuenta. Probá ingresar.";
    if(s.includes("at least")) return "La contraseña debe tener al menos 6 caracteres.";
    if(s.includes("valid email")||s.includes("invalid email")) return "El email no parece válido.";
    if(s.includes("weak")) return "Esa contraseña es muy débil.";
    return m || "Ocurrió un error. Probá de nuevo.";
  };

  const google=async()=>{ setBusy(true); await db.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: window.location.href.split("#")[0] } }); };

  const submit=async()=>{
    setMsg(null);
    if(!email || !pass){ setMsg({type:"err",text:"Completá email y contraseña."}); return; }
    setBusy(true);
    try{
      if(mode==="in"){
        const { error }=await db.auth.signInWithPassword({ email, password:pass });
        if(error) setMsg({type:"err",text:traducir(error.message)});
      }else{
        const { data, error }=await db.auth.signUp({ email, password:pass });
        if(error) setMsg({type:"err",text:traducir(error.message)});
        else if(!data.session) setMsg({type:"ok",text:"Cuenta creada. Revisá tu correo para confirmarla."});
      }
    } finally { setBusy(false); }
  };

  const olvide=async()=>{
    if(!email){ setMsg({type:"err",text:"Escribí tu email arriba y volvé a tocar."}); return; }
    setBusy(true);
    const { error }=await db.auth.resetPasswordForEmail(email,{ redirectTo: window.location.href.split("#")[0] });
    setBusy(false);
    setMsg(error?{type:"err",text:traducir(error.message)}:{type:"ok",text:"Te mandamos un mail para recuperar la contraseña."});
  };

  return (
    <div className="center">
      <div className="logo">A</div>
      <div><h1 className="title-xl">Auge Equipos</h1><p className="sub">Ingresá para ver tus equipos.</p></div>

      <button className="btn-google" onClick={google} disabled={busy}>
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.6 13.2l7.9 6.1C12.4 13.3 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.1-3.8 6.5-9.4 6.5-16.9z"/><path fill="#FBBC05" d="M10.5 28.3a14.5 14.5 0 010-9.2l-7.9-6.1a24 24 0 000 21.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.3-4.6 2.1-7.9 2.1-6.3 0-11.6-3.8-13.5-9.3l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
        Ingresar con Google
      </button>

      <div className="divider">o con tu email</div>

      <div className="seg">
        <button className={"segbtn"+(mode==="in"?" active":"")} onClick={()=>{setMode("in");setMsg(null);}}>Ingresar</button>
        <button className={"segbtn"+(mode==="up"?" active":"")} onClick={()=>{setMode("up");setMsg(null);}}>Crear cuenta</button>
      </div>

      <div className="authform">
        <input className="field" type="email" inputMode="email" autoComplete="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input className="field" type="password" autoComplete={mode==="in"?"current-password":"new-password"} placeholder="Contraseña" value={pass} onChange={e=>setPass(e.target.value)}/>
        <button className="authbtn" onClick={submit} disabled={busy}>{busy?"…":(mode==="in"?"Ingresar":"Crear cuenta")}</button>
        {mode==="in" && <button className="linkbtn" onClick={olvide} disabled={busy}>¿Olvidaste tu contraseña?</button>}
      </div>

      {msg && <div className={"msg "+(msg.type==="err"?"err":"ok")}>{msg.text}</div>}
    </div>
  );
}

/* ============ Onboarding: validá tu carnet ============ */
function Onboarding({ email, onValidated }){
  const [carnet,setCarnet]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);

  const validar=async()=>{
    setMsg(null);
    if(!carnet.trim()){ setMsg({type:"err",text:"Ingresá tu número de carnet."}); return; }
    setBusy(true);
    const { data, error }=await db.rpc("validar_carnet",{ p_carnet:carnet.trim() });
    setBusy(false);
    if(error){ setMsg({type:"err",text:"No se pudo validar. Probá de nuevo."}); return; }
    const st=data && data.status;
    if(st==="ok"){
      const eqs=(data.equipos||[]).map(e=>e.nombre).join(", ");
      setMsg({type:"ok",text:"¡Listo! Te asociamos"+(eqs?" a: "+eqs:"")+"."});
      setTimeout(onValidated, 900);
    } else if(st==="no_encontrado"){
      setMsg({type:"err",text:"No encontramos ese carnet. Revisá el número o pedile a tu entrenador que te cargue."});
    } else if(st==="ya_asociado"){
      setMsg({type:"err",text:"Ese carnet ya está asociado a otra cuenta. Hablá con tu coordinador."});
    } else {
      setMsg({type:"err",text:"No se pudo validar. Probá de nuevo."});
    }
  };

  return (
    <div className="center">
      <div className="logo">A</div>
      <div><h1 className="title-xl">Validá tu carnet</h1><p className="sub">Ingresá tu número de carnet AAHBA para vincularte con tu ficha y ver tus equipos.</p></div>
      <div className="authform">
        <input className="field" inputMode="numeric" placeholder="Número de carnet" value={carnet} onChange={e=>setCarnet(e.target.value)}/>
        <button className="authbtn" onClick={validar} disabled={busy}>{busy?"Validando…":"Validar"}</button>
      </div>
      {msg && <div className={"msg "+(msg.type==="err"?"err":"ok")}>{msg.text}</div>}
      <button className="linkbtn" onClick={()=>db.auth.signOut()}>Cerrar sesión</button>
    </div>
  );
}

function Plantilla({ equipo, email, multi, onOpenPicker }){
  const [players,setPlayers]=useState(null);

  useEffect(()=>{
    setPlayers(null);
    db.from("jugadores").select("id,numero,nombre,apodo,posicion,es_capitan,estado")
      .eq("club_id", equipo.id).order("numero",{ nullsFirst:false })

  const posiciones = [...new Set(players.map(p=>p.posicion).filter(Boolean))];

/* ============ Gestión de equipos del club ============ */
function EquiposManager({ clubeId, clubNombre, onBack }){
  const [lista,setLista]=useState(null);
  const [editing,setEditing]=useState(null);   // null | {id?,rama,division,tira,sigla,_legacy?}
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState(null);

  const cargar=()=>{
    setLista(null);
    db.from("clubs").select("id,nombre,categoria,division,tira,rama,sigla")
      .eq("club_real_id", clubeId)
      .then(({data,error})=>{ setLista(error?[]:(data||[])); });
  };
  useEffect(cargar,[clubeId]);

  const nuevo =()=>{ setErr(null); setEditing({rama:"Caballeros",division:"",tira:"",sigla:""}); };
  const editar=(e)=>{ setErr(null); setEditing({id:e.id,rama:e.rama||"Caballeros",division:e.division||"",tira:e.tira||"",sigla:e.sigla||"",_legacy:(!e.division?(e.categoria||e.nombre):null)}); };

  const guardar=async()=>{
    const f=editing;
    if(!f.division||!f.tira||!f.rama){ setErr("Completá rama, división y tira."); return; }
    const auto=genSigla(f.division,f.tira,f.rama);
    const siglaStore=(f.sigla && f.sigla.trim() && f.sigla.trim()!==auto) ? f.sigla.trim() : null;
    setSaving(true); setErr(null);
    let res;
    if(f.id){
      res=await db.from("clubs").update({division:f.division,tira:f.tira,rama:f.rama,sigla:siglaStore}).eq("id",f.id);
    }else{
      res=await db.from("clubs").insert({club_real_id:clubeId, nombre:(f.division+" "+f.tira).trim(), categoria:f.rama, division:f.division, tira:f.tira, rama:f.rama, sigla:siglaStore});
    }
    setSaving(false);
    if(res.error){ setErr("No se pudo guardar. "+(res.error.message||"")); return; }
    setEditing(null); cargar();
  };

  if(lista===null) return <div className="center"><div className="spinner"/></div>;

  return (
    <div>
      <div className="backrow">
        <button className="backbtn" onClick={onBack}>‹</button>
        <div><div className="h1" style={{fontSize:22}}>Equipos</div><div className="ppos">{clubNombre||"Mi club"}</div></div>
      </div>
      <div className="content">
        {lista.length===0 && <div className="empty">Todavía no hay equipos. Creá el primero.</div>}
        {lista.map(e=>(
          <button className="row" key={e.id} onClick={()=>editar(e)} style={{width:"100%",textAlign:"left"}}>
            <span className="sigbadge">{siglaEquipo(e)}</span>
            <span style={{flex:1,minWidth:0}}>
              <span className="pname">{labelEquipo(e)}</span>
              <span className="ppos">{(e.rama||e.categoria||"—")}{!e.division ? " · a normalizar" : ""}</span>
            </span>
            <span className="ppos">✏️</span>
          </button>
        ))}
        <button className="addbtn" onClick={nuevo}>+ Nuevo equipo</button>
      </div>

      {editing && (
        <div className="sheet-bg" onClick={()=>setEditing(null)}>
          <div className="sheet" onClick={ev=>ev.stopPropagation()}>
            <h3>{editing.id?"EDITAR EQUIPO":"NUEVO EQUIPO"}</h3>
            <div style={{padding:"4px 20px 8px",display:"flex",flexDirection:"column",gap:16}}>
              {editing._legacy && <div className="ppos">Nombre actual: {editing._legacy}</div>}
              <div>
                <div className="field-lbl">Rama</div>
                <div className="seg" style={{maxWidth:"none"}}>
                  {["Damas","Caballeros"].map(r=>(
                    <button key={r} className={"segbtn"+(editing.rama===r?" active":"")}
                      onClick={()=>setEditing({...editing,rama:r,tira:tiraOpts(r,editing.division).includes(editing.tira)?editing.tira:""})}>{r}</button>
                  ))}
                </div>
              </div>
              <div>
                <div className="field-lbl">División</div>
                <div className="selectrow">
                  {DIVISIONES.map(d=>(
                    <button key={d} className={"selchip"+(editing.division===d?" active":"")}
                      onClick={()=>setEditing({...editing,division:d,tira:tiraOpts(editing.rama,d).includes(editing.tira)?editing.tira:""})}>{d}</button>
                  ))}
                </div>
              </div>
              <div>
                <div className="field-lbl">Tira</div>
                <div className="selectrow">
                  {tiraOpts(editing.rama,editing.division).map(t=>(
                    <button key={t} className={"selchip"+(editing.tira===t?" active":"")}
                      onClick={()=>setEditing({...editing,tira:t})}>{t}</button>
                  ))}
                </div>
              </div>
              <div>
                <div className="field-lbl">Sigla (se genera sola; podés editarla)</div>
                <input className="field" value={editing.sigla || genSigla(editing.division,editing.tira,editing.rama)}
                  onChange={ev=>setEditing({...editing,sigla:ev.target.value})} placeholder="Sigla"/>
              </div>
              {err && <div className="msg err">{err}</div>}
              <button className="authbtn" onClick={guardar} disabled={saving}>{saving?"Guardando…":(editing.id?"Guardar cambios":"Crear equipo")}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============ Espacios y turnos ============ */
const SUBDIV = {1:"Entera",2:"Medias",3:"Tercios",4:"Cuartos"};
function EspaciosTurnosManager({ clubeId, clubNombre, onBack }){
  const [espacios,setEspacios]=useState(null);
  const [turnos,setTurnos]=useState(null);
  const [edEsp,setEdEsp]=useState(null);   // edición de cancha
  const [edTur,setEdTur]=useState(null);   // edición de turno
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(null);

  const cargar=()=>{
    db.from("espacios").select("id,nombre,alias,subdivisiones,activo,es_default,orden")
      .eq("clube_id",clubeId).order("orden").then(({data})=>setEspacios(data||[]));
    db.from("turnos").select("id,hora_inicio,hora_fin,orden,activo")
      .eq("clube_id",clubeId).order("hora_inicio").then(({data})=>setTurnos(data||[]));
  };
  useEffect(cargar,[clubeId]);

  const hhmm=(t)=> (t||"").slice(0,5);

  // ---- canchas ----
  const guardarEsp=async()=>{
    const f=edEsp;
    if(!f.nombre || !f.nombre.trim()){ setErr("Poné un nombre para la cancha."); return; }
    setBusy(true); setErr(null);
    if(f.es_default){
      await db.from("espacios").update({es_default:false}).eq("clube_id",clubeId).neq("id", f.id||"00000000-0000-0000-0000-000000000000");
    }
    const payload={ nombre:f.nombre.trim(), alias:(f.alias||"").trim()||null, subdivisiones:f.subdivisiones||2, activo:f.activo!==false, es_default:!!f.es_default };
    let res = f.id
      ? await db.from("espacios").update(payload).eq("id",f.id)
      : await db.from("espacios").insert({...payload, clube_id:clubeId, orden:(espacios||[]).length});
    setBusy(false);
    if(res.error){ setErr("No se pudo guardar. "+(res.error.message||"")); return; }
    setEdEsp(null); cargar();
  };
  const borrarEsp=async(e)=>{
    if(!window.confirm("¿Borrar la cancha \""+(e.alias||e.nombre)+"\"? Se quitarán sus asignaciones de la grilla.")) return;
    setBusy(true);
    const res=await db.from("espacios").delete().eq("id",e.id);
    setBusy(false);
    if(res.error){ setErr("No se pudo borrar. "+(res.error.message||"")); return; }
    setEdEsp(null); cargar();
  };

  // ---- turnos ----
  const guardarTur=async()=>{
    const f=edTur;
    if(!f.hora_inicio || !f.hora_fin){ setErr("Completá hora de inicio y fin."); return; }
    if(f.hora_fin <= f.hora_inicio){ setErr("La hora de fin tiene que ser posterior al inicio."); return; }
    setBusy(true); setErr(null);
    const payload={ hora_inicio:f.hora_inicio, hora_fin:f.hora_fin, activo:true };
    let res = f.id
      ? await db.from("turnos").update(payload).eq("id",f.id)
      : await db.from("turnos").insert({...payload, clube_id:clubeId, orden:(turnos||[]).length});
    setBusy(false);
    if(res.error){ setErr("No se pudo guardar. "+(res.error.message||"")); return; }
    setEdTur(null); cargar();
  };
  const borrarTur=async(t)=>{
    if(!window.confirm("¿Borrar el turno "+hhmm(t.hora_inicio)+"–"+hhmm(t.hora_fin)+"?")) return;
    setBusy(true);
    const res=await db.from("turnos").delete().eq("id",t.id);
    setBusy(false);
    if(res.error){ setErr("No se pudo borrar. "+(res.error.message||"")); return; }
    setEdTur(null); cargar();
  };

  if(espacios===null || turnos===null) return <div className="center"><div className="spinner"/></div>;

  return (
    <div>
      <div className="backrow">
        <button className="backbtn" onClick={onBack}>‹</button>
        <div><div className="h1" style={{fontSize:22}}>Espacios y turnos</div><div className="ppos">{clubNombre||"Mi club"}</div></div>
      </div>
      <div className="content">
        <div className="cfg-t">CANCHAS</div>
        {espacios.map(e=>(
          <button className="row" key={e.id} onClick={()=>{setErr(null);setEdEsp({...e});}} style={{width:"100%",textAlign:"left"}}>
            <span className="sigbadge" style={{minWidth:44}}>{e.alias||e.nombre}</span>
            <span style={{flex:1,minWidth:0}}>
              <span className="pname">{e.nombre}{e.es_default?" · default":""}</span>
              <span className="ppos">{SUBDIV[e.subdivisiones]||e.subdivisiones+" partes"}{e.activo===false?" · inactiva":""}</span>
            </span>
            <span className="ppos">✏️</span>
          </button>
        ))}
        <button className="addbtn" onClick={()=>{setErr(null);setEdEsp({nombre:"",alias:"",subdivisiones:2,activo:true,es_default:false});}}>+ Nueva cancha</button>

        <div className="cfg-t" style={{marginTop:22}}>TURNOS</div>
        {turnos.length===0 && <div className="empty">Todavía no hay turnos. Cargá el primero (arrancás 17:30).</div>}
        {turnos.map(t=>(
          <button className="row" key={t.id} onClick={()=>{setErr(null);setEdTur({id:t.id,hora_inicio:hhmm(t.hora_inicio),hora_fin:hhmm(t.hora_fin)});}} style={{width:"100%",textAlign:"left"}}>
            <span className="sigbadge" style={{minWidth:56}}>{hhmm(t.hora_inicio)}</span>
            <span style={{flex:1,minWidth:0}}><span className="pname">{hhmm(t.hora_inicio)} – {hhmm(t.hora_fin)}</span></span>
            <span className="ppos">✏️</span>
          </button>
        ))}
        <button className="addbtn" onClick={()=>{setErr(null);setEdTur({hora_inicio:"17:30",hora_fin:"19:00"});}}>+ Nuevo turno</button>
      </div>

      {edEsp && (
        <div className="sheet-bg" onClick={()=>setEdEsp(null)}>
          <div className="sheet" onClick={ev=>ev.stopPropagation()}>
            <h3>{edEsp.id?"EDITAR CANCHA":"NUEVA CANCHA"}</h3>
            <div style={{padding:"4px 20px 8px",display:"flex",flexDirection:"column",gap:16}}>
              <div><div className="field-lbl">Nombre</div><input className="field" value={edEsp.nombre} onChange={ev=>setEdEsp({...edEsp,nombre:ev.target.value})} placeholder="Cancha 1"/></div>
              <div><div className="field-lbl">Alias / color</div><input className="field" value={edEsp.alias||""} onChange={ev=>setEdEsp({...edEsp,alias:ev.target.value})} placeholder="Azul"/></div>
              <div>
                <div className="field-lbl">Se divide en</div>
                <div className="selectrow">
                  {[1,2,3,4].map(n=>(
                    <button key={n} className={"selchip"+(edEsp.subdivisiones===n?" active":"")} onClick={()=>setEdEsp({...edEsp,subdivisiones:n})}>{SUBDIV[n]}</button>
                  ))}
                </div>
              </div>
              <div>
                <div className="field-lbl">Estado</div>
                <div className="seg" style={{maxWidth:"none"}}>
                  <button className={"segbtn"+(edEsp.activo!==false?" active":"")} onClick={()=>setEdEsp({...edEsp,activo:true})}>Activa</button>
                  <button className={"segbtn"+(edEsp.activo===false?" active":"")} onClick={()=>setEdEsp({...edEsp,activo:false})}>Inactiva</button>
                </div>
              </div>
              <div>
                <div className="field-lbl">Cancha por defecto</div>
                <div className="seg" style={{maxWidth:"none"}}>
                  <button className={"segbtn"+(edEsp.es_default?" active":"")} onClick={()=>setEdEsp({...edEsp,es_default:true})}>Sí</button>
                  <button className={"segbtn"+(!edEsp.es_default?" active":"")} onClick={()=>setEdEsp({...edEsp,es_default:false})}>No</button>
                </div>
              </div>
              {err && <div className="msg err">{err}</div>}
              <button className="authbtn" onClick={guardarEsp} disabled={busy}>{busy?"Guardando…":(edEsp.id?"Guardar":"Crear cancha")}</button>
              {edEsp.id && <button className="linkbtn" style={{color:"var(--result-lose)"}} onClick={()=>borrarEsp(edEsp)}>Borrar cancha</button>}
            </div>
          </div>
        </div>
      )}

      {edTur && (
        <div className="sheet-bg" onClick={()=>setEdTur(null)}>
          <div className="sheet" onClick={ev=>ev.stopPropagation()}>
            <h3>{edTur.id?"EDITAR TURNO":"NUEVO TURNO"}</h3>
            <div style={{padding:"4px 20px 8px",display:"flex",flexDirection:"column",gap:16}}>
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1}}><div className="field-lbl">Inicio</div><input className="field" type="time" value={edTur.hora_inicio} onChange={ev=>setEdTur({...edTur,hora_inicio:ev.target.value})}/></div>
                <div style={{flex:1}}><div className="field-lbl">Fin</div><input className="field" type="time" value={edTur.hora_fin} onChange={ev=>setEdTur({...edTur,hora_fin:ev.target.value})}/></div>
              </div>
              {err && <div className="msg err">{err}</div>}
              <button className="authbtn" onClick={guardarTur} disabled={busy}>{busy?"Guardando…":(edTur.id?"Guardar":"Crear turno")}</button>
              {edTur.id && <button className="linkbtn" style={{color:"var(--result-lose)"}} onClick={()=>borrarTur(edTur)}>Borrar turno</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============ Panel del coordinador (datos reales) ============ */
function PanelCoordinador({ clubeId, email }){
  const [data,setData]=useState(null);
  useEffect(()=>{
    if(!clubeId){ setData({}); return; }
    setData(null);
    db.rpc("panel_coordinador",{ p_clube_id: clubeId }).then(({data,error})=>{
      if(error){ console.error(error); setData({error:true}); return; }
      setData(data||{});
    });
  },[clubeId]);

  if(data===null) return <div className="center"><div className="spinner"/></div>;

  const hoy = new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  const sem = data.asistencia_semanal || [];
  const maxPct = Math.max(100, ...sem.map(s=>s.pct||0));
  const prox = data.proximo_partido;
  const ent = data.entrenamientos_hoy || [];

  return (
    <div>
      <div className="topbar"><h1 className="h1">Panel</h1><div className="avatar">{initials(email)}</div></div>
      <div className="screen-sub" style={{textTransform:"capitalize"}}>{hoy} · Temporada 2026</div>
      <div className="content">
        <div className="metrics">
          <div className="metric"><div className="metric-l">Jugadores</div><div className="metric-v">{data.jugadores ?? "—"}</div></div>
          <div className="metric"><div className="metric-l">Categorías</div><div className="metric-v">{data.categorias ?? "—"}</div></div>
          <div className="metric"><div className="metric-l">Asistencia media</div><div className="metric-v">{data.asistencia_media!=null ? data.asistencia_media+"%" : "—"}</div><div className="metric-s">últimas 4 semanas</div></div>
          <div className="metric"><div className="metric-l">Cuotas al día</div><div className="metric-v" style={{color:"var(--muted)"}}>—</div><div className="metric-s">próximamente</div></div>
        </div>

        <div className="section-t">Próximo partido</div>
        {prox ? (
          <div className="matchcard">
            <div className="matchlabel">{prox.equipo || "Próximo partido"}</div>
            <div className="matchrow">
              <div className="crest home">GE</div>
              <div className="mtime">{(prox.kick_time||"").slice(0,5) || "—"}</div>
              <div className="crest away">{initials(prox.rival||"?")}</div>
            </div>
            <div className="mfoot">{fmtFecha(prox.fecha_date)}{prox.location? " · "+prox.location:""}{prox.rival? " · vs "+prox.rival:""}</div>
          </div>
        ) : <div className="empty">Sin partidos próximos cargados.</div>}

        <div className="section-t">Asistencia semanal</div>
        {sem.length ? (
          <div className="bars">
            {sem.map((s,i)=>(
              <div className="barcol" key={i}>
                <div className="bar" style={{height:Math.max(6,((s.pct||0)/maxPct)*88)+"px"}}/>
                <div className="barlbl">{DIAS[s.dow] || "?"}</div>
              </div>
            ))}
          </div>
        ) : <div className="empty">Sin datos de asistencia todavía.</div>}

        <div className="section-t">Entrenamientos de hoy</div>
        {ent.length ? ent.map((e,i)=>(
          <div className="trainrow" key={i}>
            <div style={{flex:1,minWidth:0}}>
              <div className="pname">{e.titulo || "Entrenamiento"}</div>
              <div className="ppos">{e.equipo}{e.notas? " · "+e.notas:""}</div>
            </div>
          </div>
        )) : <div className="empty">No hay entrenamientos hoy.</div>}
      </div>
    </div>
  );
}

/* ============ App ============ */
function App({ session }){
  const email = session.user.email;
  const [accesos,setAccesos]=useState(null);
  const [equipoSel,setEquipoSel]=useState(()=>localStorage.getItem("mobile_equipo")||null);
  const [tab,setTab]=useState(()=>localStorage.getItem("mobile_tab")||"");
  const [pickerOpen,setPickerOpen]=useState(false);
  const [palette,setPalette]=useState(()=>localStorage.getItem("mobile_palette")||"celeste");
  const [mode,setMode]=useState(()=>localStorage.getItem("mobile_mode")||"dark");
  const [cfgView,setCfgView]=useState("main");   // main | equipos

  useEffect(()=>{ applyTheme(palette,mode); localStorage.setItem("mobile_palette",palette); localStorage.setItem("mobile_mode",mode); },[palette,mode]);
  useEffect(()=>{ if(equipoSel) localStorage.setItem("mobile_equipo",equipoSel); },[equipoSel]);
  useEffect(()=>{ if(tab) localStorage.setItem("mobile_tab",tab); },[tab]);

  const loadAccesos=React.useCallback(()=>{
    setAccesos(null);
    db.rpc("mis_accesos").then(({data,error})=>{
      setAccesos(error ? {equipos:[],clubes:[],super_admin:false} : (data||{equipos:[],clubes:[]}));
    });
  },[]);
  useEffect(()=>{ loadAccesos(); },[loadAccesos]);

  useEffect(()=>{
    if(!accesos) return;
    const eqs = accesos.equipos || [];
    if(eqs.length && !eqs.find(e=>e.id===equipoSel)) setEquipoSel(eqs[0].id);
  },[accesos]);

  if(accesos===null) return <div className="center"><div className="spinner"/></div>;

  const equipos = accesos.equipos || [];
  const esCoord = !!accesos.super_admin || (accesos.clubes||[]).length>0;
  const clubeId = (accesos.clubes||[])[0]?.id || equipos[0]?.clube_id || null;
  const clubNombre = (accesos.clubes||[])[0]?.nombre || null;
  const navOrder = esCoord ? ["panel","plantilla","campeonato","config"]
                           : ["plantilla","campeonato","entrenamiento","config"];
  const tabActual = navOrder.includes(tab) ? tab : navOrder[0];

  if(!esCoord && equipos.length===0) return <Onboarding email={email} onValidated={loadAccesos}/>;

  const equipo = equipos.find(e=>e.id===equipoSel) || equipos[0] || null;

  return (
    <div className="wrap">
      {tabActual==="panel"         && <PanelCoordinador clubeId={clubeId} email={email}/>}
      {tabActual==="plantilla"     && (equipo ? <Plantilla equipo={equipo} email={email} multi={equipos.length>1} onOpenPicker={()=>setPickerOpen(true)}/> : <Placeholder titulo="Plantilla" email={email}/>)}
      {tabActual==="campeonato"    && <Campeonato email={email}/>}
      {tabActual==="entrenamiento" && <Placeholder titulo="Entrenamiento" email={email}/>}
      {tabActual==="config"        && (
          cfgView==="equipos"  ? <EquiposManager clubeId={clubeId} clubNombre={clubNombre} onBack={()=>setCfgView("main")}/> :
          cfgView==="espacios" ? <EspaciosTurnosManager clubeId={clubeId} clubNombre={clubNombre} onBack={()=>setCfgView("main")}/> :
          <Config email={email} palette={palette} mode={mode} onPalette={setPalette} onMode={setMode} esCoord={esCoord} onOpenEquipos={()=>setCfgView("equipos")} onOpenEspacios={()=>setCfgView("espacios")}/>
      )}

      <nav className="bottomnav">
        {navOrder.map(id=>{ const n=NAV_ALL[id]; return (
          <button key={id} className={"navitem"+(id===tabActual?" active":"")} onClick={()=>setTab(id)}>
            <span className="navico"><Ico d={n.d}/></span><span>{n.label}</span>
          </button>
        );})}
      </nav>

      {pickerOpen && (
        <div className="sheet-bg" onClick={()=>setPickerOpen(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <h3>ELEGIR EQUIPO</h3>
            {equipos.map(e=>(
              <button key={e.id} className={"eq-row"+(e.id===(equipo&&equipo.id)?" sel":"")} onClick={()=>{setEquipoSel(e.id);setPickerOpen(false);}}>
                <span style={{flex:1}}>{e.nombre}<br/><span style={{fontSize:12,color:"var(--muted)"}}>{e.categoria||"—"}</span></span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Root(){
  const [session,setSession]=useState(undefined);
  useEffect(()=>{ applyTheme(localStorage.getItem("mobile_palette")||"celeste", localStorage.getItem("mobile_mode")||"dark"); },[]);
  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub }=db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(session===undefined) return <div className="center"><div className="spinner"/></div>;
  if(!session) return <Login/>;
  return <App session={session}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
