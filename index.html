    // ═══════════════════════════════════════════════════════════════════════════
    //  PARSER DE FICHA DE PARTIDO AAHBA (PDF descargado del tournamenttracker)
    //  Espera texto con dos equipos (local + visitante) y devuelve la lista
    //  de jugadores con: { numero, nombre, carnet }
    // ═══════════════════════════════════════════════════════════════════════════

    // Detecta líneas de jugadores en formato AAHBA: "N° Nombre Apellido [carnet] - - - -"
    // Ejemplo: "1 Munnich Martina 166875 - - - -"
    // El (C) antes del número indica capitán pero lo ignoramos en el import (lo cargás manual)
    function parseAAHBAFichaPartido(text) {
      // Normalizar caracteres invisibles y saltos
      let t = text;
      t = t.replace(/[\u00a0\u200b-\u200d\ufeff\ufffc\ufffd]/g, " ");
      t = t.replace(/\r\n?/g, "\n");

      // Fix de encoding roto típico de algunos PDFs (UTF-8 mal decodificado como Latin-1)
      // "ã¡" → "á", "ã©" → "é", "ã³" → "ó", "ã±" → "ñ", etc.
      t = t.replace(/ã¡/g, "á").replace(/ã©/g, "é").replace(/ã­/g, "í")
           .replace(/ã³/g, "ó").replace(/ãº/g, "ú").replace(/ã±/g, "ñ")
           .replace(/ã/g, "Á").replace(/ã‰/g, "É").replace(/ã/g, "Í")
           .replace(/ã“/g, "Ó").replace(/ãš/g, "Ú").replace(/ã'/g, "Ñ");

      const lines = t.split("\n").map(l => l.trim()).filter(Boolean);

      // ─── Extraer nombres de equipos ─────────────────────────────────────────
      let equipoLocalNombre = "";
      let equipoVisitanteNombre = "";
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i].toLowerCase();
        // Caso 1: "Equipo local ||| Equipo visitante" en la misma línea (layout 2 columnas)
        if (l.includes("equipo local") && l.includes("equipo visitante") && !equipoLocalNombre) {
          // La siguiente línea tiene "BANADE 3 ||| G. Y ESGRIMA B 2" - separados por |||
          if (i + 1 < lines.length && lines[i+1].includes("|||")) {
            const [izq, der] = lines[i+1].split("|||").map(s => s.trim());
            equipoLocalNombre = limpiarNombreEquipo(izq);
            equipoVisitanteNombre = limpiarNombreEquipo(der);
          }
          continue;
        }
        // Caso 2: "Equipo local" en su propia línea, nombre en la siguiente
        if (l.includes("equipo local") && !equipoLocalNombre) {
          const inLine = lines[i].replace(/equipo\s+local/i, "").trim();
          if (inLine) equipoLocalNombre = limpiarNombreEquipo(inLine);
          else if (i + 1 < lines.length) equipoLocalNombre = limpiarNombreEquipo(lines[i+1]);
        }
        if (l.includes("equipo visitante") && !equipoVisitanteNombre) {
          const inLine = lines[i].replace(/equipo\s+visitante/i, "").trim();
          if (inLine) equipoVisitanteNombre = limpiarNombreEquipo(inLine);
          else if (i + 1 < lines.length) equipoVisitanteNombre = limpiarNombreEquipo(lines[i+1]);
        }
      }

      // ─── Encontrar bloque de jugadores ──────────────────────────────────────
      // Buscar la línea con headers de tabla. Puede ser:
      //   "Nº Local Carnet G TVe TAm TRo" (una sola línea con header local)
      //   "Nº Local Carnet G TVe TAm TRo Nº Visitante Carnet G TVe TAm TRo" (dos columnas paralelas)
      let idxHeader = -1;
      let idxVisitanteHeader = -1; // por si están en líneas separadas
      let twoColumns = false;
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        if (idxHeader === -1 && /N[ºo°]\s+Local\s+Carnet/i.test(l)) {
          idxHeader = i;
          // Detectar si la misma línea tiene también "Nº Visitante"
          if (/N[ºo°]\s+Visitante\s+Carnet/i.test(l)) twoColumns = true;
        }
        if (idxVisitanteHeader === -1 && /^N[ºo°]\s+Visitante/i.test(l)) {
          idxVisitanteHeader = i;
        }
      }

      // ─── Regex de un jugador: "número (C) Nombre Apellido carnet" ───────────
      // Usado con flag /g para extraer todos los matches de una línea
      const playerRe = /(?:\(C\)\s*)?(\d{1,3})\s+(?:\(C\)\s*)?([A-Za-zÁÉÍÓÚÑÜáéíóúñü][A-Za-zÁÉÍÓÚÑÜáéíóúñü\s'\.-]+?)\s+(\d{4,10})/g;

      const localPlayers = [];
      const visitantePlayers = [];

      // Determinar rango de procesamiento
      const start = idxHeader >= 0 ? idxHeader + 1 : 0;
      const end = lines.length;

      // Estrategia en 2 pasadas para 2 columnas:
      // 1) Procesamos las filas con 2 matches → 1° local, 2° visitante
      // 2) Las filas con 1 match son del equipo que tiene más jugadores (el más grande)
      const lineMatches = []; // [{line, matches}]
      for (let i = start; i < end; i++) {
        const line = lines[i];
        if (/^Arbitros|^Juez|^Ballgirls|^Observaciones|^Powered by/i.test(line)) break;
        if (/^[TAP]\s+[A-ZÁÉÍÓÚÑ]/.test(line)) {
          playerRe.lastIndex = 0;
          if (!playerRe.test(line)) break;
          playerRe.lastIndex = 0;
        }
        playerRe.lastIndex = 0;
        const matches = [...line.matchAll(playerRe)];
        if (matches.length === 0) continue;
        lineMatches.push({ line, matches });
      }

      if (twoColumns) {
        // Pasada 1: filas con 2 matches → ambos equipos
        for (const lm of lineMatches) {
          if (lm.matches.length >= 2) {
            const [, num1, nom1, car1] = lm.matches[0];
            const [, num2, nom2, car2] = lm.matches[1];
            localPlayers.push({ numero: parseInt(num1), nombre: cleanName(nom1), carnet: car1 });
            visitantePlayers.push({ numero: parseInt(num2), nombre: cleanName(nom2), carnet: car2 });
          }
        }
        // Pasada 2: filas con 1 match → usar separador "|||" para decidir columna
        for (const lm of lineMatches) {
          if (lm.matches.length === 1) {
            const m = lm.matches[0];
            // ¿El match está después del separador "|||"?
            const sepIdx = lm.line.indexOf("|||");
            const matchIdx = lm.line.indexOf(m[0]);
            // Si hay separador y el match viene después → columna derecha (visitante)
            // Si no hay separador, fallback: posición < 5 = local, sino visitante
            let target;
            if (sepIdx >= 0) {
              target = matchIdx > sepIdx ? visitantePlayers : localPlayers;
            } else {
              target = matchIdx < 5 ? localPlayers : visitantePlayers;
            }
            target.push({ numero: parseInt(m[1]), nombre: cleanName(m[2]), carnet: m[3] });
          }
        }
      } else {
        // Layout antiguo de 1 columna: usar idxVisitanteHeader para distinguir
        for (let i = start; i < end; i++) {
          const line = lines[i];
          if (/^Arbitros|^Juez|^Ballgirls|^Observaciones|^Powered by/i.test(line)) break;
          playerRe.lastIndex = 0;
          const matches = [...line.matchAll(playerRe)];
          if (matches.length === 0) continue;
          const target = (idxVisitanteHeader > 0 && i >= idxVisitanteHeader) ? visitantePlayers : localPlayers;
          for (const m of matches) {
            target.push({ numero: parseInt(m[1]), nombre: cleanName(m[2]), carnet: m[3] });
          }
        }
      }

      return {
        equipoLocal: { nombre: equipoLocalNombre, jugadores: localPlayers },
        equipoVisitante: { nombre: equipoVisitanteNombre, jugadores: visitantePlayers },
      };
    }

    // Limpia el nombre del jugador: saca "(C)" embebido, espacios múltiples, etc.
    function cleanName(raw) {
      return raw.trim().replace(/\s*\(C\)\s*/gi, " ").replace(/\s+/g, " ").trim();
    }

    // Limpia "S.I.C. D 2" → "S.I.C. D" (saca el goleo al final si quedó pegado)
    function limpiarNombreEquipo(raw) {
      let s = raw.trim();
      // Quitar el separador de columna ||| si quedó
      s = s.replace(/\|\|\|/g, " ").trim();
      // Saca dígitos colgando al final ("S.I.C. D 2" → "S.I.C. D")
      s = s.replace(/\s+\d+$/, "");
      return s.trim();
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  PARSER EXTENDIDO DE PLANILLA AAHBA
    //  A diferencia de parseAAHBAFichaPartido (que solo lee plantel), este
    //  extrae también: marcador, goles/tarjetas por jugador, árbitros.
    //
    //  Devuelve:
    //    {
    //      equipoLocal: { nombre, golesEquipo, jugadores: [...] },
    //      equipoVisitante: { nombre, golesEquipo, jugadores: [...] },
    //      arbitros: string,
    //    }
    //
    //  Cada jugador tiene: { numero, nombre, carnet, goles, tarjetaVerde, tarjetaAmarilla, tarjetaRoja }
    //  Fila típica del PDF: "1 Munnich Martina 166875 - - 1 -"
    //  (después del carnet: G TVe TAm TRo, con "-" = 0)
    // ═══════════════════════════════════════════════════════════════════════════
    function parsePlanillaAAHBA(text) {
      // Normalizar
      let t = text;
      t = t.replace(/[\u00a0\u200b-\u200d\ufeff\ufffc\ufffd]/g, " ");
      t = t.replace(/\r\n?/g, "\n");
      // Fix encoding roto
      t = t.replace(/ã¡/g, "á").replace(/ã©/g, "é").replace(/ã­/g, "í")
           .replace(/ã³/g, "ó").replace(/ãº/g, "ú").replace(/ã±/g, "ñ");

      const lines = t.split("\n").map(l => l.trim()).filter(Boolean);

      // ─── Nombres y marcador de equipos ────────────────────────────────────
      let equipoLocal = { nombre: "", golesEquipo: null, jugadores: [] };
      let equipoVisitante = { nombre: "", golesEquipo: null, jugadores: [] };

      // Helper: extrae nombre + goles del final ("S.I.C. D 2" → ["S.I.C. D", 2])
      const splitNombreGoles = (raw) => {
        const s = (raw || "").replace(/\|\|\|/g, " ").trim();
        const m = s.match(/^(.+?)\s+(\d+)$/);
        if (m) return [m[1].trim(), parseInt(m[2])];
        return [s, null];
      };

      for (let i = 0; i < lines.length; i++) {
        const l = lines[i].toLowerCase();
        if (l.includes("equipo local") && l.includes("equipo visitante") && !equipoLocal.nombre) {
          if (i + 1 < lines.length && lines[i+1].includes("|||")) {
            const [izq, der] = lines[i+1].split("|||").map(s => s.trim());
            const [nL, gL] = splitNombreGoles(izq);
            const [nV, gV] = splitNombreGoles(der);
            equipoLocal.nombre = nL; equipoLocal.golesEquipo = gL;
            equipoVisitante.nombre = nV; equipoVisitante.golesEquipo = gV;
          }
          continue;
        }
        if (l.includes("equipo local") && !equipoLocal.nombre) {
          const inLine = lines[i].replace(/equipo\s+local/i, "").trim();
          const target = inLine || (i + 1 < lines.length ? lines[i+1] : "");
          const [n, g] = splitNombreGoles(target);
          equipoLocal.nombre = n; equipoLocal.golesEquipo = g;
        }
        if (l.includes("equipo visitante") && !equipoVisitante.nombre && !l.includes("equipo local")) {
          const inLine = lines[i].replace(/equipo\s+visitante/i, "").trim();
          const target = inLine || (i + 1 < lines.length ? lines[i+1] : "");
          const [n, g] = splitNombreGoles(target);
          equipoVisitante.nombre = n; equipoVisitante.golesEquipo = g;
        }
      }

      // ─── Encontrar header de tabla ───────────────────────────────────────
      let idxHeader = -1;
      let twoColumns = false;
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        if (idxHeader === -1 && /N[ºo°]\s+Local\s+Carnet/i.test(l)) {
          idxHeader = i;
          if (/N[ºo°]\s+Visitante\s+Carnet/i.test(l)) twoColumns = true;
        }
      }

      // Regex EXTENDIDO. El ||| puede cortar la fila en cualquier punto, así que
      // capturamos al menos UN valor después del carnet, y el resto lo leemos por separado.
      // Formato: "1 Apellido Nombre 166875 - - 1 -"
      // Captura: (numero)(nombre)(carnet)(extras = "- - - -" o lo que haya)
      const playerRe = /(?:\(C\)\s*)?(\d{1,3})\s+(?:\(C\)\s*)?([A-Za-zÁÉÍÓÚÑÜáéíóúñü][A-Za-zÁÉÍÓÚÑÜáéíóúñü\s'\.-]+?)\s+(\d{4,10})((?:\s+[\d-]){1,4})/g;

      // ─── Recopilar matches por línea ────────────────────────────────────
      const start = idxHeader >= 0 ? idxHeader + 1 : 0;
      const lineMatches = [];
      for (let i = start; i < lines.length; i++) {
        const line = lines[i];
        if (/^Arbitros|^Juez|^Ballgirls|^Observaciones|^Powered by/i.test(line)) break;
        if (/^[TAP]\s+[A-ZÁÉÍÓÚÑ]/.test(line)) {
          playerRe.lastIndex = 0;
          if (!playerRe.test(line)) break;
          playerRe.lastIndex = 0;
        }
        playerRe.lastIndex = 0;
        const matches = [...line.matchAll(playerRe)];
        if (matches.length === 0) continue;
        lineMatches.push({ line, matches });
      }

      // Helper para convertir un match en objeto jugador
      // m[4] tiene los "extras" como string: " - - - -" o " 3 - - -" o " - -" (incompleto)
      // Si vinieron menos de 4 valores (porque ||| cortó la fila), completamos con "-"
      const matchToPlayer = (m, extrasSeparadasDerecha = "") => {
        const dashOrInt = (s) => s === "-" ? 0 : parseInt(s);
        // Parsear los extras: el grupo m[4] + lo que haya quedado después de |||
        const extrasIzq = (m[4] || "").trim().split(/\s+/).filter(Boolean);
        const extrasDer = extrasSeparadasDerecha.trim().split(/\s+/).filter(Boolean);
        const todos = [...extrasIzq, ...extrasDer];
        // Si hay menos de 4, completar con "-" al final
        while (todos.length < 4) todos.push("-");
        return {
          numero: parseInt(m[1]),
          nombre: cleanName(m[2]),
          carnet: m[3],
          goles: dashOrInt(todos[0]),
          tarjetaVerde: dashOrInt(todos[1]) > 0,
          tarjetaAmarilla: dashOrInt(todos[2]),
          tarjetaRoja: dashOrInt(todos[3]) > 0,
        };
      };

      // ─── Distribuir matches en local y visitante (2 columnas) ─────────────
      if (twoColumns) {
        for (const lm of lineMatches) {
          if (lm.matches.length >= 2) {
            // El primer match (local) tiene sus extras potencialmente cortados por ||| en el medio.
            // Buscamos los caracteres "- - - -" o "X X X X" entre el end del match[0] y el inicio de match[1]
            const m0 = lm.matches[0];
            const m1 = lm.matches[1];
            const m0End = m0.index + m0[0].length;
            const m1Start = m1.index;
            const enMedio = lm.line.substring(m0End, m1Start)
              .replace(/\|\|\|/g, " ")
              .trim();
            // Si "enMedio" contiene solo guiones/digitos y espacios, son los extras que faltan al local
            const extrasExtra = /^[\d\s\-]*$/.test(enMedio) ? enMedio : "";

            equipoLocal.jugadores.push(matchToPlayer(m0, extrasExtra));
            equipoVisitante.jugadores.push(matchToPlayer(m1));
          }
        }
        for (const lm of lineMatches) {
          if (lm.matches.length === 1) {
            const m = lm.matches[0];
            const sepIdx = lm.line.indexOf("|||");
            const matchIdx = lm.line.indexOf(m[0]);
            const target = (sepIdx >= 0 && matchIdx > sepIdx) || (sepIdx < 0 && matchIdx >= 5)
              ? equipoVisitante.jugadores : equipoLocal.jugadores;
            target.push(matchToPlayer(m));
          }
        }
      } else {
        // 1 columna: usar índice de "Nº Visitante" para distinguir
        let idxVisitanteHeader = -1;
        for (let i = 0; i < lines.length; i++) {
          if (/^N[ºo°]\s+Visitante/i.test(lines[i])) { idxVisitanteHeader = i; break; }
        }
        for (let li = 0; li < lineMatches.length; li++) {
          const lm = lineMatches[li];
          const lineIdx = lines.indexOf(lm.line);
          const target = (idxVisitanteHeader > 0 && lineIdx >= idxVisitanteHeader)
            ? equipoVisitante.jugadores : equipoLocal.jugadores;
          for (const m of lm.matches) target.push(matchToPlayer(m));
        }
      }

      // ─── Árbitros ────────────────────────────────────────────────────────
      // Entre "Arbitros" y "Juez de mesa" suele haber 1-2 líneas con los nombres
      let arbitros = "";
      for (let i = 0; i < lines.length; i++) {
        if (/^Arbitros\b/i.test(lines[i])) {
          // La línea siguiente suele tener "Apellido, Nombre   Otro, Nombre" (con o sin |||)
          if (i + 1 < lines.length) {
            arbitros = lines[i+1].replace(/\|\|\|/g, "  ").replace(/\s{2,}/g, " · ").trim();
          }
          break;
        }
      }

      return { equipoLocal, equipoVisitante, arbitros };
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  PARSER DE TEXTO SIMPLE para plantel
    //  Formato: "N - Nombre Apellido - Posición" o "N Nombre Apellido"
    //  Una línea por jugador
    // ═══════════════════════════════════════════════════════════════════════════
    function parsePlantelSimple(text) {
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
      const jugadores = [];
      for (const line of lines) {
        // Skipear headers/títulos
        if (/^(plantel|jugadores|n[uú]mero|nro|n[°ºo]|nombre|posici)/i.test(line)) continue;

        // Intentar separar por " - " o " | "
        const parts = line.split(/\s*[\-|]\s*/).map(p => p.trim()).filter(Boolean);

        let numero = null, nombre = "", posicion = "";

        if (parts.length >= 2) {
          // Primer parte: ¿número solo?
          if (/^\d{1,3}$/.test(parts[0])) {
            numero = parseInt(parts[0]);
            nombre = parts[1] || "";
            posicion = parts[2] || "";
          } else {
            nombre = parts[0];
            posicion = parts[1] || "";
          }
        } else {
          // Sin separadores: "10 Lionel Messi" o solo "Lionel Messi"
          const m = line.match(/^(\d{1,3})\s+(.+)$/);
          if (m) { numero = parseInt(m[1]); nombre = m[2].trim(); }
          else { nombre = line; }
        }

        if (!nombre.trim()) continue;
        jugadores.push({ numero, nombre: nombre.trim(), posicion: posicion.trim() });
      }
      return jugadores;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  EXTRACTOR DE TEXTO DE PDF (usa pdf.js cargado desde CDN)
    // ═══════════════════════════════════════════════════════════════════════════
    async function extractPdfText(file) {
      if (!window.pdfjsLib) throw new Error("pdf.js no está cargado.");
      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      let fullText = "";
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const content = await page.getTextContent();
        const items = content.items;

        // Detectar el centro horizontal de la página (para distinguir columna izquierda/derecha)
        let maxX = 0;
        for (const it of items) {
          const x = it.transform[4] + (it.width || 0);
          if (x > maxX) maxX = x;
        }
        const pageMidX = maxX / 2;

        // Agrupar por Y similar (tolerancia ~4 píxeles)
        const rows = [];
        for (const it of items) {
          const y = Math.round(it.transform[5]);
          let row = rows.find(r => Math.abs(r.y - y) < 4);
          if (!row) { row = { y, items: [] }; rows.push(row); }
          row.items.push(it);
        }
        // Ordenar filas de arriba a abajo (Y decrece) y items por X
        rows.sort((a, b) => b.y - a.y);
        for (const row of rows) {
          row.items.sort((a, b) => a.transform[4] - b.transform[4]);
          // Insertar marcador "|||" donde los items cruzan el centro horizontal
          const parts = [];
          let crossed = false;
          for (const it of row.items) {
            if (!crossed && it.transform[4] >= pageMidX) {
              parts.push("|||");
              crossed = true;
            }
            parts.push(it.str);
          }
          fullText += parts.join(" ").replace(/\s+/g, " ").trim() + "\n";
        }
      }
      return fullText;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  MATCH DE JUGADORES DEL IMPORT vs EL PLANTEL EXISTENTE
    //  Devuelve cada jugador del import con un "action":
    //    - "nueva": no existe en el plantel
    //    - "actualiza": match por carnet (se actualiza nombre/número si cambian)
    //    - "duda": existe alguien con el mismo nombre pero distinto carnet (o sin carnet)
    // ═══════════════════════════════════════════════════════════════════════════
    function matchJugadoresImport(importados, existentes) {
      const result = [];
      const nameNorm = s => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");

      for (const imp of importados) {
        let action = "nueva";
        let matchExisting = null;
        let reason = "";

        // 1. Match por carnet AAHBA (primer criterio)
        if (imp.carnet) {
          matchExisting = existentes.find(e => e.carnet_aahba && e.carnet_aahba === imp.carnet);
          if (matchExisting) {
            action = "actualiza";
            reason = `Mismo carnet ${imp.carnet}`;
          }
        }

        // 2. Si no hubo match por carnet, intentar por nombre exacto
        if (!matchExisting && imp.nombre) {
          const nombreNorm = nameNorm(imp.nombre);
          const sameName = existentes.find(e => nameNorm(e.nombre) === nombreNorm);
          if (sameName) {
            // Si tiene carnet en la base y el import también tiene, pero son distintos → DUDA
            if (sameName.carnet_aahba && imp.carnet && sameName.carnet_aahba !== imp.carnet) {
              action = "duda";
              matchExisting = sameName;
              reason = `Mismo nombre pero carnet distinto (${sameName.carnet_aahba} vs ${imp.carnet})`;
            } else {
              // Mismo nombre, sin conflicto de carnet → actualiza
              action = "actualiza";
              matchExisting = sameName;
              reason = "Mismo nombre";
            }
          }
        }

        result.push({ ...imp, action, matchExisting, reason });
      }

      return result;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  PLANTEL IMPORT · UI con 3 modos (PDF / texto AAHBA / texto simple)
    // ═══════════════════════════════════════════════════════════════════════════
    function PlantelImport({ club, session, existing, onDone, onCancel }) {
      const persistPrefix = `plantel_import_${club.id}_`;
      const [phase, setPhase] = usePersistedState(persistPrefix + "phase", "input"); // input | confirm | preview
      const [mode, setMode] = usePersistedState(persistPrefix + "mode", "ficha"); // ficha | simple
      const [pasteText, setPasteText] = usePersistedState(persistPrefix + "text", "");
      const [pdfLoading, setPdfLoading] = useState(false);

      // Fase confirm (ficha AAHBA con 2 equipos detectados)
      const [parsedFicha, setParsedFicha] = useState(null);
      const [chosenSide, setChosenSide] = useState(""); // "local" | "visitante"

      // Fase preview
      const [parsed, setParsed] = useState([]); // jugadores con .action

      const [importing, setImporting] = useState(false);

      const clearDraft = () => clearPersistedKeysWithPrefix(persistPrefix);

      const handlePdfUpload = async (file) => {
        if (!file) return;
        setPdfLoading(true);
        try {
          const text = await extractPdfText(file);
          setPasteText(text);
        } catch (e) {
          alert("Error leyendo el PDF: " + e.message);
        }
        setPdfLoading(false);
      };

      const handleProcess = () => {
        if (!pasteText.trim()) { alert("Pegá el texto o subí el PDF primero."); return; }

        if (mode === "ficha") {
          const ficha = parseAAHBAFichaPartido(pasteText);
          if (ficha.equipoLocal.jugadores.length === 0 && ficha.equipoVisitante.jugadores.length === 0) {
            alert("No detecté jugadores en formato AAHBA. ¿Probaste el modo 'Texto simple'?");
            return;
          }
          setParsedFicha(ficha);

          // Detección automática del equipo propio si ya hay plantel cargado
          const tryDetect = () => {
            if (existing.length === 0) return null;
            const matchCount = (jugs) => {
              const carnets = new Set(existing.map(e => e.carnet_aahba).filter(Boolean));
              return jugs.filter(j => carnets.has(j.carnet)).length;
            };
            const localMatches = matchCount(ficha.equipoLocal.jugadores);
            const visitMatches = matchCount(ficha.equipoVisitante.jugadores);
            if (localMatches > visitMatches && localMatches >= 3) return "local";
            if (visitMatches > localMatches && visitMatches >= 3) return "visitante";
            return null;
          };
          const detected = tryDetect();
          if (detected) {
            setChosenSide(detected);
            // Saltear fase confirm y pasar directo a preview
            const jugs = detected === "local" ? ficha.equipoLocal.jugadores : ficha.equipoVisitante.jugadores;
            setParsed(matchJugadoresImport(jugs, existing));
            setPhase("preview");
          } else {
            setPhase("confirm");
          }
        } else {
          // Modo simple
          const jugs = parsePlantelSimple(pasteText);
          if (jugs.length === 0) {
            alert("No detecté jugadores. Formato esperado: una línea por jugador, ej:\n10 - Lionel Messi - Delantero central\n7 - Cristiano - Volante derecho");
            return;
          }
          // En modo simple no hay carnet, así que el match va por nombre solo
          setParsed(matchJugadoresImport(jugs.map(j => ({...j, carnet: ""})), existing));
          setPhase("preview");
        }
      };

      const handleConfirmSide = () => {
        if (!chosenSide) { alert("Elegí cuál es tu equipo."); return; }
        const jugs = chosenSide === "local" ? parsedFicha.equipoLocal.jugadores : parsedFicha.equipoVisitante.jugadores;
        setParsed(matchJugadoresImport(jugs, existing));
        setPhase("preview");
      };

      const updateRow = (idx, field, value) => {
        setParsed(p => p.map((r, i) => i === idx ? {...r, [field]: value} : r));
      };

      const removeRow = (idx) => {
        setParsed(p => p.filter((_, i) => i !== idx));
      };

      const handleImport = async () => {
        const dudas = parsed.filter(r => r.action === "duda");
        if (dudas.length > 0) {
          if (!confirm(`Hay ${dudas.length} jugadora(s) con DUDA (mismo nombre, distinto carnet). Si seguís, esas se van a crear como NUEVAS. ¿Continuar?`)) return;
        }

        setImporting(true);
        const inserts = [];
        const updates = [];

        for (const r of parsed) {
          const payload = {
            numero: r.numero || null,
            nombre: r.nombre || "",
            carnet_aahba: r.carnet || "",
          };
          if (r.action === "actualiza" && r.matchExisting?.id) {
            updates.push({ id: r.matchExisting.id, payload });
          } else {
            // nueva o duda → crear
            inserts.push({ ...payload, club_id: club.id, estado: "activo" });
          }
        }

        try {
          if (inserts.length > 0) {
            const { error } = await sb.from("jugadores").insert(inserts);
            if (error) throw error;
          }
          for (const upd of updates) {
            const { error } = await sb.from("jugadores").update(upd.payload).eq("id", upd.id);
            if (error) throw error;
          }
          alert(`✓ Import OK: ${inserts.length} nuevas, ${updates.length} actualizadas.`);
          clearDraft();
          onDone();
        } catch (e) {
          alert("Error: " + e.message);
        }
        setImporting(false);
      };

      const handleCancel = () => {
        if (pasteText.trim() || parsed.length > 0) {
          if (!confirm("¿Cancelar import? Vas a perder lo que pegaste/editaste.")) return;
        }
        clearDraft();
        onCancel();
      };

      // ─── FASE CONFIRM (ficha AAHBA, elegir equipo) ──────────────────────────
      if (phase === "confirm" && parsedFicha) {
        return (
          <div>
            <div style={{padding:12, background:"var(--plat-soft)", borderRadius:6, marginBottom:16}}>
              <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, marginBottom:4}}>
                ✓ FICHA AAHBA DETECTADA
              </div>
              <div style={{fontSize:12, color:"var(--white-soft)"}}>
                ¿Cuál es tu equipo? Elegí abajo.
              </div>
            </div>

            {["local", "visitante"].map(side => {
              const teamData = side === "local" ? parsedFicha.equipoLocal : parsedFicha.equipoVisitante;
              return (
                <div key={side} onClick={() => setChosenSide(side)} style={{
                  padding:14, marginBottom:10, cursor:"pointer",
                  border: chosenSide === side ? `2px solid ${club.theme_primary}` : "1px solid rgba(255,255,255,0.08)",
                  background: chosenSide === side ? `${club.theme_primary}1F` : "rgba(255,255,255,0.02)",
                  borderRadius:6
                }}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                    <div style={{fontSize:14, fontWeight:700}}>{teamData.nombre || "(sin nombre)"}</div>
                    <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--white-dim)"}}>
                      {side === "local" ? "🏠 LOCAL" : "✈️ VISITANTE"} · {teamData.jugadores.length} jugadores
                    </div>
                  </div>
                  <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>
                    {teamData.jugadores.slice(0, 4).map(j => `#${j.numero} ${j.nombre}`).join(" · ")}
                    {teamData.jugadores.length > 4 && ` · +${teamData.jugadores.length - 4} más`}
                  </div>
                </div>
              );
            })}

            <div style={{display:"flex", gap:10, marginTop:14}}>
              <button onClick={() => setPhase("input")} style={{...btnGhost, flex:1}}>← Volver</button>
              <button onClick={handleConfirmSide} disabled={!chosenSide} style={{...btnPrimary, flex:2}}>
                Continuar →
              </button>
            </div>
          </div>
        );
      }

      // ─── FASE PREVIEW ──────────────────────────────────────────────────────
      if (phase === "preview") {
        const nuevas = parsed.filter(r => r.action === "nueva").length;
        const actualizar = parsed.filter(r => r.action === "actualiza").length;
        const dudas = parsed.filter(r => r.action === "duda").length;
        return (
          <div>
            <div style={{padding:12, background:"var(--plat-soft)", borderRadius:6, marginBottom:16}}>
              <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, marginBottom:6}}>
                PREVISUALIZACIÓN · {parsed.length} JUGADORES
              </div>
              <div style={{display:"flex", gap:10, fontSize:11, color:"var(--white-soft)", flexWrap:"wrap"}}>
                <span><span style={{color:"var(--green)"}}>●</span> {nuevas} nuevas</span>
                <span><span style={{color:"var(--plat)"}}>●</span> {actualizar} actualizan</span>
                {dudas > 0 && <span><span style={{color:"var(--orange)"}}>●</span> {dudas} con dudas</span>}
              </div>
            </div>

            <div style={{display:"flex", flexDirection:"column", gap:6, marginBottom:14, maxHeight:480, overflowY:"auto"}}>
              {parsed.map((r, idx) => {
                const color = r.action === "nueva" ? "var(--green)" : r.action === "duda" ? "var(--orange)" : "var(--plat)";
                const tagLabel = r.action === "nueva" ? "NUEVA" : r.action === "duda" ? "DUDA" : "ACTUALIZA";
                return (
                  <div key={idx} style={{padding:10, borderLeft:`3px solid ${color}`, background:"rgba(255,255,255,0.02)", borderRadius:4}}>
                    <div style={{display:"flex", gap:8, alignItems:"center", marginBottom:5}}>
                      <input type="number" value={r.numero || ""} onChange={e => updateRow(idx, "numero", parseInt(e.target.value) || null)}
                        style={{...inputStyle, width:55, padding:5, fontSize:12, textAlign:"center"}} placeholder="#"/>
                      <input type="text" value={r.nombre} onChange={e => updateRow(idx, "nombre", e.target.value)}
                        style={{...inputStyle, flex:1, padding:5, fontSize:12}}/>
                      <span style={{
                        fontSize:9, fontFamily:"var(--mono)", letterSpacing:1, padding:"2px 6px",
                        color, border:`1px solid ${color}50`, borderRadius:3, fontWeight:700, flexShrink:0
                      }}>{tagLabel}</span>
                      <button onClick={() => removeRow(idx)} style={{...btnGhost, padding:"4px 8px", fontSize:11, color:"var(--red)", borderColor:"rgba(232,85,85,0.3)"}}>×</button>
                    </div>
                    <div style={{display:"flex", gap:8, fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>
                      {r.carnet && <span>🪪 {r.carnet}</span>}
                      {r.reason && <span style={{fontStyle:"italic"}}>{r.reason}</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex", gap:10}}>
              <button onClick={() => setPhase("input")} disabled={importing} style={{...btnGhost, flex:1}}>← Volver</button>
              <button onClick={handleImport} disabled={importing || parsed.length === 0} style={{...btnPrimary, flex:2}}>
                {importing ? "Importando..." : `✓ Importar ${parsed.length} jugadores`}
              </button>
            </div>
          </div>
        );
      }

      // ─── FASE INPUT ────────────────────────────────────────────────────────
      return (
        <div>
          <div style={{fontSize:13, fontWeight:700, marginBottom:14, color:"var(--plat)"}}>📥 Importar plantel</div>

          {/* Selector de modo */}
          <div style={{display:"flex", gap:4, marginBottom:14}}>
            {[
              { id:"ficha", label:"Ficha AAHBA", desc:"PDF de partido jugado" },
              { id:"simple", label:"Texto simple", desc:"Una línea por jugador" },
            ].map(m => (
              <button key={m.id} onClick={() => setMode(m.id)} style={{
                flex:1, padding:"10px 12px", fontSize:12, fontFamily:"inherit", fontWeight:600,
                border: mode === m.id ? "1px solid var(--plat)" : "1px solid rgba(255,255,255,0.08)",
                background: mode === m.id ? "var(--plat-soft)" : "transparent",
                color: mode === m.id ? "var(--plat)" : "var(--white-soft)", borderRadius:6, textAlign:"left"
              }}>
                <div>{m.label}</div>
                <div style={{fontSize:10, fontWeight:400, color:"var(--white-dim)", marginTop:2}}>{m.desc}</div>
              </button>
            ))}
          </div>

          {/* Mensaje de ayuda según modo */}
          <div style={{padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:14, fontSize:11, color:"var(--white-soft)", lineHeight:1.5}}>
            {mode === "ficha" ? (
              <>
                Importá la ficha de un partido jugado de AAHBA. Subí el PDF o copiá el texto del PDF (todo, Ctrl+A en Adobe Reader o equivalente).
                <br/>Se detectan los 2 equipos automáticamente. Si ya tenés plantel cargado, identificamos cuál es el tuyo solo.
              </>
            ) : (
              <>
                Una línea por jugador. Formatos aceptados:
                <br/>• <code style={{color:"var(--gold)"}}>10 - Lionel Messi - Delantero central</code>
                <br/>• <code style={{color:"var(--gold)"}}>10 Lionel Messi</code>
                <br/>• <code style={{color:"var(--gold)"}}>Lionel Messi</code>
              </>
            )}
          </div>

          {/* Botón de upload PDF (solo en modo ficha) */}
          {mode === "ficha" && (
            <div style={{marginBottom:10}}>
              <label style={{
                display:"block", padding:"12px 14px", borderRadius:6, cursor:"pointer",
                border:"1px dashed var(--plat-border)", background:"rgba(45,157,111,0.04)",
                textAlign:"center", fontSize:13, color:"var(--plat)", fontWeight:600,
                opacity: pdfLoading ? 0.6 : 1
              }}>
                {pdfLoading ? "🔄 Leyendo PDF..." : "📄 Subir archivo PDF"}
                <input type="file" accept="application/pdf" disabled={pdfLoading} onChange={e => handlePdfUpload(e.target.files?.[0])} style={{display:"none"}}/>
              </label>
              <div style={{fontSize:10, color:"var(--white-dim)", textAlign:"center", marginTop:4}}>
                O pegá el texto manualmente abajo
              </div>
            </div>
          )}

          <textarea value={pasteText} onChange={e => setPasteText(e.target.value)} rows={10}
            placeholder={mode === "ficha" ? "Pegá el texto del PDF acá (o subí el PDF arriba)" : "Pegá la lista de jugadores acá..."}
            style={{...inputStyle, fontFamily:"var(--mono)", fontSize:12, resize:"vertical"}}/>

          <div style={{display:"flex", gap:10, marginTop:14}}>
            <button onClick={handleCancel} style={{...btnGhost, flex:1}}>Cancelar</button>
            <button onClick={handleProcess} disabled={!pasteText.trim() || pdfLoading} style={{...btnPrimary, flex:2}}>
              Procesar →
            </button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  PLANTEL MANAGER · CRUD de jugadores con vista de lista + editor con acordeones
    // ═══════════════════════════════════════════════════════════════════════════

    function PlantelManager({ club, session }) {
      const [jugadores, setJugadores] = useState([]);
      const [loading, setLoading] = useState(true);
      const [view, setView] = usePersistedState(`plantel_${club.id}_view`, "list"); // list | edit | import
      const [editingJugador, setEditingJugador] = useState(null);
      const [filtroEstado, setFiltroEstado] = usePersistedState(`plantel_${club.id}_filtro`, "activos");

      const load = useCallback(async () => {
        setLoading(true);
        const { data } = await sb.from("jugadores").select("*").eq("club_id", club.id).order("numero", { ascending: true });
        setJugadores(data || []);
        setLoading(false);
      }, [club.id]);

      useEffect(() => { load(); }, [load]);

      // Si view=edit pero perdí editingJugador (refresh), vuelvo a list
      useEffect(() => {
        if (view === "edit" && !editingJugador) setView("list");
      }, []);

      const handleDelete = async (j) => {
        const nombre = j.nombre || "este jugador";
        if (!confirm(`¿Eliminar a "${nombre}"?\n\nEsto borra permanentemente al jugador. Si solo querés sacarlo del equipo activo, mejor cambiá su estado a "Dado de baja".`)) return;
        const { error } = await sb.from("jugadores").delete().eq("id", j.id);
        if (error) { alert("Error: " + error.message); return; }
        await load();
      };

      if (loading) return <div style={{padding:20, textAlign:"center"}}><div className="spinner" style={{margin:"0 auto"}}/></div>;

      if (view === "edit" && editingJugador) {
        return <JugadorEditor jugador={editingJugador} club={club} session={session}
          onSave={async () => { await load(); setView("list"); setEditingJugador(null); }}
          onCancel={() => { setView("list"); setEditingJugador(null); }}/>;
      }

      if (view === "import") {
        return <PlantelImport club={club} session={session} existing={jugadores}
          onDone={async () => { await load(); setView("list"); }}
          onCancel={() => setView("list")}/>;
      }

      // Filtrar por estado
      const filtered = jugadores.filter(j => {
        if (filtroEstado === "todos") return true;
        if (filtroEstado === "activos") return !j.estado || j.estado === "activo";
        return j.estado === filtroEstado;
      });

      const countByEstado = {
        activos: jugadores.filter(j => !j.estado || j.estado === "activo").length,
        lesionado: jugadores.filter(j => j.estado === "lesionado").length,
        suspendido: jugadores.filter(j => j.estado === "suspendido").length,
        dado_de_baja: jugadores.filter(j => j.estado === "dado_de_baja").length,
      };

      return (
        <div>
          {jugadores.length === 0 ? (
            <div style={{textAlign:"center", padding:24, background:"rgba(255,255,255,0.02)", borderRadius:6}}>

              <div style={{display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap"}}>
                <button onClick={() => { setEditingJugador({club_id: club.id, estado:"activo"}); setView("edit"); }} style={{...btnPrimary, fontSize:13}}>
                  + Agregar primer jugador
                </button>
                <button onClick={() => setView("import")} style={{...btnSecondary, fontSize:13}}>

                </button>
              </div>
            </div>

            <>
              {/* Acciones rápidas */}

                <button onClick={() => { setEditingJugador({club_id: club.id, estado:"activo"}); setView("edit"); }}
                  style={{...btnPrimary, flex:1, minWidth:140, fontSize:12}}>
                  + Agregar jugador
                </button>
                <button onClick={() => setView("import")} style={{...btnSecondary, flex:1, minWidth:140, fontSize:12}}>
                  📥 Importar plantel
                </button>
              </div>

              {/* Filtros por estado */}
              <div style={{display:"flex", gap:4, marginBottom:12, overflowX:"auto", paddingBottom:2}}>
                {[
                  { id:"activos", label:`Activos (${countByEstado.activos})` },
                  { id:"lesionado", label:`Lesionados (${countByEstado.lesionado})` },
                  { id:"suspendido", label:`Suspendidos (${countByEstado.suspendido})` },
                  { id:"dado_de_baja", label:`De baja (${countByEstado.dado_de_baja})` },
                  { id:"todos", label:`Todos (${jugadores.length})` },
                ].map(f => (
                  <button key={f.id} onClick={() => setFiltroEstado(f.id)} style={{
                    flexShrink:0, padding:"5px 10px", fontSize:10, fontFamily:"var(--mono)", letterSpacing:1, fontWeight:600,
                    border: filtroEstado === f.id ? "1px solid var(--plat)" : "1px solid rgba(255,255,255,0.08)",
                    background: filtroEstado === f.id ? "var(--plat-soft)" : "transparent",
                    color: filtroEstado === f.id ? "var(--plat)" : "var(--white-dim)", borderRadius:3
                  }}>{f.label}</button>

              {/* Lista */}
              <div style={{background:"rgba(255,255,255,0.02)", borderRadius:6, overflow:"hidden"}}>
                {filtered.length === 0 ? (
                  <div style={{padding:18, textAlign:"center", fontSize:12, color:"var(--white-dim)"}}>

                    onDelete={() => handleDelete(j)}/>
                ))}

            </>
          )}
        </div>
      );

    function FixtureManager({ club, session, initialFechaId, onConsumedFechaId }) {
      const [fechas, setFechas] = useState([]);
      const [loading, setLoading] = useState(true);
      const [view, setView] = usePersistedState(`fixturemgr_${club.id}_view`, "list"); // "list" | "import" | "edit"
      const [editingFecha, setEditingFecha] = useState(null);

      // Si volví al componente con view="edit" pero sin fecha en memoria → vuelvo a list
      useEffect(() => {
        if (view === "edit" && !editingFecha) {
          setView("list");
        }
      }, []);

      const load = useCallback(async () => {
        setLoading(true);
        const { data } = await sb.from("fechas").select("*").eq("club_id", club.id).order("fecha_num");
        setFechas(data || []);
        setLoading(false);
        return data || [];
      }, [club.id]);

      useEffect(() => { load(); }, [load]);

      // Si vinimos con una fecha pre-seleccionada desde la vista pública, abrir directo el editor
      useEffect(() => {
        if (!initialFechaId || loading || fechas.length === 0) return;
        const fechaTarget = fechas.find(f => f.id === initialFechaId);
        if (fechaTarget) {
          setEditingFecha(fechaTarget);
          setView("edit");
        }
        // Consumir la fecha para que no vuelva a dispararse si el user navega
        if (onConsumedFechaId) onConsumedFechaId();
      }, [initialFechaId, loading, fechas]);

      const handleDelete = async (id) => {
        if (!confirm("¿Eliminar esta fecha? Esto también borra todas las convocatorias asociadas.")) return;
        await sb.from("fechas").delete().eq("id", id);
        await load();
      };

      if (loading) return <div style={{padding:20, textAlign:"center"}}><div className="spinner" style={{margin:"0 auto"}}/></div>;

      if (view === "import") {
        return <FixtureImport club={club} session={session} onDone={async () => { await load(); setView("list"); }} onCancel={() => setView("list")}/>;
      }

      if (view === "batchPlanillas") {
        return <BatchPlanillasImporter club={club} session={session} fechas={fechas} onDone={async () => { await load(); setView("list"); }} onCancel={() => setView("list")}/>;
      }

      if (view === "edit" && editingFecha) {
        return <FechaEditor fecha={editingFecha} club={club} session={session} onSave={async () => { await load(); setView("list"); setEditingFecha(null); }} onCancel={() => { setView("list"); setEditingFecha(null); }}/>;
      }

      return (
        <div>
          {fechas.length === 0 ? (
            <div style={{textAlign:"center", padding:24, background:"rgba(255,255,255,0.02)", borderRadius:6}}>
              <div style={{fontSize:32, marginBottom:10, opacity:0.5}}>📅</div>
              <p style={{fontSize:13, color:"var(--white-soft)", marginBottom:14}}>Todavía no cargaste ninguna fecha.</p>
              <button onClick={() => setView("import")} style={{...btnPrimary, fontSize:13}}>
                + Cargar fixture (pegar)
              </button>
            </div>
          ) : (
            <>
              {/* Banda destacada: cargar planillas AAHBA en lote */}
              <button onClick={() => setView("batchPlanillas")} style={{
                width:"100%", padding:"12px 14px", marginBottom:10,
                background:`linear-gradient(135deg, var(--plat-soft) 0%, transparent 100%)`,
                border:"1px solid var(--plat-border)",
                color:"var(--plat)", borderRadius:6,
                fontSize:12, fontWeight:700, letterSpacing:1, fontFamily:"var(--mono)",
                cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10
              }}>
                <span style={{fontSize:16}}>📥</span>
                <span>CARGAR PLANILLAS EN LOTE</span>
              </button>

              <div style={{display:"flex", gap:8, marginBottom:14}}>
                <button onClick={() => setView("import")} style={{...btnSecondary, flex:1, fontSize:12}}>
                  + Importar más fechas
                </button>
                <button onClick={() => { setEditingFecha({club_id: club.id}); setView("edit"); }} style={{...btnGhost, flex:1, fontSize:12}}>
                  + Agregar fecha sola
                </button>
              </div>
              <div style={{background:"rgba(255,255,255,0.02)", borderRadius:6, overflow:"hidden"}}>
                {fechas.map((f, i) => (
                  <div key={f.id} style={{padding:"12px 14px", borderBottom: i < fechas.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none", display:"flex", gap:10, alignItems:"center"}}>
                    <div style={{minWidth:36, fontFamily:"var(--mono)", fontSize:11, color:"var(--plat)", letterSpacing:1, fontWeight:700}}>
                      F{f.fecha_num}{f.rueda > 1 ? `·R${f.rueda}` : ""}
                    </div>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontSize:14, fontWeight:600}}>
                        vs {f.rival}
                        {f.kit === "suplente" && (
                          <span style={{marginLeft:8, fontSize:10, color:"var(--gold)", fontFamily:"var(--mono)", letterSpacing:1}}>👕 SUPLENTE</span>
                        )}
                      </div>
                      <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>
                        {formatDateForDisplay(f.fecha_date)} · {f.condition === "Local" ? "🏠" : "✈️"} {f.condition}
                        {f.kick_time && ` · ${f.kick_time}`}
                      </div>
                    </div>
                    <button onClick={() => { setEditingFecha(f); setView("edit"); }} style={{...btnGhost, padding:"5px 10px", fontSize:11}}>✏️</button>
                    <button onClick={() => handleDelete(f.id)} style={{...btnGhost, padding:"5px 10px", fontSize:11, color:"var(--red)", borderColor:"rgba(232,85,85,0.3)"}}>×</button>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  FIXTURE IMPORT
    //  Fases: input → confirm (si AAHBA) → preview → import
    // ═══════════════════════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════════════════════
    //  HELPERS COMUNES PARA APLICAR UNA PLANILLA AAHBA A UNA FECHA
    //  Usados por el importer single y el batch.
    // ═══════════════════════════════════════════════════════════════════════════

    // Normalizador de nombre para comparar
    const _normName = s => (s || "").toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]/g, "");

    // Decide cuál equipo del PDF es el nuestro (por carnets matcheados o por fallback)
    function pickMiEquipo(parsed, jugadores) {
      const carnetSet = new Set(jugadores.map(j => j.carnet_aahba).filter(Boolean));
      const matchCount = jugs => jugs.filter(j => carnetSet.has(j.carnet)).length;
      const localMatches = matchCount(parsed.equipoLocal.jugadores);
      const visitMatches = matchCount(parsed.equipoVisitante.jugadores);
      if (localMatches >= visitMatches && localMatches > 0) {
        return { miEquipo: parsed.equipoLocal, equipoRival: parsed.equipoVisitante, lado: "L" };
      }
      if (visitMatches > 0) {
        return { miEquipo: parsed.equipoVisitante, equipoRival: parsed.equipoLocal, lado: "V" };
      }
      return null;
    }

    // Detectar jugadoras del PDF que NO están en el plantel
    // Devuelve [{ numero, nombre, carnet }, ...]
    function detectarNuevasJugadoras(miEquipo, jugadores) {
      const nuevas = [];
      for (const pJ of miEquipo.jugadores) {
        let j = pJ.carnet ? jugadores.find(x => x.carnet_aahba === pJ.carnet) : null;
        if (!j) j = jugadores.find(x => _normName(x.nombre) === _normName(pJ.nombre));
        if (!j) {
          nuevas.push({ numero: pJ.numero, nombre: pJ.nombre, carnet: pJ.carnet });
        }
      }
      return nuevas;
    }

    // Aplica una planilla a una fecha. Asume que las nuevas ya están creadas en `jugadores`.
    // Devuelve { convocados, bajas, goles, tarjetas, marker }
    async function applyPlanillaAFecha(parsed, fecha, jugadores, miEquipo, equipoRival) {
      const activos = jugadores.filter(j => !j.estado || j.estado === "activo");
      const matchedIds = new Set();
      let convocados = 0, golesT = 0, tarjT = 0;

      for (const pJ of miEquipo.jugadores) {
        let j = pJ.carnet ? jugadores.find(x => x.carnet_aahba === pJ.carnet) : null;
        if (!j) j = jugadores.find(x => _normName(x.nombre) === _normName(pJ.nombre));
        if (!j) continue;
        matchedIds.add(j.id);
        convocados++;
        if (pJ.goles > 0) golesT += pJ.goles;
        if (pJ.tarjetaVerde || pJ.tarjetaAmarilla > 0 || pJ.tarjetaRoja) tarjT++;

        await sb.from("fecha_jugadores").upsert({
          fecha_id: fecha.id,
          jugador_id: j.id,
          status: "convocado",
          motivo: null,
          goles: pJ.goles,
          tarjeta_verde: pJ.tarjetaVerde,
          tarjeta_amarilla: pJ.tarjetaAmarilla,
          tarjeta_roja: pJ.tarjetaRoja,
        }, { onConflict: "fecha_id,jugador_id" });
      }

      // BAJA a los activos del plantel que no aparecen
      let bajas = 0;
      for (const j of activos) {
        if (matchedIds.has(j.id)) continue;
        await sb.from("fecha_jugadores").upsert({
          fecha_id: fecha.id,
          jugador_id: j.id,
          status: "baja",
          motivo: "deportivo",
        }, { onConflict: "fecha_id,jugador_id" });
        bajas++;
      }

      // Marcador + árbitros + cerrar
      const fechaUpdates = { result_cargado: true };
      if (miEquipo.golesEquipo != null) fechaUpdates.goles_propio = miEquipo.golesEquipo;
      if (equipoRival.golesEquipo != null) fechaUpdates.goles_rival = equipoRival.golesEquipo;
      if (parsed.arbitros) fechaUpdates.arbitros = parsed.arbitros;
      await sb.from("fechas").update(fechaUpdates).eq("id", fecha.id);

      return {
        convocados, bajas, goles: golesT, tarjetas: tarjT,
        marker: `${miEquipo.golesEquipo ?? "?"}-${equipoRival.golesEquipo ?? "?"}`,
      };
    }

    // Crear N jugadoras nuevas en el plantel. Devuelve un array con los registros creados.
    async function crearJugadorasNuevas(nuevas, clubId) {
      if (nuevas.length === 0) return [];
      const payload = nuevas.map(n => ({
        club_id: clubId,
        numero: n.numero ?? null,
        nombre: n.nombre,
        carnet_aahba: n.carnet || null,
        estado: "activo",
      }));
      const { data, error } = await sb.from("jugadores").insert(payload).select();
      if (error) {
        console.error("Error creando nuevas jugadoras:", error);
        return [];
      }
      return data || [];
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  BATCH PLANILLAS IMPORTER · sube N PDFs y los asocia a fechas por rival
    //  Flujo de 2 pasadas:
    //    1. Parsea todos los PDFs y muestra lista de jugadoras nuevas detectadas
    //    2. Usuario confirma → se agregan al plantel + se procesan todos los PDFs
    // ═══════════════════════════════════════════════════════════════════════════
    function BatchPlanillasImporter({ club, session, fechas, onDone, onCancel }) {
      const [files, setFiles] = useState([]);
      const [mode, setMode] = useState("skip"); // skip | discover_only | overwrite
      const [phase, setPhase] = useState("select"); // select | discovering | confirm | applying | done
      const [progress, setProgress] = useState(0);
      const [parsedFiles, setParsedFiles] = useState([]); // [{ file, parsed, miEquipo, equipoRival, fecha, skipReason }]
      const [nuevasDescubiertas, setNuevasDescubiertas] = useState([]); // [{ numero, nombre, carnet }]
      const [results, setResults] = useState([]);
      const [jugadores, setJugadores] = useState([]);

      useEffect(() => {
        (async () => {
          const { data } = await sb.from("jugadores").select("*").eq("club_id", club.id);
          setJugadores(data || []);
        })();
      }, [club.id]);

      // Normaliza nombre de rival para matchear con las fechas del club
      const normRival = s => (s || "").toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/\b(c\.?a\.?|r\.?c\.?|club|s\.?i\.?c\.?|sports?|hockey)\b/gi, "")
        .replace(/[^a-z0-9]/g, "").trim();

      const findFechaForRival = (rivalDelPdf) => {
        const target = normRival(rivalDelPdf);
        if (!target) return null;
        let m = fechas.find(f => normRival(f.rival) === target);
        if (m) return m;
        m = fechas.find(f => {
          const fr = normRival(f.rival);
          return fr && (fr.includes(target) || target.includes(fr));
        });
        return m;
      };

      // ─── PASADA 1: parsear todos los PDFs y descubrir nuevas jugadoras ───────
      const handleDiscover = async () => {
        if (files.length === 0) return;
        setPhase("discovering");
        setProgress(0);

        const parsed = [];
        const nuevasMap = new Map(); // key (carnet o nombre normalizado) → {numero, nombre, carnet}

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          try {
            const text = await extractPdfText(file);
            const parsedPdf = parsePlanillaAAHBA(text);

            if (parsedPdf.equipoLocal.jugadores.length === 0 && parsedPdf.equipoVisitante.jugadores.length === 0) {
              parsed.push({ file, skipReason: "No se detectaron jugadores en el PDF" });
              setProgress(i + 1);
              continue;
            }

            const pick = pickMiEquipo(parsedPdf, jugadores);
            if (!pick) {
              parsed.push({ file, skipReason: "No detecté tu equipo (sin matches de carnet)" });
              setProgress(i + 1);
              continue;
            }

            const fecha = findFechaForRival(pick.equipoRival.nombre);
            if (!fecha) {
              parsed.push({ file, parsed: parsedPdf, ...pick, skipReason: `No encontré fecha vs "${pick.equipoRival.nombre}"` });
              setProgress(i + 1);
              continue;
            }

            // Detectar nuevas jugadoras de este PDF (siempre, en todos los modos)
            const nuevasDePdf = detectarNuevasJugadoras(pick.miEquipo, jugadores);
            for (const n of nuevasDePdf) {
              const key = n.carnet || _normName(n.nombre);
              if (!nuevasMap.has(key)) nuevasMap.set(key, n);
            }

            // Si la fecha ya tiene resultado:
            //  - mode "skip" → no se procesa (skipReason)
            //  - mode "discover_only" → solo se descubren nuevas, no se aplica resultado
            //  - mode "overwrite" → se sobrescribe
            if (fecha.result_cargado) {
              if (mode === "skip") {
                parsed.push({ file, parsed: parsedPdf, ...pick, fecha, skipReason: "Ya tenía resultado cargado" });
                setProgress(i + 1);
                continue;
              }
              if (mode === "discover_only") {
                parsed.push({ file, parsed: parsedPdf, ...pick, fecha, discoverOnly: true });
                setProgress(i + 1);
                continue;
              }
              // mode === "overwrite" → cae al push normal de abajo
            }

            parsed.push({ file, parsed: parsedPdf, ...pick, fecha });
          } catch (e) {
            parsed.push({ file, skipReason: `Error: ${e.message}` });
          }
          setProgress(i + 1);
        }

        setParsedFiles(parsed);
        setNuevasDescubiertas(Array.from(nuevasMap.values()));
        setPhase("confirm");
      };

      // ─── PASADA 2: agregar nuevas (si aceptan) y aplicar todos los PDFs ──────
      const handleApply = async (agregarNuevas) => {
        setPhase("applying");
        setProgress(0);

        // Crear nuevas jugadoras si corresponde
        let jugadoresUpd = jugadores;
        if (agregarNuevas && nuevasDescubiertas.length > 0) {
          const creadas = await crearJugadorasNuevas(nuevasDescubiertas, club.id);
          jugadoresUpd = [...jugadores, ...creadas];
        }

        // Procesar cada PDF
        const res = [];
        for (let i = 0; i < parsedFiles.length; i++) {
          const p = parsedFiles[i];
          if (p.skipReason) {
            res.push({
              file: p.file, fecha: p.fecha,
              status: p.fecha ? "skipped" : "no_match",
              message: p.skipReason,
            });
          } else if (p.discoverOnly) {
            // Modo "Solo agregar nuevas" en fecha ya cargada: solo detectamos, no aplicamos
            res.push({
              file: p.file, fecha: p.fecha, status: "discover_only",
              marker: `${p.fecha.goles_propio ?? "?"}-${p.fecha.goles_rival ?? "?"}`,
              message: "Solo se usó para detectar nuevas (resultado conservado)",
            });
          } else {
            try {
              const r = await applyPlanillaAFecha(p.parsed, p.fecha, jugadoresUpd, p.miEquipo, p.equipoRival);
              res.push({
                file: p.file, fecha: p.fecha, status: "ok",
                marker: r.marker,
                message: `${r.convocados} convocadas, ${r.bajas} bajas, ${r.goles} gol${r.goles !== 1 ? "es" : ""}, ${r.tarjetas} con tarjeta`,
              });
            } catch (e) {
              res.push({
                file: p.file, fecha: p.fecha, status: "error",
                message: e.message || "Error aplicando",
              });
            }
          }
          setResults([...res]);
          setProgress(i + 1);
        }

        // Recargar jugadores
        const { data: refreshedJug } = await sb.from("jugadores").select("*").eq("club_id", club.id);
        setJugadores(refreshedJug || []);
        setPhase("done");
      };

      const handleSelectFiles = (e) => {
        const f = Array.from(e.target.files || []);
        setFiles(f);
        setParsedFiles([]);
        setNuevasDescubiertas([]);
        setResults([]);
        setPhase("select");
      };

      const summary = (() => {
        const ok = results.filter(r => r.status === "ok").length;
        const skipped = results.filter(r => r.status === "skipped").length;
        const discoverOnly = results.filter(r => r.status === "discover_only").length;
        const noMatch = results.filter(r => r.status === "no_match").length;
        const errors = results.filter(r => r.status === "error").length;
        return { ok, skipped, discoverOnly, noMatch, errors };
      })();

      return (
        <div>
          <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14}}>
            <button onClick={onCancel} style={{...btnGhost, padding:"6px 12px", fontSize:11}}>← Volver</button>
            <div style={{fontSize:13, fontWeight:700, color:"var(--plat)", flex:1}}>📥 Cargar planillas en lote</div>
          </div>

          {/* ─── FASE: SELECT (elegir archivos) ─── */}
          {phase === "select" && (
            <div style={{padding:14, background:"var(--plat-soft)", border:"1px solid var(--plat-border)", borderRadius:6, marginBottom:14}}>
              <div style={{fontSize:11, color:"var(--white-soft)", marginBottom:10, lineHeight:1.5}}>
                Subí <strong>todos los PDFs de planillas AAHBA</strong> que tengas. La app va a:
              </div>
              <ul style={{fontSize:11, color:"var(--white-dim)", paddingLeft:18, lineHeight:1.6, marginBottom:14}}>
                <li>Parsear cada PDF y detectar jugadoras nuevas</li>
                <li>Pedirte confirmación para agregar las nuevas al plantel</li>
                <li>Aplicar todo: convocadas, goles, tarjetas, marcador y árbitros</li>
              </ul>

              <label style={{
                display:"block", padding:"14px 14px", borderRadius:6, cursor:"pointer", marginBottom:12,
                border:"1px dashed var(--plat-border)", background:"rgba(45,157,111,0.04)",
                textAlign:"center", fontSize:13, color:"var(--plat)", fontWeight:600,
              }}>
                {files.length > 0 ? `📄 ${files.length} archivo${files.length > 1 ? "s" : ""} seleccionado${files.length > 1 ? "s" : ""}` : "📄 Elegir PDFs (uno o varios)"}
                <input type="file" accept="application/pdf" multiple onChange={handleSelectFiles} style={{display:"none"}}/>
              </label>

              <div style={{padding:"10px 0", fontSize:12, color:"var(--white-soft)"}}>
                <div style={{fontSize:10, fontFamily:"var(--mono)", letterSpacing:2, color:"var(--white-dim)", fontWeight:700, marginBottom:8}}>
                  MODO DE PROCESAMIENTO
                </div>
                <div style={{display:"flex", flexDirection:"column", gap:6}}>
                  <ModeRadio value="skip" current={mode} onChange={setMode}
                    label="🚫 No tocar fechas ya cargadas"
                    hint="Las fechas con resultado ya cargado se saltan. Solo se procesan las que no tienen resultado todavía. Recomendado para no perder ediciones manuales." />
                  <ModeRadio value="discover_only" current={mode} onChange={setMode}
                    label="👀 Solo agregar jugadoras nuevas"
                    hint="Se analizan TODAS las planillas (incluso las ya cargadas) para detectar jugadoras nuevas, pero NO se sobrescriben los resultados ya cargados. Las fechas sin resultado sí se aplican normalmente." />
                  <ModeRadio value="overwrite" current={mode} onChange={setMode}
                    label="⚠️ Sobrescribir todo"
                    hint="Sobrescribe los resultados de las fechas ya cargadas. ¡Cuidado! Vas a perder cualquier edición manual que hayas hecho." />
                </div>
              </div>

              <button onClick={handleDiscover} disabled={files.length === 0}
                style={{...btnPrimary, width:"100%", marginTop:14, fontSize:13}}>
                Analizar {files.length || "—"} planilla{files.length !== 1 ? "s" : ""} →
              </button>
            </div>
          )}

          {/* ─── FASE: DISCOVERING (parseando los PDFs) ─── */}
          {phase === "discovering" && (
            <div style={{padding:24, textAlign:"center", background:"var(--plat-soft)", borderRadius:6}}>
              <div style={{fontSize:13, fontWeight:700, color:"var(--plat)", marginBottom:14}}>
                Analizando {files.length} planilla{files.length !== 1 ? "s" : ""}...
              </div>
              <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)", marginBottom:10}}>
                {progress} de {files.length}
              </div>
              <div style={{height:6, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden"}}>
                <div style={{height:"100%", background:"var(--plat)", width:`${(progress / files.length) * 100}%`, transition:"width 0.3s ease"}}/>
              </div>
            </div>
          )}

          {/* ─── FASE: CONFIRM (mostrar nuevas + pedir confirmación) ─── */}
          {phase === "confirm" && (
            <div>
              {/* Resumen del descubrimiento */}
              <div style={{padding:14, background:"var(--plat-soft)", border:"1px solid var(--plat-border)", borderRadius:6, marginBottom:14}}>
                <div style={{fontSize:12, fontWeight:700, color:"var(--white-soft)", marginBottom:10}}>
                  📋 Resumen del análisis
                </div>
                <div style={{display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, fontSize:11, color:"var(--white-soft)"}}>
                  <div>
                    <span style={{color:"var(--white-dim)"}}>Archivos analizados:</span>{" "}
                    <strong>{parsedFiles.length}</strong>
                  </div>
                  <div>
                    <span style={{color:"var(--white-dim)"}}>Listos para aplicar:</span>{" "}
                    <strong style={{color:"var(--green)"}}>{parsedFiles.filter(p => !p.skipReason).length}</strong>
                  </div>
                </div>
              </div>

              {/* Lista de archivos saltados (si hay) */}
              {parsedFiles.some(p => p.skipReason) && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10, letterSpacing:2, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:6}}>
                    ⏭ ARCHIVOS QUE SE SALTAN
                  </div>
                  {parsedFiles.filter(p => p.skipReason).map((p, i) => (
                    <div key={i} style={{padding:"6px 10px", background:"rgba(255,255,255,0.02)", borderRadius:4, fontSize:10, color:"var(--white-dim)", marginBottom:3, fontFamily:"var(--mono)"}}>
                      {p.file.name} · {p.skipReason}
                    </div>
                  ))}
                </div>
              )}

              {/* Bloque de jugadoras nuevas detectadas */}
              {nuevasDescubiertas.length > 0 ? (
                <div style={{padding:14, background:"rgba(240,208,80,0.08)", border:"1px solid rgba(240,208,80,0.35)", borderRadius:6, marginBottom:14}}>
                  <div style={{fontSize:12, fontWeight:700, color:"var(--gold)", marginBottom:8}}>
                    👀 Detecté {nuevasDescubiertas.length} jugadora{nuevasDescubiertas.length !== 1 ? "s" : ""} nueva{nuevasDescubiertas.length !== 1 ? "s" : ""}
                  </div>
                  <div style={{fontSize:11, color:"var(--white-soft)", marginBottom:10, lineHeight:1.5}}>
                    Aparecen en las planillas pero <strong>no están en tu plantel actual</strong>. Si las agregás, se van a crear como activas con su número, nombre y carnet.
                  </div>
                  <div style={{maxHeight:240, overflowY:"auto", background:"rgba(0,0,0,0.2)", borderRadius:4, padding:6}}>
                    {nuevasDescubiertas
                      .sort((a, b) => (a.numero || 999) - (b.numero || 999))
                      .map((n, i) => (
                      <div key={i} style={{padding:"5px 8px", fontSize:11, color:"var(--white-soft)", borderBottom: i < nuevasDescubiertas.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", display:"flex", alignItems:"center", gap:8}}>
                        <span style={{minWidth:24, fontFamily:"var(--mono)", color:"var(--gold)", fontWeight:700, textAlign:"center"}}>
                          #{n.numero ?? "?"}
                        </span>
                        <span style={{flex:1, fontWeight:600}}>{n.nombre}</span>
                        {n.carnet && <span style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>{n.carnet}</span>}
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex", gap:8, marginTop:14}}>
                    <button onClick={() => handleApply(false)} style={{...btnGhost, flex:1, fontSize:12}}>
                      ✗ Ignorarlas
                    </button>
                    <button onClick={() => handleApply(true)} style={{...btnPrimary, flex:2, fontSize:12}}>
                      ✓ Agregar al plantel y procesar
                    </button>
                  </div>
                </div>
              ) : (
                <div style={{padding:14, background:"rgba(45,157,111,0.08)", border:"1px solid rgba(45,157,111,0.3)", borderRadius:6, marginBottom:14}}>
                  <div style={{fontSize:12, fontWeight:700, color:"var(--plat)", marginBottom:6}}>
                    ✓ No detecté jugadoras nuevas
                  </div>
                  <div style={{fontSize:11, color:"var(--white-soft)", marginBottom:14}}>
                    Todas las jugadoras de las planillas ya están en tu plantel. Listo para aplicar.
                  </div>
                  <div style={{display:"flex", gap:8}}>
                    <button onClick={() => setPhase("select")} style={{...btnGhost, flex:1, fontSize:12}}>← Atrás</button>
                    <button onClick={() => handleApply(false)} style={{...btnPrimary, flex:2, fontSize:12}}>
                      ✓ Procesar planillas
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ─── FASE: APPLYING (aplicando los cambios) ─── */}
          {phase === "applying" && (
            <>
              <div style={{padding:14, background:"var(--plat-soft)", borderRadius:6, marginBottom:14}}>
                <div style={{fontSize:13, fontWeight:700, color:"var(--plat)", marginBottom:10, textAlign:"center"}}>
                  Aplicando... {progress}/{parsedFiles.length}
                </div>
                <div style={{height:6, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden"}}>
                  <div style={{height:"100%", background:"var(--plat)", width:`${(progress / parsedFiles.length) * 100}%`, transition:"width 0.3s ease"}}/>
                </div>
              </div>
              {results.length > 0 && <BatchResultsList results={results}/>}
            </>
          )}

          {/* ─── FASE: DONE (resumen final) ─── */}
          {phase === "done" && (
            <>
              <div style={{
                padding:14, marginBottom:14, borderRadius:6,
                background: summary.errors > 0 ? "rgba(232,85,85,0.08)" : "rgba(45,157,111,0.10)",
                border: `1px solid ${summary.errors > 0 ? "var(--red)" : "var(--plat)"}`
              }}>
                <div style={{fontSize:13, fontWeight:700, color:"var(--white-soft)", marginBottom:6}}>
                  ✓ Proceso terminado
                </div>
                <div style={{display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8, marginTop:10}}>
                  <BatchStat label="IMPORTADOS" value={summary.ok} color="var(--green)"/>
                  <BatchStat label="ANÁLISIS" value={summary.discoverOnly} color="var(--gold)"/>
                  <BatchStat label="SALTADOS" value={summary.skipped} color="var(--white-dim)"/>
                  <BatchStat label="SIN MATCH" value={summary.noMatch} color="var(--orange)"/>
                  <BatchStat label="ERRORES" value={summary.errors} color="var(--red)"/>
                </div>
              </div>

              <BatchResultsList results={results}/>

              <div style={{display:"flex", gap:10, marginTop:14}}>
                <button onClick={onCancel} style={{...btnGhost, flex:1}}>Cerrar</button>
                <button onClick={onDone} style={{...btnPrimary, flex:2}}>✓ Listo, ver fixture</button>
              </div>
            </>
          )}
        </div>
      );
    }

    function BatchStat({ label, value, color }) {
      return (
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:20, fontWeight:900, color, fontFamily:"var(--mono)", lineHeight:1}}>{value}</div>
          <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:3, fontWeight:600}}>{label}</div>
        </div>
      );
    }

    function ModeRadio({ value, current, onChange, label, hint }) {
      const selected = value === current;
      return (
        <label style={{
          display:"flex", alignItems:"flex-start", gap:10, padding:10, cursor:"pointer",
          background: selected ? "rgba(45,157,111,0.08)" : "rgba(255,255,255,0.02)",
          border: selected ? "1px solid var(--plat-border)" : "1px solid rgba(255,255,255,0.05)",
          borderRadius:6
        }}>
          <input type="radio" checked={selected} onChange={() => onChange(value)}
            style={{width:16, height:16, marginTop:1, cursor:"pointer", flexShrink:0}}/>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:12, fontWeight:600, color:"var(--white-soft)", marginBottom:2}}>{label}</div>
            <div style={{fontSize:10, color:"var(--white-dim)", lineHeight:1.4}}>{hint}</div>
          </div>
        </label>
      );
    }

    function BatchResultsList({ results }) {
      return (
        <div style={{display:"flex", flexDirection:"column", gap:5}}>
          {results.map((r, i) => {
            const colorMap = {
              ok: "var(--green)",
              skipped: "var(--white-dim)",
              discover_only: "var(--gold)",
              no_match: "var(--orange)",
              error: "var(--red)",
            };
            const iconMap = {
              ok: "✓",
              skipped: "⏭",
              discover_only: "👀",
              no_match: "⚠️",
              error: "❌",
            };
            return (
              <div key={i} style={{
                padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:5,
                borderLeft:`3px solid ${colorMap[r.status]}`,
                display:"flex", alignItems:"center", gap:10
              }}>
                <span style={{fontSize:14, flexShrink:0}}>{iconMap[r.status]}</span>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:11, color:"var(--white-soft)", fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                    {r.fecha ? `F${r.fecha.fecha_num} · vs ${r.fecha.rival}` : r.file.name}
                  </div>
                  <div style={{fontSize:10, color:"var(--white-dim)", marginTop:1, fontFamily:"var(--mono)"}}>
                    {r.marker && <span style={{color:"var(--plat)", marginRight:6}}>{r.marker}</span>}
                    {r.message}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function FixtureImport({ club, session, onDone, onCancel }) {
      const persistPrefix = `fixture_import_${club.id}_`;
      const [pasteText, setPasteText] = usePersistedState(persistPrefix + "pasteText", "");
      const [phase, setPhase] = usePersistedState(persistPrefix + "phase", "input"); // "input" | "confirm" | "preview"
      const [importing, setImporting] = useState(false);

      // Estado para fase "confirm" (AAHBA)
      const [aahbaBlocks, setAahbaBlocks] = usePersistedState(persistPrefix + "aahbaBlocks", []);
      const [detectedTeam, setDetectedTeam] = usePersistedState(persistPrefix + "detectedTeam", "");
      const [allTeamsOptions, setAllTeamsOptions] = usePersistedState(persistPrefix + "allTeamsOptions", []);
      const [chosenTeam, setChosenTeam] = usePersistedState(persistPrefix + "chosenTeam", "");
      const [chosenYear, setChosenYear] = usePersistedState(persistPrefix + "chosenYear", parseInt(club.temporada) || new Date().getFullYear());

      // Estado para fase "preview" (datos parseados editables)
      const [parsed, setParsed] = usePersistedState(persistPrefix + "parsed", []);

      // Helper para limpiar todo el draft del importador
      const clearDraft = () => clearPersistedKeysWithPrefix(persistPrefix);

      const defaults = {
        default_cancha: club.default_cancha,
        default_maps_url: club.default_maps_url,
        default_kick_time: club.default_kick_time,
        default_citacion_time: club.default_citacion_time,
        default_rueda: club.default_rueda,
      };

      const handleProcess = async () => {
        if (isAAHBAFormat(pasteText)) {
          // Formato AAHBA → necesitamos confirmar equipo y año
          const blocks = parseAAHBABlocks(pasteText);
          if (blocks.length === 0) {
            alert("No pude detectar fechas en el texto. Probá revisar el formato.");
            return;
          }
          const detected = detectOwnTeam(blocks);
          setAahbaBlocks(blocks);
          setDetectedTeam(detected.team);
          setChosenTeam(detected.team);
          setAllTeamsOptions(detected.allTeams);
          setPhase("confirm");
        } else {
          // Formato línea simple → directo a preview
          const result = await parseSimpleLines(pasteText, defaults);
