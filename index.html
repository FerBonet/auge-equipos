                <text x={pos.x} y={pos.y + r + 12} textAnchor="middle"
                  fontSize={10} fontWeight={700} fill="var(--white-soft)" fontFamily="var(--mono)" pointerEvents="none">
                  {apellido.toUpperCase()}
                </text>
                <text x={pos.x} y={pos.y + r + 24} textAnchor="middle"
                  fontSize={9} fontWeight={700}
                  fill={isInCancha ? (club.theme_primary || "var(--plat)") : "var(--white-dim)"}
                  fontFamily="var(--mono)" pointerEvents="none">
                  {tiempoDoble}
                </text>
              </>
            )}
          </g>
        );
      };

      // ─── Líneas de cambios pendientes ─────────────────────────────────────
      const renderLineasCambio = () => {
        return cambiosPendientes.map((c, idx) => {
          const sale = jugadores.find(j => j.id === c.sale_id);
          const entra = jugadores.find(j => j.id === c.entra_id);
          if (!sale || !entra) return null;
          const pSale = pxOfJugador(sale);
          const pEntra = pxOfJugador(entra);
          if (!pSale || !pEntra) return null;
          return (
            <g key={idx} opacity={animating ? 0 : 1} style={{transition: animating ? "opacity 0.3s" : "none"}}>
              <line x1={pSale.x} y1={pSale.y} x2={pEntra.x} y2={pEntra.y}
                stroke="var(--orange)" strokeWidth={2} strokeDasharray="5 3"
                style={{
                  animation: "dashFlow 1s linear infinite",
                }}/>
            </g>
          );
        });
      };

      // ─── Validaciones ─────────────────────────────────────────────────────
      const minTotal = state.cuarto * CUARTO_DURACION - (CUARTO_DURACION - liveValues.segundosCuarto);
      const minutosTotalesPartido = Math.floor(minTotal / 60);
      const tiempoFinalCuarto = liveValues.segundosCuarto >= CUARTO_DURACION;
      const cantConvocados = jugadores.filter(j => {
        const r = convRows.find(x => x.jugador_id === j.id);
        return r?.status === "convocado";
      }).length;

      if (cantConvocados === 0) {
        return (
          <div style={{padding:24, textAlign:"center", background:"rgba(255,255,255,0.02)", borderRadius:6, fontSize:12, color:"var(--white-dim)", lineHeight:1.5}}>
            Primero hacé la convocatoria y armá la formación inicial.<br/>
            Después acá vas a poder gestionar los cambios en vivo durante el partido.
          </div>
        );
      }

      // ─── Loader mientras chequeamos si está finalizado ────────────────────
      if (partidoFinalizado === null) {
        return (
          <div style={{padding:24, textAlign:"center"}}>
            <div className="spinner" style={{margin:"0 auto"}}/>
          </div>
        );
      }

      // ─── Modo lectura: el partido ya fue finalizado ───────────────────────
      if (partidoFinalizado) {
        // Agrupar cambios por cuarto
        const cambiosByCuarto = [1,2,3,4].map(c => ({
          cuarto: c,
          cambios: partidoFinalizado.cambios.filter(x => x.cuarto === c),
        }));
        // Jugadoras que jugaron, ordenadas por minutos desc
        const jugaronOrdenados = jugadores
          .filter(j => (partidoFinalizado.minutos[j.id] || 0) > 0)
          .map(j => ({ jugador: j, minutos: partidoFinalizado.minutos[j.id] || 0 }))
          .sort((a, b) => b.minutos - a.minutos);

        return (
          <div>
            {/* Cartel grande verde */}
            <div style={{
              padding:18, background:"rgba(45,157,111,0.12)", border:"2px solid var(--plat)",
              borderRadius:8, marginBottom:14, textAlign:"center"
            }}>
              <div style={{fontSize:28, marginBottom:6}}>🏁</div>
              <div style={{fontSize:14, fontWeight:700, color:"var(--plat)", marginBottom:4, fontFamily:"var(--mono)", letterSpacing:1}}>
                PARTIDO FINALIZADO
              </div>
              <div style={{fontSize:11, color:"var(--white-soft)", lineHeight:1.5}}>
                Los datos del partido ya fueron guardados en la base de datos.<br/>
                Si necesitás corregir algo, podés re-abrir el partido.
              </div>
            </div>

            {/* Resumen: 3 contadores */}
            <div style={{padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:14}}>
              <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:22, fontWeight:900, color:club.theme_primary, fontFamily:"var(--mono)"}}>{partidoFinalizado.cambios.length}</div>
                  <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:600, marginTop:2}}>CAMBIOS</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:22, fontWeight:900, color:"var(--green)", fontFamily:"var(--mono)"}}>{jugaronOrdenados.length}</div>
                  <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:600, marginTop:2}}>JUGARON</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:22, fontWeight:900, color:"var(--gold)", fontFamily:"var(--mono)"}}>
                    {jugaronOrdenados.reduce((acc, j) => Math.max(acc, j.minutos), 0)}'
                  </div>
                  <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:600, marginTop:2}}>MAX MIN</div>
                </div>
              </div>
            </div>

            {/* Lista de minutos jugados */}
            {jugaronOrdenados.length > 0 && (() => {
              // Base = duración real del partido (guardada en fecha.duracion_real_segundos)
              // Si no está guardado (partidos viejos), uso la jugadora que más jugó como fallback
              const totalMin = fecha.duracion_real_segundos
                ? Math.round(fecha.duracion_real_segundos / 60)
                : jugaronOrdenados.reduce((acc, j) => Math.max(acc, j.minutos), 0);
              const baseMin = totalMin || 1;
              return (
                <div style={{marginBottom:14}}>
                  {/* Encabezado con toggle list/bars */}
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8}}>
                    <div style={{fontSize:10, fontFamily:"var(--mono)", letterSpacing:2, color:"var(--white-dim)", fontWeight:700}}>
                      ⏱ MINUTOS JUGADOS
                    </div>
                    <div style={{display:"flex", gap:2, background:"rgba(255,255,255,0.03)", padding:2, borderRadius:4}}>
                      <button onClick={() => setMinutosViewMode("list")} style={{
                        padding:"4px 10px", fontSize:10, fontFamily:"var(--mono)", fontWeight:700, letterSpacing:1,
                        background: minutosViewMode === "list" ? club.theme_primary : "transparent",
                        color: minutosViewMode === "list" ? "var(--bg)" : "var(--white-dim)",
                        border:"none", borderRadius:3, cursor:"pointer"
                      }}>📋 Lista</button>
                      <button onClick={() => setMinutosViewMode("bars")} style={{
                        padding:"4px 10px", fontSize:10, fontFamily:"var(--mono)", fontWeight:700, letterSpacing:1,
                        background: minutosViewMode === "bars" ? club.theme_primary : "transparent",
                        color: minutosViewMode === "bars" ? "var(--bg)" : "var(--white-dim)",
                        border:"none", borderRadius:3, cursor:"pointer"
                      }}>📊 Barras</button>
                    </div>
                  </div>

                  {/* Vista lista (original) */}
                  {minutosViewMode === "list" && (
                    <div style={{background:"rgba(255,255,255,0.02)", borderRadius:6, overflow:"hidden"}}>
                      {jugaronOrdenados.map((entry, i) => (
                        <div key={entry.jugador.id} style={{
                          display:"flex", alignItems:"center", gap:10, padding:"8px 12px",
                          borderBottom: i < jugaronOrdenados.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none"
                        }}>
                          <span style={{minWidth:28, fontSize:11, fontWeight:900, color:club.theme_primary, fontFamily:"var(--mono)", textAlign:"center"}}>
                            {entry.jugador.numero ?? "?"}
                          </span>
                          <div style={{flex:1, fontSize:12, fontWeight:600}}>{entry.jugador.nombre}</div>
                          <span style={{fontSize:13, fontWeight:900, color:"var(--gold)", fontFamily:"var(--mono)"}}>
                            {entry.minutos}'
                          </span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Vista barras */}
                  {minutosViewMode === "bars" && (
                    <div style={{background:"rgba(255,255,255,0.02)", borderRadius:6, padding:"10px 12px"}}>
                      <div style={{fontSize:9, color:"var(--white-dim)", marginBottom:6, fontFamily:"var(--mono)", letterSpacing:1.5}}>
                        Base: {baseMin}' (duración del partido)
                      </div>
                      <LeyendaCuartos clubColor={club.theme_primary}/>
                      {jugaronOrdenados.map(entry => {
                        const porCuarto = (partidoFinalizado.porCuarto || {})[entry.jugador.id];
                        const posShort = getPositionShort(entry.jugador.posicion);
                        const lineColor = getPositionColor(entry.jugador.posicion);
                        return (
                          <div key={entry.jugador.id} style={{
                            display:"flex", alignItems:"center", gap:10, padding:"8px 4px",
                            borderBottom:"1px solid rgba(255,255,255,0.04)"
                          }}>
                            {/* Badge de posición */}
                            {posShort ? (
                              <span style={{
                                minWidth:34, padding:"3px 6px", fontSize:9, fontWeight:900,
                                fontFamily:"var(--mono)", letterSpacing:1, color:"var(--bg)",
                                background:lineColor, borderRadius:3, textAlign:"center", flexShrink:0
                              }}>{posShort}</span>
                            ) : (
                              <span style={{minWidth:34, flexShrink:0}}/>
                            )}
                            {/* Apellido */}
                            <div style={{minWidth:90, maxWidth:110, fontSize:12, fontWeight:600, color:"var(--white-soft)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
                              {entry.jugador.nombre.split(",")[0].split(" ")[0]}
                            </div>
                            {/* Barra */}
                            <div style={{flex:1, minWidth:0}}>
                              <BarraMinutosCuartos
                                porCuarto={porCuarto}
                                totalMin={entry.minutos}
                                baseMin={baseMin}
                                clubColor={club.theme_primary}
                                fallbackColor={club.theme_primary}
                                height={18}
                              />
                            </div>
                            {/* Porcentaje */}
                            <div style={{minWidth:42, textAlign:"right", fontSize:13, fontWeight:900, color:"var(--gold)", fontFamily:"var(--mono)"}}>
                              {Math.round((entry.minutos / baseMin) * 100)}%
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Lista de cambios por cuarto */}
            {partidoFinalizado.cambios.length > 0 && (
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10, fontFamily:"var(--mono)", letterSpacing:2, color:"var(--white-dim)", fontWeight:700, marginBottom:8}}>
                  🔄 CAMBIOS POR CUARTO
                </div>
                {cambiosByCuarto.filter(c => c.cambios.length > 0).map(({cuarto, cambios}) => (
                  <div key={cuarto} style={{marginBottom:8}}>
                    <div style={{fontSize:10, fontFamily:"var(--mono)", color:"var(--plat)", fontWeight:700, marginBottom:4, padding:"4px 8px"}}>
                      CUARTO {cuarto}
                    </div>
                    <div style={{background:"rgba(255,255,255,0.02)", borderRadius:6, overflow:"hidden"}}>
                      {cambios.map((c, i) => (
                        <div key={c.id} style={{
                          display:"flex", alignItems:"center", gap:8, padding:"6px 10px", fontSize:11,
                          borderBottom: i < cambios.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none"
                        }}>
                          <span style={{minWidth:36, fontFamily:"var(--mono)", color:"var(--white-dim)", fontWeight:700}}>
                            {String(c.minuto_cuarto).padStart(2,"0")}'
                          </span>
                          <span style={{color:"var(--red)", fontWeight:600}}>↓ {c.sale?.nombre || "?"}</span>
                          <span style={{color:"var(--white-dim)"}}>·</span>
                          <span style={{color:"var(--green)", fontWeight:600}}>↑ {c.entra?.nombre || "?"}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Botón re-abrir partido */}
            <button onClick={reabrirPartido} style={{
              width:"100%", padding:"10px", fontSize:11, fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700,
              background:"rgba(232,85,85,0.06)", border:"1px solid rgba(232,85,85,0.25)",
              color:"var(--red)", borderRadius:6, cursor:"pointer"
            }}>
              ⚠️ Re-abrir partido (borra los datos cargados)
            </button>
          </div>
        );
      }

      return (
        <div>
          {/* ─── Estilos de animación del trazo ─── */}
          <style>{`
            @keyframes dashFlow {
              to { stroke-dashoffset: -16; }
            }
            @keyframes pulseRed {
              0%, 100% { opacity: 1; }
              50% { opacity: 0.4; }
            }
            /* Animación de fichas en el cambio */
            g.ficha-animating {
              transition: transform 0.7s cubic-bezier(0.4, 1.6, 0.6, 1);
              -webkit-transition: transform 0.7s cubic-bezier(0.4, 1.6, 0.6, 1);
            }
          `}</style>

          {/* ─── RELOJ ARRIBA ─── */}
          <div style={{
            padding:14, background:"rgba(0,0,0,0.3)",
            border:`2px solid ${tiempoFinalCuarto ? "var(--red)" : (state.isRunning ? "var(--green)" : "var(--white-dim)")}`,
            borderRadius:8, marginBottom:14,
            animation: tiempoFinalCuarto ? "pulseRed 0.8s infinite" : "none"
          }}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
              <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:2, fontWeight:700}}>
                CUARTO
              </div>
              <div style={{display:"flex", gap:5}}>
                {[1,2,3,4].map(c => (
                  <button key={c} onClick={() => state.cuarto !== c && confirm(`¿Saltar al cuarto ${c}? El reloj vuelve a 0:00.`) && setState(s => {
                    const live = computeLiveValues(s, Date.now());
                    return {
                      ...s, cuarto: c, segundosCuarto: 0, isRunning: false, startedAt: null,
                      minutosJugados: live.minutosJugados,
                      tiempoSinCambio: live.tiempoSinCambio,
                      minutosPorCuarto: live.minutosPorCuarto,
                    };
                  })}
                    style={{
                      width:30, height:30, borderRadius:15, fontSize:13, fontWeight:900, fontFamily:"var(--mono)",
                      border: state.cuarto === c ? `2px solid ${club.theme_primary}` : "1px solid rgba(255,255,255,0.15)",
                      background: state.cuarto === c ? `${club.theme_primary}33` : "transparent",
                      color: state.cuarto === c ? club.theme_primary : "var(--white-dim)",
                      cursor:"pointer"
                    }}>{c}</button>
                ))}
              </div>
            </div>
            {/* Tiempo grande */}
            <div style={{textAlign:"center", marginBottom:14}}>
              <div style={{
                fontSize:64, fontWeight:900, fontFamily:"var(--mono)",
                color: tiempoFinalCuarto ? "var(--red)" : (state.isRunning ? "var(--green)" : "var(--white-soft)"),
                lineHeight:1, letterSpacing:-2
              }}>
                {fmtTime(liveValues.segundosCuarto)}
              </div>
              <div style={{fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:2, marginTop:6}}>
                {tiempoFinalCuarto ? "⚠️ FIN DEL CUARTO" : `RESTANTE: ${fmtTime(CUARTO_DURACION - liveValues.segundosCuarto)}`}
              </div>
            </div>
            {/* Controles */}
            <div style={{display:"flex", gap:8}}>
              <button onClick={togglePlay} disabled={tiempoFinalCuarto && state.cuarto >= 4} style={{
                flex:2, padding:"12px", fontSize:13, fontWeight:700, fontFamily:"var(--mono)", letterSpacing:1,
                background: state.isRunning ? "var(--orange)" : "var(--green)",
                color: "var(--bg)", border:"none", borderRadius:6, cursor:"pointer",
                opacity: tiempoFinalCuarto && state.cuarto >= 4 ? 0.4 : 1
              }}>
                {state.isRunning ? "⏸ PAUSAR" : "▶ JUGAR"}
              </button>
              {state.cuarto < 4 && (
                <button onClick={siguienteCuarto} style={{
                  flex:1, padding:"12px", fontSize:11, fontWeight:700, fontFamily:"var(--mono)", letterSpacing:1,
                  background: "transparent", color:"var(--plat)", border:"1px solid var(--plat-border)", borderRadius:6, cursor:"pointer"
                }}>
                  Q{state.cuarto + 1} →
                </button>
              )}
              <button onClick={resetReloj} style={{
                padding:"12px", fontSize:11, fontWeight:700, fontFamily:"var(--mono)",
                background:"transparent", color:"var(--white-dim)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:6, cursor:"pointer"
              }}>↺</button>
            </div>
          </div>

          {/* ─── Cambios pendientes (cartel + botón) ─── */}
          {cambiosPendientes.length > 0 && (
            <div style={{
              padding:12, background:"rgba(255,140,0,0.10)", border:"1px solid var(--orange)", borderRadius:6, marginBottom:12,
              display:"flex", alignItems:"center", gap:10
            }}>
              <div style={{flex:1, fontSize:12, color:"var(--white-soft)"}}>
                <strong style={{color:"var(--orange)"}}>{cambiosPendientes.length} cambio{cambiosPendientes.length > 1 ? "s" : ""} pendiente{cambiosPendientes.length > 1 ? "s" : ""}</strong>
                <div style={{fontSize:10, color:"var(--white-dim)", marginTop:2}}>Las líneas naranjas muestran los cambios.</div>
              </div>
              <button onClick={cancelarPendientes} disabled={animating} style={{...btnGhost, padding:"6px 10px", fontSize:11}}>
                ✗
              </button>
              <button onClick={confirmarCambios} disabled={animating} style={{
                padding:"8px 14px", fontSize:11, fontWeight:700, fontFamily:"var(--mono)", letterSpacing:1,
                background:"var(--orange)", color:"var(--bg)", border:"none", borderRadius:4, cursor:"pointer"
              }}>
                ✓ CONFIRMAR
              </button>
            </div>
          )}

          {/* ─── CANCHA SVG ─── */}
          <div style={{padding:10, background:"rgba(0,0,0,0.25)", borderRadius:6, marginBottom:12}}>
            <div style={{fontSize:11, color:"var(--white-soft)", marginBottom:6, textAlign:"center", lineHeight:1.4}}>
              <span style={{fontSize:14}}>🤚</span> Arrastrá fichas: suplente↔titular = cambio · titular↔titular = swap directo
            </div>
            <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{display:"block", width:"100%", height:"auto", userSelect:"none"}}>
              {/* Cancha */}
              <rect x={pad} y={pad} width={fw} height={fh} fill="rgba(45,157,111,0.10)" stroke="rgba(255,255,255,0.20)" strokeWidth={1.5} rx={4}/>
              <line x1={pad} y1={pad + fh/2} x2={pad + fw} y2={pad + fh/2} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
              <line x1={pad} y1={pad + fh * 0.252} x2={pad + fw} y2={pad + fh * 0.252} stroke="rgba(255,255,255,0.30)" strokeWidth={1} strokeDasharray="4,3"/>
              <line x1={pad} y1={pad + fh * 0.748} x2={pad + fw} y2={pad + fh * 0.748} stroke="rgba(255,255,255,0.30)" strokeWidth={1} strokeDasharray="4,3"/>
              <path d={`M ${pad + fw/2 - 0.30*fw} ${pad + fh} A ${0.30*fw} ${0.16*fh} 0 0 1 ${pad + fw/2 + 0.30*fw} ${pad + fh}`}
                fill="none" stroke="rgba(255,255,255,0.40)" strokeWidth={1.2}/>
              <path d={`M ${pad + fw/2 - 0.30*fw} ${pad} A ${0.30*fw} ${0.16*fh} 0 0 0 ${pad + fw/2 + 0.30*fw} ${pad}`}
                fill="none" stroke="rgba(255,255,255,0.40)" strokeWidth={1.2}/>
              <line x1={pad + fw/2 - 0.06*fw} y1={pad + fh} x2={pad + fw/2 + 0.06*fw} y2={pad + fh} stroke="rgba(255,255,255,0.8)" strokeWidth={3}/>
              <line x1={pad + fw/2 - 0.06*fw} y1={pad} x2={pad + fw/2 + 0.06*fw} y2={pad} stroke="rgba(255,255,255,0.8)" strokeWidth={3}/>

              {/* Línea divisoria suplentes */}
              <line x1={0} y1={SUB_ZONE_Y - 4} x2={W} y2={SUB_ZONE_Y - 4} stroke="rgba(255,255,255,0.15)" strokeWidth={1} strokeDasharray="3 3"/>
              <text x={W/2} y={SUB_ZONE_Y + 8} textAnchor="middle"
                fontSize={9} fontWeight={700} fill="rgba(255,255,255,0.5)" fontFamily="var(--mono)" letterSpacing={2.5}>
                SUPLENTES ({disponibles.length})
              </text>

              {/* Líneas de cambios pendientes */}
              {renderLineasCambio()}

              {/* Titulares */}
              {enCancha.map(j => renderFicha(j, true))}
              {/* Suplentes */}
              {disponibles.map(j => renderFicha(j, false))}
            </svg>
          </div>

          {/* ─── Resumen + Finalizar ─── */}
          <div style={{padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:10}}>
            <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, fontSize:11}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:900, color:club.theme_primary, fontFamily:"var(--mono)"}}>{state.cambios.length}</div>
                <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:600, marginTop:2}}>CAMBIOS</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:900, color:"var(--green)", fontFamily:"var(--mono)"}}>
                  {Object.keys(liveValues.minutosJugados).filter(k => liveValues.minutosJugados[k] > 0).length}
                </div>
                <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:600, marginTop:2}}>JUGARON</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18, fontWeight:900, color:"var(--gold)", fontFamily:"var(--mono)"}}>
                  {(state.cuarto - 1) * 15 + Math.floor(liveValues.segundosCuarto / 60)}'
                </div>
                <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:600, marginTop:2}}>MIN TOTAL</div>
              </div>
            </div>
          </div>

          <div style={{display:"flex", gap:8}}>
            <button onClick={resetTodo} style={{...btnGhost, flex:1, fontSize:11}}>↺ Resetear</button>
            <button onClick={finalizarPartido} disabled={finalizando} style={{
              flex:2, padding:"10px", fontSize:12, fontWeight:700, fontFamily:"var(--mono)", letterSpacing:1.5,
              background:"var(--green)", color:"var(--bg)", border:"none", borderRadius:6, cursor:"pointer"
            }}>
              {finalizando ? "Guardando..." : "🏁 FINALIZAR PARTIDO"}
            </button>
          </div>
        </div>
      );
    }

    function ResultadoTabContent({ fecha, club, jugadores, convRows, onUpdate, reload }) {
      const [golesPropio, setGolesPropio] = useState(fecha.goles_propio ?? "");
      const [golesRival, setGolesRival] = useState(fecha.goles_rival ?? "");
      const [arbitros, setArbitros] = useState(fecha.arbitros || "");
      const [resultNotas, setResultNotas] = useState(fecha.result_notas || []);
      const [resultCargado, setResultCargado] = useState(fecha.result_cargado || false);
      const [savingMeta, setSavingMeta] = useState(false);
      const [importing, setImporting] = useState(false);
      const [importMsg, setImportMsg] = useState(""); // resumen post-import
      const [showImporter, setShowImporter] = useState(false);
      const [pasteText, setPasteText] = useState("");
      const [pendingImport, setPendingImport] = useState(null); // { parsed, miEquipo, equipoRival, nuevas }

      // Solo los convocados pueden recibir goles/tarjetas (los duda/baja no jugaron)
      const convocados = jugadores.filter(j => {
        const row = convRows.find(r => r.jugador_id === j.id);
        return row?.status === "convocado";
      });

      // Persistir los datos generales del partido (goles, árbitros, etc.) con debounce
      const saveTimerRef = useRef(null);
      const queueSaveMeta = useCallback((updates) => {
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(async () => {
          setSavingMeta(true);
          await sb.from("fechas").update(updates).eq("id", fecha.id);
          setSavingMeta(false);
        }, 400);
      }, [fecha.id]);

      const handleGolesPropio = (v) => {
        const n = v === "" ? null : parseInt(v);
        setGolesPropio(v);
        queueSaveMeta({ goles_propio: n });
      };
      const handleGolesRival = (v) => {
        const n = v === "" ? null : parseInt(v);
        setGolesRival(v);
        queueSaveMeta({ goles_rival: n });
      };
      const handleArbitros = (v) => {
        setArbitros(v);
        queueSaveMeta({ arbitros: v });
      };

      const toggleResultCargado = async () => {
        const newVal = !resultCargado;
        setResultCargado(newVal);
        await sb.from("fechas").update({ result_cargado: newVal }).eq("id", fecha.id);
      };

      // Helpers para acceder a la fila del jugador
      const rowOf = (jId) => convRows.find(r => r.jugador_id === jId);

      // Update de goleador / tarjeta / lesión
      const updateGoles = (jId, delta) => {
        const row = rowOf(jId);
        const current = row?.goles || 0;
        const newGoles = Math.max(0, current + delta);
        onUpdate(jId, { goles: newGoles });
      };
      const toggleVerde = (jId) => {
        const row = rowOf(jId);
        onUpdate(jId, { tarjeta_verde: !row?.tarjeta_verde });
      };
      const cycleAmarilla = (jId) => {
        const row = rowOf(jId);
        const current = row?.tarjeta_amarilla || 0;
        const next = current >= 2 ? 0 : current + 1;
        onUpdate(jId, { tarjeta_amarilla: next });
      };
      const toggleRoja = (jId) => {
        const row = rowOf(jId);
        onUpdate(jId, { tarjeta_roja: !row?.tarjeta_roja });
      };
      const toggleLesion = (jId) => {
        const row = rowOf(jId);
        onUpdate(jId, { lesionado: !row?.lesionado });
      };

      // Notas adicionales (texto libre)
      const addNota = () => setResultNotas(n => [...n, { icon: "📝", text: "" }]);
      const updateNota = (idx, key, val) => setResultNotas(n => n.map((it, i) => i === idx ? {...it, [key]: val} : it));
      const removeNota = (idx) => setResultNotas(n => n.filter((_, i) => i !== idx));

      // Guardar notas (con debounce)
      useEffect(() => {
        const timer = setTimeout(async () => {
          await sb.from("fechas").update({ result_notas: resultNotas }).eq("id", fecha.id);
        }, 500);
        return () => clearTimeout(timer);
      }, [resultNotas, fecha.id]);

      // ─── Import de planilla AAHBA (flujo 2 pasadas) ──────────────────────
      // Pasada 1: parsea, detecta nuevas → muestra confirmación
      // Pasada 2: aplica (creando nuevas o no según la elección)
      const handleImportPlanilla = async (text) => {
        setImporting(true);
        setImportMsg("");
        try {
          const parsed = parsePlanillaAAHBA(text);
          if (parsed.equipoLocal.jugadores.length === 0 && parsed.equipoVisitante.jugadores.length === 0) {
            alert("No se detectaron jugadores en la planilla. ¿Pegaste el texto correcto?");
            setImporting(false);
            return;
          }

          // Detectar mi equipo
          let pick = pickMiEquipo(parsed, jugadores);
          if (!pick) {
            const choice = prompt(
              `No pude detectar cuál es tu equipo. Tipeá:\n  L  → si tu equipo es ${parsed.equipoLocal.nombre}\n  V  → si tu equipo es ${parsed.equipoVisitante.nombre}`,
              ""
            );
            if (!choice) { setImporting(false); return; }
            pick = choice.toUpperCase().startsWith("L")
              ? { miEquipo: parsed.equipoLocal, equipoRival: parsed.equipoVisitante }
              : { miEquipo: parsed.equipoVisitante, equipoRival: parsed.equipoLocal };
          }

          // Detectar jugadoras nuevas
          const nuevas = detectarNuevasJugadoras(pick.miEquipo, jugadores);

          if (nuevas.length > 0) {
            // Mostrar modal de confirmación y pausar
            setPendingImport({ parsed, ...pick, nuevas });
            setImporting(false);
            return;
          }

          // Sin nuevas → aplicar directo
          await aplicarImport(parsed, pick.miEquipo, pick.equipoRival, false, []);
        } catch (e) {
          alert("Error procesando la planilla: " + e.message);
          setImporting(false);
        }
      };

      // Aplica el import (después de resolver el tema de las nuevas)
      const aplicarImport = async (parsed, miEquipo, equipoRival, agregarNuevas, nuevas) => {
        setImporting(true);
        try {
          let jugadoresUpd = jugadores;
          if (agregarNuevas && nuevas.length > 0) {
            const creadas = await crearJugadorasNuevas(nuevas, club.id);
            jugadoresUpd = [...jugadores, ...creadas];
          }

          const r = await applyPlanillaAFecha(parsed, fecha, jugadoresUpd, miEquipo, equipoRival);

          // Actualizar estados locales para que la UI se sincronice
          if (miEquipo.golesEquipo != null) setGolesPropio(miEquipo.golesEquipo.toString());
          if (equipoRival.golesEquipo != null) setGolesRival(equipoRival.golesEquipo.toString());
          if (parsed.arbitros) setArbitros(parsed.arbitros);
          setResultCargado(true);

          const nuevasMsg = agregarNuevas && nuevas.length > 0 ? ` ${nuevas.length} jugadora${nuevas.length !== 1 ? "s" : ""} nueva${nuevas.length !== 1 ? "s" : ""} agregada${nuevas.length !== 1 ? "s" : ""} al plantel.` : "";
          setImportMsg(`✓ ${r.convocados} convocadas, ${r.bajas} bajas, ${r.goles} gol${r.goles !== 1 ? "es" : ""}, ${r.tarjetas} con tarjeta. Marcador: ${r.marker}.${nuevasMsg}`);
          setShowImporter(false);
          setPasteText("");
          setPendingImport(null);

          if (reload) await reload();
        } catch (e) {
          alert("Error aplicando la planilla: " + e.message);
        }
        setImporting(false);
      };

      const handlePdfUpload = async (file) => {
        if (!file) return;
        setImporting(true);
        try {
          const text = await extractPdfText(file);
          setPasteText(text);
          // Auto-procesar
          await handleImportPlanilla(text);
        } catch (e) {
          alert("Error leyendo PDF: " + e.message);
          setImporting(false);
        }
      };

      // Calcular goles asignados a goleadores
      const golesAsignados = convocados.reduce((sum, j) => sum + (rowOf(j.id)?.goles || 0), 0);
      const golesIngresados = golesPropio === "" ? 0 : parseInt(golesPropio) || 0;
      const golesPorAsignar = golesIngresados - golesAsignados;

      // Bloque del import (siempre arriba)
      const importerBlock = (
        <div style={{marginBottom:14, padding:12, background:"var(--plat-soft)", border:"1px solid var(--plat-border)", borderRadius:6}}>
          {/* Modal interno de confirmación de jugadoras nuevas */}
          {pendingImport && (
            <div style={{padding:14, background:"rgba(240,208,80,0.10)", border:"1px solid rgba(240,208,80,0.4)", borderRadius:6, marginBottom:10}}>
              <div style={{fontSize:12, fontWeight:700, color:"var(--gold)", marginBottom:6}}>
                👀 Detecté {pendingImport.nuevas.length} jugadora{pendingImport.nuevas.length !== 1 ? "s" : ""} nueva{pendingImport.nuevas.length !== 1 ? "s" : ""}
              </div>
              <div style={{fontSize:11, color:"var(--white-soft)", marginBottom:10, lineHeight:1.5}}>
                Aparecen en la planilla pero <strong>no están en el plantel</strong>. Si las agregás, se van a crear como activas.
              </div>
              <div style={{maxHeight:180, overflowY:"auto", background:"rgba(0,0,0,0.25)", borderRadius:4, padding:6, marginBottom:10}}>
                {pendingImport.nuevas
                  .sort((a, b) => (a.numero || 999) - (b.numero || 999))
                  .map((n, i) => (
                  <div key={i} style={{padding:"4px 8px", fontSize:11, color:"var(--white-soft)", display:"flex", alignItems:"center", gap:8, borderBottom: i < pendingImport.nuevas.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none"}}>
                    <span style={{minWidth:22, fontFamily:"var(--mono)", color:"var(--gold)", fontWeight:700, textAlign:"center"}}>
                      #{n.numero ?? "?"}
                    </span>
                    <span style={{flex:1, fontWeight:600}}>{n.nombre}</span>
                    {n.carnet && <span style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>{n.carnet}</span>}
                  </div>
                ))}
              </div>
              <div style={{display:"flex", gap:8}}>
                <button onClick={() => {
                  // Ignorar nuevas: aplicar sin crearlas
                  aplicarImport(pendingImport.parsed, pendingImport.miEquipo, pendingImport.equipoRival, false, []);
                }} disabled={importing} style={{...btnGhost, flex:1, fontSize:11}}>
                  ✗ Ignorarlas
                </button>
                <button onClick={() => {
                  // Agregar nuevas + aplicar
                  aplicarImport(pendingImport.parsed, pendingImport.miEquipo, pendingImport.equipoRival, true, pendingImport.nuevas);
                }} disabled={importing} style={{...btnPrimary, flex:2, fontSize:11}}>
                  {importing ? "Procesando..." : "✓ Agregar al plantel y procesar"}
                </button>
              </div>
              <button onClick={() => { setPendingImport(null); setImporting(false); }} disabled={importing} style={{...btnGhost, width:"100%", marginTop:6, fontSize:10}}>
                Cancelar
              </button>
            </div>
          )}

          {!showImporter ? (
            <>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:10, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, fontWeight:700, marginBottom:3}}>
                    📥 IMPORTAR DESDE PLANILLA AAHBA
                  </div>
                  <div style={{fontSize:11, color:"var(--white-soft)", lineHeight:1.4}}>
                    Carga automática de convocatoria, goles, tarjetas, marcador y árbitros desde el PDF oficial de la AAHBA.
                  </div>
                </div>
                <button onClick={() => setShowImporter(true)} disabled={importing}
                  style={{...btnPrimary, fontSize:11, padding:"8px 14px", flexShrink:0}}>
                  Abrir
                </button>
              </div>
              {importMsg && (
                <div style={{marginTop:10, padding:10, background:"rgba(45,157,111,0.10)", border:"1px solid var(--plat)", borderRadius:4, fontSize:11, color:"var(--white-soft)"}}>
                  {importMsg}
                </div>
              )}
            </>
          ) : (
            <div>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
                <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, fontWeight:700}}>
                  📥 IMPORTAR PLANILLA
                </div>
                <button onClick={() => { setShowImporter(false); setPasteText(""); }} disabled={importing} style={{...btnGhost, padding:"3px 9px", fontSize:11}}>× Cerrar</button>
              </div>
              <label style={{
                display:"block", padding:"10px 14px", borderRadius:6, cursor: importing ? "wait" : "pointer", marginBottom:10,
                border:"1px dashed var(--plat-border)", background:"rgba(45,157,111,0.04)",
                textAlign:"center", fontSize:12, color:"var(--plat)", fontWeight:600,
                opacity: importing ? 0.6 : 1
              }}>
                {importing ? "Procesando..." : "📄 Subir PDF de planilla"}
                <input type="file" accept="application/pdf" disabled={importing}
                  onChange={e => handlePdfUpload(e.target.files?.[0])} style={{display:"none"}}/>
              </label>
              <div style={{fontSize:10, color:"var(--white-dim)", textAlign:"center", marginBottom:8}}>
                — o pegá el texto del PDF acá —
              </div>
              <textarea value={pasteText} onChange={e => setPasteText(e.target.value)} rows={5}
                placeholder="Pegá acá el texto del PDF (todo, Ctrl+A)..."
                style={{...inputStyle, fontFamily:"var(--mono)", fontSize:11, resize:"vertical"}}/>
              <button onClick={() => handleImportPlanilla(pasteText)} disabled={importing || !pasteText.trim()}
                style={{...btnPrimary, width:"100%", marginTop:10, fontSize:12}}>
                {importing ? "Procesando..." : "Procesar planilla →"}
              </button>
              <div style={{marginTop:8, padding:8, background:"rgba(240,208,80,0.06)", border:"1px solid rgba(240,208,80,0.25)", borderRadius:4, fontSize:10, color:"var(--white-soft)", lineHeight:1.4}}>
                ⚠️ Esto va a <strong>sobrescribir</strong> la convocatoria actual: los jugadores que aparezcan en la planilla se marcan CONVOCADOS (con sus goles/tarjetas), los que NO aparezcan se marcan BAJA (motivo: deportivo).
              </div>
            </div>
          )}
        </div>
      );

      if (convocados.length === 0) {
        return (
          <div>
            {importerBlock}
            <div style={{padding:24, textAlign:"center", background:"rgba(255,255,255,0.02)", borderRadius:6, fontSize:12, color:"var(--white-dim)", lineHeight:1.5}}>
              Para cargar el resultado primero hay que tener jugadores convocados.<br/>
              Podés <strong>importar la planilla AAHBA</strong> arriba para autocompletar todo desde el PDF oficial,<br/>
              o marcar manualmente los jugadores en la pestaña 📋 CONVOCATORIA.
            </div>
          </div>
        );
      }

      return (
        <div>
          {importerBlock}
          {/* ── Marcador grande ──────────────────────────────────────────── */}
          <div style={{
            padding:14, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:12,
            display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:10, alignItems:"center"
          }}>
            <div>
              <div style={{fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700, marginBottom:5, textAlign:"center"}}>
                {club.nombre.toUpperCase()}
              </div>
              <input type="number" min="0" value={golesPropio} onChange={e => handleGolesPropio(e.target.value)}
                style={{...inputStyle, fontSize:32, fontWeight:900, textAlign:"center", padding:"10px", fontFamily:"var(--mono)"}} placeholder="—"/>
            </div>
            <div style={{fontSize:20, fontWeight:900, color:"var(--white-dim)", padding:"0 4px"}}>vs</div>
            <div>
              <div style={{fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700, marginBottom:5, textAlign:"center", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
                {(fecha.rival || "—").toUpperCase()}
              </div>
              <input type="number" min="0" value={golesRival} onChange={e => handleGolesRival(e.target.value)}
                style={{...inputStyle, fontSize:32, fontWeight:900, textAlign:"center", padding:"10px", fontFamily:"var(--mono)"}} placeholder="—"/>
            </div>
          </div>

          {/* Alerta de goles por asignar */}
          {golesIngresados > 0 && golesPorAsignar !== 0 && (
            <div style={{
              padding:"8px 12px", marginBottom:12, borderRadius:6, fontSize:11,
              background: golesPorAsignar > 0 ? "rgba(240,208,80,0.10)" : "rgba(232,85,85,0.10)",
              border: `1px solid ${golesPorAsignar > 0 ? "rgba(240,208,80,0.4)" : "rgba(232,85,85,0.4)"}`,
              color:"var(--white-soft)"
            }}>
              {golesPorAsignar > 0
                ? <>⚠️ Te faltan asignar <strong>{golesPorAsignar} gol{golesPorAsignar > 1 ? "es" : ""}</strong> a algún jugador.</>
                : <>⚠️ Asignaste <strong>{-golesPorAsignar}</strong> gol{-golesPorAsignar > 1 ? "es" : ""} de más (más que los del marcador).</>
              }
            </div>
          )}

          {/* ── Lista de jugadores: goles + tarjetas + lesión ──────────────── */}
          <div style={{fontSize:9, fontFamily:"var(--mono)", letterSpacing:2, color:"var(--white-dim)", marginBottom:8, fontWeight:700}}>
            REGISTRO POR JUGADOR
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:6, marginBottom:14}}>
            {convocados.map(j => {
              const row = rowOf(j.id) || {};
              const posShort = getPositionShort(j.posicion);
              return (
                <div key={j.id} style={{padding:10, background:"rgba(255,255,255,0.02)", borderRadius:6}}>
                  {/* Fila principal: nombre + goles +/- */}
                  <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
                    {posShort && (
                      <span style={{fontSize:9, fontFamily:"var(--mono)", fontWeight:800, padding:"3px 6px", borderRadius:3, color:"var(--bg)", background:"var(--plat)", flexShrink:0}}>
                        {posShort}
                      </span>
                    )}
                    <div style={{flex:1, minWidth:0, fontSize:12, fontWeight:600}}>
                      {j.numero != null && <span style={{color:"var(--white-dim)", fontFamily:"var(--mono)", marginRight:6}}>#{j.numero}</span>}
                      {j.nombre || "(sin nombre)"}
                    </div>
                    {/* Goles +/- */}
                    <div style={{display:"flex", alignItems:"center", gap:4, flexShrink:0}}>
                      <button onClick={() => updateGoles(j.id, -1)} disabled={(row.goles || 0) === 0}
                        style={{padding:"4px 9px", fontSize:14, fontWeight:900, fontFamily:"var(--mono)",
                          background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)",
                          color:"var(--white-soft)", borderRadius:3, cursor: (row.goles || 0) === 0 ? "not-allowed" : "pointer",
                          opacity: (row.goles || 0) === 0 ? 0.3 : 1
                        }}>−</button>
                      <div style={{
                        minWidth:42, padding:"4px 6px", fontSize:13, fontWeight:900, textAlign:"center", fontFamily:"var(--mono)",
                        background: (row.goles || 0) > 0 ? "rgba(45,157,111,0.15)" : "transparent",
                        border:`1px solid ${(row.goles || 0) > 0 ? "var(--plat)" : "rgba(255,255,255,0.08)"}`,
                        color: (row.goles || 0) > 0 ? "var(--plat)" : "var(--white-dim)",
                        borderRadius:3
                      }}>⚽ {row.goles || 0}</div>
                      <button onClick={() => updateGoles(j.id, +1)}
                        style={{padding:"4px 9px", fontSize:14, fontWeight:900, fontFamily:"var(--mono)",
                          background:"var(--plat-soft)", border:"1px solid var(--plat-border)",
                          color:"var(--plat)", borderRadius:3, cursor:"pointer"
                        }}>+</button>
                    </div>
                  </div>
                  {/* Fila secundaria: tarjetas + lesión */}
                  <div style={{display:"flex", gap:5, flexWrap:"wrap", paddingLeft:posShort ? 36 : 0}}>
                    <TogglePill active={row.tarjeta_verde} onClick={() => toggleVerde(j.id)}
                      activeColor="var(--green)" icon="🟢" label="VERDE"/>
                    <CycleAmarillaPill value={row.tarjeta_amarilla || 0} onClick={() => cycleAmarilla(j.id)}/>
                    <TogglePill active={row.tarjeta_roja} onClick={() => toggleRoja(j.id)}
                      activeColor="var(--red)" icon="🟥" label="ROJA"/>
                    <TogglePill active={row.lesionado} onClick={() => toggleLesion(j.id)}
                      activeColor="var(--orange)" icon="🤕" label="LESIÓN"/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Árbitros ──────────────────────────────────────────────────── */}
          <Field label="Árbitros del partido">
            <input type="text" value={arbitros} onChange={e => handleArbitros(e.target.value)}
              placeholder="Ej: González, Juan · Pérez, Mateo"
              style={inputStyle}/>
          </Field>

          {/* ── Notas adicionales ────────────────────────────────────────── */}
          <div style={{marginTop:14}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
              <span style={{fontSize:9, fontFamily:"var(--mono)", letterSpacing:2, color:"var(--white-dim)", fontWeight:700}}>
                NOTAS DEL PARTIDO ({resultNotas.length})
              </span>
              <button onClick={addNota} style={{...btnGhost, padding:"4px 10px", fontSize:11}}>+ Agregar</button>
            </div>
            {resultNotas.length === 0 && (
              <div style={{padding:10, fontSize:11, color:"var(--white-dim)", fontStyle:"italic", textAlign:"center", background:"rgba(255,255,255,0.02)", borderRadius:4}}>
                Sin notas. Tocá "+ Agregar" para sumar comentarios libres.
              </div>
            )}
            {resultNotas.map((n, idx) => (
              <div key={idx} style={{display:"flex", gap:6, marginBottom:6, alignItems:"center"}}>
                <input type="text" value={n.icon} maxLength={3} onChange={e => updateNota(idx, "icon", e.target.value)}
                  style={{...inputStyle, width:48, padding:"6px 4px", textAlign:"center", fontSize:14, flexShrink:0}}/>
                <input type="text" value={n.text} onChange={e => updateNota(idx, "text", e.target.value)}
                  placeholder="Ej: Penal atajado por el arquero rival"
                  style={{...inputStyle, flex:1, padding:"6px 10px", fontSize:12}}/>
                <button onClick={() => removeNota(idx)} style={{...btnGhost, padding:"4px 8px", fontSize:11, color:"var(--red)", borderColor:"rgba(232,85,85,0.3)", flexShrink:0}}>×</button>
              </div>
            ))}
          </div>

          {/* ── Botón cerrar partido ─────────────────────────────────────── */}
          <button onClick={toggleResultCargado} style={{
            marginTop:16, width:"100%", padding:"12px",
            background: resultCargado ? "var(--plat)" : "transparent",
            border:`1px solid ${resultCargado ? "var(--plat)" : "var(--plat-border)"}`,
            color: resultCargado ? "var(--bg)" : "var(--plat)",
            borderRadius:6, fontSize:11, letterSpacing:2, fontFamily:"var(--mono)", fontWeight:700, cursor:"pointer"
          }}>
            {resultCargado ? "✓ RESULTADO CARGADO · Tocar para reabrir" : "🏁 MARCAR RESULTADO COMO CERRADO"}
          </button>
          {savingMeta && (
            <div style={{textAlign:"center", marginTop:8, fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>Guardando...</div>
          )}
        </div>
      );
    }

    // ─── Píldoras de tarjetas/lesión ──────────────────────────────────────────
    function TogglePill({ active, onClick, activeColor, icon, label }) {
      return (
        <button onClick={onClick} style={{
          padding:"3px 8px", fontSize:9, fontFamily:"var(--mono)", letterSpacing:1, fontWeight:700,
          border: active ? `1px solid ${activeColor}` : "1px solid rgba(255,255,255,0.08)",
          background: active ? `${activeColor}1F` : "transparent",
          color: active ? activeColor : "var(--white-dim)",
          borderRadius:3, cursor:"pointer", display:"flex", alignItems:"center", gap:3
        }}>
          <span style={{fontSize:10}}>{icon}</span> {label}
        </button>
      );
    }

    function CycleAmarillaPill({ value, onClick }) {
      const labels = ["0", "1×", "2× = ROJA"];
      const colors = ["transparent", "rgba(240,208,80,0.15)", "rgba(232,85,85,0.15)"];
      const textColors = ["var(--white-dim)", "var(--gold)", "var(--red)"];
      const borders = ["rgba(255,255,255,0.08)", "var(--gold)", "var(--red)"];
      return (
        <button onClick={onClick} style={{
          padding:"3px 8px", fontSize:9, fontFamily:"var(--mono)", letterSpacing:1, fontWeight:700,
          border: `1px solid ${borders[value]}`,
          background: colors[value],
          color: textColors[value],
          borderRadius:3, cursor:"pointer", display:"flex", alignItems:"center", gap:3
        }}>
          <span style={{fontSize:10}}>🟡</span> AMARILLA {labels[value]}
        </button>
      );
    }

    function FormacionHeader({ formacion, onFormacionChange, savingFormacion }) {
      return (
        <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14, padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6}}>
          <span style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700, flexShrink:0}}>FORMACIÓN:</span>
          <select value={formacion} onChange={e => onFormacionChange(e.target.value)} style={{...inputStyle, flex:1, padding:"6px 10px", fontSize:13, fontWeight:700}}>
            {FORMATIONS.map(f => <option key={f} value={f}>{f}</option>)}
          </select>
          {savingFormacion && <span style={{fontSize:10, color:"var(--white-dim)"}}>Guardando...</span>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
