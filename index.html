<body>
  <div id="root">
    <!-- Loader inicial mientras Babel compila (especialmente útil en Safari iOS) -->
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#051710;color:#2D9D6F;font-family:'JetBrains Mono',monospace;">

  <script type="text/babel" data-presets="env,react" data-targets="safari 13">
    const { useState, useEffect, useCallback, useRef } = React;

    const SUPABASE_URL = "https://ojzsvefvbsrrdyeswqlg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qenN2ZWZ2YnNycmR5ZXN3cWxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI0MzUsImV4cCI6MjA5NTU2ODQzNX0.sKcZvStmgmCPERvlksxg7Igp4LMHSt2I51KutEToLbk";

    const DIVISIONES = ["1era","Intermedia","5ta","6ta","7ma","8va","9na","Sub-14","Sub-16","Sub-18","Sub-21","Mayores","Veteranos"];
    const ZONAS = ["A","B","C","D","E"];
    const RAMAS = ["Caballeros","Damas","Mixto"];
    const POSITIONS = ["GK","DEF","MED","DEL"]; // legacy — compatibilidad con jugadores viejos

    // ═══════════════════════════════════════════════════════════════════════════
    //  POSICIONES NUEVAS · agrupadas por línea
    //  Cada grupo tiene { label, options: [{value, label, short}] }
    //  - value: lo que se guarda en la base
    //  - label: lo que se muestra en el select
    //  - short: versión corta para listados/tags (3-4 chars)
    // ═══════════════════════════════════════════════════════════════════════════
    const POSITION_GROUPS = [
      { label: "Líneas", options: [
        { value: "ARQ", label: "🥅 ARQ · Arquero",   short: "ARQ" },
        { value: "DEF", label: "🛡️ DEF · Defensora", short: "DEF" },
        { value: "VOL", label: "⚙️ VOL · Volante",   short: "VOL" },
        { value: "DEL", label: "⚔️ DEL · Delantera", short: "DEL" },
      ]},
    ];

    // Lookup helpers
    const ALL_POSITIONS = POSITION_GROUPS.flatMap(g => g.options);

    // Map de valores VIEJOS (largos o cortos legacy) → cortos nuevos. Solo para mostrar bien
    // los jugadores que se cargaron antes con el editor que tenía 14 opciones.
    const LEGACY_POSITION_MAP = {
      // Cortos clásicos
      "GK": "ARQ", "DEF": "DEF", "MED": "VOL", "DEL": "DEL",
      // Largos viejos
      "Arco": "ARQ", "Arquero": "ARQ",
      "Defensa": "DEF",
      "Defensor central": "DEF", "Defensor central derecho": "DEF", "Defensor central izquierdo": "DEF",
      "Defensor derecho": "DEF", "Defensor izquierdo": "DEF",
      "Mediocampo": "VOL",
      "Volante central": "VOL", "Volante central derecho": "VOL", "Volante central izquierdo": "VOL",

      "Delantero": "DEL",
      "Delantero central": "DEL", "Delantero derecho": "DEL", "Delantero izquierdo": "DEL",
    };

    function getPositionShort(value) {
      if (!value) return "";
      return LEGACY_POSITION_MAP[value] || value.toUpperCase().slice(0, 4);
    }
    function getPositionLabel(value) {
      if (!value) return "—";
      const found = ALL_POSITIONS.find(p => p.value === value);
      if (found) return found.label;
      // Si es un valor viejo (Defensor central, etc), mostrarlo tal cual
      return value;
    }
    // Devuelve uno de "ARQ" | "DEF" | "VOL" | "DEL" | "" según el valor (corto nuevo o legacy)
    function getPositionGroup(value) {
      return getPositionShort(value); // ya devuelve uno de los 4 grupos
    }
    // Devuelve color del badge según la línea del jugador
    function getPositionColor(value) {
      const g = getPositionGroup(value);
      if (g === "ARQ") return "var(--gold)";
      if (g === "DEF") return "var(--plat)";
      if (g === "VOL") return "var(--orange)";
      if (g === "DEL") return "var(--red)";
      return "var(--white-dim)";
    }

    // Helper global: nombre a mostrar (apodo si existe, sino primer apellido cap a 10)
    // Recibe un objeto jugador o un string (en cuyo caso lo trata como nombre)
    function displayName(jugador) {
      if (!jugador) return "—";
      // Si es string, lo trata como nombre completo
      const obj = typeof jugador === "string" ? { nombre: jugador } : jugador;
      // Apodo si tiene
      if (obj.apodo && obj.apodo.trim()) return obj.apodo.trim();
      // Sino, primer apellido
      const n = (obj.nombre || "").trim();
      if (!n) return "—";
      // "Apellido, Nombre" → primer apellido
      if (n.includes(",")) return n.split(",")[0].trim().slice(0, 10);
      // "Apellido Nombre" o "Apellido1 Apellido2 Nombre" → primer palabra
      return n.split(/\s+/)[0].slice(0, 10);
    }

    const ESTADOS_JUGADOR = [
      { value: "activo", label: "Activo", color: "var(--green)" },
      { value: "lesionado", label: "Lesionado", color: "var(--orange)" },
      { value: "suspendido", label: "Suspendido", color: "var(--red)" },
      { value: "dado_de_baja", label: "Dado de baja", color: "var(--white-dim)" },
    ];

    const PIERNAS = ["Derecha", "Izquierda", "Ambidiestro"];
    const GRUPOS_SANGUINEOS = ["", "0+", "0-", "A+", "A-", "B+", "B-", "AB+", "AB-"];

    // ═══════════════════════════════════════════════════════════════════════════
    //  CONVOCATORIA POR FECHA
    //  Constantes para gestionar status (convocado/duda/baja), titular/suplente,
    //  posiciones en cancha (dependen de la formación) y motivos.
    // ═══════════════════════════════════════════════════════════════════════════

    // Status del jugador para una fecha específica
    const CONV_STATUS = [
      { value: "convocado", label: "CONVOCADO", short: "✓", color: "var(--green)" },
      { value: "duda",      label: "DUDA",      short: "?", color: "var(--orange)" },
      { value: "baja",      label: "BAJA",      short: "✗", color: "var(--red)" },
    ];

    // Motivos para DUDA o BAJA
    const MOTIVOS_CONV = [
      { value: "lesion",    label: "Lesión",    icon: "🤕" },
      { value: "viaje",     label: "Viaje",     icon: "✈️" },
      { value: "deportivo", label: "Deportivo", icon: "🏑" },
      { value: "personal",  label: "Personal",  icon: "👤" },
    ];

    // Reglamento AAHBA: máximo de 20 convocados por partido
    const MAX_CONVOCADOS = 20;

    // ─── POSICIONES POR FORMACIÓN ───────────────────────────────────────────────
    // Coordenadas X/Y (0–100) sobre el viewBox del campo SVG (vertical, arco abajo)
    // Cada formación define qué posiciones están disponibles y dónde van en la cancha
    const FORMATION_POSITIONS = {
      "4-3-3": {
        GK:  { label:"Arquero",              x:50,  y:94 },
        LB:  { label:"Def. Lateral Izq.",    x:14,  y:72 },
        DCI: { label:"Def. Central Izq.",    x:36,  y:70 },
        DCD: { label:"Def. Central Der.",    x:62,  y:70 },
        RB:  { label:"Def. Lateral Der.",    x:86,  y:72 },
        LM:  { label:"Volante Izquierdo",    x:18,  y:50 },
        MC:  { label:"Volante Central",      x:50,  y:50 },
        RM:  { label:"Volante Derecho",      x:82,  y:50 },
        LF:  { label:"Delantero Izq.",       x:18,  y:29 },
        FC:  { label:"Delantero Central",    x:50,  y:27 },
        RF:  { label:"Delantero Der.",       x:82,  y:29 },
      },
      "4-4-2": {
        GK:  { label:"Arquero",              x:50,  y:94 },
        LB:  { label:"Def. Lateral Izq.",    x:14,  y:72 },
        DCI: { label:"Def. Central Izq.",    x:36,  y:70 },
        DCD: { label:"Def. Central Der.",    x:62,  y:70 },
        RB:  { label:"Def. Lateral Der.",    x:86,  y:72 },
        LM:  { label:"Volante Izquierdo",    x:14,  y:50 },
        MCI: { label:"Volante Centro Izq.",  x:38,  y:50 },
        MCD: { label:"Volante Centro Der.",  x:62,  y:50 },
        RM:  { label:"Volante Derecho",      x:86,  y:50 },
        LF:  { label:"Delantero Izq.",       x:32,  y:29 },
        RF:  { label:"Delantero Der.",       x:68,  y:29 },
      },
      "3-4-3": {
        GK:  { label:"Arquero",              x:50,  y:94 },
        DCI: { label:"Def. Central Izq.",    x:28,  y:72 },
        DC:  { label:"Def. Central",         x:50,  y:72 },
        DCD: { label:"Def. Central Der.",    x:72,  y:72 },
        LM:  { label:"Volante Izquierdo",    x:12,  y:50 },
        MCI: { label:"Volante Centro Izq.",  x:36,  y:50 },
        MCD: { label:"Volante Centro Der.",  x:62,  y:50 },
        RM:  { label:"Volante Derecho",      x:88,  y:50 },
        LF:  { label:"Delantero Izq.",       x:18,  y:29 },
        FC:  { label:"Delantero Central",    x:50,  y:27 },
        RF:  { label:"Delantero Der.",       x:82,  y:29 },
      },
    };

    const FORMATIONS = Object.keys(FORMATION_POSITIONS); // ["4-3-3", "4-4-2", "3-4-3"]

    // Helpers de convocatoria
    function getFormationPositions(formacion) {
      return FORMATION_POSITIONS[formacion] || FORMATION_POSITIONS["4-3-3"];
    }
    function getFieldPosLabel(formacion, fieldPos) {
      if (!fieldPos) return "";
      if (fieldPos === "SUB") return "Suplente";
      const positions = getFormationPositions(formacion);
      return positions[fieldPos]?.label || fieldPos;
    }
    function getMotivoLabel(value) {
      const m = MOTIVOS_CONV.find(x => x.value === value);
      return m ? `${m.icon} ${m.label}` : "";
    }
    function getStatusInfo(value) {
      return CONV_STATUS.find(s => s.value === value) || CONV_STATUS[0];
    }


    // ═══════════════════════════════════════════════════════════════════════════
    //  HOOK: usePersistedState
    //  Como useState pero auto-guarda en sessionStorage. Sobrevive a:
    //   - Cambios de tab (Chrome conserva sessionStorage por tab)
    //   - Refresh accidental (F5)
    //   - Recargas automáticas del browser por suspensión de tab
    //  Se borra cuando cerrás la tab o cuando llamás a clearPersistedKey(key).
    // ═══════════════════════════════════════════════════════════════════════════
    function usePersistedState(key, defaultValue) {
      const fullKey = "auge_" + key;
      const [value, setValue] = useState(() => {
        try {
          const stored = sessionStorage.getItem(fullKey);
          if (stored !== null) return JSON.parse(stored);
        } catch (e) {}
        return defaultValue;
      });

      useEffect(() => {
        try {
          if (value === undefined || value === null || value === "" || (Array.isArray(value) && value.length === 0)) {
            sessionStorage.removeItem(fullKey);
          } else {
            sessionStorage.setItem(fullKey, JSON.stringify(value));
          }
        } catch (e) {
          // sessionStorage lleno o no disponible: no es un error fatal
        }
      }, [fullKey, value]);

      return [value, setValue];
    }

    function clearPersistedKey(key) {
      try { sessionStorage.removeItem("auge_" + key); } catch (e) {}
    }

    function clearPersistedKeysWithPrefix(prefix) {
      try {
        const full = "auge_" + prefix;
        const keys = [];
        for (let i = 0; i < sessionStorage.length; i++) {
          const k = sessionStorage.key(i);
          if (k && k.startsWith(full)) keys.push(k);
        }
        keys.forEach(k => sessionStorage.removeItem(k));
      } catch (e) {}
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ─── Exportar nodo del DOM a PNG (usando html2canvas) ──────────────────────
    async function exportImage(node, filename) {
      if (!node || !window.html2canvas) {
        alert("No se pudo iniciar la exportación. Recargá la página y probá de nuevo.");
        return;
      }
      try {
        const canvas = await window.html2canvas(node, {
          backgroundColor: "#051710",
          scale: 2,
          useCORS: true,
          logging: false,
        });
        const link = document.createElement("a");
        link.download = filename.endsWith(".png") ? filename : filename + ".png";
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      } catch (e) {
        alert("Error al exportar: " + e.message);
      }
    }

    // Sanitiza un nombre para usar en filename
    function safeFilename(s) {
      return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9_\-]/g, "_").replace(/_+/g, "_").toLowerCase();
    }

    function parsePlantelText(text) {
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
      const players = [];
      for (const line of lines) {
        const parts = line.split(/[\-,;|\t]+/).map(p => p.trim()).filter(Boolean);
        let number = null, name = "", position = "MED";
        if (parts.length >= 3) {
          const numC = parseInt(parts[0]);
          if (!isNaN(numC)) { number = numC; name = parts[1]; const p = parts[2].toUpperCase(); if (POSITIONS.includes(p)) position = p; }
          else { name = parts[0]; const numC2 = parseInt(parts[1]); if (!isNaN(numC2)) number = numC2; const p = parts[2].toUpperCase(); if (POSITIONS.includes(p)) position = p; }
        } else if (parts.length === 2) {
          const numC = parseInt(parts[0]);
          if (!isNaN(numC)) { number = numC; name = parts[1]; }
          else { name = parts[0]; const numC2 = parseInt(parts[1]); if (!isNaN(numC2)) number = numC2; else { const p = parts[1].toUpperCase(); if (POSITIONS.includes(p)) position = p; } }
        } else {
          const m = line.match(/^(\d+)\s+(.+?)(?:\s+(GK|DEF|MED|DEL))?$/i);
          if (m) { number = parseInt(m[1]); name = m[2].trim(); if (m[3]) position = m[3].toUpperCase(); } else { name = line; }
        }
        if (!name) continue;
        players.push({ numero: number ?? 0, nombre: name, posicion: position });
      }
      return players;
    }

    const inputStyle = { width:"100%", padding:11, background:"rgba(0,0,0,0.3)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:4, color:"var(--white)", fontSize:14, fontFamily:"inherit" };
    const btnPrimary = { background:"var(--plat)", color:"var(--bg)", padding:"12px 20px", border:"none", borderRadius:4, fontSize:13, fontWeight:700, letterSpacing:1 };
    const btnSecondary = { background:"transparent", color:"var(--plat)", padding:"10px 16px", border:"1px solid var(--plat-border)", borderRadius:4, fontSize:12, fontWeight:600 };
    const btnGhost = { background:"transparent", color:"var(--white-soft)", padding:"10px 16px", border:"1px solid rgba(255,255,255,0.1)", borderRadius:4, fontSize:12 };
    const btnGold = { background:"var(--gold)", color:"var(--bg)", padding:"10px 18px", border:"none", borderRadius:4, fontSize:12, fontWeight:700, letterSpacing:1 };
    const btnDanger = { background:"transparent", color:"var(--red)", padding:"10px 16px", border:"1px solid var(--red)", borderRadius:4, fontSize:12, fontWeight:600 };

    function Card({ title, accent, children }) {

    function Field({ label, hint, children }) {

    function StatBox({ label, value, color }) {

        <div style={{ flex:1, textAlign:"center", padding:"12px 0", background:"rgba(255,255,255,0.02)", borderRadius:6 }}>
          <div style={{fontSize:24, fontWeight:900, color, lineHeight:1}}>{value}</div>

        <span style={{ fontSize:11, color: color || "var(--white-soft)", fontFamily:"var(--mono)", padding:"3px 8px", background:"rgba(255,255,255,0.04)", borderRadius:3 }}>{children}</span>

    function Spinner({ label }) {

        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"60vh", gap:16 }}>
          <div className="spinner"/>

    function ImpersonationBanner({ club, onExit }) {
      return (
        <div style={{
          position:"sticky", top:0, zIndex:50,
          background:"linear-gradient(90deg, #e85555 0%, #c94545 100%)",
          color:"#fff", padding:"10px 16px",
          display:"flex", justifyContent:"space-between", alignItems:"center", gap:10,
          boxShadow:"0 2px 12px rgba(232,85,85,0.4)",

    function App() {
      const [loading, setLoading] = useState(true);
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [pendingRequests, setPendingRequests] = useState([]);
      const [currentClubId, setCurrentClubId] = usePersistedState("app_currentClubId", null);
      const [view, setView] = usePersistedState("app_view", "auto");
      const [impersonatingClub, setImpersonatingClub] = useState(null); // intencionalmente no persistido

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (!session) setLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, newSession) => {
          // Ignorar TOKEN_REFRESHED y INITIAL_SESSION repetidos: solo nos importan login/logout reales
          if (event === "TOKEN_REFRESHED") return;
          setSession(prev => {
            const prevEmail = prev?.user?.email;
            const newEmail = newSession?.user?.email;
            // Si es el mismo usuario, no actualizamos session (evita re-render y recarga de perfil)
            if (prevEmail && newEmail && prevEmail === newEmail) return prev;
            return newSession;
          });
          if (event === "SIGNED_OUT") {
            setProfile(null); setCurrentClubId(null); setView("auto"); setLoading(false);
            clearPersistedKeysWithPrefix(""); // limpia todo el draft
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      // Solo recargamos el perfil cuando cambia el EMAIL del usuario, no cuando se refresca el token
      const sessionEmail = session?.user?.email;
      const loadProfile = useCallback(async () => {
        if (!sessionEmail) return;
        setLoading(true);
        try {
          const { data: superAdminData } = await sb.from("super_admins").select("email").eq("email", sessionEmail).maybeSingle();
          const isSuperAdmin = !!superAdminData;
          const { data: ownerClubs } = await sb.from("clubs").select("*").eq("owner_email", sessionEmail);
          const { data: memberClubs } = await sb.from("club_users").select("role, clubs(*)").eq("email", sessionEmail);
          const adminOf = (memberClubs || []).filter(c => c.role === "admin").map(c => c.clubs).filter(Boolean);
          const viewerOf = (memberClubs || []).filter(c => c.role === "viewer").map(c => c.clubs).filter(Boolean);
          const { data: myReqs } = await sb.from("access_requests").select("*").eq("email_solicitante", sessionEmail).eq("status", "pending");
          setProfile({ isSuperAdmin, ownerOf: ownerClubs || [], adminOf, viewerOf });
          setPendingRequests(myReqs || []);
        } catch (e) {
          console.error(e);
          alert("Error de conexión: " + e.message);
        } finally {
          setLoading(false);
        }
      }, [sessionEmail]);

      useEffect(() => { loadProfile(); }, [loadProfile]);

      if (loading) return <Spinner label="VERIFICANDO ACCESO..."/>;
      if (!session) return <LoginScreen/>;
      if (!profile) return <Spinner label="CARGANDO PERFIL..."/>;

      const allClubs = [
        ...profile.ownerOf.map(c => ({...c, myRole:"owner"})),
        ...profile.adminOf.map(c => ({...c, myRole:"admin"})),
        ...profile.viewerOf.map(c => ({...c, myRole:"viewer"})),
      ];

      if (impersonatingClub) {
        // Super-admin entró a un club ajeno - mostrar como si fuera owner pero con banner rojo
        return <ClubView
          clubInfo={{...impersonatingClub, myRole: "owner"}}
          session={session}
          onExit={() => { setImpersonatingClub(null); setView("superadmin"); }}
          isSuperAdmin={profile.isSuperAdmin}
          onGoSuperAdmin={() => { setImpersonatingClub(null); setView("superadmin"); }}
          impersonating={true}/>;
      }

      if (view === "superadmin") {
        return <SuperAdminPanel session={session}
          onExit={() => setView("auto")}
          onImpersonateClub={(club) => setImpersonatingClub(club)}/>;
      }

      if (view === "request-club") {
        return <RequestClubScreen session={session} onSubmit={async () => { await loadProfile(); setView("auto"); }} onCancel={() => setView("auto")}/>;
      }

      if (allClubs.length === 0 && pendingRequests.length > 0) {
        return <PendingRequestsScreen requests={pendingRequests} onReload={loadProfile} isSuperAdmin={profile.isSuperAdmin} onGoSuperAdmin={() => setView("superadmin")}/>;
      }

      if (allClubs.length === 0) {
        return <NoAccessScreen session={session} onRequestClub={() => setView("request-club")} isSuperAdmin={profile.isSuperAdmin} onGoSuperAdmin={() => setView("superadmin")}/>;
      }

      if (currentClubId) {
        const clubInfo = allClubs.find(c => c.id === currentClubId);
        if (!clubInfo) { setCurrentClubId(null); return <Spinner/>; }
        return <ClubView clubInfo={clubInfo} session={session} onExit={() => setCurrentClubId(null)} isSuperAdmin={profile.isSuperAdmin} onGoSuperAdmin={() => setView("superadmin")}/>;
      }

      if (allClubs.length === 1 && !profile.isSuperAdmin) {
        setCurrentClubId(allClubs[0].id);
        return <Spinner/>;
      }

      return <ClubSelector clubs={allClubs} session={session} onSelect={setCurrentClubId} onRequestNew={() => setView("request-club")} isSuperAdmin={profile.isSuperAdmin} onGoSuperAdmin={() => setView("superadmin")}/>;
    }

              <div style={{fontSize:13, color:"var(--white-soft)", maxWidth:400, margin:"0 auto"}}>

            <Section title="🏑 CLUBS DISPONIBLES">

    function RequestClubScreen({ session, onSubmit, onCancel }) {
      const persistKey = `request_club_${session.user.email}`;
      const [data, setData] = usePersistedState(persistKey, {
        nombre_solicitante:"", club_propuesto:"",
        division:"", divisionOtra:"", zona:"", zonaOtra:"", rama:"",
        temporada: new Date().getFullYear().toString(), mensaje:""
      });
      const [submitting, setSubmitting] = useState(false);
      const u = (k, v) => setData(d => ({...d, [k]: v}));
      const categoriaCompuesta = (() => {
        const div = data.division === "__otra__" ? data.divisionOtra.trim() : data.division;
        const zn = data.zona === "__otra__" ? data.zonaOtra.trim() : (data.zona === "__sin__" ? "" : data.zona);
        return [div, zn, data.rama].filter(Boolean).join(" ");
      })();

      const handleSubmit = async () => {
        if (!data.nombre_solicitante.trim()) return alert("Ingresá tu nombre.");
        if (!data.club_propuesto.trim()) return alert("Ingresá el nombre del club.");
        if (!categoriaCompuesta) return alert("Completá la categoría.");
        setSubmitting(true);
        const { error } = await sb.from("access_requests").insert({
          email_solicitante: session.user.email,
          nombre_solicitante: data.nombre_solicitante.trim(),
          club_propuesto: data.club_propuesto.trim(),
          division: data.division === "__otra__" ? data.divisionOtra.trim() : data.division,
          zona: data.zona === "__otra__" ? data.zonaOtra.trim() : (data.zona === "__sin__" ? "" : data.zona),
          rama: data.rama,
          temporada: data.temporada,
          mensaje: data.mensaje.trim(),
          status: "pending",
        });
        setSubmitting(false);
        if (error) { alert("Error: " + error.message); return; }
        alert("Solicitud enviada. El super-administrador te aprobará y vas a poder configurar tu club.");
        clearPersistedKey(persistKey);
        onSubmit();
      };

      return (
        <div style={{minHeight:"100vh", padding:"40px 20px"}}>
          <div style={{maxWidth:560, margin:"0 auto"}}>
            <button onClick={onCancel} style={{...btnGhost, marginBottom:20, fontSize:11}}>← Volver</button>
            <Card title="Solicitar acceso como entrenador">
              <p style={{fontSize:13, color:"var(--white-soft)", lineHeight:1.6, marginBottom:24}}>
                Solicitás permiso para crear un nuevo club. La solicitud va al super-administrador.
              </p>
              <Field label="Tu nombre completo">
                <input type="text" value={data.nombre_solicitante} onChange={e => u("nombre_solicitante", e.target.value)} placeholder="Ej: Fernando Bonet" style={inputStyle}/>
              </Field>
              <Field label="Nombre del club">
                <input type="text" value={data.club_propuesto} onChange={e => u("club_propuesto", e.target.value)} placeholder="Ej: Club Atlético Independiente" style={inputStyle}/>
              </Field>
              <Field label="División">
                <select value={data.division} onChange={e => u("division", e.target.value)} style={inputStyle}>
                  <option value="">— Elegí —</option>
                  {DIVISIONES.map(d => <option key={d} value={d}>{d}</option>)}
                  <option value="__otra__">Otra (libre)</option>
                </select>
                {data.division === "__otra__" && <input type="text" value={data.divisionOtra} onChange={e => u("divisionOtra", e.target.value)} placeholder="Escribir" style={{...inputStyle, marginTop:8}}/>}
              </Field>
              <Field label="Zona">
                <select value={data.zona} onChange={e => u("zona", e.target.value)} style={inputStyle}>
                  <option value="">— Elegí —</option>
                  <option value="__sin__">Sin zona</option>
                  {ZONAS.map(z => <option key={z} value={z}>{z}</option>)}
                  <option value="__otra__">Otra (libre)</option>
                </select>
                {data.zona === "__otra__" && <input type="text" value={data.zonaOtra} onChange={e => u("zonaOtra", e.target.value)} placeholder="Escribir" style={{...inputStyle, marginTop:8}}/>}
              </Field>
              <Field label="Rama">
                <select value={data.rama} onChange={e => u("rama", e.target.value)} style={inputStyle}>
                  <option value="">— Elegí —</option>
                  {RAMAS.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </Field>
              <Field label="Temporada">
                <input type="text" value={data.temporada} onChange={e => u("temporada", e.target.value)} style={inputStyle}/>
              </Field>
              {categoriaCompuesta && (
                <div style={{padding:"10px 14px", background:"var(--plat-soft)", border:"1px solid var(--plat-border)", borderRadius:6, marginBottom:16}}>
                  <div style={{fontSize:10, letterSpacing:2, color:"var(--white-dim)", fontFamily:"var(--mono)", marginBottom:4}}>CATEGORÍA</div>
                  <div style={{fontSize:14, fontWeight:700, color:"var(--plat)"}}>{categoriaCompuesta}</div>
                </div>
              )}
              <Field label="Mensaje (opcional)">
                <textarea value={data.mensaje} onChange={e => u("mensaje", e.target.value)} rows={4} style={{...inputStyle, resize:"vertical"}}/>
              </Field>
              <div style={{display:"flex", gap:10, marginTop:20}}>
                <button onClick={onCancel} disabled={submitting} style={{...btnGhost, flex:1}}>Cancelar</button>
                <button onClick={handleSubmit} disabled={submitting} style={{...btnPrimary, flex:2}}>
                  {submitting ? "Enviando..." : "Enviar solicitud"}
                </button>
              </div>
            </Card>
          </div>
        </div>
      );
    }

    // ─── TAB: SOLICITUDES (lo que existía antes) ────────────────────────────
    function RequestsPanel({ session }) {
      const [requests, setRequests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [stats, setStats] = useState({ pending:0, approved:0, rejected:0, clubs:0 });

      const load = useCallback(async () => {
        setLoading(true);
        const { data: reqs } = await sb.from("access_requests").select("*").is("requested_club_id", null).order("created_at", { ascending: false });
        const { count: clubsCount } = await sb.from("clubs").select("*", { count:"exact", head:true });
        const all = reqs || [];
        setRequests(all);
        setStats({
          pending: all.filter(r => r.status === "pending").length,
          approved: all.filter(r => r.status === "approved").length,
          rejected: all.filter(r => r.status === "rejected").length,
          clubs: clubsCount || 0,
        });
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleApprove = async (req) => {
        if (!confirm(`Aprobar a ${req.nombre_solicitante} para crear "${req.club_propuesto}"?`)) return;
        const categoria = [req.division, req.zona, req.rama].filter(Boolean).join(" ");
        const { data: newClub, error: clubError } = await sb.from("clubs").insert({
          owner_email: req.email_solicitante, request_id: req.id,
          nombre: req.club_propuesto, categoria,
          division: req.division || "", zona: req.zona || "", rama: req.rama || "",
          temporada: req.temporada || "", setup_done: false,
        }).select().single();
        if (clubError) { alert("Error: " + clubError.message); return; }
        await sb.from("access_requests").update({
          status: "approved", reviewed_by: session.user.email,
          reviewed_at: new Date().toISOString(), resulting_club_id: newClub.id,
        }).eq("id", req.id);
        alert("✓ Aprobada.");
        await load();
      };

      const handleReject = async (req) => {
        const reason = prompt(`Razón del rechazo (opcional):`);
        if (reason === null) return;
        await sb.from("access_requests").update({
          status: "rejected", reviewed_by: session.user.email,
          reviewed_at: new Date().toISOString(), rejection_reason: reason || "",
        }).eq("id", req.id);
        await load();
      };

      const pending = requests.filter(r => r.status === "pending");
      const others = requests.filter(r => r.status !== "pending").slice(0, 10);

      if (loading) return <Spinner/>;

      return (
        <div>
          <Section title="📊 RESUMEN">
            <div style={{display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:10}}>
              <StatBox label="PENDIENTES" value={stats.pending} color="var(--gold)"/>
              <StatBox label="APROBADAS" value={stats.approved} color="var(--green)"/>
              <StatBox label="RECHAZADAS" value={stats.rejected} color="var(--white-dim)"/>
              <StatBox label="CLUBS" value={stats.clubs} color="var(--plat)"/>
            </div>
          </Section>
          <Section title={`⏳ PENDIENTES (${pending.length})`}>
            {pending.length === 0 ? (
              <p style={{fontSize:13, color:"var(--white-dim)", textAlign:"center", padding:20}}>No hay solicitudes pendientes.</p>
            ) : pending.map(req => (
              <RequestCard key={req.id} req={req} onApprove={() => handleApprove(req)} onReject={() => handleReject(req)}/>
            ))}
          </Section>
          {others.length > 0 && (
            <Section title={`📋 HISTORIAL`}>
              {others.map(req => (
                <div key={req.id} style={{padding:"10px 14px", background:"rgba(255,255,255,0.02)", borderBottom:"1px solid rgba(255,255,255,0.04)", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:13, fontWeight:600}}>{req.club_propuesto}</div>
                    <div style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>{req.nombre_solicitante} · {req.email_solicitante}</div>
                  </div>
                  <Tag color={req.status === "approved" ? "var(--green)" : "var(--red)"}>{req.status.toUpperCase()}</Tag>
                </div>
              ))}
            </Section>
          )}
        </div>
      );
    }

    // ─── TAB: LISTADO DE CLUBS ──────────────────────────────────────────────
    function ClubsListPanel({ session, onImpersonate }) {
      const [clubs, setClubs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState("");

      const load = useCallback(async () => {
        setLoading(true);
        const { data: clubsData } = await sb.from("clubs").select("*").order("created_at", { ascending: false });
        // Para cada club, contar jugadores y fechas
        const enriched = await Promise.all((clubsData || []).map(async c => {
          const [j, f] = await Promise.all([
            sb.from("jugadores").select("*", { count:"exact", head:true }).eq("club_id", c.id),
            sb.from("fechas").select("*", { count:"exact", head:true }).eq("club_id", c.id),
          ]);
          return {...c, jugadoresCount: j.count || 0, fechasCount: f.count || 0};
        }));
        setClubs(enriched);
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleDelete = async (club) => {
        const confirmText = `BORRAR ${club.nombre}`;
        const input = prompt(`Para BORRAR PERMANENTEMENTE "${club.nombre}" y todos sus datos (jugadores, fechas, usuarios) escribí:\n\n${confirmText}`);
        if (input !== confirmText) {
          if (input !== null) alert("Texto incorrecto. Operación cancelada.");
          return;
        }
        // Cascada manual: jugadores → fechas → club_users → club
        await sb.from("jugadores").delete().eq("club_id", club.id);
        await sb.from("fechas").delete().eq("club_id", club.id);
        await sb.from("club_users").delete().eq("club_id", club.id);
        const { error } = await sb.from("clubs").delete().eq("id", club.id);
        if (error) { alert("Error: " + error.message); return; }
        alert("Club eliminado.");
        await load();
      };

      const handleTransfer = async (club) => {
        const newOwner = prompt(`Transferir "${club.nombre}" a otro entrenador.\n\nEmail del nuevo owner:`, club.owner_email);
        if (!newOwner || newOwner === club.owner_email) return;
        if (!newOwner.includes("@")) { alert("Email inválido."); return; }
        if (!confirm(`Transferir ownership de "${club.nombre}" desde ${club.owner_email} a ${newOwner}?`)) return;
        const { error } = await sb.from("clubs").update({ owner_email: newOwner.trim().toLowerCase() }).eq("id", club.id);
        if (error) { alert("Error: " + error.message); return; }
        alert("Transferencia OK.");
        await load();
      };

      if (loading) return <Spinner/>;

      const filtered = clubs.filter(c => {
        if (!filter.trim()) return true;
        const q = filter.toLowerCase();
        return c.nombre.toLowerCase().includes(q) || c.categoria?.toLowerCase().includes(q) || c.owner_email?.toLowerCase().includes(q);
      });

      return (
        <div>
          <input type="text" value={filter} onChange={e => setFilter(e.target.value)}
            placeholder="🔍 Filtrar por nombre, categoría u owner..."
            style={{...inputStyle, marginBottom:14}}/>
          <Section title={`🏑 CLUBS (${filtered.length}${filter ? ` de ${clubs.length}` : ""})`}>
            {filtered.length === 0 ? (
              <p style={{fontSize:13, color:"var(--white-dim)", textAlign:"center", padding:20}}>
                {filter ? "Sin resultados." : "Todavía no hay clubs en la plataforma."}
              </p>
            ) : (
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {filtered.map(c => (
                  <div key={c.id} style={{padding:14, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:6}}>
                    <div style={{display:"flex", gap:12, alignItems:"center", marginBottom:10}}>
                      {c.escudo_base64 ? (
                        <img src={c.escudo_base64} style={{width:44, height:44, objectFit:"contain", flexShrink:0}}/>
                      ) : (
                        <div style={{width:44, height:44, background: c.theme_primary || "var(--plat)", borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--bg)", fontWeight:900, fontSize:13, flexShrink:0}}>
                          {c.nombre.slice(0,3).toUpperCase()}
                        </div>
                      )}
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:15, fontWeight:700}}>{c.nombre}</div>
                        <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>
                          {c.categoria} · {c.temporada}
                        </div>
                      </div>
                      {c.setup_done ? (
                        <Tag color="var(--green)">ACTIVO</Tag>
                      ) : (
                        <Tag color="var(--orange)">PENDIENTE</Tag>
                      )}
                    </div>
                    <div style={{display:"flex", gap:14, fontSize:11, color:"var(--white-soft)", marginBottom:10, fontFamily:"var(--mono)"}}>
                      <span>👤 {c.owner_email}</span>
                      <span>•</span>
                      <span>👥 {c.jugadoresCount}</span>
                      <span>•</span>
                      <span>📅 {c.fechasCount}</span>
                    </div>
                    <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
                      <button onClick={() => onImpersonate(c)} style={{...btnSecondary, fontSize:11, padding:"6px 12px"}}>👁️ Ver / Editar</button>
                      <button onClick={() => handleTransfer(c)} style={{...btnGhost, fontSize:11, padding:"6px 12px"}}>↪ Transferir</button>
                      <button onClick={() => handleDelete(c)} style={{...btnDanger, fontSize:11, padding:"6px 12px"}}>🗑️ Eliminar</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Section>
        </div>
      );
    }

    // ─── TAB: LISTADO DE USUARIOS ───────────────────────────────────────────
    function UsersListPanel({ session }) {
      const [usuarios, setUsuarios] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState("");

      const load = useCallback(async () => {
        setLoading(true);
        // Recolectar de: clubs (owners), club_users (admin/viewer), access_requests, super_admins
        const [clubsRes, cuRes, reqsRes, saRes] = await Promise.all([
          sb.from("clubs").select("owner_email, nombre, id"),
          sb.from("club_users").select("email, role, clubs(id, nombre)"),
          sb.from("access_requests").select("email_solicitante, status"),
          sb.from("super_admins").select("email"),
        ]);

        const byEmail = {};
        const getU = (email) => {
          if (!email) return null;
          const e = email.toLowerCase();
          if (!byEmail[e]) byEmail[e] = { email: e, roles: [], isSuperAdmin: false, pendingReqs: 0 };
          return byEmail[e];
        };

        (clubsRes.data || []).forEach(c => {
          const u = getU(c.owner_email);
          if (u) u.roles.push({ role: "owner", clubId: c.id, clubName: c.nombre });
        });
        (cuRes.data || []).forEach(cu => {
          const u = getU(cu.email);
          if (u && cu.clubs) u.roles.push({ role: cu.role, clubId: cu.clubs.id, clubName: cu.clubs.nombre });
        });
        (reqsRes.data || []).forEach(r => {
          const u = getU(r.email_solicitante);
          if (u && r.status === "pending") u.pendingReqs++;
        });
        (saRes.data || []).forEach(s => {
          const u = getU(s.email);
          if (u) u.isSuperAdmin = true;
        });

        const list = Object.values(byEmail).sort((a, b) => a.email.localeCompare(b.email));
        setUsuarios(list);
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      if (loading) return <Spinner/>;

      const filtered = usuarios.filter(u =>
        !filter.trim() || u.email.includes(filter.toLowerCase())
      );

      return (
        <div>
          <input type="text" value={filter} onChange={e => setFilter(e.target.value)}
            placeholder="🔍 Filtrar por email..."
            style={{...inputStyle, marginBottom:14}}/>
          <Section title={`👥 USUARIOS (${filtered.length}${filter ? ` de ${usuarios.length}` : ""})`}>
            {filtered.length === 0 ? (
              <p style={{fontSize:13, color:"var(--white-dim)", textAlign:"center", padding:20}}>Sin usuarios.</p>
            ) : (
              <div>
                {filtered.map(u => (
                  <div key={u.email} style={{padding:12, background:"rgba(255,255,255,0.02)", borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                    <div style={{display:"flex", justifyContent:"space-between", gap:10, alignItems:"center", marginBottom:6}}>
                      <div style={{fontSize:13, fontWeight:600, fontFamily:"var(--mono)", color:"var(--white)", wordBreak:"break-all"}}>{u.email}</div>
                      <div style={{display:"flex", gap:4, flexShrink:0}}>
                        {u.isSuperAdmin && <Tag color="var(--gold)">⭐ SA</Tag>}
                        {u.pendingReqs > 0 && <Tag color="var(--orange)">📋 {u.pendingReqs}</Tag>}
                      </div>
                    </div>
                    {u.roles.length > 0 ? (
                      <div style={{display:"flex", flexWrap:"wrap", gap:5}}>
                        {u.roles.map((r, i) => (
                          <Tag key={i} color={r.role === "owner" ? "var(--plat)" : r.role === "admin" ? "var(--gold)" : "var(--white-dim)"}>
                            {r.role}:{r.clubName}
                          </Tag>
                        ))}
                      </div>
                    ) : (
                      <div style={{fontSize:11, color:"var(--white-dim)", fontStyle:"italic"}}>Sin clubs asociados</div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </Section>
        </div>
      );

    // ─── TAB: RIVALES GLOBALES ───────────────────────────────────────────────
    function RivalesPanel({ session }) {
      const [rivales, setRivales] = useState([]); // mezcla de globales + detectados de fechas
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState("");
      const [editing, setEditing] = useState(null); // null | objeto rival
      const [showOnly, setShowOnly] = useState("all"); // "all" | "withData" | "noData"

      const load = useCallback(async () => {
        setLoading(true);
        // 1. Traer rivales globales ya cargados
        const { data: globales } = await sb.from("rivales_globales").select("*");
        // 2. Traer todas las fechas tipo Visitante para extraer rivales únicos
        const { data: fechasVisitante } = await sb.from("fechas")
          .select("rival")
          .eq("condition", "Visitante");

        // Indexar globales por nombre_key
        const globalByKey = {};
        (globales || []).forEach(g => { globalByKey[g.nombre_key] = g; });

        // Contar apariciones por rival (usa nombre normalizado como clave)
        const counters = {};
        (fechasVisitante || []).forEach(f => {
          if (!f.rival || f.rival === "LIBRE" || f.rival === "TBD") return;
          const key = normalizeRivalName(f.rival);
          if (!key) return;
          if (!counters[key]) {
            counters[key] = { count: 0, sampleNames: new Set() };
          }
          counters[key].count++;
          counters[key].sampleNames.add(f.rival.trim());
        });

        // Construir lista final
        const result = [];
        // Primero los globales (con o sin fechas asociadas)
        Object.values(globalByKey).forEach(g => {
          const c = counters[g.nombre_key];
          result.push({
            ...g,
            fechasCount: c ? c.count : 0,
            isFromGlobal: true,
          });
        });
        // Después los que solo están en fechas pero NO en globales
        Object.entries(counters).forEach(([key, c]) => {
          if (globalByKey[key]) return; // ya está
          // Elegir el nombre más común (por simplicidad, el primero alfabético)
          const names = Array.from(c.sampleNames).sort();
          result.push({
            id: null,
            nombre_display: names[0],
            nombre_key: key,
            cancha: "",
            maps_url: "",
            created_by: null,
            updated_by: null,
            fechasCount: c.count,
            isFromGlobal: false,
          });
        });

        // Ordenar: primero los que tienen datos, después los huérfanos. Dentro de cada grupo alfabético.
        result.sort((a, b) => {
          const aHas = !!(a.cancha || a.maps_url);
          const bHas = !!(b.cancha || b.maps_url);
          if (aHas !== bHas) return bHas - aHas; // primero con datos
          return a.nombre_display.localeCompare(b.nombre_display);
        });

        setRivales(result);
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleDelete = async (r) => {
        if (!r.id) return; // los huérfanos no se pueden borrar (no existen en la tabla)
        if (!confirm(`Eliminar el rival "${r.nombre_display}" de la tabla global?\n\nLas fechas de los clubs que ya lo usan no se modifican.`)) return;
        const { error } = await sb.from("rivales_globales").delete().eq("id", r.id);
        if (error) { alert("Error: " + error.message); return; }
        await load();
      };

      const handleSaveEdit = async () => {
        if (!editing.nombre_display.trim()) return alert("El nombre es obligatorio.");
        let result;
        if (editing.id) {
          // Update existente
          result = await sb.from("rivales_globales").update({
            nombre_display: editing.nombre_display.trim(),
            cancha: editing.cancha?.trim() || "",
            maps_url: editing.maps_url?.trim() || "",
            updated_by: session.user.email,
          }).eq("id", editing.id);
        } else {
          // Insert nuevo
          result = await sb.from("rivales_globales").insert({
            nombre_display: editing.nombre_display.trim(),
            nombre_key: editing.nombre_key,
            cancha: editing.cancha?.trim() || "",
            maps_url: editing.maps_url?.trim() || "",
            created_by: session.user.email,
          });
        }
        if (result.error) { alert("Error: " + result.error.message); return; }
        setEditing(null);
        await load();
      };

      if (loading) return <Spinner/>;

      let filtered = rivales.filter(r =>
        !filter.trim() || r.nombre_display.toLowerCase().includes(filter.toLowerCase()) ||
        r.cancha?.toLowerCase().includes(filter.toLowerCase())
      );
      if (showOnly === "withData") filtered = filtered.filter(r => r.cancha || r.maps_url);
      if (showOnly === "noData") filtered = filtered.filter(r => !r.cancha && !r.maps_url);

      const conData = rivales.filter(r => r.cancha || r.maps_url).length;
      const sinData = rivales.length - conData;

      return (
        <div>
          {editing && (
            <div style={{
              position:"fixed", inset:0, zIndex:100,
              background:"rgba(0,0,0,0.7)", backdropFilter:"blur(4px)",
              display:"flex", alignItems:"flex-start", justifyContent:"center",
              padding:"40px 16px", overflowY:"auto"
            }} onClick={(e) => { if (e.target === e.currentTarget) setEditing(null); }}>
              <div style={{
                background:"var(--bg-soft)",
                border:"1px solid var(--plat-border)",
                borderRadius:8, padding:20,
                maxWidth:520, width:"100%",
                boxShadow:"0 12px 40px rgba(0,0,0,0.5)"
              }}>

              flex:1, padding:"7px 10px", fontSize:11, fontFamily:"inherit", fontWeight:600,
              border: showOnly === "all" ? "1px solid var(--plat)" : "1px solid rgba(255,255,255,0.08)",
              background: showOnly === "all" ? "var(--plat-soft)" : "transparent",
              color: showOnly === "all" ? "var(--plat)" : "var(--white-soft)", borderRadius:4

            <button onClick={() => setShowOnly("withData")} style={{
              flex:1, padding:"7px 10px", fontSize:11, fontFamily:"inherit", fontWeight:600,

              background: showOnly === "withData" ? "rgba(95,200,138,0.1)" : "transparent",
              color: showOnly === "withData" ? "var(--green)" : "var(--white-soft)", borderRadius:4

            <button onClick={() => setShowOnly("noData")} style={{
              flex:1, padding:"7px 10px", fontSize:11, fontFamily:"inherit", fontWeight:600,
              border: showOnly === "noData" ? "1px solid var(--orange)" : "1px solid rgba(255,255,255,0.08)",
              background: showOnly === "noData" ? "rgba(240,181,64,0.1)" : "transparent",
              color: showOnly === "noData" ? "var(--orange)" : "var(--white-soft)", borderRadius:4

          <Section title={`🌐 RIVALES (${filtered.length})`}>
            {filtered.length === 0 ? (
              <p style={{fontSize:13, color:"var(--white-dim)", textAlign:"center", padding:20}}>
                {filter ? "Sin resultados." : "Sin rivales detectados todavía. Aparecerán acá cuando algún club cargue fechas de visitante."}
              </p>
            ) : (
              <div>
                {filtered.map((r, idx) => {
                  const hasData = !!(r.cancha || r.maps_url);
                  return (
                    <div key={r.nombre_key} style={{
                      padding:12,
                      background: hasData ? "rgba(255,255,255,0.02)" : "rgba(240,181,64,0.04)",
                      borderBottom:"1px solid rgba(255,255,255,0.04)",
                      borderLeft: hasData ? "3px solid var(--green)" : "3px solid var(--orange)"
                    }}>
                      <div style={{display:"flex", justifyContent:"space-between", gap:10, alignItems:"center", marginBottom:6}}>
                        <div style={{flex:1, minWidth:0}}>
                          <div style={{fontSize:14, fontWeight:700, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                            {r.nombre_display}
                            {r.fechasCount > 0 && (
                              <span style={{
                                fontSize:10, fontFamily:"var(--mono)",
                                background:"rgba(255,255,255,0.05)", padding:"2px 6px", borderRadius:3,
                                color:"var(--white-soft)", letterSpacing:1, fontWeight:500
                              }}>📅 {r.fechasCount}</span>
                            )}
                            {!hasData && <Tag color="var(--orange)">FALTA CANCHA</Tag>}

                          <div style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>
                            key: {r.nombre_key}
                          </div>
                        </div>
                        <div style={{display:"flex", gap:6, flexShrink:0}}>
                          {hasData ? (
                            <>
                              <button onClick={() => setEditing(r)} style={{...btnGhost, padding:"4px 10px", fontSize:11}}>✏️</button>
                              <button onClick={() => handleDelete(r)} style={{...btnGhost, padding:"4px 10px", fontSize:11, color:"var(--red)", borderColor:"rgba(232,85,85,0.3)"}}>🗑️</button>
                            </>
                          ) : (
                            <button onClick={() => setEditing(r)} style={{...btnPrimary, padding:"5px 12px", fontSize:11}}>
                              + Agregar cancha
                            </button>
                          )}
                        </div>
                      </div>
                      <div style={{fontSize:12, color:"var(--white-soft)", marginBottom: r.created_by ? 4 : 0}}>
                        {r.cancha ? <>📌 {r.cancha}</> : <em style={{color:"var(--white-dim)"}}>sin cancha cargada</em>}
                        {r.maps_url && <> · <a href={r.maps_url} target="_blank" rel="noopener" style={{color:"var(--plat)"}}>🗺️ Maps</a></>}
                      </div>
                      {r.created_by && (
                        <div style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>
                          Creado por: {r.created_by}
                          {r.updated_by && r.updated_by !== r.created_by && <> · Editado por: {r.updated_by}</>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </Section>
        </div>
      );
    }

    // ─── TAB: SUPER-ADMINS ──────────────────────────────────────────────────
    function SuperAdminsPanel({ session }) {
      const [admins, setAdmins] = useState([]);
      const [loading, setLoading] = useState(true);
      const [newEmail, setNewEmail] = useState("");
      const myEmail = session.user.email.toLowerCase();

      const load = useCallback(async () => {
        setLoading(true);
        const { data } = await sb.from("super_admins").select("*").order("email");
        setAdmins(data || []);
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleAdd = async () => {
        const email = newEmail.trim().toLowerCase();
        if (!email.includes("@")) return alert("Email inválido.");
        if (admins.some(a => a.email === email)) return alert("Ese email ya es super-admin.");
        if (!confirm(`¿Hacer a ${email} super-administrador de la plataforma?\n\nVa a tener acceso completo: ver/editar todos los clubs, usuarios y rivales.`)) return;
        const { error } = await sb.from("super_admins").insert({ email });
        if (error) { alert("Error: " + error.message); return; }
        setNewEmail("");
        await load();
      };

      const handleRemove = async (email) => {
        if (email === myEmail) {
          alert("No podés quitarte a vos mismo como super-admin.\nPedile a otro super-admin que te saque.");
          return;
        }
        if (!confirm(`¿Quitar a ${email} como super-admin?\n\nVa a perder todos los privilegios administrativos.`)) return;
        const { error } = await sb.from("super_admins").delete().eq("email", email);
        if (error) { alert("Error: " + error.message); return; }
        await load();
      };

      if (loading) return <Spinner/>;

      return (
        <div>
          <div style={{padding:12, background:"var(--gold-dim)", border:"1px solid rgba(240,208,80,0.3)", borderRadius:6, marginBottom:14, fontSize:12, color:"var(--white-soft)", lineHeight:1.5}}>
            ⚠️ Los super-admins tienen <strong>acceso completo</strong> a la plataforma. Solo agregá a personas de absoluta confianza.
            Para evitar quedarte sin acceso, <strong>no podés quitarte a vos mismo</strong>: pediselo a otro super-admin.
          </div>
          <Section title={`⭐ SUPER-ADMINS (${admins.length})`}>
            {admins.map(a => (
              <div key={a.email} style={{padding:"10px 12px", background:"rgba(255,255,255,0.02)", borderBottom:"1px solid rgba(255,255,255,0.04)", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:13, fontWeight:600, fontFamily:"var(--mono)", wordBreak:"break-all"}}>
                    {a.email}
                    {a.email === myEmail && <span style={{marginLeft:8, fontSize:10, color:"var(--gold)"}}>(VOS)</span>}
                  </div>
                </div>
                <button onClick={() => handleRemove(a.email)} disabled={a.email === myEmail}
                  style={{...btnGhost, padding:"5px 10px", fontSize:11, color:a.email === myEmail ? "var(--white-faint)" : "var(--red)", borderColor: a.email === myEmail ? "rgba(255,255,255,0.05)" : "rgba(232,85,85,0.3)"}}>
                  Quitar
                </button>
              </div>
            ))}
          </Section>
          <Section title="➕ AGREGAR SUPER-ADMIN">
            <div style={{display:"flex", gap:8}}>
              <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)}
                placeholder="email@gmail.com" style={{...inputStyle, flex:1}}/>
              <button onClick={handleAdd} disabled={!newEmail.trim()} style={btnPrimary}>Agregar</button>
            </div>
          </Section>
        </div>
      );
    }

    function RequestCard({ req, onApprove, onReject }) {
      const categoria = [req.division, req.zona, req.rama].filter(Boolean).join(" ");
      return (
        <div style={{padding:16, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:6, marginBottom:10}}>
          <div style={{display:"flex", justifyContent:"space-between", gap:14, flexWrap:"wrap"}}>
            <div style={{flex:1, minWidth:200}}>
              <div style={{fontSize:17, fontWeight:700}}>{req.nombre_solicitante}</div>
              <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>{req.email_solicitante}</div>
              <div style={{display:"flex", gap:6, marginTop:10, flexWrap:"wrap"}}>
                <Tag color="var(--plat)">{req.club_propuesto}</Tag>
                {categoria && <Tag>{categoria}</Tag>}
                {req.temporada && <Tag>{req.temporada}</Tag>}
              </div>
              {req.mensaje && (
                <div style={{marginTop:12, padding:10, background:"rgba(0,0,0,0.2)", borderLeft:"3px solid var(--plat)", borderRadius:3, fontSize:13, color:"var(--white-soft)", fontStyle:"italic"}}>"{req.mensaje}"</div>
              )}
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:8, justifyContent:"center"}}>
              <button onClick={onApprove} style={{background:"var(--green)", color:"var(--bg)", border:"none", padding:"10px 18px", borderRadius:4, fontSize:11, fontWeight:700, letterSpacing:2}}>✓ APROBAR</button>
              <button onClick={onReject} style={btnDanger}>RECHAZAR</button>
            </div>
          </div>
        </div>
      );
    }

    function ClubView({ clubInfo, session, onExit, isSuperAdmin, onGoSuperAdmin, impersonating }) {
      const [club, setClub] = useState(clubInfo);
      const [view, setView] = usePersistedState(`clubview_${clubInfo.id}_view`, "public");
      // Cuando el user entra al admin desde la vista pública, llevamos la fecha que estaba mirando
      // para que el admin abra ahí directamente. Se consume y se limpia.
      const [adminInitialFechaId, setAdminInitialFechaId] = useState(null);
      const isOwnerOrAdmin = clubInfo.myRole === "owner" || clubInfo.myRole === "admin";

      if (!club.setup_done && isOwnerOrAdmin) {
        return <SetupWizard club={club} session={session} onFinish={(updatedClub) => setClub({...updatedClub, myRole: clubInfo.myRole})} onExit={onExit}/>;
      }
      if (!club.setup_done) {
        return (
          <div style={{minHeight:"100vh", padding:"60px 20px", display:"flex", alignItems:"center", justifyContent:"center"}}>
            <div style={{maxWidth:440, textAlign:"center"}}>
              <div style={{fontSize:48, marginBottom:14}}>⏳</div>
              <h1 style={{fontSize:20, color:"var(--plat)", marginBottom:8}}>Club en configuración</h1>
              <p style={{fontSize:13, color:"var(--white-soft)"}}>El entrenador no terminó la configuración. Volvé más tarde.</p>
              <button onClick={onExit} style={{...btnSecondary, marginTop:20}}>← Volver</button>
            </div>
          </div>
        );
      }
      if (view === "admin" && isOwnerOrAdmin) {
        return <ClubAdminPanel club={club} session={session} myRole={clubInfo.myRole}
          initialFechaId={adminInitialFechaId}
          onConsumedFechaId={() => setAdminInitialFechaId(null)}
          onExit={() => setView("public")}
          onClubUpdate={(updated) => setClub({...updated, myRole: clubInfo.myRole})}
          impersonating={impersonating}/>;
      }
      return <ClubPublicView club={club} session={session} myRole={clubInfo.myRole} onOpenAdmin={(fechaId) => { setAdminInitialFechaId(fechaId || null); setView("admin"); }} onExit={onExit} isSuperAdmin={isSuperAdmin} onGoSuperAdmin={onGoSuperAdmin} impersonating={impersonating}/>;
    }

    function SetupWizard({ club, session, onFinish }) {
      const persistPrefix = `wizard_${club.id}_`;
      const [step, setStep] = usePersistedState(persistPrefix + "step", 0);
      const [data, setData] = usePersistedState(persistPrefix + "data", {
        nombre: club.nombre || "",
        categoria: club.categoria || "",
        temporada: club.temporada || new Date().getFullYear().toString(),
        escudo_base64: club.escudo_base64 || "",
        theme_primary: club.theme_primary || "#4FC3E8",
        theme_secondary: club.theme_secondary || "#FFD700",
        kit_titular: club.kit_titular || "",
        kit_suplente: club.kit_suplente || "",
      });
      const [plantelMode, setPlantelMode] = usePersistedState(persistPrefix + "plantelMode", "import");
      // Estado para saber si ya importaron jugadores (para mostrar en resumen)
      const [importedCount, setImportedCount] = useState(0);
      const [showImporter, setShowImporter] = useState(false);
      const [saving, setSaving] = useState(false);
      const u = (k, v) => setData(d => ({...d, [k]: v}));
      const next = () => setStep(s => Math.min(s+1, 3));
      const prev = () => setStep(s => Math.max(s-1, 0));

      // Al entrar al paso 3, cargar cuántos jugadores ya hay
      useEffect(() => {
        if (step === 2) {
          (async () => {
            const { count } = await sb.from("jugadores").select("*", { count:"exact", head:true }).eq("club_id", club.id);
            setImportedCount(count || 0);
          })();
        }
      }, [step, club.id]);

      const handleFinish = async () => {
        setSaving(true);
        try {
          const { data: updated, error: clubError } = await sb.from("clubs").update({...data, setup_done: true}).eq("id", club.id).select().single();
          if (clubError) throw clubError;
          clearPersistedKeysWithPrefix(persistPrefix);
          onFinish(updated);
        } catch (e) {
          alert("Error: " + e.message);
          setSaving(false);
        }
      };

      return (
        <div style={{minHeight:"100vh", padding:"20px 16px"}}>
          <div style={{maxWidth:600, margin:"0 auto"}}>
            <div style={{textAlign:"center", marginBottom:30, paddingTop:20}}>
              <div style={{fontSize:9, letterSpacing:3, color:"var(--plat)", fontFamily:"var(--mono)", marginBottom:6}}>CONFIGURACIÓN INICIAL</div>
              <div style={{fontSize:28, fontWeight:900, letterSpacing:-1, lineHeight:1}}>BIEN<span style={{color:"var(--plat)"}}>VENIDO</span></div>
              <div style={{fontSize:11, color:"var(--white-dim)", marginTop:8, fontFamily:"var(--mono)"}}>{session.user.email} · {club.nombre}</div>
            </div>
            <div style={{display:"flex", gap:4, marginBottom:30, justifyContent:"center"}}>
              {Array.from({length: 4}).map((_, i) => (
                <div key={i} style={{width:40, height:4, borderRadius:2, background: i <= step ? "var(--plat)" : "rgba(255,255,255,0.1)"}}/>
              ))}
            </div>
            {step === 0 && (
              <Card title="Paso 1 de 4 · Datos del equipo">
                <Field label="Nombre del club"><input type="text" value={data.nombre} onChange={e => u("nombre", e.target.value)} style={inputStyle}/></Field>
                <Field label="Categoría"><input type="text" value={data.categoria} onChange={e => u("categoria", e.target.value)} placeholder="Ej: 6ta A Caballeros" style={inputStyle}/></Field>
                <Field label="Temporada"><input type="text" value={data.temporada} onChange={e => u("temporada", e.target.value)} style={inputStyle}/></Field>
                <Field label="Escudo (opcional, máx 500 KB)">
                  <input type="file" accept="image/*" onChange={async e => {
                    const f = e.target.files?.[0]; if (!f) return;
                    if (f.size > 500_000) { alert("Imagen muy grande"); return; }
                    u("escudo_base64", await fileToBase64(f));
                  }} style={{...inputStyle, padding:8}}/>
                  {data.escudo_base64 && (
                    <div style={{marginTop:10, display:"flex", alignItems:"center", gap:12}}>
                      <img src={data.escudo_base64} style={{width:56, height:56, objectFit:"contain"}}/>
                      <button onClick={() => u("escudo_base64","")} style={{...btnGhost, fontSize:10}}>Quitar</button>
                    </div>
                  )}
                </Field>
                <button onClick={next} disabled={!data.nombre.trim()||!data.categoria.trim()} style={{...btnPrimary, width:"100%", marginTop:24}}>Continuar →</button>
              </Card>
            )}
            {step === 1 && (
              <Card title="Paso 2 de 4 · Colores del club">
                <p style={{fontSize:12, color:"var(--white-soft)", marginBottom:16, lineHeight:1.5}}>Estos colores son tuyos, no afectan a la plataforma.</p>
                <Field label="Color principal">
                  <div style={{display:"flex", gap:10, alignItems:"center"}}>
                    <input type="color" value={data.theme_primary} onChange={e => u("theme_primary", e.target.value)} style={{width:60, height:40, border:"none"}}/>
                    <input type="text" value={data.theme_primary} onChange={e => u("theme_primary", e.target.value)} style={{...inputStyle, flex:1, fontFamily:"var(--mono)"}}/>
                  </div>
                </Field>
                <Field label="Color secundario">
                  <div style={{display:"flex", gap:10, alignItems:"center"}}>
                    <input type="color" value={data.theme_secondary} onChange={e => u("theme_secondary", e.target.value)} style={{width:60, height:40, border:"none"}}/>
                    <input type="text" value={data.theme_secondary} onChange={e => u("theme_secondary", e.target.value)} style={{...inputStyle, flex:1, fontFamily:"var(--mono)"}}/>
                  </div>
                </Field>
                <Field label="Camiseta titular"><input type="text" value={data.kit_titular} onChange={e => u("kit_titular", e.target.value)} placeholder="Ej: Blanca" style={inputStyle}/></Field>
                <Field label="Camiseta suplente"><input type="text" value={data.kit_suplente} onChange={e => u("kit_suplente", e.target.value)} placeholder="Ej: Negra" style={inputStyle}/></Field>
                <div style={{marginTop:20, padding:14, borderRadius:6, background:`linear-gradient(180deg, ${data.theme_primary}1F 0%, transparent 100%)`, borderBottom:"2px solid " + data.theme_primary}}>
                  <div style={{fontSize:8, letterSpacing:3, color:data.theme_primary, fontFamily:"var(--mono)", marginBottom:4}}>VISTA PREVIA</div>
                  <div style={{fontSize:20, fontWeight:900, letterSpacing:-1}}>CONVO<span style={{color:data.theme_primary}}>CATORIA</span></div>
                  <div style={{marginTop:6}}><span style={{background:data.theme_primary, color:"var(--bg)", fontSize:9, fontFamily:"var(--mono)", letterSpacing:2, padding:"3px 8px", fontWeight:700}}>{data.categoria.toUpperCase()}</span></div>
                </div>
                <div style={{display:"flex", gap:10, marginTop:24}}>
                  <button onClick={prev} style={{...btnGhost, flex:1}}>← Atrás</button>
                  <button onClick={next} style={{...btnPrimary, flex:2}}>Continuar →</button>
                </div>
              </Card>
            )}
            {step === 2 && (
              <Card title="Paso 3 de 4 · Plantel inicial">
                {!showImporter ? (
                  <>
                    {importedCount > 0 ? (
                      <div style={{padding:14, background:"var(--plat-soft)", border:"1px solid var(--plat-border)", borderRadius:6, marginBottom:16}}>
                        <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, marginBottom:4, fontWeight:700}}>
                          ✓ PLANTEL CARGADO
                        </div>
                        <div style={{fontSize:13, color:"var(--white-soft)"}}>
                          Tenés <strong>{importedCount} jugador{importedCount > 1 ? "es" : ""}</strong> cargado{importedCount > 1 ? "s" : ""}. Podés agregar más o continuar.
                        </div>
                      </div>
                    ) : (
                      <p style={{fontSize:12, color:"var(--white-soft)", marginBottom:16, lineHeight:1.5}}>
                        Cargá tu plantel ahora o después desde el panel admin. Podés importarlo desde una ficha de partido AAHBA (PDF o texto) o pegando una lista simple.
                      </p>
                    )}
                    <div style={{display:"flex", flexDirection:"column", gap:8}}>
                      <button onClick={() => setShowImporter(true)} style={{...btnPrimary, width:"100%"}}>
                        📥 Importar plantel
                      </button>
                      <button onClick={() => setPlantelMode("skip")} style={{...btnGhost, width:"100%", fontSize:12}}>
                        ⏭️ Cargarlo después
                      </button>
                    </div>
                  </>
                ) : (
                  <PlantelImport
                    club={club}
                    session={session}
                    existing={[]}
                    onDone={async () => {
                      const { count } = await sb.from("jugadores").select("*", { count:"exact", head:true }).eq("club_id", club.id);
                      setImportedCount(count || 0);
                      setPlantelMode("import");
                      setShowImporter(false);
                    }}
                    onCancel={() => setShowImporter(false)}
                  />
                )}
                {!showImporter && (
                  <div style={{display:"flex", gap:10, marginTop:24}}>
                    <button onClick={prev} style={{...btnGhost, flex:1}}>← Atrás</button>
                    <button onClick={next} style={{...btnPrimary, flex:2}}>Continuar →</button>
                  </div>
                )}
              </Card>
            )}
            {step === 3 && (
              <Card title="Paso 4 de 4 · Confirmar">
                <div style={{background:"rgba(255,255,255,0.02)", padding:14, borderRadius:6}}>

    // ═══════════════════════════════════════════════════════════════════════════
