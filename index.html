            background:"rgba(255,255,255,0.03)", border:"1px solid rgba(240,208,80,0.3)",
            color:"var(--gold)", borderRadius:6, fontSize:11, letterSpacing:2.5, fontFamily:"var(--mono)", fontWeight:700,
            cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8
          }}>
            🏆 HISTÓRICO DE PARTIDOS ({jugados.length})
          </button>

          {open && (
            <div onClick={() => setOpen(false)} style={{
              position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:1000,
              display:"flex", alignItems:"flex-start", justifyContent:"center",
              padding:"40px 16px", overflowY:"auto"
            }}>
              <div onClick={e => e.stopPropagation()} style={{
                maxWidth:560, width:"100%", background:"var(--bg)", border:`1px solid ${club.theme_primary}40`,
                borderRadius:8, padding:18, position:"relative"
              }}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
                  <div>
                    <div style={{fontSize:10, letterSpacing:3, color:"var(--gold)", fontFamily:"var(--mono)", fontWeight:700}}>
                      🏆 HISTÓRICO DE PARTIDOS
                    </div>
                    <div style={{fontSize:13, color:"var(--white-soft)", marginTop:4}}>
                      {jugados.length} partido{jugados.length !== 1 ? "s" : ""} jugado{jugados.length !== 1 ? "s" : ""}
                    </div>
                  </div>
                  <button onClick={() => setOpen(false)} style={{
                    background:"transparent", border:"1px solid rgba(255,255,255,0.15)",
                    color:"var(--white-soft)", borderRadius:4, padding:"5px 10px", fontSize:11, cursor:"pointer"
                  }}>× Cerrar</button>
                </div>

                <div style={{display:"flex", flexDirection:"column", gap:6}}>
                  {jugados.map(f => {
                    const golesProp = f.goles_propio ?? 0;
                    const golesRiv = f.goles_rival ?? 0;
                    const ganamos = golesProp > golesRiv;
                    const empate = golesProp === golesRiv;
                    const dotColor = ganamos ? "var(--green)" : empate ? "var(--orange)" : "var(--red)";
                    const dotChar = ganamos ? "G" : empate ? "E" : "P";
                    const isLocal = f.condition === "Local";
                    const fechaTxt = f.fecha_date ? formatDateForDisplay(f.fecha_date) : "Sin fecha";
                    return (
                      <div key={f.id}
                        onClick={() => { onSelectFecha(f.id); setOpen(false); window.scrollTo({top: 0, behavior:"smooth"}); }}
                        style={{
                          padding:"10px 12px", background:"rgba(255,255,255,0.03)", borderRadius:6,
                          cursor:"pointer", display:"flex", alignItems:"center", gap:10,
                          borderLeft:`3px solid ${dotColor}`
                        }}>
                        {/* Dot G/E/P */}
                        <div style={{width:24, height:24, borderRadius:12, background:`${dotColor}26`, color:dotColor, fontWeight:900, fontFamily:"var(--mono)", fontSize:11, textAlign:"center", lineHeight:"24px", flexShrink:0}}>
                          {dotChar}
                        </div>
                        {/* Fecha y rival */}
                        <div style={{flex:1, minWidth:0}}>
                          <div style={{fontSize:12, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                            <span style={{color:"var(--white-dim)", fontFamily:"var(--mono)", marginRight:6, fontSize:10}}>F{f.fecha_num}</span>
                            {isLocal ? "vs " : "en "}{f.rival || "—"}
                          </div>
                          <div style={{fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>
                            {fechaTxt} · {isLocal ? "🏠 LOCAL" : "✈️ VISITANTE"}
                          </div>
                        </div>
                        {/* Marcador */}
                        <div style={{textAlign:"right", flexShrink:0}}>
                          <div style={{fontSize:16, fontWeight:900, fontFamily:"var(--mono)", color: ganamos ? "var(--green)" : empate ? "var(--white)" : "var(--red)"}}>
                            {golesProp} <span style={{color:"var(--white-dim)", fontWeight:600}}>-</span> {golesRiv}
                          </div>
                          <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>FINAL</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function ClubPublicView({ club, session, myRole, onOpenAdmin, onExit, isSuperAdmin, onGoSuperAdmin, impersonating }) {
      const [jugadores, setJugadores] = useState([]);
      const [fechas, setFechas] = useState([]);
      const [loading, setLoading] = useState(true);
      const [fechaActualId, setFechaActualId] = useState(null);

      useEffect(() => {
        (async () => {
          const [jres, fres] = await Promise.all([
            sb.from("jugadores").select("*").eq("club_id", club.id).order("numero", { ascending: true }),
            sb.from("fechas").select("*").eq("club_id", club.id).order("fecha_num"),
          ]);
          setJugadores(jres.data || []);
          const fechasOrdenadas = fres.data || [];
          setFechas(fechasOrdenadas);

          // Seleccionar la "próxima fecha" según calendario:
          //   1) Si hay una fecha futura (>= hoy) con fecha_date asignada → la primera
          //   2) Si no, la última jugada (la más reciente)
          //   3) Si ninguna tiene fecha_date, la primera del fixture
          const hoy = new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
          const conFecha = fechasOrdenadas.filter(f => f.fecha_date);
          let proxima = null;
          if (conFecha.length > 0) {
            // Ordenar por fecha_date ascendente
            const porFecha = [...conFecha].sort((a, b) => a.fecha_date.localeCompare(b.fecha_date));
            proxima = porFecha.find(f => f.fecha_date >= hoy) || porFecha[porFecha.length - 1];
          } else if (fechasOrdenadas.length > 0) {
            proxima = fechasOrdenadas[0];
          }
          if (proxima) setFechaActualId(proxima.id);
          setLoading(false);
        })();
      }, [club.id]);

      const fechaActual = fechas.find(f => f.id === fechaActualId);
      const isOwnerOrAdmin = myRole === "owner" || myRole === "admin";
      if (loading) return <Spinner/>;

      return (
        <div style={{minHeight:"100vh", position:"relative"}}>
          {impersonating && <ImpersonationBanner club={club} onExit={onExit}/>}
          <div style={{position:"fixed", inset:0, pointerEvents:"none", zIndex:0, background:`radial-gradient(ellipse 60% 40% at 50% 0%, ${club.theme_primary}1F 0%, transparent 70%)`}}/>
          <div style={{position:"relative", zIndex:1, padding:"0 0 60px", maxWidth:720, margin:"0 auto"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px", fontSize:10, fontFamily:"var(--mono)", letterSpacing:1, color:"var(--white-dim)", borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <button onClick={onExit} style={{background:"transparent", border:"none", color:"var(--white-dim)", fontSize:10, fontFamily:"var(--mono)", letterSpacing:1}}>← MIS EQUIPOS</button>
              <div>{session.user.email} · {myRole.toUpperCase()}</div>
            </div>
            <div style={{background:`linear-gradient(180deg, ${club.theme_primary}2E 0%, transparent 100%)`, borderBottom:`3px solid ${club.theme_primary}`, padding:"20px 16px"}}>
              <div style={{display:"flex", alignItems:"center", gap:14}}>
                {club.escudo_base64 ? (
                  <img src={club.escudo_base64} style={{width:56, height:"auto", maxHeight:64, objectFit:"contain", flexShrink:0, filter:`drop-shadow(0 2px 8px ${club.theme_primary}4D)`}}/>
                ) : (
                  <div style={{width:56, height:56, background:`${club.theme_primary}30`, border:`2px solid ${club.theme_primary}`, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", color:club.theme_primary, fontWeight:900, fontSize:18, flexShrink:0}}>{club.nombre.slice(0,3).toUpperCase()}</div>
                )}
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:9, letterSpacing:3, color:club.theme_primary, fontFamily:"var(--mono)", marginBottom:6}}>{club.nombre.toUpperCase()}</div>
                  <div style={{fontSize:26, fontWeight:900, letterSpacing:-1, lineHeight:1}}>CONVO<span style={{color:club.theme_primary}}>CATORIA</span></div>
                  <div style={{marginTop:8}}><span style={{background:club.theme_primary, color:"var(--bg)", fontSize:9, fontFamily:"var(--mono)", letterSpacing:2, padding:"3px 8px", borderRadius:2, fontWeight:700}}>{club.categoria.toUpperCase()} · {club.temporada}</span></div>
                </div>
              </div>
            </div>
            <div style={{padding:"20px 16px"}}>
              {fechas.length === 0 ? (
                <div style={{textAlign:"center", padding:40, background:`${club.theme_primary}08`, borderRadius:8, border:`1px dashed ${club.theme_primary}40`}}>
                  <div style={{fontSize:48, marginBottom:16, opacity:0.5}}>📅</div>
                  <div style={{fontSize:16, color:"var(--white-soft)", marginBottom:8}}>Todavía no hay fechas cargadas</div>
                  <div style={{fontSize:12, color:"var(--white-dim)"}}>{isOwnerOrAdmin ? "Cargá fechas desde el panel admin (Entrega 2D)." : "El entrenador va a cargar la primera fecha pronto."}</div>
                </div>
              ) : (
                <>
                  <StatsTemporadaBanner fechas={fechas} club={club} jugadores={jugadores}/>
                  <HistoricoButton fechas={fechas} club={club} onSelectFecha={(fId) => setFechaActualId(fId)}/>
                  <div style={{display:"flex", gap:5, marginBottom:16, overflowX:"auto", paddingBottom:4}}>
                    {fechas.map(f => (
                      <button key={f.id}
                        ref={el => { if (el && fechaActualId === f.id) { setTimeout(() => el.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"}), 50); } }}
                        onClick={() => setFechaActualId(f.id)}
                        style={{flexShrink:0, padding:"6px 12px", fontSize:10, letterSpacing:1, fontFamily:"var(--mono)", border: fechaActualId === f.id ? `1px solid ${club.theme_primary}` : "1px solid rgba(255,255,255,0.08)", background: fechaActualId === f.id ? `${club.theme_primary}1F` : "transparent", color: fechaActualId === f.id ? club.theme_primary : "var(--white-dim)", borderRadius:3}}>
                        F{f.fecha_num} · {f.rival.length > 12 ? f.rival.slice(0,12)+"…" : f.rival}
                      </button>
                    ))}
                  </div>
                  {fechaActual && <FechaDetalle fecha={fechaActual} club={club} jugadores={jugadores} session={session}/>}
                </>
              )}
              <div style={{marginTop:50, paddingTop:24, borderTop:"1px solid rgba(255,255,255,0.05)", textAlign:"center", display:"flex", flexDirection:"column", gap:8, alignItems:"center"}}>
                {isOwnerOrAdmin && (
                  <button onClick={() => onOpenAdmin(fechaActualId)} style={{background:"transparent", border:"1px solid rgba(240,208,80,0.3)", color:"var(--gold)", padding:"6px 14px", borderRadius:3, fontSize:10, fontFamily:"var(--mono)", letterSpacing:2}}>⚙ PANEL ADMIN</button>
                )}
                {isSuperAdmin && (
                  <button onClick={onGoSuperAdmin} style={{background:"transparent", border:"1px solid var(--gold)", color:"var(--gold)", padding:"6px 14px", borderRadius:3, fontSize:10, fontFamily:"var(--mono)", letterSpacing:2}}>⭐ SUPER ADMIN</button>
                )}
                <button onClick={() => sb.auth.signOut()} style={{background:"transparent", border:"none", color:"var(--white-faint)", fontSize:9, fontFamily:"var(--mono)", letterSpacing:2}}>CERRAR SESIÓN</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ClubAdminPanel({ club, session, myRole, onExit, onClubUpdate, impersonating, initialFechaId, onConsumedFechaId }) {
      const [pendingRequests, setPendingRequests] = useState([]);
      const [counts, setCounts] = useState({ jugadores:0, fechas:0 });
      const [editingClub, setEditingClub] = usePersistedState(`adminpanel_${club.id}_editing`, false);
      const [tab, setTab] = usePersistedState(`adminpanel_${club.id}_tab`, "resumen"); // resumen | fixture | plantel | config

      // Si vinimos con una fecha pre-seleccionada desde la vista pública, ir directo a fixture
      useEffect(() => {
        if (initialFechaId) {
          setTab("fixture");
        }
      }, [initialFechaId]);

      const loadRequests = useCallback(async () => {
        const { data } = await sb.from("access_requests").select("*").eq("requested_club_id", club.id).eq("status", "pending").order("created_at", { ascending: false });
        setPendingRequests(data || []);
      }, [club.id]);

      useEffect(() => {
        loadRequests();
        (async () => {
          const [j, f] = await Promise.all([
            sb.from("jugadores").select("*", { count:"exact", head:true }).eq("club_id", club.id),
            sb.from("fechas").select("*", { count:"exact", head:true }).eq("club_id", club.id),
          ]);
          setCounts({ jugadores: j.count || 0, fechas: f.count || 0 });
        })();
      }, [loadRequests, club.id]);

      const handleApproveViewer = async (req) => {
        if (!confirm(`Aprobar a ${req.nombre_solicitante}?`)) return;
        const { error: cuError } = await sb.from("club_users").insert({club_id: club.id, email: req.email_solicitante, role: "viewer", added_by: session.user.email});
        if (cuError && cuError.code !== "23505") { alert("Error: " + cuError.message); return; }
        await sb.from("access_requests").update({status: "approved", reviewed_by: session.user.email, reviewed_at: new Date().toISOString()}).eq("id", req.id);
        await loadRequests();
      };

      const handleRejectViewer = async (req) => {
        const reason = prompt("Razón (opcional):");
        if (reason === null) return;
        await sb.from("access_requests").update({status: "rejected", reviewed_by: session.user.email, reviewed_at: new Date().toISOString(), rejection_reason: reason || ""}).eq("id", req.id);
        await loadRequests();
      };

      const handleBackup = async () => {
        const [jRes, fRes, cuRes] = await Promise.all([
          sb.from("jugadores").select("*").eq("club_id", club.id),
          sb.from("fechas").select("*").eq("club_id", club.id),
          sb.from("club_users").select("*").eq("club_id", club.id),
        ]);
        downloadJSON({ schemaVersion:2, exportedAt: new Date().toISOString(), club, jugadores: jRes.data, fechas: fRes.data, club_users: cuRes.data }, `backup_${club.nombre.replace(/[^a-z0-9]/gi,"_").toLowerCase()}_${new Date().toISOString().slice(0,10)}.json`);
      };

      // Si estoy editando los datos del club → renderizar editor en vez del panel
      if (editingClub) {
        return <ClubDataEditor club={club} session={session}
          onSave={(updatedClub) => { onClubUpdate?.(updatedClub); setEditingClub(false); }}
          onCancel={() => setEditingClub(false)}/>;
      }

      const tabs = [
        { id: "resumen", label: "Resumen", icon: "📊", badge: pendingRequests.length || null },
        { id: "fixture", label: "Fixture", icon: "📅" },
        { id: "plantel", label: "Plantel", icon: "👥" },
        { id: "config", label: "Config", icon: "⚙️" },
      ];

      return (
        <div style={{minHeight:"100vh"}}>
          {impersonating && <ImpersonationBanner club={club} onExit={onExit}/>}
          <div style={{padding:"20px 16px 60px"}}>
            <div style={{maxWidth:720, margin:"0 auto"}}>
              <div style={{background:"var(--gold-dim)", border:"1px solid rgba(240,208,80,0.3)", borderRadius:6, padding:"14px 18px", marginBottom:18, display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:10, letterSpacing:3, color:"var(--gold)", fontFamily:"var(--mono)"}}>PANEL ADMIN · {myRole.toUpperCase()}</div>
                  <div style={{fontSize:16, fontWeight:700, marginTop:2}}>{club.nombre}</div>
                </div>
                <div style={{display:"flex", gap:6, flexShrink:0}}>
                  {myRole === "owner" && (
                    <button onClick={() => setEditingClub(true)} style={{...btnGhost, fontSize:11}} title="Editar datos del club">✏️ Editar club</button>
                  )}
                  <button onClick={onExit} style={{...btnGhost, fontSize:11}}>← Volver</button>
                </div>
              </div>

              {/* TABS */}
              <div style={{display:"flex", gap:4, marginBottom:20, overflowX:"auto", paddingBottom:4}}>
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{
                    flexShrink:0, padding:"10px 14px", fontSize:13, fontFamily:"inherit", fontWeight:600,
                    border: tab === t.id ? `1px solid ${club.theme_primary}` : "1px solid rgba(255,255,255,0.08)",
                    background: tab === t.id ? `${club.theme_primary}1F` : "transparent",
                    color: tab === t.id ? club.theme_primary : "var(--white-soft)",
                    borderRadius:6, position:"relative"
                  }}>
                    {t.icon} {t.label}
                    {t.badge && (
                      <span style={{
                        marginLeft:6, padding:"1px 6px", fontSize:10, fontWeight:700,
                        background:"var(--gold)", color:"var(--bg)", borderRadius:8, fontFamily:"var(--mono)"
                      }}>{t.badge}</span>
                    )}
                  </button>
                ))}
              </div>

              {/* CONTENIDO según tab */}
              {tab === "resumen" && (
                <>
                  <Section title="📊 RESUMEN">
                    <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10}}>
                      <StatBox label="JUGADORES" value={counts.jugadores} color={club.theme_primary}/>
                      <StatBox label="FECHAS" value={counts.fechas} color={club.theme_primary}/>
                      <StatBox label="PENDIENTES" value={pendingRequests.length} color="var(--gold)"/>
                    </div>
                  </Section>
                  {pendingRequests.length > 0 ? (
                    <Section title={`⏳ SOLICITUDES (${pendingRequests.length})`}>
                      {pendingRequests.map(req => (
                        <div key={req.id} style={{padding:14, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:8}}>
                          <div style={{display:"flex", justifyContent:"space-between", gap:10, flexWrap:"wrap"}}>
                            <div style={{flex:1, minWidth:160}}>
                              <div style={{fontSize:15, fontWeight:700}}>{req.nombre_solicitante}</div>
                              <div style={{fontSize:11, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:2}}>{req.email_solicitante}</div>
                              {req.mensaje && <div style={{marginTop:10, padding:10, background:"rgba(0,0,0,0.2)", borderLeft:"3px solid var(--plat)", fontSize:13, fontStyle:"italic", color:"var(--white-soft)"}}>"{req.mensaje}"</div>}
                            </div>
                            <div style={{display:"flex", flexDirection:"column", gap:6, justifyContent:"center"}}>
                              <button onClick={() => handleApproveViewer(req)} style={{background:"var(--green)", color:"var(--bg)", border:"none", padding:"8px 14px", borderRadius:4, fontSize:11, fontWeight:700, letterSpacing:1}}>✓ APROBAR</button>
                              <button onClick={() => handleRejectViewer(req)} style={{...btnDanger, fontSize:11}}>RECHAZAR</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </Section>
                  ) : (
                    <Section title="⏳ SOLICITUDES">
                      <p style={{fontSize:12, color:"var(--white-dim)", textAlign:"center", padding:14}}>Sin solicitudes pendientes.</p>
                    </Section>
                  )}
                  <Section title="🚧 PRÓXIMAMENTE">
                    <ul style={{fontSize:12, color:"var(--white-soft)", lineHeight:1.8, paddingLeft:20}}>
                      <li>Convocar / duda / baja por fecha</li>
                      <li>Titulares y formación</li>
                      <li>Resultados y goleadores</li>
                      <li>Ficha extendida del jugador (datos médicos / familia)</li>
                    </ul>
                  </Section>
                </>
              )}

              {tab === "fixture" && (myRole === "owner" || myRole === "admin") && (
                <FixtureManager club={club} session={session}
                  initialFechaId={initialFechaId}
                  onConsumedFechaId={onConsumedFechaId}/>
              )}

              {tab === "plantel" && (myRole === "owner" || myRole === "admin") && (
                <PlantelManager club={club} session={session}/>
              )}

              {tab === "config" && (
                <>
                  {(myRole === "owner" || myRole === "admin") && (
                    <Section title="⚙️ DEFAULTS DEL CLUB">
                      <ClubDefaultsEditor club={club} session={session}/>
                    </Section>
                  )}
                  {myRole === "owner" && (
                    <Section title="👥 USUARIOS DEL CLUB"><ClubUsersManager club={club} session={session}/></Section>
                  )}
                  <Section title="💾 BACKUP">
                    <button onClick={handleBackup} style={{...btnSecondary, width:"100%"}}>⬇️ Descargar backup</button>
                  </Section>
                </>
              )}

          </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  CLUB DATA EDITOR (datos del club editables: nombre, escudo, colores, etc.)
    // ═══════════════════════════════════════════════════════════════════════════
    function ClubDataEditor({ club, session, onSave, onCancel }) {
      const [data, setData] = useState({
        nombre: club.nombre || "",
        categoria: club.categoria || "",
        temporada: club.temporada || new Date().getFullYear().toString(),
        escudo_base64: club.escudo_base64 || "",
        theme_primary: club.theme_primary || "#4FC3E8",
        theme_secondary: club.theme_secondary || "#FFD700",
        kit_titular: club.kit_titular || "",
        kit_suplente: club.kit_suplente || "",
      });
      const [saving, setSaving] = useState(false);
      const u = (k, v) => setData(d => ({...d, [k]: v}));

      const handleSave = async () => {
        if (!data.nombre.trim()) return alert("El nombre del club es obligatorio.");
        if (!data.categoria.trim()) return alert("La categoría es obligatoria.");
        setSaving(true);
        const { data: updated, error } = await sb.from("clubs").update(data).eq("id", club.id).select().single();
        setSaving(false);
        if (error) { alert("Error: " + error.message); return; }
        onSave(updated);
      };

      return (
        <div style={{minHeight:"100vh", padding:"20px 16px 60px"}}>
          <div style={{maxWidth:720, margin:"0 auto"}}>
            <div style={{background:"var(--gold-dim)", border:"1px solid rgba(240,208,80,0.3)", borderRadius:6, padding:"14px 18px", marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:10, letterSpacing:3, color:"var(--gold)", fontFamily:"var(--mono)"}}>✏️ EDITAR CLUB</div>
                <div style={{fontSize:16, fontWeight:700, marginTop:2}}>{club.nombre}</div>
              </div>
              <button onClick={onCancel} disabled={saving} style={{...btnGhost, fontSize:11}}>← Cancelar</button>
            </div>

            <Section title="📝 DATOS GENERALES">
              <Field label="Nombre del club">
                <input type="text" value={data.nombre} onChange={e => u("nombre", e.target.value)} style={inputStyle}/>
              </Field>
              <Field label="Categoría">
                <input type="text" value={data.categoria} onChange={e => u("categoria", e.target.value)} placeholder="Ej: 6ta A Caballeros" style={inputStyle}/>
              </Field>
              <Field label="Temporada">
                <input type="text" value={data.temporada} onChange={e => u("temporada", e.target.value)} style={inputStyle}/>
              </Field>
            </Section>

            <Section title="🛡️ ESCUDO">

    function ClubUsersManager({ club, session }) {
      const [users, setUsers] = useState([]);
      const [newEmail, setNewEmail] = useState("");
      const [newRole, setNewRole] = useState("viewer");
      const load = async () => {
        const { data } = await sb.from("club_users").select("*").eq("club_id", club.id);
        setUsers(data || []);
      };
      useEffect(() => { load(); }, []);
      const handleAdd = async () => {
        const email = newEmail.trim().toLowerCase();
        if (!email.includes("@")) return alert("Email inválido");
        const { error } = await sb.from("club_users").insert({club_id: club.id, email, role: newRole, added_by: session.user.email});
        if (error) { alert("Error: " + error.message); return; }
        setNewEmail(""); await load();
      };
      const handleRemove = async (id, email) => {
        if (!confirm(`Quitar ${email}?`)) return;
        await sb.from("club_users").delete().eq("id", id);
        await load();
      };
      return (
        <div>
          <p style={{fontSize:12, color:"var(--white-soft)", marginBottom:12}}>Owner: <strong>{club.owner_email}</strong></p>
          <div style={{maxHeight:200, overflowY:"auto", marginBottom:14}}>
            {users.map(u => (
              <div key={u.id} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 10px", borderBottom:"1px solid rgba(255,255,255,0.04)", gap:8}}>
                <div style={{flex:1, minWidth:0, fontSize:13, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis"}}>{u.email}</div>
                <Tag color={u.role==="admin" ? "var(--plat)" : "var(--white-dim)"}>{u.role.toUpperCase()}</Tag>
                <button onClick={() => handleRemove(u.id, u.email)} style={{...btnGhost, padding:"4px 8px", fontSize:11}}>×</button>
              </div>
            ))}
            {users.length === 0 && <p style={{fontSize:12, color:"var(--white-dim)", textAlign:"center", padding:10}}>Sin usuarios.</p>}
          </div>
          <div style={{padding:10, background:"rgba(45,157,111,0.06)", borderRadius:4, display:"flex", gap:6}}>
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="email@gmail.com" style={{...inputStyle, flex:1, padding:8, fontSize:12}}/>
            <select value={newRole} onChange={e => setNewRole(e.target.value)} style={{...inputStyle, width:90, padding:8, fontSize:12}}>
              <option value="viewer">viewer</option>
              <option value="admin">admin</option>
            </select>
            <button onClick={handleAdd} style={{...btnPrimary, padding:"8px 12px", fontSize:12}}>+</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  PARSER DE FIXTURE
    //  Soporta 2 formatos:
    //  1) Formato AAHBA (bloques multi-línea como vienen del tournamenttracker)
    //  2) Formato línea simple (1 fecha por línea, separadores variados)
    //  El parser auto-detecta cuál es.
    // ═══════════════════════════════════════════════════════════════════════════

    // Normaliza el texto pegado desde el copy-paste del sitio AAHBA.
    // El browser puede insertar caracteres invisibles, NBSP, zero-width spaces,
    // íconos de escudos como imágenes, etc. Esta función limpia agresivamente.
    function normalizeAAHBAText(rawText) {
      let t = rawText;

      // PASO 1: Limpieza agresiva de caracteres no útiles.
      // Solo mantenemos: letras ASCII básicas, acentos hispanos (áéíóúñÁÉÍÓÚÑü),
      // dígitos, espacios, tabs, saltos de línea, y signos comunes (-, ., :, /, (, ), ,, ;, |).
      // Todo lo demás se reemplaza por espacio.
      t = t.replace(/[^\x20-\x7E\nA-Za-zÁÉÍÓÚÑáéíóúñÜü\t]/g, " ");

      // PASO 2: Normalizar espacios múltiples (pero conservar saltos)
      // Reemplazar tabs por espacios
      t = t.replace(/\t/g, " ");
      // Múltiples espacios consecutivos → un solo espacio
      t = t.replace(/[ ]{2,}/g, " ");

      // PASO 3: Insertar saltos de línea donde detectamos patrones AAHBA
      // Patrón: "Fecha N" como separador → asegurar salto antes
      t = t.replace(/(\S)\s*(Fecha\s+\d+)/g, "$1\n$2");
      // Patrón: día abreviado → asegurar salto antes
      t = t.replace(/(\S)\s+((?:lun|mar|mi[eé]|jue|vie|s[aá]b|dom)\.?\s+\d{1,2}\s+(?:ene|feb|mar|abr|may|jun|jul|ago|sep|set|sept|oct|nov|dic))/gi, "$1\n$2");
      // Patrón: hora HH:MM seguida de letras (separar hora del equipo)
      t = t.replace(/(\d{1,2}:\d{2})\s*([A-ZÁÉÍÓÚÑ])/g, "$1\n$2");
      // Patrón: "Vs" o "VS" rodeado de equipos sin saltos
      t = t.replace(/([A-ZÁÉÍÓÚÑ\.])\s+(Vs|VS)\s+([A-ZÁÉÍÓÚÑ])/g, "$1\n$2\n$3");
      // Patrón: marcador con dígitos (rival arriba, número, número, rival abajo)
      t = t.replace(/([A-ZÁÉÍÓÚÑa-záéíóúñ\.])\s+(\d{1,3})\s+(\d{1,3})\s+([A-ZÁÉÍÓÚÑ])/g, "$1\n$2\n$3\n$4");
      // Patrón: equipo seguido de un dígito solitario antes de salto (goleador del marcador)
      t = t.replace(/([A-ZÁÉÍÓÚÑa-záéíóúñ\.])\s+(\d{1,3})\s*\n/g, "$1\n$2\n");

      // PASO 4: Limpiar líneas vacías y trims
      t = t.split("\n").map(l => l.trim()).filter(Boolean).join("\n");
      // Re-unir "Fecha" con su número si quedaron en líneas separadas
      t = t.replace(/^Fecha\s*\n\s*(\d+)/gm, "Fecha $1");
      return t;
    }

    // Detecta si el texto pegado tiene formato AAHBA (bloques que empiezan con "Fecha N")
    function isAAHBAFormat(text) {
      const normalized = normalizeAAHBAText(text);
      const lines = normalized.split("\n").map(l => l.trim()).filter(Boolean);
      let fechaHeaders = 0;
      for (const line of lines) {
        if (/^Fecha\s+\d+\s*$/i.test(line)) fechaHeaders++;
      }
      // Si hay 2+ líneas tipo "Fecha 1", "Fecha 2"... es AAHBA
      return fechaHeaders >= 2;
    }

    // Detecta el equipo "propio" buscando el que más se repite
    function detectOwnTeam(blocks) {
      const counts = {};
      blocks.forEach(b => {
        if (b.localRaw) counts[b.localRaw] = (counts[b.localRaw] || 0) + 1;
        if (b.visitanteRaw) counts[b.visitanteRaw] = (counts[b.visitanteRaw] || 0) + 1;
      });
      let maxTeam = "", maxCount = 0;
      for (const [team, count] of Object.entries(counts)) {
        if (count > maxCount) { maxTeam = team; maxCount = count; }
      }
      return { team: maxTeam, count: maxCount, allTeams: Object.keys(counts).sort() };
    }

    // Parser de formato AAHBA: agrupa líneas en bloques por "Fecha N"
    function parseAAHBABlocks(text) {
      const normalized = normalizeAAHBAText(text);
      const lines = normalized.split("\n").map(l => l.trim());
      const blocks = [];
      let current = null;
      const monthMap = { ene:"01", feb:"02", mar:"03", abr:"04", may:"05", jun:"06", jul:"07", ago:"08", sep:"09", set:"09", sept:"09", oct:"10", nov:"11", dic:"12" };

      const flushBlock = () => {
        if (!current) return;
        if (current.lines.length === 0) { current = null; return; }
        // Procesar el bloque
        // Variantes posibles del bloque:
        //  A) Sin jugar (con o sin fecha): puede tener "Vs" / "VS" como separador
        //     - "G. Y ESGRIMA B" | "Vs" | "EST. LA PLATA (N.P.)"
        //     - "dom 08 mar 11:30" | "LANUS" | "Vs" | "G. Y ESGRIMA B"  (con fecha)
        //  B) Ya jugado: con marcador (goles arriba y abajo)
        //     - "dom 08 mar 11:30" | "LANUS" | "0" | "6" | "G. Y ESGRIMA B"
        const block = current;
        const innerLines = block.lines;

        let dateLine = null;
        let local = "", visitante = "";
        let kickTime = "";
        let fechaISO = "";

        // Buscar línea de fecha (formato "dom 08 mar 11:30") - tolerante a caracteres iniciales raros
        // El regex busca el patrón día+número+mes en CUALQUIER parte de la línea, no solo al inicio.
        const dateRegex = /(?:lun|mar|mi[eé]|jue|vie|s[aá]b|dom)\.?\s+(\d{1,2})\s+(ene|feb|mar|abr|may|jun|jul|ago|sep|set|sept|oct|nov|dic)\.?\s*(\d{1,2}:\d{2})?/i;
        let dateIdx = -1;
        innerLines.forEach((l, i) => {
          const m = l.match(dateRegex);
          if (m && dateIdx === -1) {
            dateIdx = i;
            dateLine = l;
            const dd = m[1].padStart(2, "0");
            const monthKey = m[2].toLowerCase().slice(0,3);
            const mm = monthMap[monthKey] || "";
            if (mm) fechaISO = `${dd}-${mm}`; // sin año, se completa después
            if (m[3]) kickTime = m[3];
          }
        });

        // Sacar líneas no-fecha
        const nonDateLines = innerLines.filter((_, i) => i !== dateIdx);

        // Detectar si hay "Vs" en alguna línea (sin jugar todavía)
        const vsIdx = nonDateLines.findIndex(l => /^v(s|\.)?$/i.test(l.trim()));
        if (vsIdx >= 0) {
          // Formato: [local, "Vs", visitante]
          local = nonDateLines[vsIdx - 1] || "";
          visitante = nonDateLines[vsIdx + 1] || "";
        } else {
          // Sin "Vs" → puede ser ya jugado con marcador, o local sin partido (fecha libre)
          // Filtramos solo las líneas que NO son números (los goles)
          const teamLines = nonDateLines.filter(l => !/^\d+$/.test(l.trim()));
          // Posibles casos:
          //   teamLines = ["LANUS", "G. Y ESGRIMA B"] → marcador (local + visitante)
          //   teamLines = ["G. Y ESGRIMA B"] → fecha rara sin rival visible
          if (teamLines.length >= 2) {
            local = teamLines[0];
            visitante = teamLines[teamLines.length - 1];
          } else if (teamLines.length === 1) {
            local = teamLines[0];
            visitante = "";
          }
        }

        blocks.push({
          fecha_num: block.fecha_num,
          fechaISO,                       // "DD-MM" (sin año)
          kick_time: kickTime,
          localRaw: local.trim(),
          visitanteRaw: visitante.trim(),
        });
        current = null;
      };

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;
        const mFecha = line.match(/^Fecha\s+(\d+)\s*$/i);
        if (mFecha) {
          flushBlock();
          current = { fecha_num: parseInt(mFecha[1]), lines: [] };
          continue;
        }
        if (current) {
          current.lines.push(line);
        }
      }
      flushBlock();

      return blocks;
    }

    // Convierte los bloques AAHBA en fechas con la perspectiva del equipo propio
    async function aahbaBlocksToFechas(blocks, ownTeam, year, defaults = {}) {
      const fechas = [];
      // Calcular rivales de visitante para hacer batch lookup
      const visitorRivals = [];
      for (const b of blocks) {
        const isLocal = b.localRaw === ownTeam;
        const isVisit = b.visitanteRaw === ownTeam;
        if (isVisit) visitorRivals.push(b.localRaw);
        else if (!isLocal) visitorRivals.push(b.localRaw || b.visitanteRaw);
      }
      const rivalesGlobales = await findRivalesGlobalBatch(visitorRivals);

      for (const b of blocks) {
        const isLocal = b.localRaw === ownTeam;
        const isVisit = b.visitanteRaw === ownTeam;
        let condition = "Local";
        let rival = "";

        if (isLocal) {
          condition = "Local";
          rival = b.visitanteRaw || "";
        } else if (isVisit) {
          condition = "Visitante";
          rival = b.localRaw || "";
        } else {
          rival = b.localRaw || b.visitanteRaw || "";
          condition = "Local";
        }

        if (!rival) rival = "LIBRE";

        let fechaIso = "";
        if (b.fechaISO) {
          const [dd, mm] = b.fechaISO.split("-");
          fechaIso = `${year}-${mm}-${dd}`;
        }

        const kickTime = b.kick_time || defaults.default_kick_time || "";
        const citacionTime = defaults.default_citacion_time || "";

        // Location y maps_url: si soy local → defaults del club; si soy visitante → tabla global de rivales
        let location = "";
        let mapsUrl = "";
        let fromGlobal = false;
        if (condition === "Local") {
          location = defaults.default_cancha || "";
          mapsUrl = defaults.default_maps_url || "";
        } else if (condition === "Visitante") {
          const key = normalizeRivalName(rival);
          const globalData = rivalesGlobales[key];
          if (globalData) {
            location = globalData.cancha || "";
            mapsUrl = globalData.maps_url || "";
            fromGlobal = true;
          }
        }

        fechas.push({
          fecha_num: b.fecha_num,
          rueda: defaults.default_rueda || 1,
          fecha_date: fechaIso,
          rival,
          condition,
          location,
          maps_url: mapsUrl,
          kick_time: kickTime,
          citacion_time: citacionTime,
          _autoLocation: !!location,
          _autoMaps: !!mapsUrl,
          _autoKick: !b.kick_time && !!kickTime,
          _autoCitacion: !!citacionTime,
          _fromGlobal: fromGlobal,
          _hasNoDate: !fechaIso,
          _isLibre: rival === "LIBRE",
        });
      }
      return fechas;
    }

    // Parser de formato línea simple (1 fecha por línea)
    async function parseSimpleLines(text, defaults = {}) {
      const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
      const fechasRaw = [];
      const currentYear = new Date().getFullYear();
      let autoFechaNum = 1;

      for (const line of lines) {
        const parts = line.split(/\s*[\-|]\s*|,(?!\d)/).map(p => p.trim()).filter(Boolean);
        if (parts.length === 0) continue;

        let fecha_num = null;
        let rueda = defaults.default_rueda || 1;
        let fecha_date = "";
        let rival = "";
        let condition = "Local";
        let location = "";
        let kick_time = "";
        let citacion_time = "";
        const usados = new Set();

        parts.forEach((p, idx) => {
          if (idx === 0 && !fecha_num) {
            const m1 = p.match(/^(?:F|Fecha|Fha)\s*(\d+)/i);
            const m2 = p.match(/^(\d+)°?$/);
            if (m1) { fecha_num = parseInt(m1[1]); usados.add(idx); return; }
            if (m2 && parseInt(m2[1]) <= 50) { fecha_num = parseInt(m2[1]); usados.add(idx); return; }
          }
          const mR = p.match(/^(?:R|Rueda)\s*(\d+)/i);
          if (mR) { rueda = parseInt(mR[1]); usados.add(idx); return; }
          const mDate = p.match(/^(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?$/);
          if (mDate && !fecha_date) {
            const d = mDate[1].padStart(2, "0");
            const mo = mDate[2].padStart(2, "0");
            let y = mDate[3] || String(currentYear);
            if (y.length === 2) y = "20" + y;
            fecha_date = `${y}-${mo}-${d}`;
            usados.add(idx); return;
          }
          if (/^(local|l)$/i.test(p)) { condition = "Local"; usados.add(idx); return; }
          if (/^(visitante|visit|v)$/i.test(p)) { condition = "Visitante"; usados.add(idx); return; }
          if (/^\d{1,2}:\d{2}$/.test(p)) {
            if (!citacion_time && !kick_time) kick_time = p;
            else if (citacion_time && !kick_time) kick_time = p;
            else if (!citacion_time && kick_time) {
              const [h1] = kick_time.split(":").map(Number);
              const [h2] = p.split(":").map(Number);
              if (h2 > h1) { citacion_time = kick_time; kick_time = p; }
              else citacion_time = p;
            }
            usados.add(idx); return;
          }
          if (!rival) {
            const mVs = p.match(/^v(?:s|\.)?\s+(.+)$/i);
            if (mVs) { rival = mVs[1].trim(); usados.add(idx); return; }
          }
        });

        parts.forEach((p, idx) => {
          if (usados.has(idx)) return;
          if (!rival) { rival = p; usados.add(idx); return; }
          if (!location) { location = p; usados.add(idx); return; }
        });

        if (!fecha_num) fecha_num = autoFechaNum;
        autoFechaNum = Math.max(autoFechaNum, fecha_num) + 1;
        if (!rival) continue;

        fechasRaw.push({ fecha_num, rueda, fecha_date, rival, condition, location, kick_time, citacion_time });
      }

      // Batch lookup de rivales visitantes
      const visitorRivals = fechasRaw.filter(f => f.condition === "Visitante" && !f.location).map(f => f.rival);
      const rivalesGlobales = await findRivalesGlobalBatch(visitorRivals);

      const fechas = [];
      for (const f of fechasRaw) {
        let finalLocation = f.location;
        let finalMaps = "";
        let fromGlobal = false;
        let autoLocation = false;
        let autoMaps = false;

        if (f.condition === "Local") {
          if (!finalLocation) {
            finalLocation = defaults.default_cancha || "";
            autoLocation = !!finalLocation;
          }
          finalMaps = defaults.default_maps_url || "";
        } else {
          // Visitante: si no hay location en el texto, intentar de tabla global
          if (!finalLocation) {
            const key = normalizeRivalName(f.rival);
            const globalData = rivalesGlobales[key];
            if (globalData) {
              finalLocation = globalData.cancha || "";
              finalMaps = globalData.maps_url || "";
              fromGlobal = true;
              autoLocation = !!finalLocation;
              autoMaps = !!finalMaps;
            }
          }
        }

        const finalKick = f.kick_time || defaults.default_kick_time || "";
        const finalCitacion = f.citacion_time || defaults.default_citacion_time || "";

        fechas.push({
          fecha_num: f.fecha_num,
          rueda: f.rueda,
          fecha_date: f.fecha_date,
          rival: f.rival,
          condition: f.condition,
          location: finalLocation,
          maps_url: finalMaps,
          kick_time: finalKick,
          citacion_time: finalCitacion,
          _autoLocation: autoLocation,
          _autoMaps: autoMaps,
          _autoKick: !f.kick_time && !!finalKick,
          _autoCitacion: !f.citacion_time && !!finalCitacion,
          _fromGlobal: fromGlobal,
          _hasNoDate: !f.fecha_date,
          _isLibre: false,
        });
      }
      return fechas;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  RIVALES GLOBALES · helpers de normalización y lookup
    // ═══════════════════════════════════════════════════════════════════════════

    // Normaliza nombre de rival para match flexible:
    // - minúsculas
    // - sin acentos
    // - sin signos de puntuación
    // - sin espacios
    // Ej: "S. Fernando H.C." → "sfernandohc", "SAN FERNANDO" → "sanfernando"
    function normalizeRivalName(name) {
      if (!name) return "";
      return name
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // saca acentos
        .replace(/[^a-z0-9]/g, ""); // saca todo lo no alfanumérico
    }

    // Busca un rival en la tabla global por nombre normalizado.
    // Devuelve el registro EXACTO si existe.
    async function findRivalGlobal(rivalName) {
      const key = normalizeRivalName(rivalName);
      if (!key) return null;
      const { data, error } = await sb.from("rivales_globales")
        .select("*").eq("nombre_key", key).maybeSingle();
      if (error) { console.error("Error buscando rival:", error); return null; }
      return data;
    }

    // Busca un rival y sus posibles variantes (multi-sede).
    // Por ejemplo, si pasás "SIC" → devuelve "sic", "sic-anexo", "sic-b", etc.
    // Devuelve array (puede estar vacío).
    async function findRivalGlobalVariants(rivalName) {
      const key = normalizeRivalName(rivalName);
      if (!key) return [];
      // Match exacto + variantes que empiezan con el key (ej: "sic" → "sic", "sic-anexo")
      const { data, error } = await sb.from("rivales_globales")
        .select("*")
        .or(`nombre_key.eq.${key},nombre_key.like.${key}-%`)
        .order("nombre_key", { ascending: true });
      if (error) { console.error("Error buscando variantes:", error); return []; }
      return data || [];
    }

    // Crea o actualiza un rival en la tabla global (upsert por nombre_key).
    // Si ya existe con esa key, actualiza cancha y maps_url (los datos más recientes ganan).
    async function upsertRivalGlobal(rivalName, cancha, mapsUrl, email) {
      const key = normalizeRivalName(rivalName);
      if (!key) return null;
      // Si tanto cancha como maps están vacíos, no vale la pena guardar
      if (!cancha?.trim() && !mapsUrl?.trim()) return null;

      // Primero buscar si existe
      const existing = await findRivalGlobal(rivalName);
      if (existing) {
        // Actualizar solo si nuestros datos aportan algo (no pisar con vacíos)
        const newCancha = cancha?.trim() || existing.cancha;
        const newMaps = mapsUrl?.trim() || existing.maps_url;
        if (newCancha === existing.cancha && newMaps === existing.maps_url) {
          return existing; // nada que actualizar
        }
        const { data, error } = await sb.from("rivales_globales")
          .update({ cancha: newCancha, maps_url: newMaps, updated_by: email })
          .eq("id", existing.id).select().single();
        if (error) { console.error("Error actualizando rival:", error); return existing; }
        return data;
      } else {
        const { data, error } = await sb.from("rivales_globales")
          .insert({
            nombre_display: rivalName.trim(),
            nombre_key: key,
            cancha: cancha?.trim() || "",
            maps_url: mapsUrl?.trim() || "",
            created_by: email,
          }).select().single();
        if (error) { console.error("Error creando rival:", error); return null; }
        return data;
      }
    }

    // Busca múltiples rivales de una sola consulta (más eficiente para import masivo)
    async function findRivalesGlobalBatch(rivalNames) {
      const keys = [...new Set(rivalNames.map(normalizeRivalName).filter(Boolean))];
      if (keys.length === 0) return {};
      const { data, error } = await sb.from("rivales_globales").select("*").in("nombre_key", keys);
      if (error) { console.error("Error buscando rivales batch:", error); return {}; }
      const byKey = {};
      (data || []).forEach(r => { byKey[r.nombre_key] = r; });
      return byKey;
    }

    function formatDateForDisplay(isoDate) {
      if (!isoDate) return "—";
      const [y, m, d] = isoDate.split("-");
      return `${d}/${m}/${y}`;
    }

    // Formatea fecha ISO ("2026-04-05") como "Domingo 5 de Abril, 2026"
    function formatDateLong(isoDate) {
      if (!isoDate) return null;
      const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
      const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      const [y, m, d] = isoDate.split("-").map(Number);
      const dt = new Date(Date.UTC(y, m-1, d));
      return `${dias[dt.getUTCDay()]} ${d} de ${meses[m-1]}, ${y}`;
    }

    //  CLUB DEFAULTS EDITOR

          </Field>

            <input type="text" value={data.default_maps_url} onChange={e => u("default_maps_url", e.target.value)} style={inputStyle} placeholder="https://maps.google.com/..."/>
          </Field>

            <input type="text" value={data.default_kick_time} onChange={e => u("default_kick_time", e.target.value)} style={inputStyle} placeholder="HH:MM"/>
          </Field>
          <Field label="Hora de citación habitual" hint='Ej: "10:45". Generalmente 45 min antes del inicio.'>
            <input type="text" value={data.default_citacion_time} onChange={e => u("default_citacion_time", e.target.value)} style={inputStyle} placeholder="HH:MM"/>
          </Field>
          <Field label="Rueda por defecto" hint="Para fechas que no aclaran a qué rueda pertenecen.">

              <option value="1">Rueda 1</option>

        </div>
      );
