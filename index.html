    // ═══════════════════════════════════════════════════════════════════════════
    //  HOCKEY FIELD · SVG de la cancha con fichitas en posiciones
    //  Props:
    //    formacion: string (4-3-3, 4-4-2, 3-4-3)
    //    titulares: [{ jugador_id, jugador, field_pos }]  // jugadores con field_pos asignada
    //    suplentes: [{ jugador_id, jugador }]              // SUB
    //    themeColor: color del club (para títulos)
    //    onTitularClick / onSuplenteClick: (jugador_id) => void  // opcional para admin
    // ═══════════════════════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════════════════════
    //  DRAGGABLE HOCKEY FIELD · solo para admin
    //  Cancha SVG donde el admin arrastra fichas y se asignan a la posición
    //  más cercana de la formación (snap). Si suelta fuera del campo, va a SUB.
    //  Soporta mouse y touch.
    // ═══════════════════════════════════════════════════════════════════════════
    function DraggableHockeyField({ formacion, convocados, rowOf, themeColor = "var(--plat)", onPosicionChange, onClearAll }) {
      const positions = getFormationPositions(formacion);
      const W = 320, H = 520; // un poco más alto para que entren los suplentes abajo
      const pad = 18;
      const fw = W - pad * 2;
      const fh = 460 - pad * 2; // alto de la cancha (resto es la "zona de suplentes")
      const SUB_ZONE_Y = 460; // a partir de acá es zona de suplentes

      // Mapa de fichas con su posición actual { jugador_id: {x, y} } en coords SVG
      // Si está en SUB o sin asignar → x/y se calcula sobre la zona de suplentes
      // Si está en cancha → coordenadas de la posición correspondiente
      const svgRef = useRef(null);
      const [dragging, setDragging] = useState(null); // { jugadorId, x, y, originPos }

      // Suplentes que se acomodan en la fila de abajo
      const subs = convocados.filter(j => {
        const r = rowOf(j.id);
        return r?.es_titular === false || r?.field_pos === "SUB" || (r?.field_pos == null && r?.es_titular == null);
      });
      // Posición visual de cada suplente (en grilla)
      const subPositionOf = (idx) => {
        const colCount = Math.max(4, Math.ceil(subs.length / 2));
        const col = idx % colCount;
        const row = Math.floor(idx / colCount);
        const cellW = fw / colCount;
        const cellH = 28;
        return {
          x: pad + col * cellW + cellW / 2,
          y: SUB_ZONE_Y + 22 + row * cellH,
        };
      };

      // Coordenadas en SVG (px) para una fichita por jugador
      const pxOf = (jugador) => {
        const r = rowOf(jugador.id);
        if (r?.es_titular === true && r?.field_pos && positions[r.field_pos]) {
          const p = positions[r.field_pos];
          return {
            x: pad + (p.x / 100) * fw,
            y: pad + (p.y / 100) * (fh),
          };
        }
        // Es suplente o sin asignar → ubicación en zona de suplentes
        const idx = subs.findIndex(s => s.id === jugador.id);
        return subPositionOf(idx >= 0 ? idx : 0);
      };

      // Detectar la posición de la cancha MÁS CERCANA a (x, y)
      // Devuelve clave (GK, LB, etc.) o null si está en zona suplentes
      const closestPosition = (x, y) => {
        if (y >= SUB_ZONE_Y - 10) return null; // está abajo → suplente
        let best = null;
        let bestDist = Infinity;
        for (const [key, p] of Object.entries(positions)) {
          const px = pad + (p.x / 100) * fw;
          const py = pad + (p.y / 100) * fh;
          const d = Math.hypot(px - x, py - y);
          if (d < bestDist) { bestDist = d; best = key; }
        }
        return best;
      };

      // ─── Helpers de evento (mouse / touch unificados) ─────────────────────────
      const getEventPoint = (e) => {
        const svg = svgRef.current;
        if (!svg) return { x: 0, y: 0 };
        const rect = svg.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        // Convertir a coordenadas del viewBox
        return {
          x: ((clientX - rect.left) / rect.width) * W,
          y: ((clientY - rect.top) / rect.height) * H,
        };
      };

      const handlePointerDown = (jugador) => (e) => {
        e.preventDefault();
        const p = getEventPoint(e);
        const r = rowOf(jugador.id);
        const originPos = r?.es_titular === true ? r.field_pos : "SUB";
        setDragging({ jugadorId: jugador.id, x: p.x, y: p.y, originPos });
      };

      // Mover el drag (window events para que no se pierda si el cursor sale del SVG)
      useEffect(() => {
        if (!dragging) return;
        const move = (e) => {
          const p = getEventPoint(e);
          setDragging(d => d ? { ...d, x: p.x, y: p.y } : null);
          if (e.cancelable) e.preventDefault();
        };
        const up = () => {
          if (!dragging) return;
          // Decidir destino
          const target = closestPosition(dragging.x, dragging.y);
          if (target === null) {
            // Fuera de cancha → suplente (solo si venía de cancha)
            if (dragging.originPos !== "SUB") {
              onPosicionChange(dragging.jugadorId, "SUB");
            }
          } else {
            // Sobre cancha → snap a target
            if (dragging.originPos !== target) {
              onPosicionChange(dragging.jugadorId, target);
            }
          }
          setDragging(null);
        };
        window.addEventListener("mousemove", move);
        window.addEventListener("touchmove", move, { passive: false });
        window.addEventListener("mouseup", up);
        window.addEventListener("touchend", up);
        return () => {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("touchmove", move);
          window.removeEventListener("mouseup", up);
          window.removeEventListener("touchend", up);
        };
      }, [dragging]);

      // Render auxiliar: ficha
      const renderFicha = (jugador, posKey) => {
        const isDragging = dragging?.jugadorId === jugador.id;
        const isGK = posKey === "GK";
        const isSub = !posKey || posKey === "SUB";
        const pos = isDragging ? { x: dragging.x, y: dragging.y } : pxOf(jugador);
        const fillColor = isSub ? "var(--red)" : (isGK ? "var(--gold)" : themeColor);
        // Fichas titulares más grandes que suplentes (para mobile más fácil de agarrar)
        const r = isSub ? 16 : 19;
        const hitR = 28; // zona invisible de touch/click (más grande para móvil)
        const apellido = (jugador.nombre || "").split(",")[0].split(" ")[0].slice(0, 10);
        return (
          <g key={jugador.id} style={{cursor: isDragging ? "grabbing" : "grab", touchAction:"none"}}
             onMouseDown={handlePointerDown(jugador)}
             onTouchStart={handlePointerDown(jugador)}
             opacity={isDragging ? 0.85 : 1}>
            {/* Zona invisible de hit (más grande que la ficha visual) */}
            <circle cx={pos.x} cy={pos.y} r={hitR} fill="transparent" pointerEvents="all"/>
            {/* Ficha visible */}
            <circle cx={pos.x} cy={pos.y} r={r}
              fill={fillColor} stroke="var(--bg)" strokeWidth={2}
              style={{filter: isDragging ? "drop-shadow(0 4px 10px rgba(0,0,0,0.6))" : "none"}}
              pointerEvents="none"/>
            <text x={pos.x} y={pos.y + 5} textAnchor="middle"
              fontSize={isSub ? 13 : 15} fontWeight={900} fontFamily="var(--mono)" fill="var(--bg)" pointerEvents="none">
              {jugador.numero ?? "?"}
            </text>
            {!isDragging && (
              <text x={pos.x} y={pos.y + r + 11} textAnchor="middle"
                fontSize={9} fontWeight={700} fill="var(--white-soft)" fontFamily="var(--mono)" pointerEvents="none">
                {apellido.toUpperCase()}
              </text>
            )}
          </g>
        );
      };

      // Renderizar todas las fichas: las que están en cancha y las suplentes (en la zona inferior)
      // Importante: las fichas se renderizan en orden, la que arrastras al final (para que quede arriba)
      const sortedConv = [...convocados].sort((a, b) => {
        if (dragging?.jugadorId === a.id) return 1;
        if (dragging?.jugadorId === b.id) return -1;
        return 0;
      });

      // Hay al menos un titular?
      const hayTitulares = convocados.some(j => rowOf(j.id)?.es_titular === true);

      return (
        <div>
          <div style={{display:"flex", gap:8, marginBottom:8, alignItems:"stretch"}}>
            <div style={{flex:1, padding:"6px 10px", background:"rgba(45,157,111,0.08)", border:"1px solid rgba(45,157,111,0.25)", borderRadius:4, fontSize:11, color:"var(--white-soft)", display:"flex", alignItems:"center", gap:8}}>
              <span style={{fontSize:14}}>🤚</span>
              <span>Arrastrá las fichas a la cancha · fuera del campo → suplente</span>
            </div>
            {hayTitulares && onClearAll && (
              <button onClick={() => {
                if (confirm("¿Sacar todas las fichas de la cancha y mandarlas a suplentes?")) {
                  onClearAll();
                }
              }} style={{
                padding:"6px 12px", fontSize:10, fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700,
                background:"rgba(232,85,85,0.08)", border:"1px solid rgba(232,85,85,0.3)",
                color:"var(--red)", borderRadius:4, cursor:"pointer", flexShrink:0,
                display:"flex", alignItems:"center", gap:5
              }}>
                🧹 LIMPIAR
              </button>
            )}
          </div>
          <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{display:"block", width:"100%", height:"auto", userSelect:"none"}}>
            {/* Cancha (fondo) */}
            <rect x={pad} y={pad} width={fw} height={fh} fill="rgba(45,157,111,0.10)" stroke="rgba(255,255,255,0.20)" strokeWidth={1.5} rx={4}/>
            {/* Línea de mediocampo */}
            <line x1={pad} y1={pad + fh/2} x2={pad + fw} y2={pad + fh/2} stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>
            {/* Líneas de 23m (punteadas) */}
            <line x1={pad} y1={pad + fh * 0.252} x2={pad + fw} y2={pad + fh * 0.252} stroke="rgba(255,255,255,0.30)" strokeWidth={1} strokeDasharray="4,3"/>
            <line x1={pad} y1={pad + fh * 0.748} x2={pad + fw} y2={pad + fh * 0.748} stroke="rgba(255,255,255,0.30)" strokeWidth={1} strokeDasharray="4,3"/>
            {/* Área propia (semicírculo abajo, la D de hockey) */}
            <path d={`M ${pad + fw/2 - 0.30*fw} ${pad + fh} A ${0.30*fw} ${0.16*fh} 0 0 1 ${pad + fw/2 + 0.30*fw} ${pad + fh}`}
              fill="none" stroke="rgba(255,255,255,0.40)" strokeWidth={1.2}/>
            {/* Área rival (semicírculo arriba) */}
            <path d={`M ${pad + fw/2 - 0.30*fw} ${pad} A ${0.30*fw} ${0.16*fh} 0 0 0 ${pad + fw/2 + 0.30*fw} ${pad}`}
              fill="none" stroke="rgba(255,255,255,0.40)" strokeWidth={1.2}/>
            {/* Arcos */}
            <line x1={pad + fw/2 - 0.06*fw} y1={pad + fh} x2={pad + fw/2 + 0.06*fw} y2={pad + fh}
              stroke="rgba(255,255,255,0.8)" strokeWidth={3}/>
            <line x1={pad + fw/2 - 0.06*fw} y1={pad} x2={pad + fw/2 + 0.06*fw} y2={pad}
              stroke="rgba(255,255,255,0.8)" strokeWidth={3}/>

            {/* Posiciones fantasma (círculos grises punteados) */}
            {(() => {
              // Si estoy arrastrando algo, calcular cuál es la posición más cercana para resaltarla
              const highlightedPos = dragging ? closestPosition(dragging.x, dragging.y) : null;
              return Object.entries(positions).map(([key, p]) => {
                const cx = pad + (p.x / 100) * fw;
                const cy = pad + (p.y / 100) * fh;
                const isHighlight = key === highlightedPos;
                return (
                  <g key={key}>
                    <circle cx={cx} cy={cy} r={22}
                      fill={isHighlight ? `${themeColor}26` : "none"}
                      stroke={isHighlight ? themeColor : "rgba(255,255,255,0.15)"}
                      strokeWidth={isHighlight ? 2 : 1}
                      strokeDasharray={isHighlight ? "0" : "3 3"}/>
                    <text x={cx} y={cy + 4} textAnchor="middle"
                      fontSize={9} fontWeight={700}
                      fill={isHighlight ? themeColor : "rgba(255,255,255,0.30)"}
                      fontFamily="var(--mono)" pointerEvents="none">
                      {key}
                    </text>
                  </g>
                );
              });
            })()}

            {/* Línea divisoria: zona de suplentes */}
            <line x1={0} y1={SUB_ZONE_Y} x2={W} y2={SUB_ZONE_Y} stroke="rgba(255,255,255,0.20)" strokeWidth={1} strokeDasharray="3 3"/>
            <text x={W/2} y={SUB_ZONE_Y + 12} textAnchor="middle"
              fontSize={8} fontWeight={700} fill="rgba(255,255,255,0.4)" fontFamily="var(--mono)" letterSpacing={2}>
              SUPLENTES
            </text>

            {/* Fichas (jugadores) */}
            {sortedConv.map(j => renderFicha(j, rowOf(j.id)?.field_pos))}
          </svg>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  JERSEY HOCKEY FIELD · vista pública estilo LineUp11
    //  Reemplaza los círculos por camisetas SVG. Solo para mostrar (no editable).
    // ═══════════════════════════════════════════════════════════════════════════
    function JerseyHockeyField({ formacion, titulares, suplentes, club }) {
      const positions = getFormationPositions(formacion);
      const W = 320, H = 580;
      const pad = 14;
      const fw = W - pad * 2;
      const fh = 440; // alto de la cancha (resto es zona suplentes)
      const SUB_ZONE_Y = fh + pad + 30; // dejo un margen para la línea divisoria

      const titularColor = club.theme_primary || "#4FC3E8";
      const detailColor = club.theme_secondary || "#FFD700";
      const arqueroColor = "#34C759"; // verde, como en LineUp11

      // Mapa de posiciones asignadas
      const posMap = {};
      for (const t of titulares) {
        if (t.field_pos && positions[t.field_pos]) {
          posMap[t.field_pos] = t;
        }
      }

      // Helper para dibujar una camiseta SVG (path) en (cx, cy)
      // cx, cy = centro del pecho de la camiseta
      // color = color principal del cuerpo
      // accent = color del cuello / detalles
      const Jersey = ({ cx, cy, color, accent, scale = 1 }) => {
        const w = 32 * scale;
        const h = 32 * scale;
        // Path: simplificación de una remera con mangas + cuerpo
        // Origen de coords: centro horizontal en cx, top de la remera en cy - h*0.4
        const x = cx - w / 2;
        const y = cy - h * 0.45;
        // path de la camiseta: mangas exteriores + cuerpo
        const d = `
          M ${x + w * 0.18} ${y}
          L ${x} ${y + h * 0.15}
          L ${x + w * 0.05} ${y + h * 0.42}
          L ${x + w * 0.22} ${y + h * 0.36}
          L ${x + w * 0.22} ${y + h * 0.95}
          Q ${x + w * 0.22} ${y + h * 1.0} ${x + w * 0.28} ${y + h * 1.0}
          L ${x + w * 0.72} ${y + h * 1.0}
          Q ${x + w * 0.78} ${y + h * 1.0} ${x + w * 0.78} ${y + h * 0.95}
          L ${x + w * 0.78} ${y + h * 0.36}
          L ${x + w * 0.95} ${y + h * 0.42}
          L ${x + w} ${y + h * 0.15}
          L ${x + w * 0.82} ${y}
          L ${x + w * 0.62} ${y}
          Q ${x + w * 0.5} ${y + h * 0.10} ${x + w * 0.38} ${y}
          Z
        `;
        // pequeño detalle de cuello tipo "V"
        const dCollar = `
          M ${x + w * 0.38} ${y}
          Q ${x + w * 0.5} ${y + h * 0.13} ${x + w * 0.62} ${y}
        `;
        return (
          <g>
            <path d={d} fill={color} stroke="rgba(0,0,0,0.25)" strokeWidth={0.8}/>
            <path d={dCollar} fill="none" stroke={accent} strokeWidth={1.2}/>
          </g>
        );
      };

      // Ubicación en SVG de cada posición
      const titularXY = (fp) => {
        const p = positions[fp];
        if (!p) return null;
        return {
          x: pad + (p.x / 100) * fw,
          y: pad + (p.y / 100) * fh,
        };
      };

      // Suplentes acomodados en grilla
      const subPositionOf = (idx, total) => {
        const colCount = Math.max(4, Math.ceil(total / 2));
        const col = idx % colCount;
        const row = Math.floor(idx / colCount);
        const cellW = fw / colCount;
        return {
          x: pad + col * cellW + cellW / 2,
          y: SUB_ZONE_Y + 24 + row * 56,
        };
      };

      // Apellido visible (completo, primer apellido si es "Apellido, Nombre")
      const apellidoDe = (jugador) => {
        const n = (jugador.nombre || "").trim();
        if (n.includes(",")) return n.split(",")[0].trim();
        return n.split(/\s+/)[0] || "—";
      };

      return (
        <div style={{width:"100%", margin:"0 auto"}}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{display:"block", width:"100%", height:"auto"}}>
            {/* Gradiente del campo (verde oscuro arriba, más claro abajo) */}
            <defs>
              <linearGradient id="fieldGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#1a4d3a"/>
                <stop offset="100%" stopColor="#2d6b50"/>
              </linearGradient>
            </defs>

            {/* Cancha */}
            <rect x={pad} y={pad} width={fw} height={fh}
              fill="url(#fieldGradient)" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5} rx={4}/>

            {/* Líneas de mediocampo, 23m, área */}
            <line x1={pad} y1={pad + fh/2} x2={pad + fw} y2={pad + fh/2}
              stroke="rgba(255,255,255,0.20)" strokeWidth={1}/>
            <line x1={pad} y1={pad + fh * 0.26} x2={pad + fw} y2={pad + fh * 0.26}
              stroke="rgba(255,255,255,0.10)" strokeWidth={0.8} strokeDasharray="4 4"/>
            <line x1={pad} y1={pad + fh * 0.74} x2={pad + fw} y2={pad + fh * 0.74}
              stroke="rgba(255,255,255,0.10)" strokeWidth={0.8} strokeDasharray="4 4"/>

            {/* Círculo central */}
            <circle cx={pad + fw/2} cy={pad + fh/2} r={fw*0.13}
              fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>

            {/* Área grande inferior (D del shooting circle) */}
            <path d={`M ${pad + fw/2 - fw*0.30} ${pad + fh*0.99} Q ${pad + fw/2} ${pad + fh*0.78} ${pad + fw/2 + fw*0.30} ${pad + fh*0.99}`}
              fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={1}/>

            {/* Arco */}
            <rect x={pad + fw/2 - fw*0.08} y={pad - 2} width={fw*0.16} height={6}
              fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.3)" strokeWidth={0.5}/>

            {/* TITULARES */}
            {Object.entries(positions).map(([key, p]) => {
              const t = posMap[key];
              const xy = titularXY(key);
              if (!xy) return null;
              if (!t) {
                // Fantasma (sin asignar)
                return (
                  <g key={key}>
                    <circle cx={xy.x} cy={xy.y} r={14}
                      fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth={1} strokeDasharray="2 3"/>
                    <text x={xy.x} y={xy.y + 3} textAnchor="middle"
                      fontSize={8} fontWeight={700} fill="rgba(255,255,255,0.30)" fontFamily="var(--mono)">
                      {key}
                    </text>
                  </g>
                );
              }
              const isGK = key === "GK";
              return (
                <g key={key}>
                  <Jersey cx={xy.x} cy={xy.y} color={isGK ? arqueroColor : titularColor} accent={detailColor}/>
                  <text x={xy.x} y={xy.y + 28} textAnchor="middle"
                    fontSize={11} fontWeight={700} fill="#FFFFFF"
                    style={{textShadow:"0 1px 3px rgba(0,0,0,0.7)"}}>
                    {apellidoDe(t.jugador)}
                  </text>
                </g>
              );
            })}

            {/* Línea divisoria suplentes */}
            <line x1={0} y1={SUB_ZONE_Y - 4} x2={W} y2={SUB_ZONE_Y - 4}
              stroke="rgba(255,255,255,0.15)" strokeWidth={1} strokeDasharray="3 3"/>
            <text x={W/2} y={SUB_ZONE_Y + 8} textAnchor="middle"
              fontSize={9} fontWeight={700} fill="rgba(255,255,255,0.5)" fontFamily="var(--mono)" letterSpacing={2.5}>
              SUPLENTES
            </text>

            {/* SUPLENTES */}
            {suplentes.map((s, i) => {
              const xy = subPositionOf(i, suplentes.length);
              return (
                <g key={s.jugador_id}>
                  <Jersey cx={xy.x} cy={xy.y} color={titularColor} accent={detailColor} scale={0.78}/>
                  <text x={xy.x} y={xy.y + 23} textAnchor="middle"
                    fontSize={9} fontWeight={700} fill="rgba(255,255,255,0.85)"
                    style={{textShadow:"0 1px 2px rgba(0,0,0,0.7)"}}>
                    {apellidoDe(s.jugador)}
                  </text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    function HockeyField({ formacion, titulares, suplentes, themeColor = "var(--plat)", onTitularClick, onSuplenteClick, emptySlotsCount = 5 }) {
      const positions = getFormationPositions(formacion);
      const W = 320, H = 480;
      const pad = 18;
      const fw = W - pad * 2;
      const fh = H - pad * 2;
      const SUB_W = W;
      const SUB_H = 64;

      // Mapeo de posiciones asignadas: { fieldPos: titularObject }
      const posMap = {};
      for (const t of titulares) {
        if (t.field_pos && positions[t.field_pos]) {
          posMap[t.field_pos] = t;
        }
      }

      // Suplentes a renderizar: los reales + circulos vacíos hasta llenar el "emptySlotsCount"
      const benchSlots = Math.max(suplentes.length, emptySlotsCount);
      const benchSpacing = SUB_W / (benchSlots + 1);

      return (
        <div style={{width:"100%", maxWidth:380, margin:"0 auto"}}>
          {/* ── Suplentes (solo nombres, 1 o 2 líneas según cantidad) ─────────── */}
          {suplentes.length > 0 && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9, letterSpacing:3, color:"var(--white-dim)", fontFamily:"var(--mono)", textAlign:"center", marginBottom:8, fontWeight:600}}>
                SUPLENTES ({suplentes.length})
              </div>
              <div style={{
                display:"flex", flexWrap:"wrap", justifyContent:"center", gap:"5px 8px",
                padding:"8px 10px", background:"rgba(232,85,85,0.08)",
                border:"1px solid rgba(232,85,85,0.25)", borderRadius:6,
                fontSize:11, lineHeight:1.3, color:"var(--white-soft)"
              }}>
                {suplentes.map((sup, i) => (
                  <span key={sup.jugador_id || i}
                    onClick={onSuplenteClick ? () => onSuplenteClick(sup.jugador_id) : undefined}
                    style={{
                      cursor: onSuplenteClick ? "pointer" : "default",
                      whiteSpace:"nowrap"
                    }}>
                    {sup.jugador?.numero != null && (
                      <span style={{color:"#E85555", fontWeight:700, fontFamily:"var(--mono)", marginRight:4}}>
                        #{sup.jugador.numero}
                      </span>
                    )}
                    <span style={{fontWeight:600}}>{apellidoCorto(sup.jugador?.nombre) || "—"}</span>
                  </span>
                )).reduce((acc, el, i) => i === 0 ? [el] : [...acc, <span key={`sep-${i}`} style={{color:"rgba(255,255,255,0.25)"}}>·</span>, el], [])}
              </div>
            </div>
          )}

          {/* ── Campo ─────────────────────────────────────────────── */}
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", display:"block"}}>
            <defs>
              <linearGradient id="grass-bg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#1e7a1e"/>
                <stop offset="50%" stopColor="#228b22"/>
                <stop offset="100%" stopColor="#1e7a1e"/>
              </linearGradient>
            </defs>

            {/* Fondo fuera del campo */}
            <rect x="0" y="0" width={W} height={H} fill="#0f3d0f"/>
            {/* Cancha */}
            <rect x={pad} y={pad} width={fw} height={fh} fill="url(#grass-bg)" rx="2"/>

            {/* Borde del campo */}
            <rect x={pad} y={pad} width={fw} height={fh} fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth="1.5"/>

            {/* Línea central (continua) */}
            <line x1={pad} y1={H/2} x2={W-pad} y2={H/2} stroke="rgba(255,255,255,0.9)" strokeWidth="1.5"/>

            {/* Línea de 23m (punteada) — a 5m del área en cada mitad
                El campo de hockey mide 91.4m largo. La línea de 23m está a 22.9m del fondo.
                En nuestro viewBox y=pad (top) → 0m, y=H-pad (bottom, arco propio) → 91.4m
                Línea de 23m inferior: y = (H-pad) - (23/91.4)*fh  ≈ H-pad - 0.252*fh
                Línea de 23m superior: y = pad + 0.252*fh                                 */}
            <line x1={pad} y1={H - pad - 0.252 * fh} x2={W - pad} y2={H - pad - 0.252 * fh}
              stroke="rgba(255,255,255,0.55)" strokeWidth="1" strokeDasharray="4,3"/>
            <line x1={pad} y1={pad + 0.252 * fh} x2={W - pad} y2={pad + 0.252 * fh}
              stroke="rgba(255,255,255,0.55)" strokeWidth="1" strokeDasharray="4,3"/>

            {/* Área propia (semicírculo abajo, arco del GK propio) */}
            {/* El área es semicírculo de 14.63m radio centrado en la mitad del arco
                Radio en viewBox: r = (14.63/91.4) * fh ≈ 0.16 * fh                       */}
            <path d={`M ${W/2 - 0.30*fw} ${H-pad} A ${0.30*fw} ${0.16*fh} 0 0 1 ${W/2 + 0.30*fw} ${H-pad}`}
              fill="none" stroke="rgba(255,255,255,0.85)" strokeWidth="1.3"/>

            {/* Área rival (semicírculo arriba) */}
            <path d={`M ${W/2 - 0.30*fw} ${pad} A ${0.30*fw} ${0.16*fh} 0 0 0 ${W/2 + 0.30*fw} ${pad}`}
              fill="none" stroke="rgba(255,255,255,0.85)" strokeWidth="1.3"/>

            {/* Arcos */}
            <line x1={W/2 - 0.06*fw} y1={H-pad} x2={W/2 + 0.06*fw} y2={H-pad}
              stroke="rgba(255,255,255,1)" strokeWidth="3"/>
            <line x1={W/2 - 0.06*fw} y1={pad} x2={W/2 + 0.06*fw} y2={pad}
              stroke="rgba(255,255,255,1)" strokeWidth="3"/>

            {/* Posiciones de la formación */}
            {Object.entries(positions).map(([posKey, posData]) => {
              const cx = pad + (posData.x / 100) * fw;
              const cy = pad + (posData.y / 100) * fh;
              const occupied = posMap[posKey];
              const isGK = posKey === "GK";
              if (occupied) {
                return (
                  <FieldChip key={posKey} cx={cx} cy={cy} r={22}
                    numero={occupied.jugador?.numero}
                    apellido={apellidoCorto(occupied.jugador?.nombre)}
                    color={isGK ? "#F0D050" : "#2D9D6F"}
                    posLabel={posKey}
                    onClick={onTitularClick ? () => onTitularClick(occupied.jugador_id) : null}
                  />
                );
              }
              // Slot vacío
              return (
                <g key={posKey}>
                  <circle cx={cx} cy={cy} r="22" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.25)" strokeWidth="1" strokeDasharray="3,3"/>
                  <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize="9" fontFamily="monospace" fill="rgba(255,255,255,0.5)" fontWeight="700">{posKey}</text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    // Componente: ficha de jugador (círculo con # grande + apellido abajo)
    function FieldChip({ cx, cy, r, numero, apellido, color, posLabel, onClick }) {
      const circleProps = onClick ? { style: { cursor: "pointer" } } : {};
      return (
        <g {...circleProps} onClick={onClick}>
          {/* Círculo */}
          <circle cx={cx} cy={cy} r={r} fill={color} stroke="white" strokeWidth="1.5"/>
          {/* Número grande en el centro */}
          <text x={cx} y={cy + 1} textAnchor="middle" dominantBaseline="middle"
            fill="white" fontSize={numero != null ? Math.round(r * 0.85) : Math.round(r * 0.6)}
            fontFamily="monospace" fontWeight="900">
            {numero != null ? numero : "?"}
          </text>
          {/* Etiqueta de posición arriba (solo titulares) */}
          {posLabel && (
            <text x={cx} y={cy - r - 4} textAnchor="middle" fontSize="8" fontFamily="monospace"
              fill="rgba(255,255,255,0.7)" fontWeight="700" letterSpacing="0.5">
              {posLabel}
            </text>
          )}
          {/* Apellido abajo - con sombra para que se lea bien sobre el campo */}
          {apellido && (
            <>
              {/* Sombra/halo negro */}
              <text x={cx} y={cy + r + 12} textAnchor="middle"
                fontSize="13" fill="rgba(0,0,0,0.85)" fontWeight="700"
                stroke="rgba(0,0,0,0.85)" strokeWidth="2.5" paintOrder="stroke">
                {apellido}
              </text>
              {/* Texto blanco encima */}
              <text x={cx} y={cy + r + 12} textAnchor="middle"
                fontSize="13" fill="white" fontWeight="700">
                {apellido}
              </text>
            </>
          )}
        </g>
      );
    }

    // Helper: extrae el apellido (primera parte hasta la coma o primer espacio)
    function apellidoCorto(nombre) {
      if (!nombre) return "";
      // Si tiene coma, asume "Apellido, Nombre"
      if (nombre.includes(",")) return nombre.split(",")[0].trim();
      // Sino, primera palabra
      return nombre.trim().split(/\s+/)[0];
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  CONVOCATORIA PÚBLICA · vista de lectura para jugadores/padres
    //  Lo que ve cualquier usuario al abrir el detalle de una fecha:
    //    - 3 contadores grandes (CONVOCADOS / EN DUDA / BAJAS)
    //    - 2 tabs (LISTA / CAMPO)
    //    - Lista de jugadores filtrable por línea (TODOS / GK / DEF / MED / DEL)
    //    - Tap en jugador → expande card con detalle
    // ═══════════════════════════════════════════════════════════════════════════

    function ConvocatoriaPublica({ fecha, club, jugadores }) {
      const [convData, setConvData] = useState([]); // filas de fecha_jugadores
      const [seasonStats, setSeasonStats] = useState({}); // { jugador_id: { pj, goles, tv, ta, tr, lesiones, titulares, ultimos: [...] } }
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = usePersistedState(`conv_pub_${fecha.id}_tab`, "lista"); // lista | campo
      const [filtroLinea, setFiltroLinea] = usePersistedState(`conv_pub_${fecha.id}_filtro`, "todos");
      const [expandedId, setExpandedId] = useState(null);
      const [exporting, setExporting] = useState(false);
      const [openConvocados, setOpenConvocados] = usePersistedState(`conv_pub_${fecha.id}_openConv`, true);
      const [openDudasBajas, setOpenDudasBajas] = usePersistedState(`conv_pub_${fecha.id}_openDB`, false);
      const listaRef = useRef(null);
      const campoRef = useRef(null);

      // Solo mostramos jugadores activos del plantel
      const jugadoresActivos = jugadores.filter(j => !j.estado || j.estado === "activo");

      useEffect(() => {
        let cancelled = false;
        (async () => {
          setLoading(true);
          // 1. Cargar la convocatoria de ESTA fecha
          const { data: convThis } = await sb.from("fecha_jugadores").select("*").eq("fecha_id", fecha.id);

          // 2. Cargar stats de TODA la temporada (todas las fechas del club con resultado cargado)
          //    Hacemos un join: traer fecha_jugadores donde la fecha pertenezca al club y tenga result_cargado=true
          const { data: fechasJugadas } = await sb.from("fechas")
            .select("id, fecha_num, fecha_date, rival, condition, goles_propio, goles_rival, result_cargado")
            .eq("club_id", club.id)
            .eq("result_cargado", true)
            .order("fecha_num");

          const fechaIds = (fechasJugadas || []).map(f => f.id);
          let convAll = [];
          if (fechaIds.length > 0) {
            const { data } = await sb.from("fecha_jugadores").select("*").in("fecha_id", fechaIds);
            convAll = data || [];
          }

          // Construir stats por jugador
          const stats = {};
          for (const j of jugadoresActivos) {
            const rows = convAll.filter(r => r.jugador_id === j.id);
            const convocadosRows = rows.filter(r => r.status === "convocado");
            const titularesRows = convocadosRows.filter(r => r.es_titular === true);
            const ultimos = convocadosRows
              .map(r => {
                const f = fechasJugadas.find(x => x.id === r.fecha_id);
                return f ? { fecha: f, row: r } : null;
              })
              .filter(Boolean)
              .sort((a, b) => (b.fecha.fecha_num || 0) - (a.fecha.fecha_num || 0))
              .slice(0, 5);
            stats[j.id] = {
              pj: convocadosRows.length,
              titulares: titularesRows.length,
              goles: convocadosRows.reduce((s, r) => s + (r.goles || 0), 0),
              tv: convocadosRows.filter(r => r.tarjeta_verde).length,
              ta: convocadosRows.reduce((s, r) => s + (r.tarjeta_amarilla || 0), 0),
              tr: convocadosRows.filter(r => r.tarjeta_roja).length,
              lesiones: convocadosRows.filter(r => r.lesionado).length,
              ultimos,
            };
          }

          if (!cancelled) {
            setConvData(convThis || []);
            setSeasonStats(stats);
            setLoading(false);
          }
        })();
        return () => { cancelled = true; };
      }, [fecha.id, club.id, jugadores.length]);

      // Construir lista enriquecida: cada jugador + su info de convocatoria (o DUDA por default)
      const items = jugadoresActivos.map(j => {
        const conv = convData.find(c => c.jugador_id === j.id);
        return {
          jugador: j,
          status: conv?.status || "duda",  // default: DUDA si no hay info cargada
          es_titular: conv?.es_titular,
          field_pos: conv?.field_pos,
          motivo: conv?.motivo,
          notas: conv?.notas,
          isDefault: !conv,  // marca si es el default (todavía no se cargó nada)
        };
      });

      // Mapeo de posición amplia → grupo de filtro (devuelve lowercase para los filtros existentes)
      const grupoDeJugador = (j) => {
        const g = getPositionGroup(j.posicion);
        if (g === "ARQ") return "gk";
        if (g === "DEF") return "def";
        if (g === "VOL") return "med";
        if (g === "DEL") return "del";
        return "otros";
      };

      // Filtrar por línea
      const itemsFiltrados = items.filter(it => {
        if (filtroLinea === "todos") return true;
        return grupoDeJugador(it.jugador) === filtroLinea;
      });

      // Contadores
      const counts = {
        convocados: items.filter(i => i.status === "convocado").length,
        duda:       items.filter(i => i.status === "duda").length,
        baja:       items.filter(i => i.status === "baja").length,
      };

      const filtros = [
        { id: "todos", label: "TODOS",  count: items.length },
        { id: "gk",    label: "GK",     count: items.filter(i => grupoDeJugador(i.jugador) === "gk").length },
        { id: "def",   label: "DEF",    count: items.filter(i => grupoDeJugador(i.jugador) === "def").length },
        { id: "med",   label: "MED",    count: items.filter(i => grupoDeJugador(i.jugador) === "med").length },
        { id: "del",   label: "DEL",    count: items.filter(i => grupoDeJugador(i.jugador) === "del").length },
      ];

      if (loading) return <div style={{textAlign:"center", padding:20}}><div className="spinner" style={{margin:"0 auto"}}/></div>;

      return (
        <div style={{marginTop:18}}>
          {/* ── Resultado del partido (si está cargado) ── */}
          {fecha.result_cargado && (
            <ResultadoPublico fecha={fecha} club={club} convData={convData} jugadores={jugadores}/>
          )}

          {/* ── 3 contadores ─────────────────────────── */}
          <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14}}>
            <CounterBox value={counts.convocados} label="CONVOCADOS" color="var(--green)"/>
            <CounterBox value={counts.duda}       label="EN DUDA"    color="var(--orange)"/>
            <CounterBox value={counts.baja}       label="BAJAS"      color="var(--red)"/>
          </div>

          {/* ── Tabs LISTA / CAMPO / MINUTOS ────────────────────── */}
          <div style={{display:"flex", gap:4, marginBottom:12}}>
            {[
              { id: "lista", icon: "📋", label: "LISTA" },
              { id: "campo", icon: "🏑", label: "CAMPO" },
              { id: "minutos", icon: "⏱", label: "MINUTOS" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex:1, padding:"11px 6px", fontSize:10, fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700,
                border: tab === t.id ? `1px solid ${club.theme_primary}` : "1px solid rgba(255,255,255,0.08)",
                background: tab === t.id ? `${club.theme_primary}1F` : "transparent",
                color: tab === t.id ? club.theme_primary : "var(--white-dim)", borderRadius:6

                setOpenConvocados(true); // abrir ambas secciones para que se vea todo
                setOpenDudasBajas(true);
                setExporting(true);
                await new Promise(r => setTimeout(r, 150)); // dejar repintar
                const rivalSlug = safeFilename(fecha.rival || "rival");
                await exportImage(listaRef.current, `convocatoria_F${fecha.fecha_num}_lista_${rivalSlug}`);
                setExporting(false);
              }} disabled={exporting} style={{
                marginTop:14, width:"100%", padding:"10px", background:"rgba(255,255,255,0.04)",
                border:"1px solid rgba(255,255,255,0.12)", color:"var(--white-soft)", borderRadius:6,
                fontSize:11, letterSpacing:2, fontFamily:"var(--mono)", fontWeight:700, cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                opacity: exporting ? 0.6 : 1
              }}>
                <span>📸</span> {exporting ? "EXPORTANDO..." : "EXPORTAR IMAGEN DE LA LISTA"}
              </button>

          {tab === "campo" && (() => {

            const titulares = items
              .filter(it => it.status === "convocado" && it.es_titular === true && it.field_pos && it.field_pos !== "SUB")
              .map(it => ({ jugador_id: it.jugador.id, jugador: it.jugador, field_pos: it.field_pos }));
            const suplentes = items
              .filter(it => it.status === "convocado" && (it.es_titular === false || it.field_pos === "SUB"))
              .map(it => ({ jugador_id: it.jugador.id, jugador: it.jugador }));

            if (titulares.length === 0 && suplentes.length === 0) {
              return (

                  <div style={{fontSize:13, color:"var(--white-soft)", marginBottom:6}}>Formación todavía sin armar</div>

                  </div>

            return (

                  fontSize:11, letterSpacing:2, fontFamily:"var(--mono)", fontWeight:700, cursor:"pointer",

    // ─── Header de marca para imágenes exportadas ─────────────────────────────
    // Se renderiza adentro del área a capturar para que la imagen tenga contexto
    function ExportableHeader({ fecha, club, counts }) {
      const fechaTxt = fecha.fecha_date ? formatDateLong(fecha.fecha_date) : "Sin fecha";
      const horaTxt = fecha.kick_time ? ` · ${fecha.kick_time}` : "";
      const condicion = (fecha.condition || "").toUpperCase();
      const rival = fecha.rival || "—";

      return (
        <div style={{
          padding:"12px 14px", background:`linear-gradient(135deg, ${club.theme_primary}26 0%, transparent 100%)`,
          border:`1px solid ${club.theme_primary}40`, borderRadius:6,
          display:"flex", alignItems:"center", gap:12
        }}>
          {club.escudo_base64 ? (
            <img src={club.escudo_base64} style={{width:42, height:"auto", maxHeight:48, objectFit:"contain", flexShrink:0}}/>
          ) : (
            <div style={{
              width:42, height:42, borderRadius:6, background:`${club.theme_primary}30`,
              border:`1.5px solid ${club.theme_primary}`, display:"flex", alignItems:"center", justifyContent:"center",
              color:club.theme_primary, fontWeight:900, fontSize:14, flexShrink:0
            }}>{club.nombre.slice(0,3).toUpperCase()}</div>
          )}
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:9, letterSpacing:2.5, color:club.theme_primary, fontFamily:"var(--mono)", fontWeight:700}}>
              {club.nombre.toUpperCase()} · {club.categoria.toUpperCase()}
            </div>
            <div style={{fontSize:14, fontWeight:900, marginTop:2, lineHeight:1.2}}>
              F{fecha.fecha_num} · {condicion} vs {rival}
            </div>
            <div style={{fontSize:10, color:"var(--white-dim)", marginTop:3, fontFamily:"var(--mono)"}}>
              {fechaTxt}{horaTxt}
            </div>
          </div>
          {/* Mini contadores */}
          <div style={{display:"flex", gap:8, flexShrink:0}}>
            <MiniCount value={counts.convocados} color="var(--green)" label="C"/>
            <MiniCount value={counts.duda} color="var(--orange)" label="D"/>
            <MiniCount value={counts.baja} color="var(--red)" label="B"/>
          </div>
        </div>
      );
    }

    function MiniCount({ value, label, color }) {
      return (
        <div style={{textAlign:"center", minWidth:24}}>
          <div style={{fontSize:16, fontWeight:900, color, fontFamily:"var(--mono)", lineHeight:1}}>{value}</div>
          <div style={{fontSize:8, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1, fontWeight:600, marginTop:2}}>{label}</div>
        </div>
      );
    }

    // ─── Sección colapsable con encabezado clickeable ───────────────────────
    function CollapsibleSection({ title, icon, count, countColor, open, onToggle, children }) {
      return (
        <div style={{background:"rgba(255,255,255,0.02)", borderRadius:6, overflow:"hidden"}}>
          <div onClick={onToggle} style={{
            display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
            cursor:"pointer", userSelect:"none",
            background: open ? "rgba(255,255,255,0.03)" : "transparent",
            borderBottom: open ? "1px solid rgba(255,255,255,0.04)" : "none"
          }}>
            {/* Icono de la sección */}
            <span style={{
              width:22, height:22, borderRadius:11, background: `${countColor}26`,
              color: countColor, fontSize:11, fontWeight:900, fontFamily:"var(--mono)",
              textAlign:"center", lineHeight:"22px", flexShrink:0
            }}>{icon}</span>

            {/* Título */}
            <div style={{flex:1, fontSize:11, letterSpacing:2, fontFamily:"var(--mono)", fontWeight:700, color:"var(--white-soft)"}}>
              {title}
            </div>

            {/* Contador */}
            <span style={{
              padding:"2px 8px", fontSize:11, fontWeight:900, fontFamily:"var(--mono)",
              color: countColor, background: `${countColor}1A`, borderRadius:3
            }}>{count}</span>

            {/* Chevron rotando */}
            <span style={{
              fontSize:10, color:"var(--white-dim)",
              transform: open ? "rotate(90deg)" : "rotate(0deg)",
              transition:"transform 0.2s ease",
              flexShrink:0
            }}>▶</span>
          </div>
          {open && <div>{children}</div>}
        </div>
      );
    }

    function CounterBox({ value, label, color }) {
      return (
        <div style={{
          padding:"16px 8px", textAlign:"center",
          background:"rgba(255,255,255,0.02)", borderRadius:6,
          border:`1px solid ${color}30`
        }}>
          <div style={{fontSize:28, fontWeight:900, color, lineHeight:1, fontFamily:"var(--mono)"}}>{value}</div>
          <div style={{fontSize:9, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:6, fontWeight:600}}>
            {label}
          </div>
        </div>
      );
    }

    // ─── Bloque público de RESULTADO del partido ─────────────────────────────
    function ResultadoPublico({ fecha, club, convData, jugadores }) {
      const golesProp = fecha.goles_propio ?? 0;
      const golesRiv  = fecha.goles_rival ?? 0;
      const ganamos = golesProp > golesRiv;
      const empatamos = golesProp === golesRiv;
      const resultColor = ganamos ? "var(--green)" : empatamos ? "var(--orange)" : "var(--red)";
      const resultLabel = ganamos ? "GANAMOS" : empatamos ? "EMPATAMOS" : "PERDIMOS";

      // Goleadores propios
      const goleadores = convData
        .filter(r => (r.goles || 0) > 0)
        .map(r => {
          const j = jugadores.find(x => x.id === r.jugador_id);
          return { jugador: j, goles: r.goles };
        })
        .filter(g => g.jugador)
        .sort((a, b) => b.goles - a.goles);

      // Jugadores con tarjetas o lesión
      const eventos = convData
        .filter(r => r.tarjeta_verde || (r.tarjeta_amarilla || 0) > 0 || r.tarjeta_roja || r.lesionado)
        .map(r => {
          const j = jugadores.find(x => x.id === r.jugador_id);
          return { jugador: j, row: r };
        })
        .filter(e => e.jugador);

      const isLocal = fecha.condition === "Local";
      const nombreLocal = isLocal ? club.nombre : (fecha.rival || "—");
      const nombreVisitante = isLocal ? (fecha.rival || "—") : club.nombre;
      const golesLocal = isLocal ? golesProp : golesRiv;
      const golesVisitante = isLocal ? golesRiv : golesProp;

      return (
        <div style={{
          marginBottom:16, padding:14, borderRadius:8,
          background:`linear-gradient(135deg, ${resultColor}14 0%, transparent 60%)`,
          border:`1px solid ${resultColor}40`
        }}>
          {/* Pildora FINAL + GANAMOS/PERDIMOS/EMPATAMOS */}
          <div style={{display:"flex", justifyContent:"center", gap:6, marginBottom:10}}>
            <span style={{fontSize:9, letterSpacing:2.5, fontFamily:"var(--mono)", padding:"3px 10px", border:"1px solid var(--white-dim)", color:"var(--white-soft)", borderRadius:3, fontWeight:700}}>
              FINAL
            </span>
            <span style={{fontSize:9, letterSpacing:2.5, fontFamily:"var(--mono)", padding:"3px 10px", border:`1px solid ${resultColor}`, color:resultColor, borderRadius:3, fontWeight:700}}>
              {resultLabel}
            </span>
          </div>

          {/* Marcador grande */}
          <div style={{display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:8, alignItems:"center", marginBottom:8}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1.5, marginBottom:4, fontWeight:600}}>{nombreLocal.toUpperCase()}</div>
              <div style={{fontSize:36, fontWeight:900, color: (isLocal ? (ganamos ? "var(--green)" : empatamos ? "var(--white)" : "var(--red)") : (ganamos ? "var(--red)" : empatamos ? "var(--white)" : "var(--green)")), lineHeight:1, fontFamily:"var(--mono)"}}>
                {golesLocal}
              </div>
            </div>
            <div style={{fontSize:18, color:"var(--white-dim)", fontWeight:700, padding:"0 6px"}}>—</div>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1.5, marginBottom:4, fontWeight:600}}>{nombreVisitante.toUpperCase()}</div>
              <div style={{fontSize:36, fontWeight:900, color: (isLocal ? (ganamos ? "var(--red)" : empatamos ? "var(--white)" : "var(--green)") : (ganamos ? "var(--green)" : empatamos ? "var(--white)" : "var(--red)")), lineHeight:1, fontFamily:"var(--mono)"}}>
                {golesVisitante}
              </div>
            </div>
          </div>

          {/* Goleadores */}
          {goleadores.length > 0 && (
            <div style={{marginTop:12, padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:4}}>
              <div style={{fontSize:9, letterSpacing:2.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:6}}>
                ⚽ GOLEADORES
              </div>
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {goleadores.map(g => (
                  <span key={g.jugador.id} style={{fontSize:11, color:"var(--white-soft)"}}>
                    {g.jugador.nombre}{g.goles > 1 ? ` (${g.goles})` : ""}
                  </span>
                )).reduce((acc, el, i) => i === 0 ? [el] : [...acc, <span key={`sep-${i}`} style={{color:"var(--white-dim)"}}>·</span>, el], [])}
              </div>
            </div>
          )}

          {/* Tarjetas y lesionados */}
          {eventos.length > 0 && (
            <div style={{marginTop:8, padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:4}}>
              <div style={{fontSize:9, letterSpacing:2.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:6}}>
                INCIDENCIAS
              </div>
              <div style={{display:"flex", flexDirection:"column", gap:3}}>
                {eventos.map(e => {
                  const icons = [];
                  if (e.row.tarjeta_verde) icons.push("🟢");
                  if ((e.row.tarjeta_amarilla || 0) >= 1) icons.push("🟡");
                  if ((e.row.tarjeta_amarilla || 0) >= 2) icons.push("🟡");
                  if (e.row.tarjeta_roja) icons.push("🟥");
                  if (e.row.lesionado) icons.push("🤕");
                  return (
                    <div key={e.jugador.id} style={{fontSize:11, color:"var(--white-soft)"}}>
                      {icons.join(" ")} <span style={{fontWeight:600}}>{e.jugador.nombre}</span>
                      {(e.row.tarjeta_amarilla || 0) >= 2 && <span style={{color:"var(--red)", fontSize:9, fontFamily:"var(--mono)", marginLeft:6, letterSpacing:1}}>2A → ROJA</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Notas adicionales */}
          {fecha.result_notas && fecha.result_notas.length > 0 && (
            <div style={{marginTop:8, padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:4}}>
              <div style={{fontSize:9, letterSpacing:2.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:6}}>
                NOTAS DEL PARTIDO
              </div>
              {fecha.result_notas.map((n, i) => (
                <div key={i} style={{fontSize:11, color:"var(--white-soft)", marginBottom:3}}>
                  {n.icon} {n.text}
                </div>
              ))}
            </div>
          )}

          {/* Árbitros */}
          {fecha.arbitros && (
            <div style={{marginTop:8, fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)", textAlign:"center", letterSpacing:0.5}}>
              <span style={{letterSpacing:1.5, fontWeight:600}}>ÁRBITROS</span> · {fecha.arbitros}
            </div>
          )}
        </div>
      );
    }

    // Bloque de minutos jugados para vista pública (post-finalización del partido)
    // Muestra toggle entre lista y barras. Total = duracion_real_segundos de la fecha.
    // Barra de minutos con segmentos por cuarto.
    // Recibe: porCuarto = { q1, q2, q3, q4 } en minutos, baseMin = total del partido en min
    // Si porCuarto está vacío o no tiene datos, dibuja una sola barra simple.
    // Recibe:
    //   porCuarto = { q1, q2, q3, q4 } en minutos (puede ser null/undefined si no hay datos)
    //   totalMin = minutos totales jugados por esta jugadora (usado en fallback cuando no hay porCuarto)
    //   baseMin = duración total del partido en minutos (= 100%)
    //   clubColor = color base del club para derivar los 4 tonos por cuarto
    function BarraMinutosCuartos({ porCuarto, totalMin, baseMin, clubColor, fallbackColor, height = 8 }) {
      const tienePorCuarto = porCuarto && (porCuarto.q1 || porCuarto.q2 || porCuarto.q3 || porCuarto.q4);
      const fallbackPct = totalMin && baseMin ? Math.min(100, (totalMin / baseMin) * 100) : 0;
      const colors = getCuartoColors(clubColor || fallbackColor);
      return (
        <div style={{
          display:"flex", height, background:"rgba(255,255,255,0.05)",
          borderRadius:Math.floor(height/2), overflow:"hidden"
        }}>
          {tienePorCuarto ? (
            ["q1","q2","q3","q4"].map(qk => {
              const mins = porCuarto[qk] || 0;
              if (mins === 0) return null;
              const widthPct = (mins / baseMin) * 100;
              return (
                <div key={qk} title={`${CUARTO_LABELS[parseInt(qk[1])-1]}: ${mins}'`}
                  style={{
                    width: `${widthPct}%`,
                    background: colors[qk],
                    transition: "width 0.4s ease",
                  }}/>
              );
            })
          ) : (
            // Fallback: barra simple del color del club, ocupando el % real
            <div style={{
              width:`${fallbackPct}%`,
              background: fallbackColor || clubColor || "var(--plat)",
              transition:"width 0.4s ease",
            }}/>
          )}
        </div>
      );
    }

    // Leyenda de cuartos para mostrar arriba de las barras
    function LeyendaCuartos({ clubColor }) {
      const colors = getCuartoColors(clubColor);
      return (
        <div style={{display:"flex", gap:10, marginBottom:8, fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", flexWrap:"wrap"}}>
          {["q1","q2","q3","q4"].map((qk, i) => (
            <span key={qk} style={{display:"flex", alignItems:"center", gap:4}}>
              <span style={{width:10, height:10, background:colors[qk], borderRadius:2, display:"inline-block"}}/>
              {CUARTO_LABELS[i]}
            </span>
          ))}
        </div>
      );
    }

    function MinutosJugadosPublico({ fecha, club, convData, jugadores }) {
      const [viewMode, setViewMode] = useState("list");
      const [cambiosCount, setCambiosCount] = useState(null);

      // Jugadores que tienen minutos jugados cargados (> 0)
      const jugaronOrdenados = convData
        .filter(r => (r.minutos_jugados || 0) > 0)
        .map(r => {
          const j = jugadores.find(x => x.id === r.jugador_id);
          const porCuarto = (r.min_q1 || r.min_q2 || r.min_q3 || r.min_q4)
            ? { q1: r.min_q1 || 0, q2: r.min_q2 || 0, q3: r.min_q3 || 0, q4: r.min_q4 || 0 }
            : null;
          return j ? { jugador: j, minutos: r.minutos_jugados, porCuarto } : null;
        })
        .filter(Boolean)
        .sort((a, b) => b.minutos - a.minutos);

      // Cargar cantidad de cambios desde DB (para el banner)
      useEffect(() => {
        let cancelled = false;
        (async () => {
          const { count } = await sb.from("cambios")

        { v: stats.titulares, l: "TIT",    c: "var(--gold)" },
        { v: stats.goles,     l: "GOLES",  c: stats.goles > 0 ? "var(--green)" : "var(--white-dim)" },
        { v: `${pctTitular}%`,l: "%TIT",   c: "var(--white-soft)" },

      const events = [];
      if (stats.tv > 0)       events.push({ icon:"🟢", n: stats.tv, l: "Verdes" });
      if (stats.ta > 0)       events.push({ icon:"🟡", n: stats.ta, l: "Amarillas" });
      if (stats.tr > 0)       events.push({ icon:"🟥", n: stats.tr, l: "Rojas" });
      if (stats.lesiones > 0) events.push({ icon:"🤕", n: stats.lesiones, l: "Lesiones" });

      return (
        <div style={{marginTop:10}}>
          {/* Header */}
          <div style={{fontSize:9, letterSpacing:2.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:6}}>
            📊 ESTADÍSTICAS DE LA TEMPORADA
          </div>

          {/* 4 tiles */}
          <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:8}}>
            {tiles.map(t => (
              <div key={t.l} style={{padding:"8px 4px", textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:4}}>
                <div style={{fontSize:16, fontWeight:900, color:t.c, fontFamily:"var(--mono)", lineHeight:1}}>{t.v}</div>
                <div style={{fontSize:8, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:3, fontWeight:600}}>{t.l}</div>

          </div>

          {/* Tarjetas/lesiones */}
          {events.length > 0 && (
            <div style={{display:"flex", flexWrap:"wrap", gap:6, marginBottom:8}}>
              {events.map(e => (
                <span key={e.l} style={{fontSize:10, padding:"3px 7px", background:"rgba(255,255,255,0.03)", borderRadius:3, color:"var(--white-soft)"}}>
                  {e.icon} {e.n} · {e.l}
                </span>
              ))}
            </div>
          )}

          {/* Últimos partidos */}
          {stats.ultimos && stats.ultimos.length > 0 && (
            <div style={{padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:4}}>
              <div style={{fontSize:8, letterSpacing:2, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:5}}>
                ÚLTIMOS PARTIDOS
              </div>
              {stats.ultimos.map(({ fecha, row }) => {
                const golesProp = fecha.goles_propio ?? 0;
                const golesRiv = fecha.goles_rival ?? 0;
                const marca = `${golesProp}-${golesRiv}`;
                const ganamos = golesProp > golesRiv;
                const empate = golesProp === golesRiv;
                const dotColor = ganamos ? "var(--green)" : empate ? "var(--orange)" : "var(--red)";
                const dotChar = ganamos ? "G" : empate ? "E" : "P";
                const eventIcons = [];
                if (row.goles > 0) eventIcons.push(`⚽${row.goles}`);
                if (row.tarjeta_verde) eventIcons.push("🟢");
                if ((row.tarjeta_amarilla || 0) > 0) eventIcons.push("🟡".repeat(row.tarjeta_amarilla));
                if (row.tarjeta_roja) eventIcons.push("🟥");
                if (row.lesionado) eventIcons.push("🤕");
                return (
                  <div key={fecha.id} style={{display:"flex", alignItems:"center", gap:8, padding:"3px 0", fontSize:10, color:"var(--white-soft)"}}>
                    <span style={{display:"inline-block", width:14, height:14, borderRadius:7, background:`${dotColor}33`, color:dotColor, fontSize:8, fontWeight:900, fontFamily:"var(--mono)", textAlign:"center", lineHeight:"14px", flexShrink:0}}>{dotChar}</span>
                    <span style={{fontFamily:"var(--mono)", color:"var(--white-dim)", flexShrink:0}}>F{fecha.fecha_num}</span>
                    <span style={{flex:1, minWidth:0, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>vs {fecha.rival}</span>
                    <span style={{fontFamily:"var(--mono)", fontWeight:700, fontSize:10}}>{marca}</span>
                    {row.es_titular === true && <span style={{fontSize:7, padding:"1px 4px", background:"var(--gold-dim)", color:"var(--gold)", borderRadius:2, fontFamily:"var(--mono)", fontWeight:700, letterSpacing:1, flexShrink:0}}>TIT</span>}
                    {eventIcons.length > 0 && <span style={{flexShrink:0}}>{eventIcons.join("")}</span>}
                  </div>
                );
              })}

          )}

      );

    // ═══════════════════════════════════════════════════════════════════════════
    //  STATS TEMPORADA · banner con PJ/PG/PE/PP/GF/GA/DG/PTS + goleadores
    // ═══════════════════════════════════════════════════════════════════════════
    function StatsTemporadaBanner({ fechas, club, jugadores }) {
      const [goleadores, setGoleadores] = useState([]); // [{ nombre, goles }]
      const jugados = fechas.filter(f => f.result_cargado);

      useEffect(() => {
        if (jugados.length === 0 || jugadores.length === 0) {
          setGoleadores([]);
          return;
        }
        (async () => {
          // Traer todos los fecha_jugadores con goles > 0 de las fechas jugadas
          const fechaIds = jugados.map(f => f.id);
          const { data } = await sb.from("fecha_jugadores")
            .select("jugador_id, goles")
            .in("fecha_id", fechaIds)
            .gt("goles", 0);
          if (!data) { setGoleadores([]); return; }
          // Agrupar por jugador
          const map = {};
          for (const row of data) {
            map[row.jugador_id] = (map[row.jugador_id] || 0) + row.goles;
          }
          // Resolver nombres
          const arr = Object.entries(map).map(([jId, goles]) => {
            const j = jugadores.find(x => x.id === jId);
            // Apellido corto (primer parte antes de la coma o primera palabra)
            let nombre = j?.nombre || "(desconocido)";
            if (nombre.includes(",")) nombre = nombre.split(",")[0].trim();
            else nombre = nombre.split(/\s+/)[0];
            return { nombre, goles };
          });
          arr.sort((a, b) => b.goles - a.goles);
          setGoleadores(arr.slice(0, 8));
        })();
      }, [fechas, jugadores]);

      if (jugados.length === 0) return null;

      const pg = jugados.filter(f => (f.goles_propio ?? 0) > (f.goles_rival ?? 0)).length;
      const pe = jugados.filter(f => (f.goles_propio ?? 0) === (f.goles_rival ?? 0)).length;
      const pp = jugados.filter(f => (f.goles_propio ?? 0) < (f.goles_rival ?? 0)).length;
      const gf = jugados.reduce((acc, f) => acc + (f.goles_propio || 0), 0);
      const ga = jugados.reduce((acc, f) => acc + (f.goles_rival || 0), 0);
      const dg = gf - ga;
      const pts = pg * 3 + pe;

      const statsRow1 = [
        { l: "PJ", v: jugados.length, c: "rgba(255,255,255,0.6)" },
        { l: "PG", v: pg, c: "var(--green)" },
        { l: "PE", v: pe, c: "var(--orange)" },
        { l: "PP", v: pp, c: "var(--red)" },
      ];
      const statsRow2 = [
        { l: "GF", v: gf, c: club.theme_primary || "var(--plat)" },
        { l: "GA", v: ga, c: "rgba(255,255,255,0.4)" },
        { l: "DG", v: (dg >= 0 ? "+" : "") + dg, c: dg >= 0 ? "var(--green)" : "var(--red)" },
        { l: "PTS", v: pts, c: "var(--gold)" },
      ];

      const maxGoals = goleadores[0]?.goles || 1;

      return (
        <div style={{
          marginBottom:16, borderRadius:6, overflow:"hidden",
          background:`${club.theme_primary}0F`, border:`1px solid ${club.theme_primary}26`,
          display:"grid", gridTemplateColumns: goleadores.length > 0 ? "auto 1fr" : "1fr", gap:0
        }}>
          {/* Panel stats */}
          <div style={{padding:"10px 12px", borderRight: goleadores.length > 0 ? `1px solid ${club.theme_primary}26` : "none"}}>
            <div style={{display:"flex", gap:0}}>
              {statsRow1.map(s => (
                <div key={s.l} style={{textAlign:"center", padding:"0 7px"}}>
                  <div style={{fontSize:15, fontWeight:900, color:s.c, lineHeight:1, fontFamily:"var(--mono)"}}>{s.v}</div>
                  <div style={{fontSize:7, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:3, fontWeight:600}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex", gap:0, marginTop:6, paddingTop:6, borderTop:`1px solid ${club.theme_primary}1F`}}>
              {statsRow2.map(s => (
                <div key={s.l} style={{textAlign:"center", padding:"0 7px"}}>
                  <div style={{fontSize:15, fontWeight:900, color:s.c, lineHeight:1, fontFamily:"var(--mono)"}}>{s.v}</div>
                  <div style={{fontSize:7, letterSpacing:1.5, color:"var(--white-dim)", fontFamily:"var(--mono)", marginTop:3, fontWeight:600}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Panel goleadores */}
          {goleadores.length > 0 && (
            <div style={{padding:"10px 12px", overflow:"hidden", minWidth:0}}>
              <div style={{fontSize:8, letterSpacing:2.5, color:"var(--white-dim)", fontFamily:"var(--mono)", fontWeight:700, marginBottom:5}}>
                ⚽ GOLEADORES
              </div>
              <div style={{display:"flex", flexDirection:"column", gap:3}}>
                {goleadores.map((g, i) => (
                  <div key={i} style={{display:"flex", alignItems:"center", gap:6, fontSize:10}}>
                    <div style={{flex:1, minWidth:0, position:"relative", height:14, background:"rgba(255,255,255,0.03)", borderRadius:2, overflow:"hidden"}}>
                      <div style={{position:"absolute", inset:0, width:`${(g.goles / maxGoals) * 100}%`, background: i === 0 ? club.theme_primary : `${club.theme_primary}66`, borderRadius:2}}/>
                      <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", padding:"0 6px", fontSize:9, color:"var(--white)", fontWeight:700, fontFamily:"var(--mono)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                        {g.nombre}
                      </div>
                    </div>
                    <div style={{fontSize:10, fontWeight:900, color: i === 0 ? club.theme_primary : "var(--white-soft)", fontFamily:"var(--mono)", flexShrink:0, minWidth:14, textAlign:"right"}}>
                      {g.goles}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }
