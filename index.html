          if (result.length === 0) {
            alert("No se pudieron detectar fechas. Cada línea debe tener al menos una fecha (DD/MM) y un rival (vs Equipo).");
            return;
          }
          setParsed(result);
          setPhase("preview");
        }
      };

      const handleConfirmAahba = async () => {
        if (!chosenTeam) { alert("Elegí el equipo que es \"tu equipo\"."); return; }
        const result = await aahbaBlocksToFechas(aahbaBlocks, chosenTeam, chosenYear, defaults);
        if (result.length === 0) {
          alert("No se pudieron procesar las fechas.");
          return;
        }
        setParsed(result);
        setPhase("preview");
      };

      const updateField = (idx, field, value) => {
        setParsed(p => p.map((f, i) => i === idx ? {...f, [field]: value} : f));
      };

      const removeRow = (idx) => {
        setParsed(p => p.filter((_, i) => i !== idx));
      };

      const handleImport = async () => {
        // Validar que las fechas que tienen fecha_date sean válidas (formato YYYY-MM-DD)
        const sinFechaDate = parsed.filter(f => !f.fecha_date).length;
        if (sinFechaDate > 0) {
          if (!confirm(`Hay ${sinFechaDate} fechas sin fecha de partido (TBD). ¿Importar igual? Podés completarlas después.`)) return;
        }
        setImporting(true);
        const toInsert = parsed.map(f => ({
          club_id: club.id,
          fecha_num: f.fecha_num,
          rueda: f.rueda || 1,
          fecha_date: f.fecha_date || null,
          rival: f.rival || "TBD",
          condition: f.condition || "Local",
          location: f.location || "",
          maps_url: f.maps_url || "",
          kick_time: f.kick_time || "",
          citacion_time: f.citacion_time || "",
          kit: "titular",
        }));
        const { error } = await sb.from("fechas").insert(toInsert);
        setImporting(false);
        if (error) { alert("Error: " + error.message); return; }

        // Después de importar exitosamente, propagar datos de canchas/maps de visitantes
        // a la tabla global de rivales (para que otros clubs los aprovechen)
        const visitantesConDatos = parsed.filter(f =>
          f.condition === "Visitante" && f.rival && f.rival !== "LIBRE" &&
          (f.location?.trim() || f.maps_url?.trim())
        );
        if (visitantesConDatos.length > 0) {
          // Agrupar por rival (puede haber varias fechas vs mismo rival)
          const porRival = {};
          for (const f of visitantesConDatos) {
            const key = normalizeRivalName(f.rival);
            // El último gana (asumiendo que si hay diferencia, la última es la corregida)
            porRival[key] = { rival: f.rival, location: f.location, maps_url: f.maps_url };
          }
          // Upsert cada uno (en paralelo)
          await Promise.all(Object.values(porRival).map(r =>
            upsertRivalGlobal(r.rival, r.location, r.maps_url, session.user.email)
          ));
        }

        alert(`✓ ${parsed.length} fechas importadas`);
        clearDraft();
        onDone();
      };

      // Wrapper para cancelar que limpia el draft
      const handleCancel = () => {
        if (pasteText.trim() || parsed.length > 0) {
          if (!confirm("¿Cancelar el import? Vas a perder lo que pegaste/editaste.")) return;
        }
        clearDraft();
        onCancel();
      };

      // ─── Fase: CONFIRM (formato AAHBA detectado) ───────────────────────
      if (phase === "confirm") {
        return (
          <div>
            <div style={{padding:12, background:"var(--plat-soft)", borderRadius:6, marginBottom:16}}>
              <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, marginBottom:4}}>
                ✓ FORMATO AAHBA DETECTADO · {aahbaBlocks.length} FECHAS
              </div>
              <div style={{fontSize:12, color:"var(--white-soft)"}}>
                Antes de importar, confirmá un par de datos.
              </div>
            </div>

            <Field label="Tu equipo" hint="Detecté automáticamente el equipo que más se repite en el fixture. Si no es el correcto, elegí uno de la lista.">
              <select value={chosenTeam} onChange={e => setChosenTeam(e.target.value)} style={inputStyle}>
                <option value="">— Elegí —</option>
                {allTeamsOptions.map(t => (
                  <option key={t} value={t}>
                    {t === detectedTeam ? `${t} ⭐ (detectado)` : t}
                  </option>
                ))}
              </select>
            </Field>

            <Field label="Año del fixture" hint="Las fechas vienen sin año (ej: 'dom 08 mar'). Indicá a qué año pertenecen.">
              <input type="number" value={chosenYear} onChange={e => setChosenYear(parseInt(e.target.value) || new Date().getFullYear())} style={inputStyle} min="2020" max="2030"/>
            </Field>

            <div style={{padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:14}}>
              <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--white-dim)", letterSpacing:2, marginBottom:8}}>
                EQUIPOS DETECTADOS EN EL FIXTURE
              </div>
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {allTeamsOptions.map(t => (
                  <span key={t} style={{
                    fontSize:11, padding:"3px 8px", borderRadius:3,
                    background: t === chosenTeam ? "var(--plat-dim)" : "rgba(255,255,255,0.04)",
                    color: t === chosenTeam ? "var(--plat)" : "var(--white-soft)",
                    fontWeight: t === chosenTeam ? 700 : 400,
                    border: t === chosenTeam ? "1px solid var(--plat)" : "1px solid transparent",
                  }}>{t}</span>
                ))}
              </div>
            </div>

            <div style={{display:"flex", gap:10}}>
              <button onClick={() => setPhase("input")} style={{...btnGhost, flex:1}}>← Volver</button>
              <button onClick={handleConfirmAahba} disabled={!chosenTeam} style={{...btnPrimary, flex:2}}>
                Confirmar y previsualizar →
              </button>
            </div>
          </div>
        );
      }

      // ─── Fase: PREVIEW (datos editables) ────────────────────────────────
      if (phase === "preview") {
        const sinFecha = parsed.filter(f => !f.fecha_date).length;
        const libres = parsed.filter(f => f._isLibre).length;
        return (
          <div>
            <div style={{padding:12, background:"var(--plat-soft)", borderRadius:6, marginBottom:14}}>
              <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:2, marginBottom:4}}>
                PREVISUALIZACIÓN · {parsed.length} FECHAS
              </div>
              <div style={{fontSize:12, color:"var(--white-soft)", lineHeight:1.5}}>
                Revisá los datos antes de importar. <span style={{color:"var(--gold)"}}>Borde dorado</span> = autocompletado desde defaults del club. <span style={{color:"#a78bfa"}}>Borde violeta</span> = autocompletado desde la tabla global de rivales.
                {sinFecha > 0 && <div style={{marginTop:4}}>⚠️ {sinFecha} fecha(s) sin fecha de partido (podés completarlas ahora o después).</div>}
                {libres > 0 && <div style={{marginTop:4}}>ℹ️ {libres} fecha(s) marcadas como LIBRE.</div>}
              </div>
            </div>

            <div style={{maxHeight:400, overflowY:"auto", marginBottom:14}}>
              {parsed.map((f, idx) => (
                <div key={idx} style={{
                  background: f._isLibre ? "rgba(240,208,80,0.04)" : "rgba(255,255,255,0.02)",
                  border: f._isLibre ? "1px dashed rgba(240,208,80,0.3)" : "1px solid rgba(255,255,255,0.05)",
                  borderRadius:6, padding:12, marginBottom:8
                }}>
                  <div style={{display:"flex", gap:8, alignItems:"center", marginBottom:8}}>
                    <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--plat)", letterSpacing:1, fontWeight:700, minWidth:50}}>
                      F{f.fecha_num}
                    </div>
                    <select value={f.rueda} onChange={e => updateField(idx, "rueda", parseInt(e.target.value))} style={{...inputStyle, width:70, padding:6, fontSize:13}}>
                      <option value="1">R1</option>
                      <option value="2">R2</option>
                    </select>
                    <input type="date" value={f.fecha_date} onChange={e => updateField(idx, "fecha_date", e.target.value)} style={{...inputStyle, flex:1, padding:6, fontSize:13, ...(!f.fecha_date ? {borderColor:"var(--orange)"} : {})}}/>
                    <button onClick={() => removeRow(idx)} style={{...btnGhost, padding:"5px 10px", fontSize:11, color:"var(--red)", borderColor:"rgba(232,85,85,0.3)"}}>×</button>
                  </div>
                  <div style={{display:"flex", gap:8, marginBottom:6}}>
                    <input type="text" value={f.rival} onChange={e => updateField(idx, "rival", e.target.value)} style={{...inputStyle, flex:2, padding:6, fontSize:13}} placeholder="Rival"/>
                    <select value={f.condition} onChange={e => updateField(idx, "condition", e.target.value)} style={{...inputStyle, width:120, padding:6, fontSize:13}} disabled={f._isLibre}>
                      <option value="Local">Local</option>
                      <option value="Visitante">Visitante</option>
                    </select>
                  </div>
                  {!f._isLibre && (
                    <>
                      <div style={{display:"flex", gap:8, marginBottom:6}}>
                        <input type="text" value={f.location} onChange={e => updateField(idx, "location", e.target.value)}
                          style={{...inputStyle, flex:1, padding:6, fontSize:13, ...(f._fromGlobal ? {borderColor:"#a78bfa"} : f._autoLocation ? {borderColor:"var(--gold)"} : {})}}
                          placeholder="Cancha"/>
                      </div>
                      {(f.maps_url || f._fromGlobal) && (
                        <div style={{display:"flex", gap:8, marginBottom:6}}>
                          <input type="text" value={f.maps_url || ""} onChange={e => updateField(idx, "maps_url", e.target.value)}
                            style={{...inputStyle, flex:1, padding:6, fontSize:13, ...(f._fromGlobal && f._autoMaps ? {borderColor:"#a78bfa"} : {})}}
                            placeholder="Link Maps (opcional)"/>
                        </div>
                      )}
                      {f._fromGlobal && (
                        <div style={{fontSize:10, color:"#a78bfa", marginBottom:4, fontFamily:"var(--mono)", letterSpacing:0.5}}>
                          🌐 Datos del rival cargados desde la tabla global
                        </div>
                      )}
                      <div style={{display:"flex", gap:8}}>
                        <input type="text" value={f.citacion_time} onChange={e => updateField(idx, "citacion_time", e.target.value)}
                          style={{...inputStyle, flex:1, padding:6, fontSize:13, ...(f._autoCitacion ? {borderColor:"var(--gold)"} : {})}}
                          placeholder="Citación HH:MM"/>
                        <input type="text" value={f.kick_time} onChange={e => updateField(idx, "kick_time", e.target.value)}
                          style={{...inputStyle, flex:1, padding:6, fontSize:13, ...(f._autoKick ? {borderColor:"var(--gold)"} : {})}}
                          placeholder="Inicio HH:MM"/>
                      </div>
                    </>
                  )}
                </div>
              ))}
            </div>

            <div style={{display:"flex", gap:10}}>
              <button onClick={() => setPhase("input")} disabled={importing} style={{...btnGhost, flex:1}}>← Volver</button>
              <button onClick={handleImport} disabled={importing} style={{...btnPrimary, flex:2}}>
                {importing ? "Importando..." : `✓ Importar ${parsed.length} fechas`}
              </button>
            </div>
          </div>
        );
      }

      // ─── Fase: INPUT ───────────────────────────────────────────────────
      const hasDefaults = club.default_cancha || club.default_kick_time || club.default_citacion_time;
      return (
        <div>
          <p style={{fontSize:13, color:"var(--white-soft)", lineHeight:1.6, marginBottom:14}}>
            Pegá el fixture de tu equipo. La app detecta automáticamente si lo copiaste del sitio de AAHBA (tournamenttracker) o si lo escribiste vos en formato simple.
          </p>

          {!hasDefaults && (
            <div style={{padding:12, background:"rgba(240,208,80,0.08)", border:"1px solid rgba(240,208,80,0.3)", borderRadius:6, marginBottom:14, fontSize:12, color:"var(--white-soft)"}}>
              💡 <strong style={{color:"var(--gold)"}}>Tip:</strong> Configurá antes los <strong>defaults del club</strong> (cancha, horarios) para que la app los autocomplete.
            </div>
          )}

          <div style={{padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6, marginBottom:14}}>
            <div style={{fontSize:11, fontFamily:"var(--mono)", color:"var(--white-dim)", letterSpacing:2, marginBottom:8}}>FORMATOS SOPORTADOS</div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:11, color:"var(--plat)", marginBottom:4, fontWeight:700}}>1. Copy-paste desde AAHBA (tournamenttracker)</div>
              <pre style={{fontFamily:"var(--mono)", fontSize:10, color:"var(--white-soft)", lineHeight:1.5, whiteSpace:"pre-wrap"}}>{`Fecha 1
dom 08 mar 11:30
LANUS
0
6
G. Y ESGRIMA B
Fecha 2
G. Y ESGRIMA B
Vs
EST. LA PLATA (N.P.)
...`}</pre>
              <div style={{fontSize:10, color:"var(--white-dim)", marginTop:4, fontStyle:"italic"}}>
                Abrí el sitio de AAHBA, seleccioná todo el fixture, copiá (Ctrl+C) y pegá acá. La app detecta tu equipo automáticamente.
              </div>
            </div>

            <div>
              <div style={{fontSize:11, color:"var(--plat)", marginBottom:4, fontWeight:700}}>2. Formato simple (1 fecha por línea)</div>
              <pre style={{fontFamily:"var(--mono)", fontSize:10, color:"var(--white-soft)", lineHeight:1.5, whiteSpace:"pre-wrap"}}>{`F1 - 12/04 - vs San Fernando - Local
F2 - 19/04 - vs Ciudad - V - Estadio Ciudad
F3 - 26/04/2026 - vs Ducilo - L - 11:30`}</pre>
            </div>
          </div>

          <textarea value={pasteText} onChange={e => setPasteText(e.target.value)} rows={12}
            placeholder="Pegá tu fixture acá..."
            style={{...inputStyle, fontFamily:"var(--mono)", fontSize:13, resize:"vertical"}}/>

          {pasteText.trim() && (
            <details style={{marginTop:10, fontSize:11, color:"var(--white-dim)"}}>
              <summary style={{cursor:"pointer", padding:"4px 0"}}>🐛 Ver debug del parser</summary>
              <div style={{marginTop:8, padding:10, background:"rgba(0,0,0,0.3)", borderRadius:4, maxHeight:300, overflowY:"auto"}}>
                <div style={{fontFamily:"var(--mono)", fontSize:10, color:"var(--gold)", marginBottom:6}}>
                  TEXTO NORMALIZADO ({pasteText.length} chars in → {normalizeAAHBAText(pasteText).length} chars out):
                </div>
                <pre style={{fontFamily:"var(--mono)", fontSize:10, color:"var(--white-soft)", whiteSpace:"pre-wrap", marginBottom:10}}>{normalizeAAHBAText(pasteText)}</pre>
                <div style={{fontFamily:"var(--mono)", fontSize:10, color:"var(--plat)", marginBottom:6}}>
                  BLOQUES PARSEADOS: {parseAAHBABlocks(pasteText).length}
                </div>
                <pre style={{fontFamily:"var(--mono)", fontSize:10, color:"var(--white-soft)", whiteSpace:"pre-wrap"}}>{
                  parseAAHBABlocks(pasteText).map(b => `F${b.fecha_num} | ${b.fechaISO || "(sin fecha)"} ${b.kick_time} | LOCAL: ${b.localRaw} | VISITANTE: ${b.visitanteRaw}`).join("\n")
                }</pre>
              </div>
            </details>
          )}

          <div style={{display:"flex", gap:10, marginTop:14}}>
            <button onClick={handleCancel} style={{...btnGhost, flex:1}}>Cancelar</button>
            <button onClick={handleProcess} disabled={!pasteText.trim()} style={{...btnPrimary, flex:2}}>
              Procesar →
            </button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  FECHA EDITOR (editar una fecha individual o agregar manualmente)
    // ═══════════════════════════════════════════════════════════════════════════

    function FechaEditor({ fecha, club, session, onSave, onCancel }) {
      const isNew = !fecha.id;
      const [data, setData] = useState({
        fecha_num: fecha.fecha_num || 1,
        rueda: fecha.rueda || club.default_rueda || 1,
        fecha_date: fecha.fecha_date || "",
        rival: fecha.rival || "",
        condition: fecha.condition || "Local",
        location: fecha.location || (fecha.condition === "Local" ? club.default_cancha || "" : ""),
        maps_url: fecha.maps_url || "",
        kick_time: fecha.kick_time || club.default_kick_time || "",
        citacion_time: fecha.citacion_time || club.default_citacion_time || "",
        kit: fecha.kit || "titular",
        formacion: fecha.formacion || "4-3-3",
      });
      const [saving, setSaving] = useState(false);
      const [rivalVariants, setRivalVariants] = useState([]); // [{ id, nombre_key, nombre_display, cancha, maps_url }, ...]
      const [selectedVariantIdx, setSelectedVariantIdx] = useState(-1); // índice elegido si hay multi

      const u = (k, v) => setData(d => ({...d, [k]: v}));

      // Cuando cambia condición, ajustar cancha
      useEffect(() => {
        if (data.condition === "Local" && !data.location) {
          u("location", club.default_cancha || "");
        }
      }, [data.condition]);

      // Cuando el rival cambia y soy visitante, buscar variantes en la tabla global
      useEffect(() => {
        if (data.condition !== "Visitante" || !data.rival.trim()) {
          setRivalVariants([]);
          setSelectedVariantIdx(-1);
          return;
        }
        let cancelled = false;
        (async () => {
          const variants = await findRivalGlobalVariants(data.rival);
          if (cancelled) return;
          setRivalVariants(variants);
          // Auto-aplicar UNA SOLA variante si el campo location está vacío
          if (variants.length === 1 && !data.location?.trim()) {
            const v = variants[0];
            setData(d => ({
              ...d,
              location: v.cancha || d.location,
              maps_url: v.maps_url || d.maps_url,
            }));
            setSelectedVariantIdx(0);
          } else if (variants.length > 1) {
            // Si hay múltiples variantes, intentar elegir la que matchea la cancha actual
            const matchByLocation = variants.findIndex(v => v.cancha === data.location);
            setSelectedVariantIdx(matchByLocation >= 0 ? matchByLocation : -1);
          }
        })();
        return () => { cancelled = true; };
      }, [data.rival, data.condition]);

      const applyVariant = (idx) => {
        const v = rivalVariants[idx];
        if (!v) return;
        setSelectedVariantIdx(idx);
        setData(d => ({
          ...d,
          location: v.cancha || d.location,
          maps_url: v.maps_url || d.maps_url,
        }));
      };

      // El rival "info" que se muestra como cartel (la variante elegida o la primera)
      const rivalGlobalInfo = selectedVariantIdx >= 0 ? rivalVariants[selectedVariantIdx] : (rivalVariants[0] || null);
      const applyGlobalRival = () => {
        if (rivalGlobalInfo) applyVariant(rivalVariants.indexOf(rivalGlobalInfo));
      };

      const handleSave = async () => {
        if (!data.rival.trim()) return alert("Ingresá el rival.");
        if (!data.fecha_date) return alert("Ingresá la fecha del partido.");

        // Si cambió la formación en una fecha existente, las posiciones de cancha del 4-3-3
        // pueden no ser válidas en la nueva formación (ej. LB no existe en 3-4-3).
        // Para evitar jugadores "huérfanos", reseteamos todos los es_titular/field_pos.
        const formacionCambio = !isNew && data.formacion !== fecha.formacion;
        if (formacionCambio) {
          if (!confirm(
            `Cambiaste la formación de ${fecha.formacion} a ${data.formacion}.\n\n` +
            `Para evitar inconsistencias, todos los jugadores convocados van a volver al banco. ` +
            `Después vas a poder reasignarlos en la nueva formación desde la pestaña FORMACIÓN.\n\n` +
            `¿Continuar?`
          )) return;
        }

        setSaving(true);
        const payload = { ...data, club_id: club.id };
        const { error } = isNew
          ? await sb.from("fechas").insert(payload)
          : await sb.from("fechas").update(payload).eq("id", fecha.id);

        // Si cambió la formación, resetear titulares/posiciones de todos los convocados
        if (!error && formacionCambio) {
          await sb.from("fecha_jugadores")
            .update({ es_titular: null, field_pos: null })
            .eq("fecha_id", fecha.id);
        }

        // Si es visitante con datos de cancha/maps, propagar a tabla global de rivales
        if (!error && data.condition === "Visitante" && data.rival.trim() && data.rival !== "LIBRE" &&
            (data.location?.trim() || data.maps_url?.trim())) {
          await upsertRivalGlobal(data.rival, data.location, data.maps_url, session?.user?.email);
        }

        setSaving(false);
        if (error) { alert("Error: " + error.message); return; }
        onSave();
      };

      return (
        <div>
          <div style={{fontSize:13, fontWeight:700, marginBottom:14, color:"var(--plat)"}}>
            {isNew ? "+ Nueva fecha" : `✏️ Editar Fecha ${fecha.fecha_num}`}
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
            <Field label="Nº fecha">
              <input type="number" value={data.fecha_num} onChange={e => u("fecha_num", parseInt(e.target.value) || 1)} style={inputStyle}/>
            </Field>
            <Field label="Rueda">
              <select value={data.rueda} onChange={e => u("rueda", parseInt(e.target.value))} style={inputStyle}>
                <option value="1">Rueda 1</option>
                <option value="2">Rueda 2</option>
              </select>
            </Field>
          </div>
          <Field label="Fecha del partido">
            <input type="date" value={data.fecha_date} onChange={e => u("fecha_date", e.target.value)} style={inputStyle}/>
          </Field>
          <Field label="Rival">
            <input type="text" value={data.rival} onChange={e => u("rival", e.target.value)} style={inputStyle} placeholder="Ej: Hurling Club"/>
          </Field>
          <Field label="Condición">
            <select value={data.condition} onChange={e => u("condition", e.target.value)} style={inputStyle}>
              <option value="Local">Local</option>
              <option value="Visitante">Visitante</option>
            </select>
          </Field>
          {rivalVariants.length > 0 && data.condition === "Visitante" && (
            <div style={{
              padding:"10px 12px", background:"var(--gold-dim)",
              border:"1px solid rgba(240,208,80,0.3)", borderRadius:6, marginBottom:12,
              fontSize:12
            }}>
              <div style={{fontSize:10, fontFamily:"var(--mono)", color:"var(--gold)", letterSpacing:2, marginBottom:6}}>
                💡 RIVAL CONOCIDO EN LA PLATAFORMA
              </div>
              {/* Si hay múltiples variantes, dropdown para elegir */}
              {rivalVariants.length > 1 ? (
                <>
                  <div style={{fontSize:11, color:"var(--white-soft)", marginBottom:6}}>
                    Este rival tiene <strong>{rivalVariants.length} canchas</strong> distintas. ¿En cuál se juega?
                  </div>
                  <select value={selectedVariantIdx} onChange={e => {
                    const idx = parseInt(e.target.value);
                    if (idx >= 0) applyVariant(idx);
                    else setSelectedVariantIdx(-1);
                  }} style={{...inputStyle, fontSize:12, marginBottom:6}}>
                    <option value={-1}>— Elegir cancha —</option>
                    {rivalVariants.map((v, i) => (
                      <option key={v.id} value={i}>
                        {v.nombre_display || v.cancha || v.nombre_key}
                      </option>
                    ))}
                  </select>
                </>
              ) : (
                <div style={{color:"var(--white-soft)", lineHeight:1.5, marginBottom:8}}>
                  {rivalGlobalInfo?.cancha && <>Cancha registrada: <strong style={{color:"var(--white)"}}>{rivalGlobalInfo.cancha}</strong></>}
                  {rivalGlobalInfo?.cancha && rivalGlobalInfo?.maps_url && " · "}
                  {rivalGlobalInfo?.maps_url && <a href={rivalGlobalInfo.maps_url} target="_blank" rel="noopener" style={{color:"var(--plat)"}}>Ver maps ↗</a>}
                </div>
              )}
              {rivalGlobalInfo && ((rivalGlobalInfo.cancha && rivalGlobalInfo.cancha !== data.location) ||
                (rivalGlobalInfo.maps_url && rivalGlobalInfo.maps_url !== data.maps_url)) && (
                <button onClick={applyGlobalRival} type="button" style={{...btnSecondary, padding:"6px 12px", fontSize:11}}>
                  Usar estos datos
                </button>
              )}
            </div>
          )}
          <Field label="Cancha / Lugar">
            <input type="text" value={data.location} onChange={e => u("location", e.target.value)} style={inputStyle} placeholder="Ej: GEBA"/>
          </Field>
          <Field label="Link Maps (opcional)">
            <input type="text" value={data.maps_url} onChange={e => u("maps_url", e.target.value)} style={inputStyle} placeholder="https://maps.google.com/..."/>
          </Field>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
            <Field label="Hora citación">
              <input type="text" value={data.citacion_time} onChange={e => u("citacion_time", e.target.value)} style={inputStyle} placeholder="HH:MM"/>
            </Field>
            <Field label="Hora inicio">
              <input type="text" value={data.kick_time} onChange={e => u("kick_time", e.target.value)} style={inputStyle} placeholder="HH:MM"/>
            </Field>
          </div>
          <Field label="Camiseta" hint={
            data.kit === "titular" ? (club.kit_titular ? `Se usará la camiseta titular: "${club.kit_titular}"` : "Se usará la camiseta titular del club.") :
            data.kit === "suplente" ? (club.kit_suplente ? `Se usará la camiseta suplente: "${club.kit_suplente}"` : "Se usará la camiseta suplente del club.") :
            "Sin definir todavía"
          }>
            <select value={data.kit} onChange={e => u("kit", e.target.value)} style={inputStyle}>
              <option value="titular">Titular</option>
              <option value="suplente">Suplente</option>
              <option value="sin_definir">Sin definir todavía</option>
            </select>
          </Field>
          <div style={{display:"flex", gap:10, marginTop:14}}>
            <button onClick={onCancel} disabled={saving} style={{...btnGhost, flex:1}}>Cancelar</button>
            <button onClick={handleSave} disabled={saving} style={{...btnPrimary, flex:2}}>
              {saving ? "Guardando..." : (isNew ? "✓ Crear fecha" : "✓ Guardar cambios")}
            </button>
          </div>

          {/* ── PANEL DE CONVOCATORIA · solo si la fecha ya existe ───────── */}
          {!isNew && (
            <ConvocatoriaAdmin fecha={fecha} club={club} session={session}/>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  CONVOCATORIA ADMIN · panel de edición dentro de FechaEditor
    //  2 tabs:
    //    📋 Convocatoria: lista del plantel con botones CONV/DUDA/BAJA + motivos
    //    🏑 Formación inicial: (placeholder por ahora, se hace en Paso 5)
    // ═══════════════════════════════════════════════════════════════════════════

    function ConvocatoriaAdmin({ fecha, club, session }) {
      const [tab, setTab] = usePersistedState(`conv_admin_${fecha.id}_tab`, "convocatoria");
      const [jugadores, setJugadores] = useState([]);
      const [convRows, setConvRows] = useState([]); // fecha_jugadores existentes
      const [loading, setLoading] = useState(true);
      const [formacion, setFormacion] = useState(fecha.formacion || "4-3-3");
      const [savingFormacion, setSavingFormacion] = useState(false);

      // Cargar plantel y convocatoria
      const load = useCallback(async () => {
        setLoading(true);
        const [jRes, cRes] = await Promise.all([
          sb.from("jugadores").select("*").eq("club_id", club.id).order("numero", { ascending: true }),
          sb.from("fecha_jugadores").select("*").eq("fecha_id", fecha.id),
        ]);
        setJugadores(jRes.data || []);
        setConvRows(cRes.data || []);
        setLoading(false);
      }, [club.id, fecha.id]);

      useEffect(() => { load(); }, [load]);

      // Guardar/actualizar el estado de un jugador
      const updateJugador = async (jugadorId, updates) => {
        const existing = convRows.find(r => r.jugador_id === jugadorId);
        // Optimistic update
        const newRow = existing
          ? { ...existing, ...updates }
          : { jugador_id: jugadorId, fecha_id: fecha.id, status: "duda", ...updates };
        setConvRows(prev => existing
          ? prev.map(r => r.jugador_id === jugadorId ? newRow : r)
          : [...prev, newRow]
        );
        // Persistir
        if (existing) {
          await sb.from("fecha_jugadores").update(updates).eq("id", existing.id);
        } else {
          const { data: inserted } = await sb.from("fecha_jugadores").insert({
            fecha_id: fecha.id, jugador_id: jugadorId, status: "duda", ...updates
          }).select().single();
          if (inserted) {
            setConvRows(prev => prev.map(r => r.jugador_id === jugadorId ? inserted : r));
          }
        }
      };

      // Cambiar formación (persiste en la fecha)
      const handleFormacion = async (val) => {
        setFormacion(val);
        setSavingFormacion(true);
        await sb.from("fechas").update({ formacion: val }).eq("id", fecha.id);
        setSavingFormacion(false);
      };

      // Solo jugadores activos
      const jugadoresActivos = jugadores.filter(j => !j.estado || j.estado === "activo");

      // Contadores
      const getStatus = (j) => {
        const row = convRows.find(r => r.jugador_id === j.id);
        return row?.status || "duda";
      };
      const counts = {
        convocados: jugadoresActivos.filter(j => getStatus(j) === "convocado").length,
        duda:       jugadoresActivos.filter(j => getStatus(j) === "duda").length,
        baja:       jugadoresActivos.filter(j => getStatus(j) === "baja").length,
      };

      return (
        <div style={{marginTop:26, paddingTop:20, borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{
            padding:"10px 14px", background:"var(--gold-dim)", border:"1px solid rgba(240,208,80,0.3)",
            borderRadius:6, marginBottom:14
          }}>
            <div style={{fontSize:10, letterSpacing:2, color:"var(--gold)", fontFamily:"var(--mono)", marginBottom:2, fontWeight:700}}>
              ⚙ MODO ADMINISTRADOR
            </div>
            <div style={{fontSize:11, color:"var(--white-soft)"}}>
              Los cambios se guardan automáticamente en cada acción.
            </div>
          </div>

          {/* Contadores chicos */}
          <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14}}>
            <CounterBox value={counts.convocados} label={`CONVOCADOS (máx ${MAX_CONVOCADOS})`}
              color={counts.convocados > MAX_CONVOCADOS ? "var(--red)" : counts.convocados === MAX_CONVOCADOS ? "var(--orange)" : "var(--green)"}/>
            <CounterBox value={counts.duda}       label="EN DUDA"    color="var(--orange)"/>
            <CounterBox value={counts.baja}       label="BAJAS"      color="var(--red)"/>
          </div>

          {/* Banner de advertencia del límite */}
          {counts.convocados > MAX_CONVOCADOS && (
            <div style={{padding:"10px 14px", background:"rgba(232,85,85,0.12)", border:"1px solid var(--red)", borderRadius:6, marginBottom:14, fontSize:12, color:"var(--white-soft)"}}>
              <strong style={{color:"var(--red)"}}>⚠️ Superaste el máximo de {MAX_CONVOCADOS} convocados</strong>
              <div style={{fontSize:11, marginTop:2, color:"var(--white-dim)"}}>El reglamento AAHBA permite hasta {MAX_CONVOCADOS} jugadores por partido. Sacá a alguien de la lista.</div>
            </div>
          )}
          {counts.convocados === MAX_CONVOCADOS && (
            <div style={{padding:"8px 12px", background:"rgba(240,208,80,0.10)", border:"1px solid rgba(240,208,80,0.4)", borderRadius:6, marginBottom:14, fontSize:11, color:"var(--white-soft)"}}>
              ⚠️ Llegaste al máximo de {MAX_CONVOCADOS} convocados (reglamento AAHBA).
            </div>
          )}

          {/* Tabs */}
          <div style={{display:"flex", gap:4, marginBottom:14, flexWrap:"wrap"}}>
            {[
              { id:"convocatoria", icon:"📋", label:"CONVOCATORIA" },
              { id:"formacion",    icon:"🏑", label:"FORMACIÓN" },
              { id:"vivo",         icon:"🎮", label:"VIVO" },
              { id:"resultado",    icon:"🏆", label:"RESULTADO" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex:1, minWidth:"22%", padding:"11px 6px", fontSize:10, fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700,
                border: tab === t.id ? `1px solid ${club.theme_primary}` : "1px solid rgba(255,255,255,0.08)",
                background: tab === t.id ? `${club.theme_primary}1F` : "transparent",
                color: tab === t.id ? club.theme_primary : "var(--white-dim)", borderRadius:6
              }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {loading ? (
            <div style={{textAlign:"center", padding:20}}><div className="spinner" style={{margin:"0 auto"}}/></div>
          ) : tab === "convocatoria" ? (
            <ConvocatoriaTabContent
              fecha={fecha}
              club={club}
              jugadores={jugadoresActivos}
              convRows={convRows}
              onUpdate={updateJugador}
              convocadosCount={counts.convocados}
              reload={load}
            />
          ) : tab === "formacion" ? (
            <FormacionTabContent
              fecha={fecha}
              club={club}
              jugadores={jugadoresActivos}
              convRows={convRows}
              formacion={formacion}
              onFormacionChange={handleFormacion}
              savingFormacion={savingFormacion}
              onUpdate={updateJugador}
            />
          ) : tab === "vivo" ? (
            <VivoTabContent
              fecha={fecha}
              club={club}
              jugadores={jugadoresActivos}
              convRows={convRows}
              reload={load}
            />
          ) : (
            <ResultadoTabContent
              fecha={fecha}
              club={club}
              jugadores={jugadoresActivos}
              convRows={convRows}
              onUpdate={updateJugador}
              reload={load}
            />
          )}
        </div>
      );
    }

    // ─── Tab Convocatoria: lista de jugadores con botones CONV/DUDA/BAJA ────
    function ConvocatoriaTabContent({ fecha, club, jugadores, convRows, onUpdate, convocadosCount, reload }) {
      const [copiando, setCopiando] = useState(false);

      const copiarFechaAnterior = async () => {
        if (!fecha.fecha_date) {
          alert("Esta fecha no tiene una fecha real cargada. Editala primero para poder buscar la anterior.");
          return;
        }
        setCopiando(true);
        try {
          // 1. Buscar la fecha inmediata anterior (por fecha_date) del mismo club
          const { data: anteriores, error: errFecha } = await sb
            .from("fechas")
            .select("id, fecha_num, fecha_date, rival, formacion")
            .eq("club_id", club.id)
            .lt("fecha_date", fecha.fecha_date)
            .not("fecha_date", "is", null)
            .order("fecha_date", { ascending: false })
            .limit(1);
          if (errFecha) throw errFecha;
          if (!anteriores || anteriores.length === 0) {
            alert("No hay una fecha anterior con fecha real cargada para copiar.");
            return;
          }
          const fechaAnterior = anteriores[0];

          // 2. Pedir confirmación
          if (!confirm(
            `¿Copiar la convocatoria de la fecha anterior?\n\n` +
            `Origen: F${fechaAnterior.fecha_num} (${fechaAnterior.fecha_date}) · ${fechaAnterior.rival}\n` +
            `Destino: F${fecha.fecha_num} · ${fecha.rival}\n\n` +
            `Se va a pisar TODO lo que tengas cargado en esta fecha:\n` +
            `  • Estados (CONV/DUDA/BAJA) y motivos\n` +
            `  • Formación (${fechaAnterior.formacion || "—"})\n` +
            `  • Posiciones de cancha (titulares y banco)\n\n` +
            `Esta acción no se puede deshacer.`
          )) return;

          // 3. Traer los fecha_jugadores de la fecha anterior
          const { data: rowsAnteriores, error: errRows } = await sb
            .from("fecha_jugadores")
            .select("jugador_id, status, motivo, es_titular, field_pos")
            .eq("fecha_id", fechaAnterior.id);
          if (errRows) throw errRows;

          // 4. Actualizar la formación de la fecha actual (si la anterior tiene una)
          if (fechaAnterior.formacion) {
            await sb.from("fechas")
              .update({ formacion: fechaAnterior.formacion })
              .eq("id", fecha.id);
          }

          // 5. Borrar todos los fecha_jugadores actuales y recrearlos con los datos copiados
          await sb.from("fecha_jugadores").delete().eq("fecha_id", fecha.id);

          if (rowsAnteriores && rowsAnteriores.length > 0) {
            // Solo copiar los jugadores que siguen activos en el plantel actual
            const idsActivos = new Set(jugadores.map(j => j.id));
            const payload = rowsAnteriores
              .filter(r => idsActivos.has(r.jugador_id))
              .map(r => ({
                fecha_id: fecha.id,
                jugador_id: r.jugador_id,
                status: r.status,
                motivo: r.motivo,
                es_titular: r.es_titular,
                field_pos: r.field_pos,
              }));
            if (payload.length > 0) {
              const { error: errInsert } = await sb.from("fecha_jugadores").insert(payload);
              if (errInsert) throw errInsert;
            }
          }

          alert(`✓ Convocatoria copiada de F${fechaAnterior.fecha_num}.`);
          if (reload) await reload();
        } catch (e) {
          alert("Error al copiar: " + e.message);
        } finally {
          setCopiando(false);
        }
      };

      if (jugadores.length === 0) {
        return (
          <div style={{padding:24, textAlign:"center", background:"rgba(255,255,255,0.02)", borderRadius:6, fontSize:12, color:"var(--white-dim)"}}>
            No hay jugadores activos en el plantel. Cargá jugadores desde la pestaña Plantel.
          </div>
        );
      }
      return (
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {/* Botón copiar de fecha anterior */}
          <button onClick={copiarFechaAnterior} disabled={copiando} style={{
            padding:"8px 12px", fontSize:11, fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700,
            background:"rgba(255,255,255,0.03)", border:"1px dashed rgba(255,255,255,0.18)",
            color:"var(--white-soft)", borderRadius:6, cursor: copiando ? "wait" : "pointer",
            marginBottom:4
          }}>
            {copiando ? "Copiando..." : "📎 Copiar convocatoria de la fecha anterior"}
          </button>
          {jugadores.map(j => {
            const row = convRows.find(r => r.jugador_id === j.id);
            return <ConvocatoriaJugadorRow key={j.id} jugador={j} row={row} onUpdate={(updates) => onUpdate(j.id, updates)} convocadosCount={convocadosCount}/>;
          })}
        </div>
      );
    }

    function ConvocatoriaJugadorRow({ jugador, row, onUpdate, convocadosCount }) {
      const status = row?.status || "duda";
      const motivo = row?.motivo || "";
      const posShort = getPositionShort(jugador.posicion);
      // Si este jugador NO está convocado y ya hay 20 → deshabilitar el botón CONV
      const convDisabled = status !== "convocado" && convocadosCount >= MAX_CONVOCADOS;

      const lineColor = getPositionColor(jugador.posicion);

      const setStatus = (newStatus) => {
        // Si va a convocado y ya está en el límite, no permitir
        if (newStatus === "convocado" && convDisabled) return;
        const updates = { status: newStatus };
        if (newStatus === "convocado") updates.motivo = null;
        onUpdate(updates);
      };

      const setMotivo = (m) => onUpdate({ motivo: m || null });

      return (
        <div style={{padding:12, background:"rgba(255,255,255,0.02)", borderRadius:6}}>
          {/* Fila principal: badge + nombre + 3 botones */}
          <div style={{display:"flex", alignItems:"center", gap:10}}>
            {posShort && (
              <span style={{
                fontSize:9, fontFamily:"var(--mono)", fontWeight:800, letterSpacing:1,
                padding:"3px 6px", borderRadius:3, color:"var(--bg)",
                background:lineColor, flexShrink:0
              }}>
                {posShort}
              </span>
            )}
            <div style={{flex:1, minWidth:0, fontSize:13, fontWeight:600}}>
              {jugador.nombre || "(sin nombre)"}
              {jugador.numero != null && (
                <span style={{marginLeft:6, fontSize:10, color:"var(--white-dim)", fontFamily:"var(--mono)"}}>#{jugador.numero}</span>
              )}
            </div>
            <div style={{display:"flex", gap:3, flexShrink:0}}>
              {CONV_STATUS.map(s => {
                const isDisabled = s.value === "convocado" && convDisabled;
                return (
                  <button key={s.value} onClick={() => setStatus(s.value)}
                    disabled={isDisabled}
                    title={isDisabled ? `Ya hay ${MAX_CONVOCADOS} convocados (máximo por reglamento)` : ""}
                    style={{
                      padding:"5px 9px", fontSize:9, fontFamily:"var(--mono)", letterSpacing:1.5, fontWeight:700,
                      border: status === s.value ? `1px solid ${s.color}` : "1px solid rgba(255,255,255,0.1)",
                      background: status === s.value ? `${s.color}1F` : "transparent",
                      color: status === s.value ? s.color : "var(--white-dim)",
                      borderRadius:3,
                      opacity: isDisabled ? 0.3 : 1,
                      cursor: isDisabled ? "not-allowed" : "pointer"
                    }}>
                  {s.value === "convocado" && "CONV"}
                  {s.value === "duda" && "DUDA"}
                  {s.value === "baja" && "BAJA"}
                </button>
                );
              })}
            </div>
          </div>

          {/* Motivo (solo si DUDA o BAJA) */}
          {(status === "duda" || status === "baja") && (
            <div style={{marginTop:8, display:"flex", alignItems:"center", gap:8}}>
              <span style={{fontSize:9, color:"var(--white-dim)", fontFamily:"var(--mono)", letterSpacing:1.5, flexShrink:0}}>MOTIVO:</span>
              <select value={motivo} onChange={e => setMotivo(e.target.value)} style={{...inputStyle, flex:1, padding:"5px 8px", fontSize:11}}>
                <option value="">-- Sin especificar --</option>
                {MOTIVOS_CONV.map(m => (
                  <option key={m.value} value={m.value}>{m.icon} {m.label}</option>
                ))}
              </select>
            </div>
          )}
        </div>
      );
    }

    // ─── Tab Formación inicial: placeholder ────────────────────────────────────
    function FormacionTabContent({ fecha, club, jugadores, convRows, formacion, onFormacionChange, savingFormacion, onUpdate }) {
      const positions = getFormationPositions(formacion);
      // Lista de convocados (los demás se descartan, están en duda o baja)
      const convocados = jugadores.filter(j => {
        const row = convRows.find(r => r.jugador_id === j.id);
        return row?.status === "convocado";
      });

      // Helpers para sacar la info de cada convocado
      const rowOf = (jugadorId) => convRows.find(r => r.jugador_id === jugadorId);
      const titularDe = (fieldPos) => {
        // Quién tiene esta posición asignada
        return convocados.find(j => {
          const r = rowOf(j.id);
          return r?.es_titular === true && r?.field_pos === fieldPos;
        });
      };

      // Construir arrays para HockeyField
      const titulares = convocados
        .filter(j => {
          const r = rowOf(j.id);
          return r?.es_titular === true && r?.field_pos && r?.field_pos !== "SUB";
        })
        .map(j => {
          const r = rowOf(j.id);
          return { jugador_id: j.id, jugador: j, field_pos: r.field_pos };
        });
      const suplentes = convocados
        .filter(j => {
          const r = rowOf(j.id);
          return r?.es_titular === false || r?.field_pos === "SUB";
        })
        .map(j => ({ jugador_id: j.id, jugador: j }));
      const sinAsignar = convocados.filter(j => {
        const r = rowOf(j.id);
        return r?.es_titular == null; // null o undefined
      });

      // Cambiar posición de un jugador (titular en field_pos, o SUB, o sin asignar)
      const setPosicion = (jugadorId, newPos) => {
        if (!newPos) {
          // Limpiar (volverlo a "convocado pero sin definir si titular o suplente")
          onUpdate(jugadorId, { es_titular: null, field_pos: null });
        } else if (newPos === "SUB") {
          onUpdate(jugadorId, { es_titular: false, field_pos: null });
        } else {
          // Si ya hay alguien en esa posición, lo dejamos sin asignar
          const existing = titularDe(newPos);
          if (existing && existing.id !== jugadorId) {
            onUpdate(existing.id, { es_titular: null, field_pos: null });
          }
          onUpdate(jugadorId, { es_titular: true, field_pos: newPos });
        }
      };

      if (convocados.length === 0) {
        return (
          <div>
            <FormacionHeader formacion={formacion} onFormacionChange={onFormacionChange} savingFormacion={savingFormacion}/>
            <div style={{padding:24, textAlign:"center", background:"rgba(255,255,255,0.02)", borderRadius:6, fontSize:12, color:"var(--white-dim)", lineHeight:1.5}}>
              Todavía no marcaste a nadie como CONVOCADO.<br/>
              Volvé a la pestaña <strong>📋 CONVOCATORIA</strong> y marcá a los jugadores que van.
            </div>
          </div>
        );
      }

      return (
        <div>
          <FormacionHeader formacion={formacion} onFormacionChange={onFormacionChange} savingFormacion={savingFormacion}/>

          {/* Campo SVG con drag & drop */}
          <div style={{padding:14, background:"rgba(0,0,0,0.2)", borderRadius:6, marginBottom:14}}>
            <DraggableHockeyField
              formacion={formacion}
              convocados={convocados}
              rowOf={rowOf}
              themeColor={club.theme_primary}
              onPosicionChange={setPosicion}
              onClearAll={() => {
                // Sacar a todos los titulares y mandarlos a suplente
                convocados.forEach(j => {
                  const r = rowOf(j.id);
                  if (r?.es_titular === true) {
                    onUpdate(j.id, { es_titular: false, field_pos: null });
                  }
                });
              }}
            />
          </div>

          {sinAsignar.length > 0 && (
            <div style={{marginBottom:10, padding:10, background:"rgba(240,208,80,0.08)", border:"1px solid rgba(240,208,80,0.3)", borderRadius:6, fontSize:11, color:"var(--white-soft)"}}>
              ⚠️ {sinAsignar.length} jugador{sinAsignar.length > 1 ? "es" : ""} sin asignar — aparecen en la zona de suplentes.
            </div>
          )}

          {/* Dropdown clásico (secundario, colapsado) */}
          <DropdownAsignador
            convocados={convocados}
            rowOf={rowOf}
            positions={positions}
            setPosicion={setPosicion}
          />
        </div>
      );
    }

    // ─── Asignador clásico por dropdown (modo secundario, colapsado) ─────────
    function DropdownAsignador({ convocados, rowOf, positions, setPosicion }) {
      const [open, setOpen] = useState(false);
      return (
        <CollapsibleSection
          title="ASIGNAR POR LISTA"
          icon="📋"
          count={convocados.length}
          countColor="var(--plat)"
          open={open}
          onToggle={() => setOpen(v => !v)}
        >
          <div style={{padding:10}}>
            <div style={{fontSize:11, color:"var(--white-dim)", marginBottom:8, lineHeight:1.4}}>
              Si preferís asignar las posiciones desde un dropdown en vez de arrastrar:
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:6}}>
              {convocados.map(j => {
                const r = rowOf(j.id);
                const currentPos = r?.es_titular ? r.field_pos : (r?.es_titular === false ? "SUB" : "");
                return (
                  <div key={j.id} style={{padding:8, background:"rgba(255,255,255,0.02)", borderRadius:6, display:"flex", alignItems:"center", gap:10}}>
                    <span style={{minWidth:28, fontSize:11, fontWeight:900, color:"var(--white-soft)", fontFamily:"var(--mono)", textAlign:"center", flexShrink:0}}>
                      {j.numero ?? "--"}
                    </span>
                    <div style={{flex:1, minWidth:0, fontSize:11, fontWeight:600}}>
                      {j.nombre || "(sin nombre)"}
                    </div>
                    <select value={currentPos} onChange={e => setPosicion(j.id, e.target.value)} style={{...inputStyle, width:130, padding:"4px 6px", fontSize:10, flexShrink:0}}>
                      <option value="">— Sin asignar —</option>
                      <option value="SUB">🟥 Suplente</option>
                      <optgroup label="En cancha">
                        {Object.entries(positions).map(([key, p]) => (
                          <option key={key} value={key}>{key} · {p.label}</option>
                        ))}
                      </optgroup>
                    </select>
                  </div>
                );
              })}
            </div>
          </div>
        </CollapsibleSection>
      );
    }

    // ─── Tab Resultado: editar goles, goleadores, tarjetas, árbitros ──────────
    // ═══════════════════════════════════════════════════════════════════════════
    //  TAB VIVO · Gestión de cambios en vivo durante un partido
    //  - Reloj de 4 cuartos de 15 min cada uno
    //  - Drag de suplente → titular = marcar cambio pendiente (línea uniendo)
    //  - Confirmar cambios → animación → guardar en localStorage
    //  - Al final, "Finalizar partido" vuelca todo a Supabase
    // ═══════════════════════════════════════════════════════════════════════════

    // Helper: clave de localStorage por fecha
    const vivoKey = fechaId => `vivo_${fechaId}`;
    const CUARTO_DURACION = 15 * 60; // 15 min en segundos
    // Genera 4 tonos del color base del club: Q1 (más oscuro) → Q4 (más claro).
    // Recibe un hex (#RRGGBB) y devuelve un objeto { q1, q2, q3, q4 } con tonos en CSS color-mix.
    function getCuartoColors(baseColor) {
      const c = baseColor || "#2D9D6F";
      // Usamos opacidades sobre el color base + un overlay blanco para los tonos más claros.
      // Q1 = base 100%, Q2 = mezcla con 18% blanco, Q3 = 35%, Q4 = 55%.
      return {
        q1: c,
        q2: `color-mix(in srgb, ${c} 82%, white 18%)`,
        q3: `color-mix(in srgb, ${c} 65%, white 35%)`,
        q4: `color-mix(in srgb, ${c} 45%, white 55%)`,
      };
    }
    const CUARTO_LABELS = ["Q1", "Q2", "Q3", "Q4"];

    function VivoTabContent({ fecha, club, jugadores, convRows, reload }) {
      const positions = getFormationPositions(fecha.formacion || "4-3-3");

      // ─── Estado persistente en localStorage ───────────────────────────────
      // Estructura: {
      //   cuarto: 1-4,
      //   segundosCuarto: 0-900,
      //   isRunning: bool,
      //   lastTickAt: timestamp (cuando se inició el último tramo)
      //   formacionActual: { jugador_id: field_pos } (mapa actual)
      //   minutosJugados: { jugador_id: segundos }
      //   cambios: [{ cuarto, minuto_cuarto, sale_id, entra_id, field_pos }]
      // }
      const loadState = () => {
        try {
          const raw = localStorage.getItem(vivoKey(fecha.id));
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        // Estado inicial desde la formación inicial guardada
        const formacionActual = {};
        const minutosJugados = {};
        const tiempoSinCambio = {};
        // minutosPorCuarto: { jugadorId: { q1: segs, q2: segs, q3: segs, q4: segs } }
        const minutosPorCuarto = {};
        for (const j of jugadores) {
          const r = convRows.find(x => x.jugador_id === j.id);
          if (r?.status === "convocado") {
            minutosJugados[j.id] = 0;
            tiempoSinCambio[j.id] = 0;
            minutosPorCuarto[j.id] = { q1: 0, q2: 0, q3: 0, q4: 0 };
            if (r.es_titular === true && r.field_pos) {
              formacionActual[j.id] = r.field_pos;
            }
          }
        }
        return {
          cuarto: 1,
          segundosCuarto: 0,
          isRunning: false,
          // startedAt: timestamp (ms) cuando arrancó este tramo de JUGAR
          // Si el reloj está pausado: null
          // Cada vez que se aprieta JUGAR: Date.now()
          // Cada vez que se pausa o se confirma cambio: null (los valores se persisten en sus campos)
          startedAt: null,
          formacionActual,
          minutosJugados,
          tiempoSinCambio,
          minutosPorCuarto,
          cambios: [],
        };
      };

      const [state, setState] = useState(loadState);
      const [cambiosPendientes, setCambiosPendientes] = useState([]); // [{ sale_id, entra_id }]
      const [draggingId, setDraggingId] = useState(null); // jugador que estoy arrastrando
      const [dragPos, setDragPos] = useState(null); // { x, y } posición actual del drag
      const [animating, setAnimating] = useState(false); // mientras se ejecuta la animación de cambio
      const [finalizando, setFinalizando] = useState(false);
      // Si el partido ya fue finalizado y subido a DB
      // Estructura: null = aún chequeando, false = no finalizado, { cambios: [], minutos: {} } = finalizado
      const [partidoFinalizado, setPartidoFinalizado] = useState(null);
      // Modo de visualización de minutos jugados en pantalla post-finalización: "list" | "bars"
      const [minutosViewMode, setMinutosViewMode] = useState("list");
      const svgRef = useRef(null);

      // ─── Check al cargar: ya hay cambios en DB para esta fecha? ──────────
      useEffect(() => {
        (async () => {
          const { data: cambiosDb } = await sb
            .from("cambios")
            .select("*, sale:sale_jugador_id(nombre,apodo,numero), entra:entra_jugador_id(nombre,apodo,numero)")
            .eq("fecha_id", fecha.id)
            .order("cuarto", { ascending: true })
            .order("minuto_cuarto", { ascending: true });
          // También chequear si algún jugador tiene minutos_jugados cargados
          const hayMinutos = convRows.some(r => (r.minutos_jugados || 0) > 0);
          if ((cambiosDb && cambiosDb.length > 0) || hayMinutos) {
            const minutosMap = {};
            const porCuartoMap = {};
            for (const r of convRows) {
              if (r.minutos_jugados) minutosMap[r.jugador_id] = r.minutos_jugados;
              if (r.min_q1 || r.min_q2 || r.min_q3 || r.min_q4) {
                porCuartoMap[r.jugador_id] = {
                  q1: r.min_q1 || 0, q2: r.min_q2 || 0, q3: r.min_q3 || 0, q4: r.min_q4 || 0,
                };
              }
            }
            setPartidoFinalizado({ cambios: cambiosDb || [], minutos: minutosMap, porCuarto: porCuartoMap });
          } else {
            setPartidoFinalizado(false);
          }
        })();
      }, [fecha.id, convRows]);

      // ─── Persistir estado en localStorage cada vez que cambia ─────────────
      useEffect(() => {
        try {
          localStorage.setItem(vivoKey(fecha.id), JSON.stringify(state));
        } catch (e) {}
      }, [state, fecha.id]);

      // ─── Estado "live" derivado: aplica el offset desde startedAt si está corriendo ──
      // Esto permite que después de un bloqueo de pantalla, los relojes salten correctamente
      // (porque se basan en el timestamp, no en un contador acumulado).
      const computeLiveValues = (s, now) => {
        if (!s.isRunning || !s.startedAt) {
          return {
            segundosCuarto: s.segundosCuarto,
            minutosJugados: s.minutosJugados,
            tiempoSinCambio: s.tiempoSinCambio,
            minutosPorCuarto: s.minutosPorCuarto || {},
          };
        }
        const offset = Math.max(0, Math.floor((now - s.startedAt) / 1000));
        const segs = Math.min(s.segundosCuarto + offset, CUARTO_DURACION);
        const realOffset = segs - s.segundosCuarto;
        const minutos = { ...s.minutosJugados };
        for (const jId of Object.keys(s.formacionActual)) {
          minutos[jId] = (minutos[jId] || 0) + realOffset;
        }
        const sinCambio = { ...s.tiempoSinCambio };
        for (const jId of Object.keys(s.tiempoSinCambio)) {
          sinCambio[jId] = (sinCambio[jId] || 0) + realOffset;
        }
        // Sumar el realOffset al cuarto actual de cada jugador en cancha
        const porCuarto = { ...(s.minutosPorCuarto || {}) };
        const qKey = `q${s.cuarto}`;
        for (const jId of Object.keys(s.formacionActual)) {
          const prev = porCuarto[jId] || { q1: 0, q2: 0, q3: 0, q4: 0 };
          porCuarto[jId] = { ...prev, [qKey]: (prev[qKey] || 0) + realOffset };
        }
        return {
          segundosCuarto: segs,
          minutosJugados: minutos,
          tiempoSinCambio: sinCambio,
          minutosPorCuarto: porCuarto,
        };
      };

      // Estado derivado (lo que se muestra en pantalla)
      const [nowTick, setNowTick] = useState(Date.now());
      const liveValues = computeLiveValues(state, nowTick);

      // ─── Tick visual cada 500ms: solo dispara re-render para refrescar la pantalla ──
      // El cálculo real se hace en computeLiveValues a partir de los timestamps.
      // Si el dispositivo se suspende, al volver el primer tick recalcula correctamente.
      useEffect(() => {
        if (!state.isRunning) return;
        const interval = setInterval(() => {
          setNowTick(Date.now());
        }, 500);
        // También escuchamos visibilitychange para refrescar al volver del bloqueo
        const onVisible = () => {
          if (document.visibilityState === "visible") {
            setNowTick(Date.now());
          }
        };
        document.addEventListener("visibilitychange", onVisible);
        return () => {
          clearInterval(interval);
          document.removeEventListener("visibilitychange", onVisible);
        };
      }, [state.isRunning]);

      // ─── Auto-pausa cuando se cumplen los 15 min ─────────────────────────
      useEffect(() => {
        if (state.isRunning && liveValues.segundosCuarto >= CUARTO_DURACION) {
          // Persistir el estado actual y pausar
          setState(s => ({
            ...s,
            isRunning: false,
            startedAt: null,
            segundosCuarto: liveValues.segundosCuarto,
            minutosJugados: liveValues.minutosJugados,
            tiempoSinCambio: liveValues.tiempoSinCambio,
          }));
        }
      }, [liveValues.segundosCuarto]);

      // ─── Helpers de reloj ─────────────────────────────────────────────────
      const fmtTime = (segs) => {
        const mm = Math.floor(segs / 60);
        const ss = segs % 60;
        return `${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
      };

      const togglePlay = () => setState(s => {
        if (s.isRunning) {
          // Pausando: persistir los valores live a los campos del state y limpiar startedAt
          const live = computeLiveValues(s, Date.now());
          return {
            ...s,
            isRunning: false,
            startedAt: null,
            segundosCuarto: live.segundosCuarto,
            minutosJugados: live.minutosJugados,
            tiempoSinCambio: live.tiempoSinCambio,
            minutosPorCuarto: live.minutosPorCuarto,
          };
        } else {
          // Jugando: marcar startedAt con timestamp actual
          return { ...s, isRunning: true, startedAt: Date.now() };
        }
      });

      const siguienteCuarto = () => {
        if (state.cuarto >= 4) return;
        if (!confirm(`¿Pasar al cuarto ${state.cuarto + 1}? El reloj vuelve a 0:00.`)) return;
        setState(s => {
          // Persistir valores live antes de cambiar el cuarto
          const live = computeLiveValues(s, Date.now());
          return {
            ...s,
            cuarto: s.cuarto + 1,
            segundosCuarto: 0,
            isRunning: false,
            startedAt: null,
            minutosJugados: live.minutosJugados,
            tiempoSinCambio: live.tiempoSinCambio,
            minutosPorCuarto: live.minutosPorCuarto,
          };
        });
      };

      const resetReloj = () => {
        if (!confirm("¿Resetear el reloj a 0:00 (sin perder cambios)?")) return;
        setState(s => {
          const live = computeLiveValues(s, Date.now());
          return {
            ...s,
            segundosCuarto: 0,
            isRunning: false,
            startedAt: null,
            minutosJugados: live.minutosJugados,
            tiempoSinCambio: live.tiempoSinCambio,
            minutosPorCuarto: live.minutosPorCuarto,
          };
        });
      };

      // ─── Lista de jugadores en cancha y disponibles para entrar ───────────
      const enCancha = jugadores.filter(j => state.formacionActual[j.id]); // tiene posición en cancha
      const disponibles = jugadores.filter(j => {
        const r = convRows.find(x => x.jugador_id === j.id);
        return r?.status === "convocado" && !state.formacionActual[j.id]; // convocado pero no en cancha
      });

      // ─── Posiciones SVG ───────────────────────────────────────────────────
      const W = 360, H = 700;
      const pad = 14;
      const fw = W - pad * 2;
      const fh = 510;
      const SUB_ZONE_Y = fh + 35;

      // Coordenadas (en px del SVG) para un jugador
      const pxOfJugador = (jugador) => {
        const fp = state.formacionActual[jugador.id];
        if (fp && positions[fp]) {
          const p = positions[fp];
          return {
            x: pad + (p.x / 100) * fw,
            y: pad + (p.y / 100) * fh,
          };
        }
        // Suplente
        const idx = disponibles.findIndex(s => s.id === jugador.id);
        if (idx < 0) return null;
        const colCount = Math.max(4, Math.ceil(disponibles.length / 2));
        const col = idx % colCount;
        const row = Math.floor(idx / colCount);
        const cellW = fw / colCount;
        return {
          x: pad + col * cellW + cellW / 2,
          y: SUB_ZONE_Y + 26 + row * 70,
        };
      };

      // ─── DRAG: arrastrar un suplente sobre un titular para marcar cambio ──
      const getEventPoint = (e) => {
        const svg = svgRef.current;
        if (!svg) return { x: 0, y: 0 };
        const rect = svg.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: ((clientX - rect.left) / rect.width) * W,
          y: ((clientY - rect.top) / rect.height) * H,
        };
      };

      const handleDragStart = (jugador) => (e) => {
        if (animating) return;
        if (partidoFinalizado) return; // bloqueo en modo lectura
        // Bloquear el drag si ese jugador ya tiene un cambio pendiente (sale o entra)
        if (cambiosPendientes.some(c => c.sale_id === jugador.id || c.entra_id === jugador.id)) return;
        e.preventDefault();
        const p = getEventPoint(e);
        setDraggingId(jugador.id);
        setDragPos(p);
      };

      useEffect(() => {
        if (!draggingId) return;
        const move = (e) => {
          const p = getEventPoint(e);
          setDragPos(p);
          if (e.cancelable) e.preventDefault();
        };
        const up = () => {
          if (!dragPos) { setDraggingId(null); return; }

          const arrastrado = jugadores.find(j => j.id === draggingId);
          const arrastradoEnCancha = !!state.formacionActual[draggingId];

          // 1. Buscar TITULAR más cercano (entre los que están en cancha)
          let titularCercano = null;
          let bestDistT = 35;
          for (const t of enCancha) {
            if (t.id === draggingId) continue; // no soltarse sobre sí mismo
            if (cambiosPendientes.some(c => c.sale_id === t.id || c.entra_id === t.id)) continue;
            const pt = pxOfJugador(t);
            if (!pt) continue;
            const d = Math.hypot(pt.x - dragPos.x, pt.y - dragPos.y);
            if (d < bestDistT) { bestDistT = d; titularCercano = t; }
          }

          // 2. Buscar SUPLENTE más cercano (entre los disponibles)
          let suplenteCercano = null;
          let bestDistS = 35;
          for (const s of disponibles) {
            if (s.id === draggingId) continue;
            if (cambiosPendientes.some(c => c.sale_id === s.id || c.entra_id === s.id)) continue;
            const ps = pxOfJugador(s);
            if (!ps) continue;
            const d = Math.hypot(ps.x - dragPos.x, ps.y - dragPos.y);
            if (d < bestDistS) { bestDistS = d; suplenteCercano = s; }
          }

          // Elegir el más cercano entre titular y suplente
          let destino = null;
          let destinoEsTitular = false;
          if (titularCercano && (!suplenteCercano || bestDistT <= bestDistS)) {
            destino = titularCercano;
            destinoEsTitular = true;
          } else if (suplenteCercano) {
            destino = suplenteCercano;
            destinoEsTitular = false;
          }

          if (destino) {
            if (arrastradoEnCancha && destinoEsTitular) {
              // CASO 1: Titular → Titular = SWAP INMEDIATO (no afecta relojes)
              setState(s => {
                const newFormacion = { ...s.formacionActual };
                const posA = newFormacion[draggingId];
                const posB = newFormacion[destino.id];
                newFormacion[draggingId] = posB;
                newFormacion[destino.id] = posA;
                return { ...s, formacionActual: newFormacion };
              });
            } else if (!arrastradoEnCancha && destinoEsTitular) {
              // CASO 2: Suplente → Titular = cambio pendiente (flujo original)
              setCambiosPendientes(prev => [...prev, { sale_id: destino.id, entra_id: draggingId }]);
            } else if (arrastradoEnCancha && !destinoEsTitular) {
              // CASO 3: Titular → Suplente = cambio pendiente (inverso)
              setCambiosPendientes(prev => [...prev, { sale_id: draggingId, entra_id: destino.id }]);
            }
            // CASO 4: Suplente → Suplente = nada (no tiene sentido)
          }

          setDraggingId(null);
          setDragPos(null);
        };
        window.addEventListener("mousemove", move);
        window.addEventListener("touchmove", move, { passive: false });
        window.addEventListener("mouseup", up);
        window.addEventListener("touchend", up);
        return () => {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("touchmove", move);
          window.removeEventListener("mouseup", up);
          window.removeEventListener("touchend", up);
        };
      }, [draggingId, dragPos, enCancha, disponibles, cambiosPendientes, state.formacionActual, jugadores]);

      // ─── Confirmar cambios pendientes ─────────────────────────────────────
      const confirmarCambios = async () => {
        if (cambiosPendientes.length === 0) return;
        // Paso 1: activar animación
        setAnimating(true);
        await new Promise(r => setTimeout(r, 750));

        // Paso 2: aplicar los cambios al estado
        setState(s => {
          // Primero persistir los valores live al state base (porque vamos a resetear sinCambio)
          const live = computeLiveValues(s, Date.now());
          const minutoActual = Math.floor(live.segundosCuarto / 60);
          const newFormacion = { ...s.formacionActual };
          const newMinutos = { ...live.minutosJugados };
          const newSinCambio = { ...live.tiempoSinCambio };
          const newPorCuarto = { ...(live.minutosPorCuarto || {}) };
          const newCambios = [...s.cambios];
          for (const c of cambiosPendientes) {
            const fieldPos = newFormacion[c.sale_id];
            delete newFormacion[c.sale_id];
            newFormacion[c.entra_id] = fieldPos;
            if (newMinutos[c.entra_id] == null) newMinutos[c.entra_id] = 0;
            if (!newPorCuarto[c.entra_id]) newPorCuarto[c.entra_id] = { q1: 0, q2: 0, q3: 0, q4: 0 };
            newSinCambio[c.sale_id] = 0;
            newSinCambio[c.entra_id] = 0;
            newCambios.push({
              cuarto: s.cuarto,
              minuto_cuarto: minutoActual,
              sale_id: c.sale_id,
              entra_id: c.entra_id,
              field_pos: fieldPos,
            });
          }
          // Si estaba jugando, mantener startedAt en "ahora" para que los relojes sigan corriendo
          return {
            ...s,
            segundosCuarto: live.segundosCuarto,
            formacionActual: newFormacion,
            minutosJugados: newMinutos,
            tiempoSinCambio: newSinCambio,
            minutosPorCuarto: newPorCuarto,
            cambios: newCambios,
            startedAt: s.isRunning ? Date.now() : null,
          };
        });
        setCambiosPendientes([]);
        setAnimating(false);
      };

      const cancelarPendientes = () => {
        if (cambiosPendientes.length === 0) return;
        if (confirm(`¿Cancelar los ${cambiosPendientes.length} cambio${cambiosPendientes.length > 1 ? "s" : ""} pendiente${cambiosPendientes.length > 1 ? "s" : ""}?`)) {
          setCambiosPendientes([]);
        }
      };

      // ─── Finalizar partido: volcar todo a DB ──────────────────────────────
      const finalizarPartido = async () => {
        // Snapshot de los valores live para que el resumen y el guardado sean exactos
        const live = computeLiveValues(state, Date.now());
        // Duración total real del partido: cuartos completos × 15min + segundos del cuarto actual
        const duracionRealSegs = (state.cuarto - 1) * CUARTO_DURACION + live.segundosCuarto;
        if (!confirm(
          `¿Finalizar el partido y guardar todo en la base de datos?\n\n` +
          `Cambios registrados: ${state.cambios.length}\n` +
          `Jugadoras que jugaron: ${Object.keys(live.minutosJugados).filter(k => live.minutosJugados[k] > 0).length}\n` +
          `Duración del partido: ${Math.floor(duracionRealSegs/60)}'\n\n` +
          `Esta acción NO se puede deshacer.`
        )) return;
        setFinalizando(true);
        try {
          // 1. Insertar cambios
          if (state.cambios.length > 0) {
            const payload = state.cambios.map(c => ({
              fecha_id: fecha.id,
              cuarto: c.cuarto,
              minuto_cuarto: c.minuto_cuarto,
              sale_jugador_id: c.sale_id,
              entra_jugador_id: c.entra_id,
              field_pos: c.field_pos,
            }));
            const { error } = await sb.from("cambios").insert(payload);
            if (error) throw error;
          }
          // 2. Update de minutos_jugados, entro_cuarto y minutos por cuarto en fecha_jugadores
          for (const jId of Object.keys(live.minutosJugados)) {
            const minutos = Math.round(live.minutosJugados[jId] / 60);
            const r = convRows.find(x => x.jugador_id === jId);
            let entroCuarto = null;
            if (r?.es_titular === true) entroCuarto = 1;
            else {
              const primerCambio = state.cambios.find(c => c.entra_id === jId);
              if (primerCambio) entroCuarto = primerCambio.cuarto;
            }
            // Minutos por cuarto (cada uno es segundos → redondeo a minuto)
            const pc = (live.minutosPorCuarto || {})[jId] || { q1: 0, q2: 0, q3: 0, q4: 0 };
            await sb.from("fecha_jugadores")
              .update({
                minutos_jugados: minutos,
                entro_cuarto: entroCuarto,
                min_q1: Math.round((pc.q1 || 0) / 60),
                min_q2: Math.round((pc.q2 || 0) / 60),
                min_q3: Math.round((pc.q3 || 0) / 60),
                min_q4: Math.round((pc.q4 || 0) / 60),
              })
              .eq("fecha_id", fecha.id)
              .eq("jugador_id", jId);
          }
          // 3. Guardar la duración real del partido en la fecha
          await sb.from("fechas")
            .update({ duracion_real_segundos: duracionRealSegs })
            .eq("id", fecha.id);
          // 4. Limpiar localStorage
          localStorage.removeItem(vivoKey(fecha.id));
          alert("✓ Partido finalizado. Datos guardados en la base de datos.");
          if (reload) await reload();
        } catch (e) {
          alert("Error al finalizar: " + e.message);
        }
        setFinalizando(false);
      };

      const resetTodo = () => {
        if (!confirm("¿Borrar TODO lo cargado en este partido (cambios, minutos, reloj)? Esto vuelve al estado inicial desde la formación inicial.")) return;
        localStorage.removeItem(vivoKey(fecha.id));
        setState(loadState());
        setCambiosPendientes([]);
      };

      const reabrirPartido = async () => {
        if (!confirm(
          "⚠️ ¿Re-abrir el partido?\n\n" +
          "Esto va a:\n" +
          "  • Borrar los cambios cargados en la base de datos\n" +
          "  • Resetear los minutos jugados a 0\n" +
          "  • Permitirte volver a usar el módulo VIVO desde cero\n\n" +
          "Esta acción NO se puede deshacer."
        )) return;
        try {
          await sb.from("cambios").delete().eq("fecha_id", fecha.id);
          // Resetear minutos_jugados y entro_cuarto en fecha_jugadores
          await sb.from("fecha_jugadores")
            .update({ minutos_jugados: 0, entro_cuarto: null, min_q1: 0, min_q2: 0, min_q3: 0, min_q4: 0 })
            .eq("fecha_id", fecha.id);
          setPartidoFinalizado(false);
          localStorage.removeItem(vivoKey(fecha.id));
          setState(loadState());
          setCambiosPendientes([]);
          alert("✓ Partido re-abierto. Podés volver a usar el módulo VIVO.");
          if (reload) await reload();
        } catch (e) {
          alert("Error al re-abrir: " + e.message);
        }
      };

      // ─── Render de una ficha en SVG ───────────────────────────────────────
      const renderFicha = (jugador, isInCancha) => {
        const isDragging = draggingId === jugador.id;
        const isPendienteSale = cambiosPendientes.some(c => c.sale_id === jugador.id);
        const isPendienteEntra = cambiosPendientes.some(c => c.entra_id === jugador.id);
        const isAnimating = animating && (isPendienteSale || isPendienteEntra);

        let basePos = pxOfJugador(jugador);
        if (!basePos) return null;
        const pos = isDragging && dragPos ? dragPos : basePos;

        // Color de la ficha
        const fp = state.formacionActual[jugador.id];
        const isGK = fp === "GK";
        let fillColor;
        if (isInCancha) {
          fillColor = isGK ? "var(--gold)" : (club.theme_primary || "var(--plat)");
        } else {
          fillColor = "var(--red)";
        }

        // Para la animación: la ficha "viaja" hacia su nueva posición
        // Calculamos el destino solo si está animando este jugador en cambio
        let animOffset = { dx: 0, dy: 0 };
        if (isAnimating) {
          const cambio = cambiosPendientes.find(c => c.sale_id === jugador.id || c.entra_id === jugador.id);
          if (cambio) {
            const otroId = cambio.sale_id === jugador.id ? cambio.entra_id : cambio.sale_id;
            const otroJugador = jugadores.find(j => j.id === otroId);
            const otroPos = otroJugador ? pxOfJugador(otroJugador) : null;
            if (otroPos) {
              animOffset = { dx: otroPos.x - basePos.x, dy: otroPos.y - basePos.y };
            }
          }
        }

        const r = isInCancha ? 21 : 18;
        const hitR = 30;
        const apellido = displayName(jugador);
        // Dos relojes: tiempo sin cambio + tiempo neto en cancha
        const segSinCambio = liveValues.tiempoSinCambio?.[jugador.id] ?? 0;
        const segEnCancha = liveValues.minutosJugados[jugador.id] ?? 0;
        const tiempoDoble = `${fmtTime(segSinCambio)}(${fmtTime(segEnCancha)})`;

        return (
          <g key={jugador.id}
             className={isAnimating ? "ficha-animating" : ""}
             transform={`translate(${animOffset.dx}, ${animOffset.dy})`}
             style={{
               cursor: "grab",
               touchAction:"none",
             }}
             opacity={isDragging ? 0.85 : (isPendienteSale && !animating ? 0.6 : 1)}
             onMouseDown={handleDragStart(jugador)}
             onTouchStart={handleDragStart(jugador)}>
            {/* Hit area invisible (más grande para mobile) */}
            <circle cx={pos.x} cy={pos.y} r={hitR} fill="transparent" pointerEvents="all"/>
            {/* Ficha */}
            <circle cx={pos.x} cy={pos.y} r={r}
              fill={fillColor}
              stroke={isPendienteSale ? "var(--orange)" : (isPendienteEntra ? "var(--orange)" : "var(--bg)")}
              strokeWidth={isPendienteSale || isPendienteEntra ? 3 : 2}
              style={{filter: isDragging ? "drop-shadow(0 4px 10px rgba(0,0,0,0.6))" : "none"}}
              pointerEvents="none"/>
            <text x={pos.x} y={pos.y + 6} textAnchor="middle"
              fontSize={isInCancha ? 17 : 14} fontWeight={900} fontFamily="var(--mono)" fill="var(--bg)" pointerEvents="none">
              {jugador.numero ?? "?"}
            </text>
            {/* Apellido + relojes dobles (siempre, en cancha o suplente) */}
            {!isDragging && (
              <>
